<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404: Страница не найдена — Antviz</title>
  <meta name="description" content="Страница не найдена. Вернитесь на главную или посмотрите наши услуги." />
  <link rel="canonical" href="https://antviz.ru/404" />
  <link rel="icon" href="img/favicon.png" type="image/png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Geologica:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #1ede7b;
      --green-h: #1ac16b;
      --green-d: #149955;
      --green-light: #d2f8e5;
      --green-lighter: #e8fcf2;
      --bg: #fff;
      --bg2: #f2f4f7;
      --bg3: #f9fafc;
      --text: #191b1e;
      --muted: #707a8a;
      --border: #dfe3e8;
      --border2: #cbcdd6;
      --dark: #191b1e;
      --dark2: #2b2f33;
      --sh1: 0 4px 16px rgba(0,51,153,.04), 0 2px 2px rgba(0,51,153,.08);
      --sh2: 0 8px 20px rgba(0,51,153,.08), 0 4px 8px rgba(0,51,153,.08);
      --font: 'Geologica', 'Inter', 'Arial', sans-serif;
    }
    html, body {
      margin: 0;
      padding: 0;
      overflow-x: hidden; /* Полная блокировка горизонтального скролла */
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-weight: 300;
      line-height: 1.5;
      letter-spacing: -0.02em;
      -webkit-font-smoothing: antialiased;
      /* FLEX-BOX УБРАН, чтобы не ломать самостоятельный дизайн вашего меню */
    }

    /* ── HERO БЛОК КОНТЕНТА ── */
    .hero-section {
      position: relative;
      overflow: hidden;
      /* Увеличили верхний отступ, чтобы опустить контент ниже под меню */
      padding: 150px 24px 80px 24px; 
      min-height: 65vh;
      display: flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
    }
    @media (max-width: 768px) {
      .hero-section { 
        /* Опускаем контент на мобилках с запасом под мобильное меню */
        padding: 110px 16px 60px 16px;
        min-height: 55vh;
      }
    }

    .hero-bg-glow {
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(30,222,123,.06) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .hero-inner {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 560px;
      width: 100%;
      box-sizing: border-box;
      overflow-wrap: break-word;
    }

    /* ── 404 число ── */
    .error-number {
      font-size: clamp(70px, 20vw, 160px);
      font-weight: 600;
      line-height: 0.9;
      letter-spacing: -0.04em;
      margin-bottom: 16px;
      position: relative;
      display: inline-block;
      max-width: 100%;
    }
    .error-number .digit {
      display: inline-block;
      animation: float-digit 3s ease-in-out infinite;
    }
    .error-number .digit:nth-child(1) { animation-delay: 0s; color: var(--green); }
    .error-number .digit:nth-child(2) { animation-delay: 0.15s; color: var(--text); }
    .error-number .digit:nth-child(3) { animation-delay: 0.3s; color: var(--green); }

    @keyframes float-digit {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    /* ── Заголовок ── */
    .error-title {
      font-size: clamp(24px, 5vw, 42px);
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1.12;
      margin-bottom: 16px;
      padding: 0 8px;
    }
    .error-title em {
      font-style: normal;
      color: var(--green);
    }

    .error-desc {
      font-size: 16px;
      color: var(--muted);
      line-height: 1.6;
      max-width: 420px;
      margin: 0 auto 36px;
      padding: 0 8px;
    }

    /* ── Кнопки ── */
    .error-actions {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 48px;
      width: 100%;
    }
    @media (max-width: 500px) {
      .error-actions { 
        flex-direction: column; 
        width: 100%; 
        padding: 0 8px;
      }
      .error-actions .btn { 
        width: 100%; 
        justify-content: center; 
      }
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font);
      font-weight: 500;
      text-decoration: none;
      border: none;
      border-radius: 12px;
      padding: 16px 32px;
      font-size: 16px;
      letter-spacing: -0.01em;
      transition: background .15s, transform .12s, box-shadow .15s;
      cursor: pointer;
    }
    .btn:hover { transform: translateY(-2px); }
    .btn-primary {
      background: var(--dark);
      color: #fff;
      box-shadow: var(--sh1);
    }
    .btn-primary:hover {
      background: var(--dark2);
      box-shadow: var(--sh2);
    }
    .btn-secondary {
      background: transparent;
      border: 1.5px solid var(--border);
      color: var(--text);
    }
    .btn-secondary:hover {
      border-color: var(--border2);
      background: var(--bg2);
    }

    /* ── Быстрые ссылки ── */
    .quick-links {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 8px;
      padding-top: 32px;
      border-top: 1px solid var(--border);
      width: 100%;
    }
    .quick-links-label {
      width: 100%;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .quick-link {
      font-size: 14px;
      color: var(--muted);
      text-decoration: none;
      padding: 6px 18px;
      border: 1px solid var(--border);
      border-radius: 100px;
      transition: border-color .2s, color .2s, background .2s;
    }
    .quick-link:hover {
      border-color: var(--green);
      color: var(--text);
      background: var(--green-light);
    }

    /* ── Анимация появления ── */
    .reveal {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity .6s ease, transform .6s ease;
    }
    .reveal.visible { opacity: 1; transform: translateY(0); }
    .reveal-1 { transition-delay: 0.05s; }
    .reveal-2 { transition-delay: 0.15s; }
    .reveal-3 { transition-delay: 0.25s; }
    .reveal-4 { transition-delay: 0.35s; }

    /* ── Декоративные элементы ── */
    .deco-ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid var(--border);
      pointer-events: none;
      opacity: 0.4;
    }
    .deco-ring-1 {
      width: 400px;
      height: 400px;
      top: 10%;
      right: -100px;
      animation: spin-slow 30s linear infinite;
    }
    .deco-ring-2 {
      width: 280px;
      height: 280px;
      bottom: 5%;
      left: -60px;
      animation: spin-slow 40s linear infinite reverse;
    }
    .deco-ring-3 {
      width: 160px;
      height: 160px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      border-color: rgba(30,222,123,.15);
      animation: spin-slow 20s linear infinite;
    }

    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* ── Частицы ── */
    .particle {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      opacity: 0;
      animation: particle-float linear infinite;
      z-index: 0;
    }
    @keyframes particle-float {
      0% {
        transform: translateY(100vh) scale(0);
        opacity: 0;
      }
      10% { opacity: 0.6; }
      90% { opacity: 0.2; }
      100% {
        transform: translateY(-10vh) scale(1);
        opacity: 0;
      }
    }

    @media (max-width: 768px) {
      .deco-ring-1 { width: 200px; height: 200px; right: -40px; }
      .deco-ring-2 { width: 150px; height: 150px; left: -30px; }
      .deco-ring-3 { width: 100px; height: 100px; }
    }

    /* Изоляция футера внизу страницы */
    footer {
      position: relative;
      z-index: 10;
      width: 100%;
      clear: both;
      display: block !important;
    }
  </style>
</head>
<body>

<script src="nav.js" data-page="404"></script>

<div id="particles"></div>

<section class="hero-section">
  <div class="deco-ring deco-ring-1"></div>
  <div class="deco-ring deco-ring-2"></div>
  <div class="deco-ring deco-ring-3"></div>

  <div class="hero-bg-glow"></div>

  <div class="hero-inner">
    <div class="error-number reveal reveal-1">
      <span class="digit">4</span>
      <span class="digit">0</span>
      <span class="digit">4</span>
    </div>

    <h1 class="error-title reveal reveal-2">
      Упс… Такой страницы <em>нет</em>
    </h1>

    <p class="error-desc reveal reveal-3">
      Возможно, ссылка устарела, в адресе опечатка или страница была удалена. Но не переживайте — мы поможем найти дорогу.
    </p>

    <div class="error-actions reveal reveal-4">
      <a href="/" class="btn btn-primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/>
          <path d="M9 21V12h6v9"/>
        </svg>
        На главную
      </a>
      <a href="order" class="btn btn-secondary">
        Заказать сайт
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </a>
    </div>

    <div class="quick-links reveal reveal-4">
      <div class="quick-links-label">Или перейдите в раздел</div>
      <a href="about" class="quick-link">Обо мне</a>
      <a href="profile/support" class="quick-link">Поддержка</a>
      <a href="profile" class="quick-link">Личный кабинет</a>
      <a href="rules" class="quick-link">Правила</a>
    </div>
  </div>
</section>

<script type="module">
  import { auth } from './firebase-config.js';
  import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  onAuthStateChanged(auth, user => {
    const np = document.getElementById('navProfile');
    const nl = document.getElementById('navLogin');
    if (user) {
      if (np) np.style.display = 'flex';
      if (nl) nl.style.display = 'none';
    } else {
      if (np) np.style.display = 'none';
      if (nl) nl.style.display = 'flex';
    }
  });
</script>

<script>
  // ── Появление элементов ──
  const obs = new IntersectionObserver((entries) => {
    entries.forEach(el => {
      if (el.isIntersecting) el.target.classList.add('visible');
    });
  }, { threshold: 0.1 });
  document.querySelectorAll('.reveal').forEach(el => obs.observe(el));

  // ── Частицы ──
  (function() {
    const container = document.getElementById('particles');
    if (!container) return;
    const colors = ['rgba(30,222,123,', 'rgba(30,222,123,', 'rgba(30,222,123,'];
    for (let i = 0; i < 20; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 5 + 2;
      const color = colors[Math.floor(Math.random() * colors.length)];
      p.style.cssText = `
        width: ${size}px; height: ${size}px;
        left: ${Math.random() * 100}%;
        background: ${color}${Math.random() * 0.3 + 0.1});
        animation-duration: ${Math.random() * 14 + 10}s;
        animation-delay: ${Math.random() * 12}s;
      `;
      container.appendChild(p);
    }
  })();
</script>

<script src="footer.js" data-page="404"></script>
<script src="GEOBLOCK.js"></script>
<script type="module" src="maintenance.js"></script>
</body>
</html>
