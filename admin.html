<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Админ — Design Antviz</title>
  <link rel="icon" href="favicon.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;600;900&family=Onest:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#07070a;--bg2:#0e0e13;--bg3:#141419;--card:#121217;--border:rgba(255,255,255,0.07);--accent:#6c63ff;--accent2:#a78bfa;--accent3:#38bdf8;--text:#f0f0f5;--muted:#666678;--success:#4ade80;--error:#f87171;--warn:#fbbf24}
    body{background:var(--bg);color:var(--text);font-family:'Onest',sans-serif;font-weight:300;line-height:1.6;min-height:100vh}
    body::before{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 50% 30% at 20% 0%,rgba(108,99,255,.1) 0%,transparent 60%);pointer-events:none}

    /* TOP BAR */
    .topbar{position:sticky;top:0;z-index:100;background:rgba(12,12,18,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:.9rem 2rem;display:flex;align-items:center;justify-content:space-between;gap:1rem}
    .topbar-left{display:flex;align-items:center;gap:1.5rem}
    .logo{font-family:'Unbounded',sans-serif;font-weight:600;font-size:.85rem;text-decoration:none;color:var(--text);display:flex;align-items:center;gap:8px}
    .logo-dot{width:7px;height:7px;border-radius:50%;background:var(--error);box-shadow:0 0 10px var(--error)}
    .admin-badge{background:rgba(248,113,113,.15);color:var(--error);border:1px solid rgba(248,113,113,.25);padding:.2rem .65rem;border-radius:50px;font-size:.7rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase}
    .topbar-right{display:flex;align-items:center;gap:1rem}
    .topbar-stat{text-align:center}
    .topbar-stat-num{font-family:'Unbounded',sans-serif;font-weight:700;font-size:1rem;color:var(--accent2)}
    .topbar-stat-label{font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
    .btn-logout{background:none;border:1px solid var(--border);color:var(--muted);font-family:'Onest',sans-serif;font-size:.78rem;padding:.4rem .9rem;border-radius:8px;cursor:pointer;transition:all .2s}
    .btn-logout:hover{border-color:var(--error);color:var(--error)}

    /* LAYOUT */
    .layout{display:grid;grid-template-columns:1fr 360px;gap:0;min-height:calc(100vh - 60px);position:relative;z-index:1}

    /* ORDERS PANEL */
    .orders-panel{border-right:1px solid var(--border);overflow-y:auto;height:calc(100vh - 60px);position:sticky;top:60px}
    .panel-header{padding:1.2rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:1rem;position:sticky;top:0;background:var(--bg2);z-index:10}
    .panel-title{font-family:'Unbounded',sans-serif;font-weight:600;font-size:.85rem}
    .filter-row{display:flex;gap:.4rem}
    .filter-btn{background:var(--bg3);border:1px solid var(--border);color:var(--muted);font-family:'Onest',sans-serif;font-size:.72rem;padding:.3rem .7rem;border-radius:8px;cursor:pointer;transition:all .18s}
    .filter-btn.active{background:rgba(108,99,255,.15);color:var(--accent2);border-color:rgba(108,99,255,.3)}
    .orders-list{padding:.8rem}

    .order-row{background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:1rem 1.1rem;margin-bottom:.6rem;cursor:pointer;transition:border-color .18s,background .18s}
    .order-row:hover{border-color:rgba(108,99,255,.3);background:rgba(108,99,255,.04)}
    .order-row.selected{border-color:var(--accent);background:rgba(108,99,255,.08)}
    .order-row-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:.4rem;gap:.5rem}
    .order-row-id{font-family:'Unbounded',sans-serif;font-size:.75rem;font-weight:600}
    .order-row-user{font-size:.75rem;color:var(--muted);margin-bottom:.2rem}
    .order-row-meta{display:flex;align-items:center;justify-content:space-between;gap:.5rem}
    .order-row-price{font-weight:600;font-size:.82rem}
    .order-row-date{font-size:.68rem;color:var(--muted)}
    .status-badge{display:inline-flex;align-items:center;gap:.3rem;padding:.22rem .65rem;border-radius:50px;font-size:.68rem;font-weight:600;flex-shrink:0}
    .status-0{background:rgba(251,191,36,.12);color:var(--warn);border:1px solid rgba(251,191,36,.2)}
    .status-1{background:rgba(56,189,248,.12);color:var(--accent3);border:1px solid rgba(56,189,248,.2)}
    .status-2{background:rgba(74,222,128,.12);color:var(--success);border:1px solid rgba(74,222,128,.2)}
    .status-dot{width:5px;height:5px;border-radius:50%;background:currentColor}

    /* DETAIL PANEL */
    .detail-panel{overflow-y:auto;height:calc(100vh - 60px);position:sticky;top:60px}
    .detail-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--muted);gap:.8rem;padding:2rem;text-align:center}
    .detail-empty-icon{font-size:2.5rem;opacity:.4}
    .detail-content{padding:1.5rem;display:none}
    .detail-content.show{display:block}

    .detail-section{margin-bottom:1.5rem}
    .detail-section-title{font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:.7rem;font-weight:500}
    .detail-id{font-family:'Unbounded',sans-serif;font-weight:700;font-size:1rem;color:var(--text);margin-bottom:.3rem}
    .detail-meta{color:var(--muted);font-size:.8rem;display:flex;gap:.8rem;flex-wrap:wrap;margin-bottom:1rem}
    .detail-desc{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:1rem;font-size:.85rem;line-height:1.6;color:var(--muted)}

    .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:.5rem}
    .info-item{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:.65rem .8rem}
    .info-item-label{font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.2rem}
    .info-item-val{font-size:.82rem;font-weight:500}

    .status-controls{display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;margin-bottom:1rem}
    .status-btn{background:var(--bg3);border:1px solid var(--border);color:var(--muted);font-family:'Onest',sans-serif;font-size:.75rem;padding:.6rem .5rem;border-radius:10px;cursor:pointer;transition:all .18s;text-align:center;font-weight:500}
    .status-btn:hover{border-color:rgba(108,99,255,.4);color:var(--text)}
    .status-btn.s0.active{background:rgba(251,191,36,.12);color:var(--warn);border-color:rgba(251,191,36,.3)}
    .status-btn.s1.active{background:rgba(56,189,248,.12);color:var(--accent3);border-color:rgba(56,189,248,.3)}
    .status-btn.s2.active{background:rgba(74,222,128,.12);color:var(--success);border-color:rgba(74,222,128,.3)}

    /* CHAT IN ADMIN */
    .admin-chat{background:var(--bg3);border:1px solid var(--border);border-radius:14px;overflow:hidden}
    .admin-chat-header{padding:.8rem 1rem;border-bottom:1px solid var(--border);font-size:.8rem;font-weight:500}
    .admin-chat-messages{max-height:220px;overflow-y:auto;padding:.8rem;display:flex;flex-direction:column;gap:.5rem}
    .admin-chat-messages::-webkit-scrollbar{width:3px}
    .admin-chat-messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
    .msg{max-width:85%;display:flex;flex-direction:column;gap:.15rem}
    .msg.mine{align-self:flex-end;align-items:flex-end}
    .msg.theirs{align-self:flex-start;align-items:flex-start}
    .msg-bubble{padding:.5rem .8rem;border-radius:12px;font-size:.8rem;line-height:1.5}
    .msg.mine .msg-bubble{background:rgba(248,113,113,.2);color:#fff;border-bottom-right-radius:3px}
    .msg.theirs .msg-bubble{background:var(--card);color:var(--text);border-bottom-left-radius:3px}
    .msg-time{font-size:.6rem;color:var(--muted)}
    .admin-chat-input-row{padding:.6rem .8rem;border-top:1px solid var(--border);display:flex;gap:.5rem}
    .admin-chat-input{flex:1;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.5rem .8rem;color:var(--text);font-family:'Onest',sans-serif;font-size:.82rem;outline:none;resize:none}
    .admin-chat-input:focus{border-color:var(--accent)}
    .admin-chat-send{width:34px;height:34px;border-radius:8px;background:var(--accent);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .admin-chat-send svg{width:14px;height:14px}

    .empty-orders{text-align:center;padding:2.5rem 1rem;color:var(--muted);font-size:.85rem}

    /* TOAST */
    .toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(20px);z-index:500;padding:.6rem 1.2rem;border-radius:50px;font-size:.78rem;font-weight:500;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;white-space:nowrap}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .toast.success{background:var(--success);color:#000}
    .toast.error{background:var(--error);color:#fff}
    .toast.info{background:var(--accent);color:#fff}

    .loading-screen{position:fixed;inset:0;z-index:1000;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem}
    .loading-spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    @media(max-width:768px){
      .layout{grid-template-columns:1fr}
      .orders-panel{height:auto;position:static}
      .detail-panel{height:auto;position:static;border-top:1px solid var(--border)}
      .topbar-stat{display:none}
    }
  </style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
  <div class="loading-spinner"></div>
  <p style="color:var(--muted);font-size:.82rem">Проверка доступа...</p>
</div>

<div id="appWrap" style="display:none">
  <div class="topbar">
    <div class="topbar-left">
      <a href="index.html" class="logo"><span class="logo-dot"></span>Design Antviz</a>
      <span class="admin-badge">Admin</span>
    </div>
    <div class="topbar-right">
      <div class="topbar-stat">
        <div class="topbar-stat-num" id="statAll">0</div>
        <div class="topbar-stat-label">Заказов</div>
      </div>
      <div class="topbar-stat">
        <div class="topbar-stat-num" id="statPending" style="color:var(--warn)">0</div>
        <div class="topbar-stat-label">Ожидают</div>
      </div>
      <div class="topbar-stat">
        <div class="topbar-stat-num" id="statWork" style="color:var(--accent3)">0</div>
        <div class="topbar-stat-label">В работе</div>
      </div>
      <div class="topbar-stat">
        <div class="topbar-stat-num" id="statDone" style="color:var(--success)">0</div>
        <div class="topbar-stat-label">Готово</div>
      </div>
      <button class="btn-logout" onclick="doLogout()">Выйти</button>
    </div>
  </div>

  <div class="layout">
    <!-- LEFT: ORDERS LIST -->
    <div class="orders-panel">
      <div class="panel-header">
        <div class="panel-title">Все заказы</div>
        <div class="filter-row">
          <button class="filter-btn active" onclick="setFilter(-1, this)">Все</button>
          <button class="filter-btn" onclick="setFilter(0, this)">🟡</button>
          <button class="filter-btn" onclick="setFilter(1, this)">🔵</button>
          <button class="filter-btn" onclick="setFilter(2, this)">🟢</button>
        </div>
      </div>
      <div class="orders-list" id="ordersList">
        <div class="empty-orders">Загрузка...</div>
      </div>
    </div>

    <!-- RIGHT: DETAIL -->
    <div class="detail-panel">
      <div class="detail-empty" id="detailEmpty">
        <div class="detail-empty-icon">👈</div>
        <p style="font-size:.85rem">Выберите заказ слева</p>
      </div>
      <div class="detail-content" id="detailContent">

        <div class="detail-section">
          <div class="detail-section-title">Заказ</div>
          <div class="detail-id" id="detailId"></div>
          <div class="detail-meta" id="detailMeta"></div>
          <div class="detail-desc" id="detailDesc" style="display:none"></div>
        </div>

        <div class="detail-section">
          <div class="detail-section-title">Клиент</div>
          <div class="info-grid" id="detailClient"></div>
        </div>

        <div class="detail-section">
          <div class="detail-section-title">Детали заказа</div>
          <div class="info-grid" id="detailInfo"></div>
        </div>

        <div class="detail-section">
          <div class="detail-section-title">Сменить статус</div>
          <div class="status-controls">
            <button class="status-btn s0" onclick="setStatus(0)">🟡 Ожидание</button>
            <button class="status-btn s1" onclick="setStatus(1)">🔵 В работе</button>
            <button class="status-btn s2" onclick="setStatus(2)">🟢 Готово</button>
          </div>
        </div>

        <div class="detail-section">
          <div class="detail-section-title">Чат с клиентом</div>
          <div class="admin-chat">
            <div class="admin-chat-header">💬 Сообщения</div>
            <div class="admin-chat-messages" id="adminChatMessages">
              <div style="color:var(--muted);font-size:.78rem;text-align:center;padding:.5rem">Нет сообщений</div>
            </div>
            <div class="admin-chat-input-row">
              <textarea class="admin-chat-input" id="adminChatInput" rows="1" placeholder="Ответить клиенту..."
                onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();adminSendMsg()}"></textarea>
              <button class="admin-chat-send" onclick="adminSendMsg()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
              </button>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { auth, db, ADMIN_EMAIL } from './firebase-config.js';
  import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import {
    collection, query, orderBy, onSnapshot,
    doc, updateDoc, addDoc, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  let allOrders = [];
  let currentFilter = -1;
  let selectedOrderId = null;
  let selectedClientUid = null;
  let unsubChat = null;

  function toast(msg, type = 'info') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type} show`;
    setTimeout(() => t.className = 'toast', 3000);
  }

  function formatDate(ts) {
    if (!ts) return '—';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleDateString('ru', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
  }

  function formatTime(ts) {
    if (!ts) return '';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' });
  }

  const statusLabels = ['Ожидание', 'В работе', 'Готово'];

  function renderOrdersList() {
    const filtered = currentFilter === -1 ? allOrders : allOrders.filter(o => o.status === currentFilter);
    const el = document.getElementById('ordersList');
    if (!filtered.length) {
      el.innerHTML = '<div class="empty-orders">Заказов нет</div>';
      return;
    }
    el.innerHTML = filtered.map(o => `
      <div class="order-row ${o.id === selectedOrderId ? 'selected' : ''}" onclick="selectOrder('${o.id}')">
        <div class="order-row-head">
          <span class="order-row-id">№ ${o.id.slice(0,8).toUpperCase()}</span>
          <span class="status-badge status-${o.status || 0}"><span class="status-dot"></span>${statusLabels[o.status || 0]}</span>
        </div>
        <div class="order-row-user">${o.clientName || o.clientEmail || 'Неизвестен'}</div>
        <div class="order-row-meta">
          <span class="order-row-price">${o.totalPrice ? o.totalPrice.toLocaleString('ru') + ' ₽' : '—'}</span>
          <span class="order-row-date">${formatDate(o.createdAt)}</span>
        </div>
      </div>`).join('');
  }

  function updateTopStats() {
    document.getElementById('statAll').textContent = allOrders.length;
    document.getElementById('statPending').textContent = allOrders.filter(o => (o.status||0) === 0).length;
    document.getElementById('statWork').textContent = allOrders.filter(o => o.status === 1).length;
    document.getElementById('statDone').textContent = allOrders.filter(o => o.status === 2).length;
  }

  window.setFilter = function(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderOrdersList();
  };

  window.selectOrder = function(id) {
    selectedOrderId = id;
    renderOrdersList();
    const o = allOrders.find(x => x.id === id);
    if (!o) return;
    selectedClientUid = o.uid;

    document.getElementById('detailEmpty').style.display = 'none';
    document.getElementById('detailContent').classList.add('show');

    document.getElementById('detailId').textContent = '№ ' + o.id.slice(0,8).toUpperCase();
    document.getElementById('detailMeta').innerHTML = `
      <span>${formatDate(o.createdAt)}</span>
      <span class="status-badge status-${o.status||0}"><span class="status-dot"></span>${statusLabels[o.status||0]}</span>`;

    const desc = document.getElementById('detailDesc');
    if (o.description) { desc.textContent = o.description; desc.style.display = 'block'; }
    else desc.style.display = 'none';

    document.getElementById('detailClient').innerHTML = `
      <div class="info-item"><div class="info-item-label">Имя</div><div class="info-item-val">${o.clientName || '—'}</div></div>
      <div class="info-item"><div class="info-item-label">Email</div><div class="info-item-val" style="font-size:.75rem;word-break:break-all">${o.clientEmail || '—'}</div></div>`;

    document.getElementById('detailInfo').innerHTML = `
      <div class="info-item"><div class="info-item-label">Тип сайта</div><div class="info-item-val">${o.siteType || '—'}</div></div>
      <div class="info-item"><div class="info-item-label">Тариф</div><div class="info-item-val">${o.tariff || '—'}</div></div>
      <div class="info-item"><div class="info-item-label">Страниц</div><div class="info-item-val">${o.pages || '—'}</div></div>
      <div class="info-item"><div class="info-item-label">Сумма</div><div class="info-item-val">${o.totalPrice ? o.totalPrice.toLocaleString('ru') + ' ₽' : '—'}</div></div>`;

    // Статус кнопки
    document.querySelectorAll('.status-btn').forEach((b, i) => b.classList.toggle('active', i === (o.status||0)));

    // Chat
    if (unsubChat) unsubChat();
    loadAdminChat(o.uid);
  };

  window.setStatus = async function(s) {
    if (!selectedOrderId) return;
    try {
      await updateDoc(doc(db, 'orders', selectedOrderId), { status: s });
      toast('Статус обновлён ✓', 'success');
    } catch(e) {
      toast('Ошибка обновления', 'error');
    }
  };

  function loadAdminChat(uid) {
    const { query: q2, collection: col, orderBy: ob, onSnapshot: ons } = { query, collection, orderBy, onSnapshot };
    const chatQ = q2(col(db, 'chats', uid, 'messages'), ob('createdAt', 'asc'));
    unsubChat = ons(chatQ, snap => {
      const msgs = snap.docs.map(d => d.data());
      const container = document.getElementById('adminChatMessages');
      if (!msgs.length) {
        container.innerHTML = '<div style="color:var(--muted);font-size:.78rem;text-align:center;padding:.5rem">Нет сообщений</div>';
        return;
      }
      container.innerHTML = msgs.map(m => {
        const isAdmin = m.sender === 'admin';
        return `<div class="msg ${isAdmin ? 'mine' : 'theirs'}">
          <div class="msg-bubble">${m.text}</div>
          <div class="msg-time">${isAdmin ? 'Вы' : (m.senderName || 'Клиент')} · ${formatTime(m.createdAt)}</div>
        </div>`;
      }).join('');
      container.scrollTop = container.scrollHeight;
    });
  }

  window.adminSendMsg = async function() {
    if (!selectedClientUid) return;
    const input = document.getElementById('adminChatInput');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    try {
      await addDoc(collection(db, 'chats', selectedClientUid, 'messages'), {
        text,
        sender: 'admin',
        senderName: 'Поддержка',
        createdAt: serverTimestamp()
      });
    } catch(e) {
      toast('Ошибка отправки', 'error');
    }
  };

  window.doLogout = async function() {
    if (unsubChat) unsubChat();
    await signOut(auth);
    window.location.href = 'auth.html';
  };

  onAuthStateChanged(auth, user => {
    document.getElementById('loadingScreen').style.display = 'none';
    if (!user || user.email !== ADMIN_EMAIL) {
      document.body.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:1rem;font-family:'Onest',sans-serif;color:#f0f0f5;background:#07070a">
        <div style="font-size:2rem">🚫</div>
        <div style="font-family:'Unbounded',sans-serif;font-weight:700">Нет доступа</div>
        <div style="color:#777789;font-size:.85rem">Эта страница только для администратора</div>
        <a href="index.html" style="color:#a78bfa;font-size:.85rem;text-decoration:none">← На главную</a>
      </div>`;
      return;
    }

    document.getElementById('appWrap').style.display = 'block';

    // Слушаем ВСЕ заказы
    const q = query(collection(db, 'orders'), orderBy('createdAt', 'desc'));
    onSnapshot(q, snap => {
      allOrders = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      updateTopStats();
      renderOrdersList();
      // Обновить открытый заказ если он изменился
      if (selectedOrderId) {
        const updated = allOrders.find(o => o.id === selectedOrderId);
        if (updated) {
          document.querySelectorAll('.status-btn').forEach((b, i) => b.classList.toggle('active', i === (updated.status||0)));
          document.getElementById('detailMeta').innerHTML = `
            <span>${formatDate(updated.createdAt)}</span>
            <span class="status-badge status-${updated.status||0}"><span class="status-dot"></span>${statusLabels[updated.status||0]}</span>`;
        }
      }
    });
  });
</script>
</body>
</html>
