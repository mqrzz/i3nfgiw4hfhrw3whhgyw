<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Админ — Design Antviz</title>
  <link rel="icon" href="favicon.png" type="image/png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;600;900&family=Onest:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#07070a;--bg2:#0e0e13;--bg3:#141419;--card:#121217;
      --border:rgba(255,255,255,.07);--accent:#6c63ff;--accent2:#a78bfa;
      --accent3:#38bdf8;--text:#f0f0f5;--muted:#666678;
      --success:#4ade80;--error:#f87171;--warn:#fbbf24;
      --topbar-h:60px;
    }
    html,body{height:100%;overflow:hidden}
    body{background:var(--bg);color:var(--text);font-family:'Onest',sans-serif;font-weight:300}

    /* ── LOADING ── */
    .loading-screen{position:fixed;inset:0;z-index:1000;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem}
    .spinner{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── TOPBAR ── */
    .topbar{
      position:fixed;top:0;left:0;right:0;z-index:100;height:var(--topbar-h);
      background:rgba(9,9,13,.97);backdrop-filter:blur(20px);
      border-bottom:1px solid var(--border);
      display:flex;align-items:center;justify-content:space-between;
      padding:0 1.5rem;gap:1rem;
    }
    .tbar-left{display:flex;align-items:center;gap:1rem}
    .logo{font-family:'Unbounded',sans-serif;font-weight:600;font-size:.85rem;text-decoration:none;color:var(--text);display:flex;align-items:center;gap:8px}
    .logo-dot{width:7px;height:7px;border-radius:50%;background:var(--error);box-shadow:0 0 10px var(--error)}
    .admin-badge{background:rgba(248,113,113,.13);color:var(--error);border:1px solid rgba(248,113,113,.22);padding:.18rem .65rem;border-radius:50px;font-size:.68rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase}
    .tbar-right{display:flex;align-items:center;gap:1.2rem}
    .tstat{text-align:center;padding:0 .4rem}
    .tstat-num{font-family:'Unbounded',sans-serif;font-weight:700;font-size:.95rem;color:var(--accent2)}
    .tstat-lbl{font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-top:.1rem}

    /* MAINTENANCE TOGGLE */
    .maint-toggle{display:flex;align-items:center;gap:.55rem;background:var(--bg3);border:1px solid var(--border);border-radius:50px;padding:.32rem .8rem;font-size:.74rem;color:var(--muted);cursor:pointer;transition:all .2s;user-select:none}
    .maint-toggle.on{background:rgba(251,191,36,.1);border-color:rgba(251,191,36,.3);color:var(--warn)}
    .toggle-knob{width:28px;height:16px;background:var(--bg2);border-radius:50px;position:relative;transition:background .2s;border:1px solid var(--border)}
    .toggle-knob::after{content:'';position:absolute;top:2px;left:2px;width:10px;height:10px;border-radius:50%;background:var(--muted);transition:transform .2s,background .2s}
    .maint-toggle.on .toggle-knob{background:rgba(251,191,36,.2)}
    .maint-toggle.on .toggle-knob::after{transform:translateX(12px);background:var(--warn)}

    .btn-logout{background:none;border:1px solid var(--border);color:var(--muted);font-family:'Onest',sans-serif;font-size:.76rem;padding:.38rem .9rem;border-radius:8px;cursor:pointer;transition:all .2s}
    .btn-logout:hover{border-color:var(--error);color:var(--error)}

    /* ── 3-COLUMN LAYOUT ── */
    .layout{
      display:grid;
      grid-template-columns:300px 1fr 380px;
      height:calc(100vh - var(--topbar-h));
      margin-top:var(--topbar-h);
      overflow:hidden;
    }

    /* ── COLUMN 1: USERS/CHATS ── */
    .users-panel{
      border-right:1px solid var(--border);
      display:flex;flex-direction:column;
      overflow:hidden;
      background:var(--bg2);
    }
    .panel-hdr{
      padding:.9rem 1.1rem;border-bottom:1px solid var(--border);
      display:flex;align-items:center;justify-content:space-between;gap:.6rem;
      flex-shrink:0;
    }
    .panel-title{font-family:'Unbounded',sans-serif;font-weight:600;font-size:.78rem}
    .tab-row{display:flex;gap:.3rem}
    .tab-btn{background:var(--bg3);border:1px solid var(--border);color:var(--muted);font-family:'Onest',sans-serif;font-size:.7rem;padding:.28rem .65rem;border-radius:7px;cursor:pointer;transition:all .16s}
    .tab-btn.active{background:rgba(108,99,255,.15);color:var(--accent2);border-color:rgba(108,99,255,.28)}
    .users-list{flex:1;overflow-y:auto;padding:.6rem}
    .users-list::-webkit-scrollbar{width:3px}
    .users-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

    .urow{
      background:var(--bg3);border:1px solid var(--border);border-radius:12px;
      padding:.8rem .95rem;margin-bottom:.5rem;cursor:pointer;transition:border-color .16s,background .16s;
    }
    .urow:hover{border-color:rgba(108,99,255,.28)}
    .urow.sel{border-color:var(--accent);background:rgba(108,99,255,.07)}
    .urow-head{display:flex;align-items:center;justify-content:space-between;gap:.5rem;margin-bottom:.3rem}
    .urow-name{font-size:.8rem;font-weight:500}
    .urow-email{font-size:.7rem;color:var(--muted);margin-bottom:.25rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .urow-meta{display:flex;align-items:center;justify-content:space-between;gap:.4rem}
    .urow-orders{font-size:.7rem;color:var(--muted)}
    .unread-dot{width:8px;height:8px;border-radius:50%;background:var(--accent2);flex-shrink:0}
    .sbadge{display:inline-flex;align-items:center;gap:.25rem;padding:.18rem .55rem;border-radius:50px;font-size:.64rem;font-weight:600;flex-shrink:0}
    .s0{background:rgba(251,191,36,.12);color:var(--warn);border:1px solid rgba(251,191,36,.2)}
    .s1{background:rgba(56,189,248,.12);color:var(--accent3);border:1px solid rgba(56,189,248,.2)}
    .s2{background:rgba(74,222,128,.12);color:var(--success);border:1px solid rgba(74,222,128,.2)}
    .sdot{width:4px;height:4px;border-radius:50%;background:currentColor}
    .empty-list{text-align:center;padding:2rem 1rem;color:var(--muted);font-size:.82rem}

    /* ── COLUMN 2: ORDER DETAIL ── */
    .detail-panel{
      border-right:1px solid var(--border);
      display:flex;flex-direction:column;
      overflow:hidden;
    }
    .detail-empty{
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      height:100%;color:var(--muted);gap:.7rem;padding:2rem;text-align:center;opacity:.5;
    }
    .detail-empty-icon{font-size:2.5rem}
    .detail-scroll{flex:1;overflow-y:auto;padding:1.5rem}
    .detail-scroll::-webkit-scrollbar{width:3px}
    .detail-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
    .dsec{margin-bottom:1.5rem}
    .dsec-title{font-size:.62rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:.65rem;font-weight:500}
    .did{font-family:'Unbounded',sans-serif;font-weight:700;font-size:1rem;margin-bottom:.28rem}
    .dmeta{color:var(--muted);font-size:.8rem;display:flex;gap:.7rem;flex-wrap:wrap;align-items:center;margin-bottom:.9rem}
    .ddesc{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:1rem;font-size:.84rem;line-height:1.6;color:var(--muted)}
    .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:.5rem}
    .info-item{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:.65rem .8rem}
    .info-lbl{font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.2rem}
    .info-val{font-size:.82rem;font-weight:500;word-break:break-all}
    .status-btns{display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;margin-bottom:.9rem}
    .sbtn{background:var(--bg3);border:1px solid var(--border);color:var(--muted);font-family:'Onest',sans-serif;font-size:.74rem;padding:.6rem .4rem;border-radius:10px;cursor:pointer;transition:all .16s;text-align:center;font-weight:500}
    .sbtn:hover{border-color:rgba(108,99,255,.35);color:var(--text)}
    .sbtn.sb0.active{background:rgba(251,191,36,.12);color:var(--warn);border-color:rgba(251,191,36,.28)}
    .sbtn.sb1.active{background:rgba(56,189,248,.12);color:var(--accent3);border-color:rgba(56,189,248,.28)}
    .sbtn.sb2.active{background:rgba(74,222,128,.12);color:var(--success);border-color:rgba(74,222,128,.28)}

    /* Order preview images */
    .order-imgs{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.6rem}
    .order-img-thumb{width:72px;height:72px;border-radius:8px;object-fit:cover;cursor:pointer;border:1px solid var(--border);transition:border-color .2s}
    .order-img-thumb:hover{border-color:var(--accent2)}

    /* ── COLUMN 3: CHAT ── */
    .chat-panel{display:flex;flex-direction:column;overflow:hidden}
    .chat-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--muted);gap:.7rem;padding:2rem;text-align:center;opacity:.5}
    .chat-hdr{
      padding:.85rem 1.1rem;border-bottom:1px solid var(--border);
      display:flex;align-items:center;justify-content:space-between;gap:.6rem;flex-shrink:0;
    }
    .chat-hdr-info{flex:1;min-width:0}
    .chat-hdr-name{font-weight:500;font-size:.86rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .chat-hdr-sub{font-size:.68rem;color:var(--muted)}
    .chat-msgs{flex:1;overflow-y:auto;padding:.9rem;display:flex;flex-direction:column;gap:.55rem;scroll-behavior:smooth}
    .chat-msgs::-webkit-scrollbar{width:3px}
    .chat-msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
    .msg{max-width:85%;display:flex;flex-direction:column;gap:.12rem}
    .msg.mine{align-self:flex-end;align-items:flex-end}
    .msg.theirs{align-self:flex-start;align-items:flex-start}
    .msg-bubble{padding:.48rem .78rem;border-radius:12px;font-size:.8rem;line-height:1.5;word-break:break-word}
    .msg.mine .msg-bubble{background:rgba(248,113,113,.18);color:#fff;border-bottom-right-radius:3px}
    .msg.theirs .msg-bubble{background:var(--bg3);color:var(--text);border-bottom-left-radius:3px}
    .msg-time{font-size:.6rem;color:var(--muted)}
    .msg-img{max-width:180px;max-height:160px;border-radius:9px;display:block;cursor:pointer;transition:opacity .2s}
    .msg-img:hover{opacity:.82}
    .msg-file-link{display:flex;align-items:center;gap:.4rem;background:rgba(255,255,255,.08);border-radius:9px;padding:.4rem .65rem;font-size:.77rem;text-decoration:none;color:var(--text)}
    .msg-file-link:hover{background:rgba(255,255,255,.13)}
    .chat-row{padding:.65rem .8rem;border-top:1px solid var(--border);display:flex;gap:.45rem;align-items:flex-end;flex-shrink:0}
    .chat-inp{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:.52rem .8rem;color:var(--text);font-family:'Onest',sans-serif;font-size:.82rem;outline:none;resize:none;max-height:80px;transition:border-color .2s;line-height:1.4}
    .chat-inp:focus{border-color:var(--accent)}
    .chat-icon-btn{width:33px;height:33px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .16s}
    .chat-icon-btn:hover{border-color:var(--accent2);color:var(--accent2)}
    .chat-send{background:var(--accent);border:none;color:#fff;border-radius:10px}
    .chat-send:hover{box-shadow:0 3px 12px rgba(108,99,255,.4)}
    .chat-icon-btn svg{width:13px;height:13px}
    .new-chat-btn{width:100%;padding:.6rem;background:rgba(108,99,255,.1);border:1px dashed rgba(108,99,255,.3);border-radius:10px;color:var(--accent2);font-family:'Onest',sans-serif;font-size:.8rem;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:.5rem;margin-bottom:.7rem}
    .new-chat-btn:hover{background:rgba(108,99,255,.18)}

    /* ── LIGHTBOX ── */
    .lightbox{position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.92);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
    .lightbox.show{opacity:1;pointer-events:all}
    .lightbox img{max-width:92vw;max-height:90vh;border-radius:12px;object-fit:contain;box-shadow:0 20px 60px rgba(0,0,0,.8)}
    .lightbox-close{position:fixed;top:1.2rem;right:1.5rem;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:1.4rem;width:40px;height:40px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .lightbox-close:hover{background:rgba(255,255,255,.25)}

    /* ── TOAST ── */
    .toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(20px);z-index:500;padding:.55rem 1.3rem;border-radius:50px;font-size:.76rem;font-weight:500;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;white-space:nowrap}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .toast.success{background:var(--success);color:#000}
    .toast.error{background:var(--error);color:#fff}
    .toast.info{background:var(--accent);color:#fff}

    /* ── MOBILE ── */
    @media(max-width:1100px){
      .layout{grid-template-columns:260px 1fr 320px}
    }
    @media(max-width:900px){
      html,body{overflow:auto}
      .layout{grid-template-columns:1fr;grid-template-rows:auto;height:auto;overflow:visible}
      .users-panel,.detail-panel,.chat-panel{height:auto;min-height:300px;overflow:visible}
      .detail-panel{border-top:1px solid var(--border);border-right:none}
      .chat-panel{border-top:1px solid var(--border)}
      .tstat{display:none}
      .users-list,.chat-msgs{max-height:320px}
    }
  </style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
  <div class="spinner"></div>
  <p style="color:var(--muted);font-size:.8rem">Проверка доступа...</p>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightboxImg" src="" alt=""/>
</div>

<div id="appWrap" style="display:none">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="tbar-left">
      <a href="index.html" class="logo"><span class="logo-dot"></span>Design Antviz</a>
      <span class="admin-badge">Admin</span>
    </div>
    <div class="tbar-right">
      <div class="tstat"><div class="tstat-num" id="sAll">0</div><div class="tstat-lbl">Заказов</div></div>
      <div class="tstat"><div class="tstat-num" id="sPend" style="color:var(--warn)">0</div><div class="tstat-lbl">Ожидают</div></div>
      <div class="tstat"><div class="tstat-num" id="sWork" style="color:var(--accent3)">0</div><div class="tstat-lbl">В работе</div></div>
      <div class="tstat"><div class="tstat-num" id="sDone" style="color:var(--success)">0</div><div class="tstat-lbl">Готово</div></div>
      <button class="maint-toggle" id="maintToggle" onclick="toggleMaintenance()">
        <div class="toggle-knob"></div>
        <span id="maintLabel">Техработы</span>
      </button>
      <button class="btn-logout" onclick="doLogout()">Выйти</button>
    </div>
  </div>

  <div class="layout">

    <!-- ── COL 1: CLIENTS/CHATS LIST ── -->
    <div class="users-panel">
      <div class="panel-hdr">
        <div class="panel-title">Клиенты</div>
        <div class="tab-row">
          <button class="tab-btn active" onclick="switchTab('orders',this)">Заказы</button>
          <button class="tab-btn" onclick="switchTab('chats',this)">Чаты</button>
        </div>
      </div>
      <div class="users-list" id="usersList">
        <div class="empty-list">Загрузка...</div>
      </div>
    </div>

    <!-- ── COL 2: ORDER DETAIL ── -->
    <div class="detail-panel">
      <div class="detail-empty" id="detailEmpty">
        <div class="detail-empty-icon">👈</div>
        <p style="font-size:.85rem">Выберите заказ слева</p>
      </div>
      <div class="detail-scroll" id="detailScroll" style="display:none">

        <div class="dsec">
          <div class="dsec-title">Заказ</div>
          <div class="did" id="dId"></div>
          <div class="dmeta" id="dMeta"></div>
          <div class="ddesc" id="dDesc" style="display:none"></div>
          <!-- Order attachment images -->
          <div id="dImgs"></div>
        </div>

        <div class="dsec">
          <div class="dsec-title">Клиент</div>
          <div class="info-grid" id="dClient"></div>
        </div>

        <div class="dsec">
          <div class="dsec-title">Детали заказа</div>
          <div class="info-grid" id="dInfo"></div>
        </div>

        <div class="dsec">
          <div class="dsec-title">Изменить статус</div>
          <div class="status-btns">
            <button class="sbtn sb0" onclick="setStatus(0)">🟡 Ожидание</button>
            <button class="sbtn sb1" onclick="setStatus(1)">🔵 В работе</button>
            <button class="sbtn sb2" onclick="setStatus(2)">🟢 Готово</button>
          </div>
        </div>

      </div>
    </div>

    <!-- ── COL 3: CHAT ── -->
    <div class="chat-panel">
      <div class="chat-empty" id="chatEmpty">
        <div style="font-size:2rem">💬</div>
        <p style="font-size:.84rem">Выберите клиента для чата</p>
        <p style="font-size:.75rem;color:var(--muted);margin-top:-.3rem">Или выберите заказ — чат откроется автоматически</p>
      </div>
      <div style="display:none;flex-direction:column;height:100%;overflow:hidden" id="chatWrap">
        <div class="chat-hdr">
          <div class="chat-hdr-info">
            <div class="chat-hdr-name" id="chatClientName">Клиент</div>
            <div class="chat-hdr-sub" id="chatClientEmail"></div>
          </div>
        </div>
        <div class="chat-msgs" id="chatMsgs"></div>
        <div class="chat-row">
          <input type="file" id="adminFileInput" style="display:none" multiple accept="image/*,.pdf,.zip,.rar,.doc,.docx,.psd,.fig" onchange="adminSendFiles(this.files)"/>
          <button class="chat-icon-btn" onclick="document.getElementById('adminFileInput').click()" title="Прикрепить файл">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
          </button>
          <textarea class="chat-inp" id="chatInp" rows="1" placeholder="Ответить клиенту..."
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();adminSendMsg()}"
            oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,80)+'px'"></textarea>
          <button class="chat-icon-btn chat-send" onclick="adminSendMsg()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
    </div>

  </div><!-- /layout -->
</div><!-- /appWrap -->

<div class="toast" id="toast"></div>

<script type="module">
  import { auth, db, ADMIN_EMAIL } from './firebase-config.js';
  import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import {
    collection, query, orderBy, onSnapshot, doc, updateDoc,
    addDoc, serverTimestamp, getDocs, getDoc, setDoc
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  let allOrders=[], allUsers={}, currentTab='orders';
  let selOrderId=null, selClientUid=null, unsubChat=null, unsubMaint=null;
  let maintEnabled=false;

  /* ── UTILS ── */
  function toast(msg,type='info'){
    const t=document.getElementById('toast');
    t.textContent=msg;t.className=`toast ${type} show`;
    setTimeout(()=>t.className='toast',3200);
  }
  function fmtDate(ts){
    if(!ts)return'—';
    const d=ts.toDate?ts.toDate():new Date(ts);
    return d.toLocaleDateString('ru',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
  }
  function fmtTime(ts){
    if(!ts)return'';
    const d=ts.toDate?ts.toDate():new Date(ts);
    return d.toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});
  }
  const sLabels=['Ожидание','В работе','Готово'];

  /* ── LIGHTBOX ── */
  window.openLightbox=function(src){
    document.getElementById('lightboxImg').src=src;
    document.getElementById('lightbox').classList.add('show');
  };
  window.closeLightbox=function(){
    document.getElementById('lightbox').classList.remove('show');
    document.getElementById('lightboxImg').src='';
  };
  document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLightbox();});

  /* ── MAINTENANCE ── */
  function watchMaintenance(){
    unsubMaint=onSnapshot(doc(db,'settings','maintenance'),snap=>{
      maintEnabled=snap.exists()&&snap.data().enabled===true;
      const toggle=document.getElementById('maintToggle');
      const label=document.getElementById('maintLabel');
      toggle.classList.toggle('on',maintEnabled);
      label.textContent=maintEnabled?'ТехРаботы ВКЛ':'Техработы';
    });
  }
  window.toggleMaintenance=async function(){
    try{
      await setDoc(doc(db,'settings','maintenance'),{enabled:!maintEnabled});
      toast((!maintEnabled?'Техработы включены 🔧':'Сайт открыт ✓'),!maintEnabled?'info':'success');
    }catch(e){toast('Ошибка','error');console.error(e);}
  };

  /* ── TAB SWITCH ── */
  window.switchTab=function(tab,btn){
    currentTab=tab;
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    renderUsersList();
  };

  /* ── RENDER USERS/ORDERS LIST ── */
  function renderUsersList(){
    const el=document.getElementById('usersList');
    if(currentTab==='orders'){
      if(!allOrders.length){el.innerHTML='<div class="empty-list">Заказов нет</div>';return;}
      el.innerHTML=allOrders.map(o=>`
        <div class="urow${o.id===selOrderId?' sel':''}" onclick="selectOrder('${o.id}')">
          <div class="urow-head">
            <span class="urow-name" style="font-family:'Unbounded',sans-serif;font-size:.72rem">№ ${o.id.slice(0,8).toUpperCase()}</span>
            <span class="sbadge s${o.status||0}"><span class="sdot"></span>${sLabels[o.status||0]}</span>
          </div>
          <div class="urow-email">${o.clientName||''} · ${o.clientEmail||'—'}</div>
          <div class="urow-meta">
            <span class="urow-orders">${o.siteType||'Сайт'} · ${o.totalPrice?o.totalPrice.toLocaleString('ru')+' ₽':'—'}</span>
            <span style="font-size:.66rem;color:var(--muted)">${fmtDate(o.createdAt)}</span>
          </div>
        </div>`).join('');
    } else {
      // Show all known users with chat preview
      const uids=Object.keys(allUsers);
      if(!uids.length){el.innerHTML='<div class="empty-list">Нет пользователей</div>';return;}
      el.innerHTML=uids.map(uid=>{
        const u=allUsers[uid];
        return`<div class="urow${selClientUid===uid&&!selOrderId?' sel':''}" onclick="selectUserChat('${uid}')">
          <div class="urow-head">
            <span class="urow-name">${u.name||'Пользователь'}</span>
            ${u.hasUnread?'<div class="unread-dot"></div>':''}
          </div>
          <div class="urow-email">${u.email||uid}</div>
          <div class="urow-meta">
            <span class="urow-orders">${u.orderCount||0} заказ(ов)</span>
          </div>
        </div>`;
      }).join('');
    }
  }

  function updateStats(){
    document.getElementById('sAll').textContent=allOrders.length;
    document.getElementById('sPend').textContent=allOrders.filter(o=>(o.status||0)===0).length;
    document.getElementById('sWork').textContent=allOrders.filter(o=>o.status===1).length;
    document.getElementById('sDone').textContent=allOrders.filter(o=>o.status===2).length;
  }

  /* ── SELECT ORDER ── */
  window.selectOrder=function(id){
    selOrderId=id;
    const o=allOrders.find(x=>x.id===id);
    if(!o)return;
    // Also open chat for this user
    selClientUid=o.uid||null;
    renderUsersList();
    showDetailOrder(o);
    if(selClientUid){
      openChat(selClientUid,o.clientName||'Клиент',o.clientEmail||'');
    }
  };

  /* ── SELECT USER CHAT (from chats tab) ── */
  window.selectUserChat=function(uid){
    selOrderId=null;
    selClientUid=uid;
    const u=allUsers[uid];
    renderUsersList();
    // show empty detail
    document.getElementById('detailEmpty').style.display='flex';
    document.getElementById('detailScroll').style.display='none';
    openChat(uid,u?.name||'Пользователь',u?.email||'');
  };

  function showDetailOrder(o){
    document.getElementById('detailEmpty').style.display='none';
    document.getElementById('detailScroll').style.display='block';
    document.getElementById('dId').textContent='№ '+o.id.slice(0,8).toUpperCase();
    document.getElementById('dMeta').innerHTML=`<span>${fmtDate(o.createdAt)}</span><span class="sbadge s${o.status||0}"><span class="sdot"></span>${sLabels[o.status||0]}</span>`;
    const dd=document.getElementById('dDesc');
    if(o.description){dd.textContent=o.description;dd.style.display='block';}else dd.style.display='none';

    // Attachment images from order
    const dImgs=document.getElementById('dImgs');
    if(o.attachments&&o.attachments.length){
      const imgs=o.attachments.filter(a=>a.fileType&&a.fileType.startsWith('image/'));
      if(imgs.length){
        dImgs.innerHTML=`<div style="font-size:.62rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin:.6rem 0 .4rem;font-weight:500">Вложения заказа</div><div class="order-imgs">${imgs.map(a=>`<img class="order-img-thumb" src="${a.fileData}" alt="${a.fileName}" onclick="openLightbox('${a.fileData.replace(/'/g,"\\'")}')"/>`).join('')}</div>`;
      } else dImgs.innerHTML='';
    } else dImgs.innerHTML='';

    document.getElementById('dClient').innerHTML=`
      <div class="info-item"><div class="info-lbl">Имя</div><div class="info-val">${o.clientName||'—'}</div></div>
      <div class="info-item"><div class="info-lbl">Email</div><div class="info-val">${o.clientEmail||'—'}</div></div>`;
    document.getElementById('dInfo').innerHTML=`
      <div class="info-item"><div class="info-lbl">Тип</div><div class="info-val">${o.siteType||'—'}</div></div>
      <div class="info-item"><div class="info-lbl">Тариф</div><div class="info-val">${o.tariff||'—'}</div></div>
      <div class="info-item"><div class="info-lbl">Страниц</div><div class="info-val">${o.pages||'—'}</div></div>
      <div class="info-item"><div class="info-lbl">Сумма</div><div class="info-val">${o.totalPrice?o.totalPrice.toLocaleString('ru')+' ₽':'—'}</div></div>`;
    document.querySelectorAll('.sbtn').forEach((b,i)=>b.classList.toggle('active',i===(o.status||0)));
  }

  window.setStatus=async function(s){
    if(!selOrderId)return;
    try{
      await updateDoc(doc(db,'orders',selOrderId),{status:s});
      toast('Статус обновлён ✓','success');
    }catch(e){toast('Ошибка','error');}
  };

  /* ── CHAT ── */
  function openChat(uid,name,email){
    if(unsubChat)unsubChat();
    document.getElementById('chatEmpty').style.display='none';
    const wrap=document.getElementById('chatWrap');
    wrap.style.display='flex';
    document.getElementById('chatClientName').textContent=name;
    document.getElementById('chatClientEmail').textContent=email;
    const msgs=document.getElementById('chatMsgs');
    msgs.innerHTML='';
    const q=query(collection(db,'chats',uid,'messages'),orderBy('createdAt','asc'));
    unsubChat=onSnapshot(q,snap=>{
      snap.docChanges().forEach(change=>{
        if(change.type==='added') appendMsg(change.doc.data());
      });
    },err=>console.error('Chat err:',err));
  }

  function appendMsg(m){
    const container=document.getElementById('chatMsgs');
    const isAdmin=m.sender==='admin';
    const div=document.createElement('div');
    div.className=`msg ${isAdmin?'mine':'theirs'}`;
    if(m.type==='file'){
      const src=m.fileData||m.fileUrl||'';
      const isImg=m.fileType&&m.fileType.startsWith('image/');
      if(isImg){
        div.innerHTML=`<img class="msg-img" src="${src}" alt="${m.fileName||'img'}" onclick="openLightbox('${src.replace(/'/g,"\\'")}')"/><div class="msg-time">${isAdmin?'Вы':'Клиент'} · ${fmtTime(m.createdAt)}</div>`;
      } else {
        div.innerHTML=`<a class="msg-file-link" href="${src}" download="${m.fileName}">📎 ${m.fileName}</a><div class="msg-time">${isAdmin?'Вы':'Клиент'} · ${fmtTime(m.createdAt)}</div>`;
      }
    } else {
      div.innerHTML=`<div class="msg-bubble">${m.text||''}</div><div class="msg-time">${isAdmin?'Вы':(m.senderName||'Клиент')} · ${fmtTime(m.createdAt)}</div>`;
    }
    container.appendChild(div);
    container.scrollTop=container.scrollHeight;
  }

  window.adminSendMsg=async function(){
    if(!selClientUid)return;
    const inp=document.getElementById('chatInp');
    const text=inp.value.trim();
    if(!text)return;
    inp.value='';inp.style.height='auto';
    try{
      await addDoc(collection(db,'chats',selClientUid,'messages'),{
        text,sender:'admin',senderName:'Поддержка',type:'text',createdAt:serverTimestamp()
      });
    }catch(e){toast('Ошибка отправки','error');}
  };

  window.adminSendFiles=async function(files){
    if(!selClientUid||!files.length)return;
    for(const file of Array.from(files)){
      if(file.size>3*1024*1024){toast(file.name+' больше 3 МБ','error');continue;}
      try{
        toast('Отправляю '+file.name+'...','info');
        const base64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(file);});
        await addDoc(collection(db,'chats',selClientUid,'messages'),{
          type:'file',fileData:base64,fileName:file.name,fileType:file.type,
          sender:'admin',senderName:'Поддержка',createdAt:serverTimestamp()
        });
        toast('Файл отправлен ✓','success');
      }catch(e){toast('Ошибка загрузки','error');console.error(e);}
    }
    document.getElementById('adminFileInput').value='';
  };

  window.doLogout=async function(){
    if(unsubChat)unsubChat();
    if(unsubMaint)unsubMaint();
    await signOut(auth);
    window.location.href='auth.html';
  };

  /* ── INIT ── */
  onAuthStateChanged(auth,async user=>{
    document.getElementById('loadingScreen').style.display='none';
    if(!user||user.email!==ADMIN_EMAIL){
      document.body.innerHTML=`<div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:1rem;font-family:'Onest',sans-serif;color:#f0f0f5;background:#07070a">
        <div style="font-size:2.5rem">🚫</div>
        <div style="font-family:'Unbounded',sans-serif;font-weight:700;font-size:1.1rem">Нет доступа</div>
        <div style="color:#666678;font-size:.85rem">Эта страница только для администратора</div>
        <a href="index.html" style="color:#a78bfa;font-size:.85rem;text-decoration:none;margin-top:.5rem">← На главную</a>
      </div>`;
      return;
    }

    document.getElementById('appWrap').style.display='block';
    watchMaintenance();

    // Load orders
    const ordQ=query(collection(db,'orders'),orderBy('createdAt','desc'));
    onSnapshot(ordQ,snap=>{
      allOrders=snap.docs.map(d=>({id:d.id,...d.data()}));
      // Collect known users from orders
      allOrders.forEach(o=>{
        if(o.uid&&!allUsers[o.uid]){
          allUsers[o.uid]={name:o.clientName||'Пользователь',email:o.clientEmail||'',orderCount:0};
        }
        if(o.uid)allUsers[o.uid].orderCount=(allOrders.filter(x=>x.uid===o.uid).length);
      });
      updateStats();
      renderUsersList();
      // Update detail if currently selected order changed
      if(selOrderId){
        const upd=allOrders.find(o=>o.id===selOrderId);
        if(upd){
          showDetailOrder(upd);
          document.querySelectorAll('.sbtn').forEach((b,i)=>b.classList.toggle('active',i===(upd.status||0)));
        }
      }
    });

    // Also check for users who sent chats but may not have orders
    // We do a best-effort by watching chats collection is not possible without listing
    // Instead rely on orders as source of users
  });
</script>
</body>
</html>
