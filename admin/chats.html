<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Тикеты поддержки — Antviz Admin</title>
  <link rel="icon" href="../img/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Geologica:wght@300;500&display=swap" rel="stylesheet" />
  <style>
    /* ===== БАЗА ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #1ede7b;
      --green-h: #1ac16b;
      --green-d: #149955;
      --green-light: #d2f8e5;
      --bg: #fff;
      --bg2: #f2f4f7;
      --bg3: #f9fafc;
      --text: #191b1e;
      --muted: #707a8a;
      --border: #dfe3e8;
      --border2: #cbcdd6;
      --dark: #191b1e;
      --dark2: #2b2f33;
      --red: #e8634f;
      --warn: #f59e0b;
      --info: #3b82f6;
      --sh1: 0 4px 16px rgba(0,51,153,.04), 0 2px 2px rgba(0,51,153,.08);
      --sh2: 0 8px 20px rgba(0,51,153,.08), 0 4px 8px rgba(0,51,153,.08);
      --font: 'Geologica', 'Inter', 'Arial', sans-serif;
      --sidebar-w: 240px;
      --topbar-h: 60px;
      --sp-l: 60px;
      --sp-m: 40px;
    }
    html, body { height: 100%; background: var(--bg2); }
    body { color: var(--text); font-family: var(--font); font-weight: 300; line-height: 1.25; -webkit-font-smoothing: antialiased; display: flex; flex-direction: column; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    .loading-screen { position: fixed; inset: 0; z-index: 9999; background: var(--bg); display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 14px; }
    .spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin .7s linear infinite; }

    /* ===== REVEAL ===== */
    .reveal { opacity: 0; transform: translateY(20px); transition: opacity .55s ease, transform .55s ease; }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    /* ===== SIDEBAR ===== */
    .sidebar { position: fixed; top: 0; left: 0; bottom: 0; width: var(--sidebar-w); background: var(--bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 200; }
    .sidebar-logo { padding: 18px 20px 14px; display: flex; align-items: center; gap: 10px; text-decoration: none; border-bottom: 1px solid var(--border); }
    .sidebar-logo-mark { width: 30px; height: 30px; border-radius: 10px; background: var(--dark); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .sidebar-logo-mark svg { width: 16px; height: 16px; fill: var(--green); }
    .sidebar-logo-name { font-weight: 500; font-size: .88rem; color: var(--text); letter-spacing: -.01em; }
    .sidebar-logo-badge { margin-left: auto; font-size: .6rem; font-weight: 500; letter-spacing: .06em; text-transform: uppercase; background: rgba(232,99,79,.1); color: var(--red); border: 1px solid rgba(232,99,79,.2); padding: .1rem .45rem; border-radius: 6px; flex-shrink: 0; }
    .sidebar-nav { flex: 1; padding: 12px 10px; overflow-y: auto; display: flex; flex-direction: column; gap: 2px; }
    .sidebar-section { font-size: .62rem; font-weight: 500; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); padding: 10px 10px 4px; margin-top: 4px; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 12px; text-decoration: none; color: var(--muted); font-size: .84rem; font-weight: 300; transition: background .15s, color .15s; cursor: pointer; border: none; background: none; width: 100%; font-family: var(--font); position: relative; }
    .nav-item:hover { background: var(--bg2); color: var(--text); }
    .nav-item.active { background: rgba(30,222,123,.1); color: var(--green-d); font-weight: 500; }
    .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; stroke: currentColor; stroke-width: 1.7; fill: none; }
    .nav-badge { position: absolute; right: 10px; background: var(--red); color: #fff; font-size: .58rem; font-weight: 500; min-width: 17px; height: 17px; border-radius: 50px; display: flex; align-items: center; justify-content: center; padding: 0 4px; animation: pulse 2s infinite; }
    .sidebar-footer { padding: 10px; border-top: 1px solid var(--border); }

    /* ===== TOPBAR ===== */
    .topbar { position: fixed; top: 0; left: var(--sidebar-w); right: 0; height: var(--topbar-h); background: rgba(255,255,255,.95); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 28px; z-index: 100; }
    .topbar-title { font-weight: 500; font-size: .92rem; color: var(--text); letter-spacing: -.01em; }
    .topbar-right { display: flex; align-items: center; gap: 8px; }
    .topbar-stat { display: flex; align-items: center; gap: 4px; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: .2rem .7rem; font-size: .7rem; color: var(--muted); }
    .topbar-stat-num { font-weight: 500; color: var(--text); }

    /* ===== MAIN (две колонки) ===== */
    .main { margin-left: var(--sidebar-w); margin-top: var(--topbar-h); display: grid; grid-template-columns: 320px 1fr; height: calc(100vh - var(--topbar-h)); animation: fadeUp .25s ease; }
    @media (max-width: 860px) { .main { grid-template-columns: 1fr; grid-template-rows: auto 1fr; } }

    /* ===== ЛЕВАЯ КОЛОНКА: СПИСОК ТИКЕТОВ ===== */
    .ticket-list-col { border-right: 1px solid var(--border); display: flex; flex-direction: column; background: var(--bg); overflow: hidden; }
    @media (max-width: 860px) { .ticket-list-col { border-right: none; border-bottom: 1px solid var(--border); height: 50vh; } }
    .list-header { padding: 16px 18px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .list-search { display: flex; align-items: center; gap: 8px; background: var(--bg2); border: 1.5px solid var(--border); border-radius: 12px; padding: .5rem .9rem; transition: border-color .15s; margin-bottom: 10px; }
    .list-search:focus-within { border-color: var(--green); box-shadow: 0 0 0 3px rgba(30,222,123,.08); }
    .list-search svg { width: 14px; height: 14px; stroke: var(--muted); flex-shrink: 0; }
    .list-search input { background: none; border: none; outline: none; font-family: var(--font); font-size: .82rem; font-weight: 300; color: var(--text); width: 100%; }
    .list-tabs { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 8px; }
    .list-tab { background: none; border: 1.5px solid var(--border); border-radius: 8px; padding: .2rem .7rem; font-family: var(--font); font-size: .72rem; font-weight: 300; color: var(--muted); cursor: pointer; transition: all .12s; }
    .list-tab:hover { border-color: var(--border2); color: var(--text); }
    .list-tab.active { background: var(--dark); border-color: var(--dark); color: #fff; font-weight: 500; }
    .list-actions { display: flex; gap: 6px; margin-top: 6px; }
    .tickets-scroll { flex: 1; overflow-y: auto; padding: 8px; }

    .ticket-item { padding: 12px 14px; border-radius: 16px; cursor: pointer; transition: background .15s, border-color .15s; border: 1.5px solid transparent; margin-bottom: 4px; background: var(--bg); }
    .ticket-item:hover { background: var(--bg2); }
    .ticket-item.selected { background: rgba(30,222,123,.06); border-color: rgba(30,222,123,.25); }
    .ticket-item-subject { display: flex; align-items: center; gap: 6px; font-weight: 500; font-size: .84rem; margin-bottom: 4px; }
    .ticket-item-meta { font-size: .72rem; color: var(--muted); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .ticket-item-preview { font-size: .74rem; color: var(--muted2); margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .unread-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--red); flex-shrink: 0; animation: pulse 1.5s infinite; }
    .empty-list { text-align: center; padding: 32px 16px; color: var(--muted); font-size: .82rem; }

    /* ===== BADGES ===== */
    .sbadge { display: inline-flex; align-items: center; gap: 4px; padding: .15rem .6rem; border-radius: 6px; font-size: .62rem; font-weight: 500; white-space: nowrap; }
    .sbadge-dot { width: 4px; height: 4px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
    .s-open { background: rgba(59,130,246,.1); color: var(--info); }
    .s-in-progress { background: rgba(245,158,11,.1); color: var(--warn); }
    .s-resolved { background: rgba(30,222,123,.12); color: var(--green-d); }
    .s-closed { background: #f2f4f7; color: var(--muted); }

    .pri-high { color: var(--red); font-size: .7rem; font-weight: 500; }
    .pri-medium { color: var(--warn); font-size: .7rem; font-weight: 500; }
    .pri-low { color: var(--muted); font-size: .7rem; }

    /* ===== ПРАВАЯ КОЛОНКА: ЧАТ ===== */
    .chat-col { display: flex; flex-direction: column; background: var(--bg3); overflow: hidden; }
    .no-selection { flex: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 10px; color: var(--muted); text-align: center; padding: 32px; }
    .no-selection-icon { font-size: 2.5rem; opacity: .3; }

    .chat-topbar { padding: 12px 20px; border-bottom: 1px solid var(--border); background: var(--bg); flex-shrink: 0; display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
    .chat-topbar-subject { font-weight: 500; font-size: .92rem; margin-bottom: 2px; }
    .chat-topbar-meta { font-size: .74rem; color: var(--muted); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .chat-topbar-actions { display: flex; gap: 6px; flex-shrink: 0; align-items: center; }

    .chat-msgs { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 4px; }
    .msg-divider { font-size: .7rem; color: var(--muted2); text-align: center; padding: 8px 0 4px; font-weight: 500; }
    .msg-wrapper { display: flex; flex-direction: column; max-width: 78%; }
    .msg-wrapper.user { align-self: flex-end; }
    .msg-wrapper.support { align-self: flex-start; }
    .msg-sender { font-size: .68rem; font-weight: 500; margin-bottom: 2px; }
    .msg-sender.user { color: var(--muted); text-align: right; }
    .msg-sender.support { color: var(--green-d); }
    .msg-bubble { padding: .6rem .9rem; border-radius: 14px; font-size: .84rem; line-height: 1.5; word-wrap: break-word; }
    .msg-wrapper.user .msg-bubble { background: var(--dark); color: #fff; border-bottom-right-radius: 2px; }
    .msg-wrapper.support .msg-bubble { background: var(--bg); border: 1px solid var(--border); color: var(--text); border-bottom-left-radius: 2px; }
    .msg-time { font-size: .62rem; color: var(--muted2); margin-top: 2px; display: block; }
    .msg-wrapper.user .msg-time { text-align: right; }
    .msg-img { max-width: 200px; border-radius: 8px; margin-top: 6px; border: 1px solid var(--border); cursor: pointer; display: block; }

    .chat-input-area { padding: 12px 20px; border-top: 1px solid var(--border); background: var(--bg); flex-shrink: 0; }
    .chat-input-row { display: flex; gap: 8px; align-items: flex-end; }
    .chat-textarea { flex: 1; background: var(--bg2); border: 1.5px solid var(--border); border-radius: 12px; padding: .6rem .9rem; font-family: var(--font); font-size: .84rem; font-weight: 300; color: var(--text); outline: none; resize: none; min-height: 38px; max-height: 120px; line-height: 1.5; transition: border-color .15s; }
    .chat-textarea:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(30,222,123,.08); }
    .chat-textarea::placeholder { color: var(--muted2); }
    .status-select { background: var(--bg2); border: 1.5px solid var(--border); border-radius: 8px; padding: .35rem .7rem; font-family: var(--font); font-size: .76rem; font-weight: 300; color: var(--text); outline: none; cursor: pointer; transition: border-color .15s; }
    .status-select:focus { border-color: var(--green); }

    /* ===== BUTTONS ===== */
    .btn { display: inline-flex; align-items: center; gap: 6px; font-family: var(--font); font-weight: 500; text-decoration: none; cursor: pointer; border: none; border-radius: 10px; padding: .5rem 1rem; font-size: .78rem; letter-spacing: -.01em; transition: background .1s, transform .1s; white-space: nowrap; }
    .btn:hover { transform: translateY(-1px); }
    .btn-green { background: var(--green); color: var(--dark); }
    .btn-green:hover { background: var(--green-h); }
    .btn-dark { background: var(--dark); color: #fff; }
    .btn-dark:hover { background: var(--dark2); }
    .btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--text); }
    .btn-outline:hover { border-color: var(--border2); }
    .btn-danger { background: rgba(232,99,79,.08); color: var(--red); border: 1px solid rgba(232,99,79,.2); }
    .btn-danger:hover { background: rgba(232,99,79,.16); }
    .btn-sm { padding: .3rem .7rem; font-size: .7rem; border-radius: 8px; }
    .btn-xs { padding: .2rem .5rem; font-size: .65rem; border-radius: 6px; }

    /* ===== MODAL ===== */
    .modal-overlay { position: fixed; inset: 0; z-index: 500; background: rgba(0,0,0,.5); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; pointer-events: none; transition: opacity .2s; }
    .modal-overlay.show { opacity: 1; pointer-events: all; }
    .modal { background: var(--bg); border-radius: 24px; padding: 32px; width: 100%; max-width: 480px; box-shadow: 0 20px 60px rgba(0,0,0,.15); max-height: 90vh; overflow-y: auto; }
    .modal-title { font-weight: 500; font-size: .95rem; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; }
    .modal-close { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1rem; padding: 0; }
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: .66rem; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); margin-bottom: 6px; font-weight: 500; }
    .form-input, .form-textarea, .form-select { width: 100%; background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: .7rem 1rem; color: var(--text); font-family: var(--font); font-size: .86rem; font-weight: 300; outline: none; transition: border-color .15s; }
    .form-input:focus, .form-textarea:focus, .form-select:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(30,222,123,.1); }
    .form-textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
    .form-select { cursor: pointer; }
    .modal-footer { display: flex; gap: 8px; margin-top: 20px; }
    .modal-footer .btn { flex: 1; justify-content: center; }

    /* ===== LIGHTBOX ===== */
    .lightbox { position: fixed; inset: 0; z-index: 999; background: rgba(0,0,0,.9); display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity .2s; }
    .lightbox.show { opacity: 1; pointer-events: all; }
    .lightbox img { max-width: 94vw; max-height: 92vh; border-radius: 10px; object-fit: contain; }
    .lb-close { position: fixed; top: 16px; right: 20px; background: rgba(255,255,255,.1); border: none; color: #fff; width: 38px; height: 38px; border-radius: 50%; cursor: pointer; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; }

    /* ===== TOAST ===== */
    .toast { position: fixed; bottom: 24px; right: 24px; z-index: 900; padding: .6rem 1.2rem; border-radius: 14px; font-size: .8rem; font-weight: 500; opacity: 0; transition: opacity .2s, transform .2s; pointer-events: none; transform: translateY(6px); }
    .toast.show { opacity: 1; transform: none; }
    .toast.success { background: var(--green); color: #0d3320; }
    .toast.error { background: var(--red); color: #fff; }
    .toast.info { background: var(--dark); color: #fff; }
    .toast.warn { background: var(--warn); color: #fff; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 860px) {
      .main { grid-template-columns: 1fr; grid-template-rows: auto 1fr; height: calc(100vh - var(--topbar-h)); }
      .ticket-list-col { height: 45vh; border-right: none; border-bottom: 1px solid var(--border); }
      .chat-col { height: 55vh; }
      .topbar-stat { display: none; }
    }
  </style>
</head>
<body>

<div class="loading-screen" id="loadingScreen"><div class="spinner"></div></div>

<!-- ===== SIDEBAR ===== -->
<div class="sidebar">
  <a href="/admin" class="sidebar-logo">
    <div class="sidebar-logo-mark"><svg viewBox="0 0 20 20"><path d="M10 2L3 7v11h5v-5h4v5h5V7L10 2z"/></svg></div>
    <span class="sidebar-logo-name">Antviz</span>
    <span class="sidebar-logo-badge">Admin</span>
  </a>
  <nav class="sidebar-nav">
    <div class="sidebar-section">Основное</div>
    <a href="/admin" class="nav-item"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Дашборд</a>
    <a href="/admin/orders" class="nav-item"><svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h4"/></svg>Заказы<span class="nav-badge" id="navBadgeOrders" style="display:none"></span></a>
    <div class="sidebar-section">Клиенты</div>
    <a href="/admin/tickets" class="nav-item"><svg viewBox="0 0 24 24"><path d="M2 9a3 3 0 010-6h20a3 3 0 010 6"/><path d="M2 15a3 3 0 000 6h20a3 3 0 000-6"/><path d="M6 12h12"/></svg>Обслуживание<span class="nav-badge" id="navBadgeTickets" style="display:none"></span></a>
    <a href="/admin/chats" class="nav-item active"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>Поддержка<span class="nav-badge" id="navBadgeChats" style="display:none"></span></a>
    <a href="/admin/promos" class="nav-item"><svg viewBox="0 0 24 24"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><circle cx="7" cy="7" r="1.5" fill="currentColor" stroke="none"/></svg>Промокоды</a>
    <div class="sidebar-section">Система</div>
    <a href="/admin/reviews" class="nav-item"><svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>Отзывы</a>
  </nav>
  <div class="sidebar-footer">
    <button class="nav-item" onclick="doLogout()" style="color:var(--red)"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>Выйти</button>
  </div>
</div>

<!-- ===== TOPBAR ===== -->
<div class="topbar" id="appTopbar" style="display:none">
  <span class="topbar-title">Поддержка</span>
  <div class="topbar-right">
    <div class="topbar-stat">Открытых: <span class="topbar-stat-num" id="statOpen" style="color:var(--red)">—</span></div>
    <div class="topbar-stat">Всего: <span class="topbar-stat-num" id="statTotal">—</span></div>
  </div>
</div>

<!-- ===== MAIN ===== -->
<div class="main" id="appWrap" style="display:none">

  <!-- ЛЕВАЯ КОЛОНКА: СПИСОК -->
  <div class="ticket-list-col">
    <div class="list-header">
      <div class="list-search">
        <svg viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input type="text" id="listSearch" placeholder="Поиск..." oninput="filterList()" />
      </div>
      <div class="list-tabs">
        <button class="list-tab active" onclick="switchTab('all',this)">Все</button>
        <button class="list-tab" onclick="switchTab('open',this)">Открытые</button>
        <button class="list-tab" onclick="switchTab('in-progress',this)">В работе</button>
        <button class="list-tab" onclick="switchTab('resolved',this)">Решённые</button>
      </div>
      <div class="list-actions">
        <button class="btn btn-green btn-sm" onclick="openCreateTicket()">➕ Создать тикет</button>
      </div>
    </div>
    <div class="tickets-scroll" id="ticketsList">
      <div class="empty-list">Загрузка...</div>
    </div>
  </div>

  <!-- ПРАВАЯ КОЛОНКА: ЧАТ -->
  <div class="chat-col" id="chatCol">
    <div class="no-selection" id="noSelection">
      <div class="no-selection-icon">💬</div>
      <div style="font-weight:500;font-size:.9rem;color:var(--text)">Выберите тикет</div>
      <div style="font-size:.8rem;">Нажмите на тикет слева, чтобы открыть переписку</div>
    </div>

    <div id="chatView" style="display:none;flex:1;flex-direction:column;overflow:hidden;">
      <div class="chat-topbar">
        <div>
          <div class="chat-topbar-subject" id="chatSubject">—</div>
          <div class="chat-topbar-meta" id="chatMeta"></div>
        </div>
        <div class="chat-topbar-actions">
          <select class="status-select" id="statusSelect" onchange="changeStatus()">
            <option value="open">Открыт</option>
            <option value="in-progress">В обработке</option>
            <option value="resolved">Решён</option>
            <option value="closed">Закрыт</option>
          </select>
          <button class="btn btn-danger btn-sm" onclick="deleteTicket()">🗑</button>
        </div>
      </div>
      <div class="chat-msgs" id="chatMsgs"></div>
      <div class="chat-input-area">
        <div class="chat-input-row">
          <textarea class="chat-textarea" id="chatInp" rows="1" placeholder="Ответить клиенту..." onkeydown="onKey(event)" oninput="autoResize(this)"></textarea>
          <label class="btn btn-outline btn-sm" style="cursor:pointer;" title="Прикрепить изображение">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            <input type="file" id="fileInp" accept="image/*" style="display:none;" onchange="sendImg()" />
          </label>
          <button class="btn btn-green btn-sm" onclick="sendReply()">Отправить</button>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- ===== MODAL: СОЗДАНИЕ ТИКЕТА ===== -->
<div class="modal-overlay" id="createTicketModal" onclick="if(event.target===this)closeCreateTicket()">
  <div class="modal">
    <div class="modal-title">📝 Создать тикет <button class="modal-close" onclick="closeCreateTicket()">✕</button></div>
    <div class="form-group">
      <label class="form-label">Пользователь</label>
      <select class="form-select" id="ticketUser"><option value="">Выберите пользователя...</option></select>
    </div>
    <div class="form-group">
      <label class="form-label">Тема</label>
      <input class="form-input" id="ticketTopic" type="text" placeholder="Например: Техническая проблема" />
    </div>
    <div class="form-group">
      <label class="form-label">Заголовок</label>
      <input class="form-input" id="ticketSubject" type="text" placeholder="Краткий заголовок" />
    </div>
    <div class="form-group">
      <label class="form-label">Сообщение</label>
      <textarea class="form-textarea" id="ticketMessage" placeholder="Опишите проблему..." rows="4"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Приоритет</label>
      <select class="form-select" id="ticketPriority">
        <option value="low">Низкий</option>
        <option value="medium" selected>Средний</option>
        <option value="high">Высокий</option>
      </select>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeCreateTicket()">Отмена</button>
      <button class="btn btn-green" onclick="createTicket()">Создать</button>
    </div>
  </div>
</div>

<!-- ===== LIGHTBOX ===== -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lb-close" onclick="event.stopPropagation();closeLightbox()">✕</button>
  <img id="lbImg" src="" alt="" />
</div>

<!-- ===== TOAST ===== -->
<div class="toast" id="toast"></div>

<script type="module">
import { auth, db, ADMIN_EMAIL } from '../firebase-config.js';
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { collection, query, orderBy, onSnapshot, doc, updateDoc, deleteDoc, addDoc, serverTimestamp, getDocs, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ===== UTILS =====
function toast(m, t = 'info') { const el = document.getElementById('toast'); el.textContent = m; el.className = `toast ${t} show`; setTimeout(() => el.className = 'toast', 3400); }
function esc(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }
function fmtDT(ts) { if (!ts) return '—'; const d = ts.toDate ? ts.toDate() : new Date(ts); return d.toLocaleDateString('ru', { day: 'numeric', month: 'short' }) + ' ' + d.toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' }); }
function fmtTime(ts) { if (!ts) return ''; const d = ts.toDate ? ts.toDate() : new Date(ts); const now = new Date(); const today = new Date(now.getFullYear(), now.getMonth(), now.getDate()); if (d >= today) return d.toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' }); return d.toLocaleDateString('ru', { day: 'numeric', month: 'short' }) + ' ' + d.toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' }); }
function statusBadge(s) { const map = { open: ['s-open', 'Открыт'], 'in-progress': ['s-in-progress', 'В обработке'], resolved: ['s-resolved', 'Решён'], closed: ['s-closed', 'Закрыт'] }; const [cls, label] = map[s] || ['s-closed', s]; return `<span class="sbadge ${cls}"><span class="sbadge-dot"></span>${label}</span>`; }
function priorityLabel(p) { if (p === 'high') return '<span class="pri-high">Высокий</span>'; if (p === 'medium') return '<span class="pri-medium">Средний</span>'; return '<span class="pri-low">Низкий</span>'; }

let allTickets = [], selectedId = null, currentFilter = 'all', unsubMsgs = null;

// ===== REVEAL =====
const revealObs = new IntersectionObserver(e => { e.forEach(el => { if (el.isIntersecting) el.target.classList.add('visible'); }); }, { threshold: .07 });
document.querySelectorAll('.reveal').forEach(el => revealObs.observe(el));

// ===== LIST =====
window.switchTab = (f, btn) => {
  currentFilter = f;
  document.querySelectorAll('.list-tab').forEach(b => b.classList.toggle('active', b === btn));
  renderList();
};
window.filterList = () => renderList();

function renderList() {
  const q = (document.getElementById('listSearch').value || '').toLowerCase();
  let list = allTickets.filter(t => {
    if (currentFilter !== 'all' && t.status !== currentFilter) return false;
    if (q) return (t.subject || '').toLowerCase().includes(q) || (t.userName || '').toLowerCase().includes(q) || (t.topic || '').toLowerCase().includes(q);
    return true;
  });

  const open = allTickets.filter(t => t.status === 'open' || t.status === 'in-progress').length;
  document.getElementById('statOpen').textContent = open;
  document.getElementById('statTotal').textContent = allTickets.length;

  const badge = document.getElementById('navBadgeChats');
  badge.style.display = open ? '' : 'none';
  badge.textContent = open;

  const el = document.getElementById('ticketsList');
  if (!list.length) { el.innerHTML = `<div class="empty-list">${allTickets.length ? 'Ничего не найдено' : 'Тикетов пока нет'}</div>`; return; }
  el.innerHTML = list.map(t => {
    const isSelected = t.id === selectedId;
    const lastMsg = (t._lastMsg || '');
    const unread = t.status === 'open' && !t._adminRead;
    return `<div class="ticket-item${isSelected ? ' selected' : ''}" onclick="selectTicket('${t.id}')">
      <div class="ticket-item-subject">
        ${unread ? '<span class="unread-dot"></span>' : ''}
        ${esc(t.subject || 'Без темы')}
      </div>
      <div class="ticket-item-meta">
        ${statusBadge(t.status)}
        <span>·</span>
        <span>${esc(t.userName || '—')}</span>
        ${t.priority ? `<span>·</span>${priorityLabel(t.priority)}` : ''}
      </div>
      ${lastMsg ? `<div class="ticket-item-preview">${esc(lastMsg)}</div>` : ''}
      <div style="font-size:.66rem;color:var(--muted2);margin-top:2px;">${fmtDT(t.updatedAt || t.createdAt)}</div>
    </div>`;
  }).join('');
}

// ===== SELECT & CHAT =====
window.selectTicket = function(id) {
  selectedId = id;
  const ticket = allTickets.find(t => t.id === id);
  if (!ticket) return;

  document.getElementById('noSelection').style.display = 'none';
  const cv = document.getElementById('chatView');
  cv.style.display = 'flex';
  cv.style.flexDirection = 'column';
  cv.style.overflow = 'hidden';
  cv.style.flex = '1';

  document.getElementById('chatSubject').textContent = `${ticket.topic || ''} · ${ticket.subject || ''}`;
  document.getElementById('chatMeta').innerHTML = `
    <span>${esc(ticket.userName || '—')}</span>
    <span>·</span>
    <span>${esc(ticket.userEmail || '—')}</span>
    <span>·</span>
    <span>${fmtDT(ticket.createdAt)}</span>
    ${ticket.priority ? `<span>·</span>${priorityLabel(ticket.priority)}` : ''}
  `;
  document.getElementById('statusSelect').value = ticket.status || 'open';

  updateDoc(doc(db, 'tickets', id), { _adminRead: true }).catch(() => {});
  ticket._adminRead = true;
  renderList();

  if (unsubMsgs) unsubMsgs();
  const q = query(collection(db, 'tickets', id, 'messages'), orderBy('createdAt', 'asc'));
  unsubMsgs = onSnapshot(q, snap => {
    const msgs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderChat(msgs);
    const last = msgs[msgs.length - 1];
    if (last && ticket) ticket._lastMsg = last.text || '';
    renderList();
  });
};

function renderChat(msgs) {
  const el = document.getElementById('chatMsgs');
  if (!msgs.length) { el.innerHTML = '<div style="text-align:center;color:var(--muted2);font-size:.8rem;padding:32px;">Нет сообщений</div>'; return; }
  let html = '', lastDate = null;
  msgs.forEach(m => {
    const d = m.createdAt?.toDate ? m.createdAt.toDate() : new Date(m.createdAt || 0);
    const dateStr = d.toLocaleDateString('ru', { day: 'numeric', month: 'long', year: 'numeric' });
    if (lastDate !== dateStr) {
      html += `<div class="msg-divider">${dateStr}</div>`;
      lastDate = dateStr;
    }
    const isUser = m.sender === 'user';
    const senderName = isUser ? (allTickets.find(t => t.id === selectedId)?.userName || 'Клиент') : 'Поддержка';
    html += `
      <div class="msg-wrapper ${isUser ? 'user' : 'support'}">
        <div class="msg-sender ${isUser ? 'user' : 'support'}">${esc(senderName)}</div>
        <div class="msg-bubble">
          ${esc(m.text)}
          ${m.imageUrl ? `<img class="msg-img" src="${m.imageUrl}" alt="вложение" onclick="showLightbox('${m.imageUrl}')" />` : ''}
          <span class="msg-time">${fmtTime(m.createdAt)}</span>
        </div>
      </div>`;
  });
  el.innerHTML = html;
  el.scrollTop = el.scrollHeight;
}

// ===== CREATE TICKET =====
window.openCreateTicket = async function() {
  try {
    const usersSnap = await getDocs(collection(db, 'users'));
    const userSelect = document.getElementById('ticketUser');
    userSelect.innerHTML = '<option value="">Выберите пользователя...</option>';
    usersSnap.forEach(d => {
      const data = d.data();
      const name = data.displayName || data.name || d.id;
      const email = data.email || '';
      userSelect.innerHTML += `<option value="${d.id}">${esc(name)}${email ? ' · ' + esc(email) : ''}</option>`;
    });
    document.getElementById('ticketTopic').value = '';
    document.getElementById('ticketSubject').value = '';
    document.getElementById('ticketMessage').value = '';
    document.getElementById('ticketPriority').value = 'medium';
    document.getElementById('createTicketModal').classList.add('show');
  } catch(e) { toast('Ошибка загрузки пользователей: ' + e.message, 'error'); }
};
window.closeCreateTicket = () => document.getElementById('createTicketModal').classList.remove('show');
window.createTicket = async function() {
  const uid = document.getElementById('ticketUser').value;
  const topic = document.getElementById('ticketTopic').value.trim();
  const subject = document.getElementById('ticketSubject').value.trim();
  const message = document.getElementById('ticketMessage').value.trim();
  const priority = document.getElementById('ticketPriority').value;
  if (!uid) { toast('Выберите пользователя', 'error'); return; }
  if (!subject) { toast('Введите заголовок', 'error'); return; }
  if (!message) { toast('Введите сообщение', 'error'); return; }
  try {
    const userDoc = await getDoc(doc(db, 'users', uid));
    const userData = userDoc.data();
    const ticketRef = await addDoc(collection(db, 'tickets'), {
      uid, userName: userData?.displayName || userData?.name || 'Пользователь',
      userEmail: userData?.email || '—', topic: topic || 'Общий вопрос',
      subject, status: 'open', priority, _read: false, _adminRead: true,
      createdAt: serverTimestamp(), updatedAt: serverTimestamp()
    });
    await addDoc(collection(db, 'tickets', ticketRef.id, 'messages'), {
      sender: 'support', senderName: 'Поддержка', text: message, imageUrl: null, createdAt: serverTimestamp()
    });
    await addDoc(collection(db, 'notifications', uid, 'items'), {
      title: '📝 Новый тикет поддержки', text: `«${subject}»: ${message}`, read: false, createdAt: serverTimestamp()
    });
    toast('Тикет создан и пользователь уведомлён ✅', 'success');
    closeCreateTicket();
  } catch(e) { toast('Ошибка: ' + e.message, 'error'); }
};

// ===== ACTIONS =====
window.sendReply = async function() {
  if (!selectedId) return;
  const inp = document.getElementById('chatInp');
  const text = inp.value.trim();
  if (!text) return toast('Напишите сообщение', 'error');
  inp.value = ''; inp.style.height = 'auto';
  try {
    await addDoc(collection(db, 'tickets', selectedId, 'messages'), {
      sender: 'support', senderName: 'Поддержка', text, imageUrl: null, createdAt: serverTimestamp()
    });
    await updateDoc(doc(db, 'tickets', selectedId), { updatedAt: serverTimestamp(), _read: false, _adminRead: true });
  } catch(e) { toast('Ошибка: ' + e.message, 'error'); }
};
window.sendImg = async function() {
  if (!selectedId) return;
  const inp = document.getElementById('fileInp');
  const file = inp.files[0];
  if (!file) return;
  if (file.size > 4 * 1024 * 1024) return toast('Файл слишком большой (макс. 4 МБ)', 'error');
  const reader = new FileReader();
  reader.onload = async e => {
    try {
      await addDoc(collection(db, 'tickets', selectedId, 'messages'), {
        sender: 'support', senderName: 'Поддержка', text: 'Изображение', imageUrl: e.target.result, createdAt: serverTimestamp()
      });
      await updateDoc(doc(db, 'tickets', selectedId), { updatedAt: serverTimestamp(), _read: false, _adminRead: true });
      toast('Изображение отправлено ✓', 'success');
    } catch(err) { toast('Ошибка', 'error'); }
    inp.value = '';
  };
  reader.readAsDataURL(file);
};
window.changeStatus = async function() {
  if (!selectedId) return;
  const val = document.getElementById('statusSelect').value;
  try { await updateDoc(doc(db, 'tickets', selectedId), { status: val, updatedAt: serverTimestamp() }); toast('Статус обновлён ✓', 'success'); } catch(e) { toast('Ошибка', 'error'); }
};
window.deleteTicket = async function() {
  if (!selectedId || !confirm('Удалить тикет и все сообщения?')) return;
  try {
    const snap = await getDocs(collection(db, 'tickets', selectedId, 'messages'));
    await Promise.all(snap.docs.map(d => deleteDoc(d.ref)));
    await deleteDoc(doc(db, 'tickets', selectedId));
    toast('Тикет удалён', 'info');
    selectedId = null;
    document.getElementById('chatView').style.display = 'none';
    document.getElementById('noSelection').style.display = 'flex';
    if (unsubMsgs) { unsubMsgs(); unsubMsgs = null; }
  } catch(e) { toast('Ошибка', 'error'); }
};
window.onKey = function(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); window.sendReply(); } };
window.autoResize = function(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; };
window.showLightbox = function(src) { document.getElementById('lbImg').src = src; document.getElementById('lightbox').classList.add('show'); };
window.closeLightbox = function() { document.getElementById('lightbox').classList.remove('show'); };
window.doLogout = async () => { await signOut(auth); window.location.href = '/'; };

// ===== INIT =====
onAuthStateChanged(auth, user => {
  document.getElementById('loadingScreen').style.display = 'none';
  if (!user || user.email !== ADMIN_EMAIL) { window.location.href = '/'; return; }
  document.getElementById('appWrap').style.display = 'grid';
  document.getElementById('appTopbar').style.display = 'flex';

  const q = query(collection(db, 'tickets'), orderBy('createdAt', 'desc'));
  onSnapshot(q, snap => {
    const incoming = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    incoming.forEach(t => { const old = allTickets.find(x => x.id === t.id); t._lastMsg = old?._lastMsg || ''; });
    allTickets = incoming;
    renderList();
    allTickets.forEach(t => {
      if (!t._lastMsg) {
        getDocs(query(collection(db, 'tickets', t.id, 'messages'), orderBy('createdAt', 'desc')))
          .then(s => { if (s.docs.length) { t._lastMsg = s.docs[0].data().text || ''; renderList(); } }).catch(()=>{});
      }
    });
  });
});
</script>
</body>
</html>
