<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Чаты — Antviz Admin</title>
<link rel="icon" href="../img/favicon.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Geologica:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#f2f4f7;overflow:hidden}
:root{
  --green:#1ede7b;--green-h:#1ac16b;--green-d:#149955;
  --bg:#fff;--bg2:#f2f4f7;--bg3:#f9fafc;
  --text:#191b1e;--muted:#707a8a;--border:#dfe3e8;--border2:#cbcdd6;
  --dark:#191b1e;--dark2:#2b2f33;
  --red:#e8634f;--warn:#f59e0b;--info:#3b82f6;
  --font:'Geologica','Inter',sans-serif;
  --sw:256px;--th:68px;
}
body{color:var(--text);font-family:var(--font);font-weight:300;-webkit-font-smoothing:antialiased}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

.ls{position:fixed;inset:0;z-index:9000;background:var(--dark);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.sp{width:26px;height:26px;border:2px solid rgba(255,255,255,.1);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite}
.lt{font-size:13px;color:rgba(255,255,255,.35)}

/* SIDEBAR */
.sb{position:fixed;top:0;left:0;bottom:0;width:var(--sw);background:var(--dark);display:flex;flex-direction:column;z-index:200}
.sb-logo{padding:24px 20px 20px;display:flex;align-items:center;gap:12px;text-decoration:none;border-bottom:1px solid rgba(255,255,255,.07)}
.lm{width:34px;height:34px;border-radius:12px;background:var(--green);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.lm svg{width:18px;height:18px;fill:var(--dark)}
.ln{font-weight:500;font-size:.95rem;color:#fff;letter-spacing:-.02em}
.lbadge{margin-left:auto;font-size:.58rem;font-weight:500;letter-spacing:.07em;text-transform:uppercase;background:rgba(232,99,79,.15);color:var(--red);border:1px solid rgba(232,99,79,.25);padding:.15rem .5rem;border-radius:7px}
.sb-nav{flex:1;padding:14px 12px;overflow-y:auto;display:flex;flex-direction:column;gap:2px}
.ns{font-size:.6rem;font-weight:500;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.25);padding:14px 10px 5px;margin-top:6px}
.ni{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:14px;text-decoration:none;color:rgba(255,255,255,.45);font-size:.85rem;font-weight:300;transition:background .12s,color .12s;cursor:pointer;border:none;background:none;width:100%;font-family:var(--font);position:relative}
.ni:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.85)}
.ni.active{background:rgba(30,222,123,.12);color:var(--green)}
.ni svg{width:16px;height:16px;flex-shrink:0;stroke:currentColor;stroke-width:1.7;fill:none;stroke-linecap:round;stroke-linejoin:round}
.nb{position:absolute;right:10px;background:var(--red);color:#fff;font-size:.58rem;font-weight:500;min-width:17px;height:17px;border-radius:50px;display:flex;align-items:center;justify-content:center;padding:0 4px;animation:pulse 2s infinite}
.sb-foot{padding:12px;border-top:1px solid rgba(255,255,255,.07)}

/* TOPBAR */
.tb{position:fixed;top:0;left:var(--sw);right:0;height:var(--th);background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;z-index:100}
.tb-l{display:flex;align-items:center;gap:16px}
.tb-title{font-weight:500;font-size:1rem;letter-spacing:-.02em}
.tb-stats{display:flex;gap:6px}
.ts{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:.3rem .85rem;font-size:.75rem;color:var(--muted);display:flex;align-items:center;gap:5px}
.ts strong{font-weight:500;color:var(--text)}
.btn-new{display:inline-flex;align-items:center;gap:7px;background:var(--dark);color:#fff;font-family:var(--font);font-size:.82rem;font-weight:400;padding:.5rem 1.1rem;border-radius:12px;border:none;cursor:pointer;transition:background .15s}
.btn-new:hover{background:var(--dark2)}

/* SHELL */
.shell{position:fixed;top:var(--th);left:var(--sw);right:0;bottom:0;display:grid;grid-template-columns:300px 1fr}

/* LIST COL */
.lc{border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--bg);overflow:hidden}
.lc-head{padding:16px 14px 12px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;flex-direction:column;gap:10px}
.sb-box{display:flex;align-items:center;gap:8px;background:var(--bg2);border:1.5px solid var(--border);border-radius:12px;padding:.55rem .9rem;transition:border-color .15s}
.sb-box:focus-within{border-color:var(--green);box-shadow:0 0 0 3px rgba(30,222,123,.08)}
.sb-box svg{width:14px;height:14px;stroke:var(--muted);flex-shrink:0;stroke-width:2;fill:none}
.sb-box input{background:none;border:none;outline:none;font-family:var(--font);font-size:.84rem;font-weight:300;color:var(--text);width:100%}
.tab-row{display:flex;gap:4px;flex-wrap:wrap}
.tab{background:none;border:1.5px solid var(--border);border-radius:9px;padding:.28rem .7rem;font-family:var(--font);font-size:.74rem;font-weight:300;color:var(--muted);cursor:pointer;transition:all .12s}
.tab:hover{color:var(--text);border-color:var(--border2)}
.tab.active{background:var(--dark);border-color:var(--dark);color:#fff;font-weight:500}
.tickets-scroll{flex:1;overflow-y:auto}
.ti{padding:16px 18px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;position:relative}
.ti:hover{background:var(--bg2)}
.ti.sel{background:rgba(30,222,123,.06);border-left:3px solid var(--green)}
.ti-subj{font-size:.88rem;font-weight:500;color:var(--text);margin-bottom:4px;display:flex;align-items:center;gap:7px}
.ti-meta{font-size:.74rem;color:var(--muted);display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:4px}
.ti-prev{font-size:.75rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ti-time{font-size:.68rem;color:var(--muted);margin-top:3px}
.unread{width:8px;height:8px;border-radius:50%;background:var(--red);flex-shrink:0;animation:pulse 1.5s infinite}
.empty-l{text-align:center;padding:48px 16px;color:var(--muted);font-size:.84rem}

/* CHAT COL */
.cc{display:flex;flex-direction:column;background:var(--bg3);overflow:hidden}
.no-sel{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;color:var(--muted)}
.no-sel-icon{font-size:3rem;opacity:.3}

.chat-topbar{padding:18px 24px;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0;display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
.ct-subj{font-weight:500;font-size:1rem;letter-spacing:-.02em;margin-bottom:5px}
.ct-meta{font-size:.78rem;color:var(--muted);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.ct-actions{display:flex;gap:8px;flex-shrink:0;align-items:center}

.chat-msgs{flex:1;overflow-y:auto;padding:24px 28px;display:flex;flex-direction:column;gap:4px;scroll-behavior:smooth}
.msg-divider{font-size:.7rem;color:var(--muted);text-align:center;padding:10px 0}
.msg-wrap{display:flex;flex-direction:column;margin-bottom:2px}
.msg-label{font-size:.68rem;font-weight:500;margin-bottom:3px;color:var(--muted)}
.msg-label.sup{color:var(--green-d)}
.msg-label.usr{text-align:right;color:var(--muted)}
.msg{padding:12px 16px;border-radius:16px;max-width:72%;font-size:.88rem;line-height:1.55;word-break:break-word}
.msg.usr{background:#e8f1ff;color:#1a3a6e;align-self:flex-end;border-bottom-right-radius:4px}
.msg.sup{background:var(--bg);border:1.5px solid var(--border);color:var(--text);align-self:flex-start;border-bottom-left-radius:4px}
.msg-time{font-size:.65rem;color:var(--muted);display:block;margin-top:5px}
.msg-img{max-width:220px;border-radius:10px;margin-top:8px;border:1.5px solid var(--border);display:block;cursor:pointer}

.chat-inp-area{padding:16px 24px;border-top:1px solid var(--border);background:var(--bg);flex-shrink:0}
.chat-inp-row{display:flex;gap:8px;align-items:flex-end}
.chat-ta{flex:1;background:var(--bg2);border:1.5px solid var(--border);border-radius:14px;padding:.75rem 1rem;color:var(--text);font-family:var(--font);font-size:.88rem;font-weight:300;outline:none;resize:none;min-height:44px;max-height:120px;line-height:1.5;transition:border-color .15s}
.chat-ta:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(30,222,123,.08)}

/* BADGE/STATUS */
.sbadge{display:inline-flex;align-items:center;padding:.2rem .6rem;border-radius:8px;font-size:.68rem;font-weight:500;white-space:nowrap}
.s-open{background:rgba(59,130,246,.1);color:var(--info)}
.s-in-progress{background:rgba(245,158,11,.1);color:var(--warn)}
.s-resolved{background:rgba(30,222,123,.12);color:var(--green-d)}
.s-closed{background:var(--bg2);color:var(--muted)}
.pri-high{color:var(--red);font-size:.72rem;font-weight:500}
.pri-medium{color:var(--warn);font-size:.72rem;font-weight:500}
.pri-low{color:var(--muted);font-size:.72rem}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;font-family:var(--font);font-weight:500;font-size:.82rem;border:none;border-radius:12px;padding:.5rem 1rem;cursor:pointer;transition:background .1s,transform .1s;text-decoration:none;white-space:nowrap}
.btn:hover{transform:translateY(-1px)}
.btn-green{background:var(--green);color:var(--dark)}.btn-green:hover{background:var(--green-h)}
.btn-dark{background:var(--dark);color:#fff}.btn-dark:hover{background:var(--dark2)}
.btn-outline{background:transparent;border:1.5px solid var(--border2);color:var(--muted)}.btn-outline:hover{border-color:var(--text);color:var(--text)}
.btn-danger{background:rgba(232,99,79,.08);color:var(--red);border:1px solid rgba(232,99,79,.2)}.btn-danger:hover{background:rgba(232,99,79,.15)}
.btn-sm{padding:.38rem .8rem;font-size:.78rem;border-radius:10px}

.status-sel{background:var(--bg2);border:1.5px solid var(--border);border-radius:10px;padding:.38rem .75rem;color:var(--text);font-family:var(--font);font-size:.78rem;outline:none;cursor:pointer;transition:border-color .15s}
.status-sel:focus{border-color:var(--green)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.55);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.show{opacity:1;pointer-events:all}
.modal{background:var(--bg);border-radius:28px;padding:32px;width:100%;max-width:500px;box-shadow:0 24px 64px rgba(0,0,0,.15)}
.modal-title{font-weight:500;font-size:1rem;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;letter-spacing:-.02em}
.modal-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1rem;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:8px;transition:background .15s}
.modal-close:hover{background:var(--bg2)}
.fg{margin-bottom:16px}
.fl{display:block;font-size:.65rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:6px;font-weight:500}
.fi,.fta,.fsel{width:100%;background:var(--bg2);border:1.5px solid var(--border);border-radius:12px;padding:.75rem 1rem;color:var(--text);font-family:var(--font);font-size:.88rem;font-weight:300;outline:none;transition:border-color .15s}
.fi:focus,.fta:focus,.fsel:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(30,222,123,.08)}
.fta{resize:vertical;min-height:80px;line-height:1.5}
.fsel{cursor:pointer}
.modal-footer{display:flex;gap:8px;margin-top:24px}
.modal-footer .btn{flex:1;justify-content:center}

/* LIGHTBOX */
.lightbox{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.9);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.lightbox.show{opacity:1;pointer-events:all}
.lightbox img{max-width:90vw;max-height:90vh;border-radius:14px;object-fit:contain}
.lb-x{position:absolute;top:20px;right:20px;background:rgba(255,255,255,.15);border:none;color:#fff;width:38px;height:38px;border-radius:50%;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center}

.toast{position:fixed;bottom:28px;right:28px;z-index:900;padding:.7rem 1.4rem;border-radius:16px;font-size:.84rem;font-weight:500;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;transform:translateY(8px)}
.toast.show{opacity:1;transform:none}
.toast.success{background:var(--green);color:#0d3320}.toast.error{background:var(--red);color:#fff}.toast.info{background:var(--dark);color:#fff}.toast.warn{background:var(--warn);color:#fff}
</style>
</head>
<body>

<div class="ls" id="loadingScreen"><div class="sp"></div><span class="lt">Загрузка...</span></div>

<div class="lightbox" id="lightbox" onclick="this.classList.remove('show')">
  <button class="lb-x">✕</button>
  <img id="lbImg" src="" alt=""/>
</div>

<!-- SIDEBAR -->
<div class="sb">
  <a href="/admin" class="sb-logo">
    <div class="lm"><svg viewBox="0 0 20 20"><path d="M10 2L3 7v11h5v-5h4v5h5V7L10 2z"/></svg></div>
    <span class="ln">Antviz</span><span class="lbadge">Admin</span>
  </a>
  <nav class="sb-nav">
    <span class="ns">Основное</span>
    <a href="/admin" class="ni"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="2"/><rect x="14" y="3" width="7" height="7" rx="2"/><rect x="3" y="14" width="7" height="7" rx="2"/><rect x="14" y="14" width="7" height="7" rx="2"/></svg>Дашборд</a>
    <a href="/admin/orders" class="ni"><svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h4"/></svg>Заказы<span class="nb" id="navBadgeOrders" style="display:none"></span></a>
    <span class="ns">Клиенты</span>
    <a href="/admin/tickets" class="ni"><svg viewBox="0 0 24 24"><path d="M2 9a3 3 0 010-6h20a3 3 0 010 6"/><path d="M2 15a3 3 0 000 6h20a3 3 0 000-6"/><path d="M6 12h12"/></svg>Обслуживание<span class="nb" id="navBadgeTickets" style="display:none"></span></a>
    <a href="/admin/chats" class="ni active"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>Чаты<span class="nb" id="navBadgeChats" style="display:none"></span></a>
    <a href="/admin/promos" class="ni"><svg viewBox="0 0 24 24"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><circle cx="7" cy="7" r="1.5" fill="currentColor" stroke="none"/></svg>Промокоды</a>
    <span class="ns">Система</span>
    <a href="/admin/reviews" class="ni"><svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>Отзывы</a>
  </nav>
  <div class="sb-foot">
    <button class="ni" onclick="doLogout()" style="color:rgba(232,99,79,.8)"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>Выйти</button>
  </div>
</div>

<!-- TOPBAR -->
<div class="tb">
  <div class="tb-l">
    <span class="tb-title">Чаты поддержки</span>
    <div class="tb-stats">
      <div class="ts">Открытых: <strong id="statOpen">—</strong></div>
      <div class="ts">Всего: <strong id="statTotal">—</strong></div>
    </div>
  </div>
  <button class="btn-new" onclick="openCreateTicket()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Создать тикет
  </button>
</div>

<!-- SHELL -->
<div class="shell" id="appWrap" style="display:none">

  <!-- LIST -->
  <div class="lc">
    <div class="lc-head">
      <div class="sb-box">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input type="text" id="listSearch" placeholder="Поиск тикетов..." oninput="filterList()"/>
      </div>
      <div class="tab-row">
        <button class="tab active" onclick="switchTab('all',this)">Все</button>
        <button class="tab" onclick="switchTab('open',this)">Открытые</button>
        <button class="tab" onclick="switchTab('in-progress',this)">В работе</button>
        <button class="tab" onclick="switchTab('resolved',this)">Решённые</button>
      </div>
    </div>
    <div class="tickets-scroll" id="ticketsList">
      <div class="empty-l">Загрузка...</div>
    </div>
  </div>

  <!-- CHAT -->
  <div class="cc" id="chatCol">
    <div class="no-sel" id="noSelection">
      <div class="no-sel-icon">💬</div>
      <div style="font-weight:500;font-size:.95rem;color:var(--text)">Выберите тикет</div>
      <div style="font-size:.84rem">Нажмите на тикет слева</div>
    </div>

    <div id="chatView" style="display:none;flex:1;flex-direction:column;overflow:hidden">
      <div class="chat-topbar">
        <div style="min-width:0">
          <div class="ct-subj" id="chatSubject">—</div>
          <div class="ct-meta" id="chatMeta"></div>
        </div>
        <div class="ct-actions">
          <select class="status-sel" id="statusSelect" onchange="changeStatus()">
            <option value="open">Открыт</option>
            <option value="in-progress">В обработке</option>
            <option value="resolved">Решён</option>
            <option value="closed">Закрыт</option>
          </select>
          <button class="btn btn-danger btn-sm" onclick="deleteTicket()">Удалить</button>
        </div>
      </div>
      <div class="chat-msgs" id="chatMsgs"></div>
      <div class="chat-inp-area">
        <div class="chat-inp-row">
          <textarea class="chat-ta" id="chatInp" rows="1" placeholder="Ответить клиенту..." onkeydown="onKey(event)" oninput="autoResize(this)"></textarea>
          <label class="btn btn-outline btn-sm" style="cursor:pointer" title="Прикрепить изображение">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            <input type="file" id="fileInp" accept="image/*" style="display:none" onchange="sendImg()"/>
          </label>
          <button class="btn btn-green btn-sm" onclick="sendReply()">Отправить</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL CREATE -->
<div class="modal-overlay" id="createTicketModal" onclick="if(event.target===this)closeCreateTicket()">
  <div class="modal">
    <div class="modal-title">Создать тикет <button class="modal-close" onclick="closeCreateTicket()">✕</button></div>
    <div class="fg"><label class="fl">Пользователь</label><select class="fsel" id="ticketUser"><option value="">Выберите пользователя...</option></select></div>
    <div class="fg"><label class="fl">Тема</label><input class="fi" id="ticketTopic" type="text" placeholder="Например: Техническая проблема"/></div>
    <div class="fg"><label class="fl">Заголовок</label><input class="fi" id="ticketSubject" type="text" placeholder="Краткий заголовок"/></div>
    <div class="fg"><label class="fl">Сообщение</label><textarea class="fta" id="ticketMessage" placeholder="Опишите проблему..." rows="4"></textarea></div>
    <div class="fg"><label class="fl">Приоритет</label><select class="fsel" id="ticketPriority"><option value="low">Низкий</option><option value="medium" selected>Средний</option><option value="high">Высокий</option></select></div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeCreateTicket()">Отмена</button>
      <button class="btn btn-green" onclick="createTicket()">Создать</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { auth, db, ADMIN_EMAIL } from '../firebase-config.js';
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { collection, query, orderBy, onSnapshot, doc, updateDoc, deleteDoc, addDoc, serverTimestamp, getDocs, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

let allTickets=[], selectedId=null, currentFilter='all', unsubMsgs=null;

function toast(m,t='info'){const el=document.getElementById('toast');el.textContent=m;el.className=`toast ${t} show`;setTimeout(()=>el.className='toast',3400);}
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function fmtDT(ts){if(!ts)return'—';const d=ts.toDate?ts.toDate():new Date(ts);return d.toLocaleDateString('ru',{day:'numeric',month:'short'})+' '+d.toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});}
function fmtTime(ts){if(!ts)return'';const d=ts.toDate?ts.toDate():new Date(ts);const now=new Date();if(d>=new Date(now.getFullYear(),now.getMonth(),now.getDate()))return d.toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});return d.toLocaleDateString('ru',{day:'numeric',month:'short'})+' '+d.toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});}
function statusBadge(s){const m={open:['s-open','Открыт'],'in-progress':['s-in-progress','В обработке'],resolved:['s-resolved','Решён'],closed:['s-closed','Закрыт']};const[cls,lbl]=m[s]||['s-closed',s];return`<span class="sbadge ${cls}">${lbl}</span>`;}
function priLabel(p){return p==='high'?'<span class="pri-high">Высокий</span>':p==='medium'?'<span class="pri-medium">Средний</span>':'<span class="pri-low">Низкий</span>';}

window.switchTab=(f,btn)=>{currentFilter=f;document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b===btn));renderList();};
window.filterList=()=>renderList();

function renderList(){
  const q=(document.getElementById('listSearch').value||'').toLowerCase();
  let list=allTickets.filter(t=>{
    if(currentFilter!=='all'&&t.status!==currentFilter)return false;
    if(q)return(t.subject||'').toLowerCase().includes(q)||(t.userName||'').toLowerCase().includes(q)||(t.topic||'').toLowerCase().includes(q);
    return true;
  });
  const open=allTickets.filter(t=>t.status==='open'||t.status==='in-progress').length;
  document.getElementById('statOpen').textContent=open;
  document.getElementById('statTotal').textContent=allTickets.length;
  const badge=document.getElementById('navBadgeChats');
  badge.style.display=open?'':'none';badge.textContent=open;
  const el=document.getElementById('ticketsList');
  if(!list.length){el.innerHTML=`<div class="empty-l">${allTickets.length?'Ничего не найдено':'Тикетов пока нет'}</div>`;return;}
  el.innerHTML=list.map(t=>{
    const unread=t.status==='open'&&!t._adminRead;
    return`<div class="ti${t.id===selectedId?' sel':''}" onclick="selectTicket('${t.id}')">
      <div class="ti-subj">${unread?'<span class="unread"></span>':''}${esc(t.subject||'Без темы')}</div>
      <div class="ti-meta">${statusBadge(t.status)}<span>·</span><span>${esc(t.userName||'—')}</span>${t.priority?`<span>·</span>${priLabel(t.priority)}`:''}</div>
      ${t._lastMsg?`<div class="ti-prev">${esc(t._lastMsg)}</div>`:''}
      <div class="ti-time">${fmtDT(t.updatedAt||t.createdAt)}</div>
    </div>`;}).join('');
}

window.selectTicket=function(id){
  selectedId=id;
  const ticket=allTickets.find(t=>t.id===id);if(!ticket)return;
  document.getElementById('noSelection').style.display='none';
  const cv=document.getElementById('chatView');cv.style.display='flex';cv.style.flexDirection='column';cv.style.overflow='hidden';cv.style.flex='1';
  document.getElementById('chatSubject').textContent=`${ticket.topic||''} · ${ticket.subject||''}`.replace(/^ · /,'');
  document.getElementById('chatMeta').innerHTML=`<span>${esc(ticket.userName||'—')}</span><span>·</span><span>${esc(ticket.userEmail||'—')}</span><span>·</span><span>${fmtDT(ticket.createdAt)}</span>${ticket.priority?`<span>·</span>${priLabel(ticket.priority)}`:''}`;
  document.getElementById('statusSelect').value=ticket.status||'open';
  updateDoc(doc(db,'tickets',id),{_adminRead:true}).catch(()=>{});
  ticket._adminRead=true;renderList();
  if(unsubMsgs)unsubMsgs();
  const q=query(collection(db,'tickets',id,'messages'),orderBy('createdAt','asc'));
  unsubMsgs=onSnapshot(q,snap=>{
    const msgs=snap.docs.map(d=>({id:d.id,...d.data()}));
    renderChat(msgs);
    const last=msgs[msgs.length-1];
    if(last&&ticket)ticket._lastMsg=last.text||'';
    renderList();
  });
};

function renderChat(msgs){
  const el=document.getElementById('chatMsgs');
  if(!msgs.length){el.innerHTML='<div style="text-align:center;color:var(--muted);font-size:.84rem;padding:32px">Нет сообщений</div>';return;}
  let html='',lastDate=null;
  msgs.forEach(m=>{
    const d=m.createdAt?.toDate?m.createdAt.toDate():new Date(m.createdAt||0);
    const ds=d.toLocaleDateString('ru',{day:'numeric',month:'long',year:'numeric'});
    if(lastDate!==ds){html+=`<div class="msg-divider">${ds}</div>`;lastDate=ds;}
    const isUser=m.sender==='user';
    const tkt=allTickets.find(t=>t.id===selectedId);
    html+=`<div class="msg-wrap">
      <div class="msg-label ${isUser?'usr':'sup'}">${isUser?esc(tkt?.userName||'Клиент'):'Поддержка'}</div>
      <div class="msg ${isUser?'usr':'sup'}">
        ${esc(m.text)}
        ${m.imageUrl?`<img class="msg-img" src="${m.imageUrl}" alt="" onclick="showLightbox('${m.imageUrl}')"/>`:''}
        <span class="msg-time">${fmtTime(m.createdAt)}</span>
      </div>
    </div>`;
  });
  el.innerHTML=html;el.scrollTop=el.scrollHeight;
}

window.sendReply=async function(){
  if(!selectedId)return;
  const inp=document.getElementById('chatInp');const text=inp.value.trim();
  if(!text)return toast('Напишите сообщение','error');
  inp.value='';inp.style.height='auto';
  try{
    await addDoc(collection(db,'tickets',selectedId,'messages'),{sender:'support',senderName:'Поддержка',text,imageUrl:null,createdAt:serverTimestamp()});
    await updateDoc(doc(db,'tickets',selectedId),{updatedAt:serverTimestamp(),_read:false,_adminRead:true});
  }catch(e){toast('Ошибка: '+e.message,'error');}
};

window.sendImg=async function(){
  if(!selectedId)return;
  const inp=document.getElementById('fileInp');const file=inp.files[0];if(!file)return;
  if(file.size>4*1024*1024)return toast('Файл слишком большой (макс. 4 МБ)','error');
  const reader=new FileReader();
  reader.onload=async e=>{
    try{
      await addDoc(collection(db,'tickets',selectedId,'messages'),{sender:'support',senderName:'Поддержка',text:'Изображение',imageUrl:e.target.result,createdAt:serverTimestamp()});
      await updateDoc(doc(db,'tickets',selectedId),{updatedAt:serverTimestamp(),_read:false,_adminRead:true});
      toast('Изображение отправлено ✓','success');
    }catch(e){toast('Ошибка','error');}
    inp.value='';
  };
  reader.readAsDataURL(file);
};

window.changeStatus=async function(){
  if(!selectedId)return;
  const val=document.getElementById('statusSelect').value;
  try{await updateDoc(doc(db,'tickets',selectedId),{status:val,updatedAt:serverTimestamp()});toast('Статус обновлён ✓','success');}
  catch(e){toast('Ошибка','error');}
};

window.deleteTicket=async function(){
  if(!selectedId||!confirm('Удалить тикет и все сообщения?'))return;
  try{
    const snap=await getDocs(collection(db,'tickets',selectedId,'messages'));
    await Promise.all(snap.docs.map(d=>deleteDoc(d.ref)));
    await deleteDoc(doc(db,'tickets',selectedId));
    toast('Тикет удалён','info');selectedId=null;
    document.getElementById('chatView').style.display='none';
    document.getElementById('noSelection').style.display='flex';
    if(unsubMsgs){unsubMsgs();unsubMsgs=null;}
  }catch(e){toast('Ошибка','error');}
};

window.openCreateTicket=async function(){
  try{
    const snap=await getDocs(collection(db,'users'));
    const sel=document.getElementById('ticketUser');
    sel.innerHTML='<option value="">Выберите пользователя...</option>';
    snap.forEach(d=>{const data=d.data();sel.innerHTML+=`<option value="${d.id}">${esc(data.displayName||data.name||d.id)}${data.email?' · '+esc(data.email):''}</option>`;});
    ['ticketTopic','ticketSubject','ticketMessage'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('ticketPriority').value='medium';
    document.getElementById('createTicketModal').classList.add('show');
  }catch(e){toast('Ошибка загрузки пользователей: '+e.message,'error');}
};
window.closeCreateTicket=function(){document.getElementById('createTicketModal').classList.remove('show');};

window.createTicket=async function(){
  const uid=document.getElementById('ticketUser').value;
  const topic=document.getElementById('ticketTopic').value.trim();
  const subject=document.getElementById('ticketSubject').value.trim();
  const message=document.getElementById('ticketMessage').value.trim();
  const priority=document.getElementById('ticketPriority').value;
  if(!uid)return toast('Выберите пользователя','error');
  if(!subject)return toast('Введите заголовок','error');
  if(!message)return toast('Введите сообщение','error');
  try{
    const userDoc=await getDoc(doc(db,'users',uid));const userData=userDoc.data();
    const ref=await addDoc(collection(db,'tickets'),{uid,userName:userData?.displayName||userData?.name||'Пользователь',userEmail:userData?.email||'—',topic:topic||'Общий вопрос',subject,status:'open',priority,_read:false,_adminRead:true,createdAt:serverTimestamp(),updatedAt:serverTimestamp()});
    await addDoc(collection(db,'tickets',ref.id,'messages'),{sender:'support',senderName:'Поддержка',text:message,imageUrl:null,createdAt:serverTimestamp()});
    await addDoc(collection(db,'notifications',uid,'items'),{title:'📝 Новый тикет поддержки',text:`«${subject}»: ${message}`,read:false,createdAt:serverTimestamp()});
    toast('Тикет создан и пользователь уведомлён ✅','success');closeCreateTicket();
  }catch(e){toast('Ошибка: '+e.message,'error');}
};

window.onKey=function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();window.sendReply();}};
window.autoResize=function(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';};
window.showLightbox=function(src){document.getElementById('lbImg').src=src;document.getElementById('lightbox').classList.add('show');};
window.doLogout=async()=>{await signOut(auth);window.location.href='/';};

onAuthStateChanged(auth,user=>{
  document.getElementById('loadingScreen').style.display='none';
  if(!user||user.email!==ADMIN_EMAIL){window.location.href='/';return;}
  document.getElementById('appWrap').style.display='grid';
  const q=query(collection(db,'tickets'),orderBy('createdAt','desc'));
  onSnapshot(q,async snap=>{
    const incoming=snap.docs.map(d=>({id:d.id,...d.data()}));
    incoming.forEach(t=>{const old=allTickets.find(x=>x.id===t.id);t._lastMsg=old?._lastMsg||'';});
    allTickets=incoming;renderList();
    for(const t of allTickets){
      if(!t._lastMsg){
        getDocs(query(collection(db,'tickets',t.id,'messages'),orderBy('createdAt','desc')))
          .then(s=>{if(s.docs.length)t._lastMsg=s.docs[0].data().text||'';renderList();}).catch(()=>{});
      }
    }
  });
});
</script>
</body>
</html>
