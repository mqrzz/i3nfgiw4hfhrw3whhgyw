<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Тикеты — Antviz Admin</title>
  <link rel="icon" href="../img/favicon.png"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Geologica:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#f5f7fa; --bg2:#ffffff; --bg3:#f0f2f5; --card:#ffffff;
      --border:#e8ecf0; --border2:#d0d5db;
      --accent:#1ede7b; --accent2:#17b86a; --accent3:#0d9f56;
      --text:#1a1a1e; --muted:#6b7280; --muted2:#9ca3af;
      --success:#1ede7b; --error:#ff2d50; --warn:#ffd11a;
      --sidebar-w:240px; --topbar-h:60px;
    }
    html,body{height:100%;font-size:16px;background:var(--bg)}
    body{color:var(--text);font-family:'Inter',sans-serif;font-weight:400;display:flex;flex-direction:column}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-thumb{background:rgba(0,0,0,.12);border-radius:2px}

    .loading-screen{position:fixed;inset:0;z-index:1000;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem}
    .spinner{width:30px;height:30px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}

    .sidebar{position:fixed;top:0;left:0;bottom:0;width:var(--sidebar-w);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100}
    .sidebar-logo{padding:1.2rem 1.2rem 1rem;display:flex;align-items:center;gap:10px;text-decoration:none;border-bottom:1px solid var(--border)}
    .sidebar-logo img{width:28px;height:28px;border-radius:8px;object-fit:cover;flex-shrink:0}
    .sidebar-logo-text{font-family:'Geologica',sans-serif;font-weight:700;font-size:.85rem;color:var(--text)}
    .sidebar-logo-badge{background:rgba(255,45,80,.1);color:var(--error);border:1px solid rgba(255,45,80,.15);padding:.08rem .45rem;border-radius:50px;font-size:.55rem;font-weight:700;margin-left:auto;flex-shrink:0}
    .sidebar-nav{flex:1;padding:1rem .7rem;overflow-y:auto;display:flex;flex-direction:column;gap:.15rem}
    .sidebar-section{font-size:.58rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:.6rem .6rem .3rem;font-weight:600}
    .nav-item{display:flex;align-items:center;gap:10px;padding:.6rem .85rem;border-radius:10px;text-decoration:none;color:var(--muted);font-size:.84rem;transition:all .15s;cursor:pointer;border:none;background:none;width:100%;font-family:'Inter',sans-serif;position:relative}
    .nav-item:hover{background:rgba(0,0,0,.04);color:var(--text)}
    .nav-item.active{background:rgba(30,222,123,.12);color:var(--accent2)}
    .nav-item svg{width:17px;height:17px;flex-shrink:0;stroke:currentColor;stroke-width:1.7;fill:none}
    .nav-item-badge{position:absolute;right:.7rem;background:var(--error);color:#fff;font-size:.58rem;font-weight:700;min-width:18px;height:18px;border-radius:50px;display:flex;align-items:center;justify-content:center;padding:0 4px;animation:pulse 2s infinite}
    .sidebar-footer{padding:.8rem .7rem;border-top:1px solid var(--border)}

    .topbar{position:fixed;top:0;left:var(--sidebar-w);right:0;height:var(--topbar-h);background:rgba(255,255,255,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 1.6rem;z-index:90}
    .topbar-title{font-family:'Geologica',sans-serif;font-weight:600;font-size:.95rem;color:var(--text)}
    .topbar-right{display:flex;align-items:center;gap:.7rem}
    .topbar-stat{display:flex;align-items:center;gap:.4rem;background:var(--bg3);border:1px solid var(--border);border-radius:50px;padding:.28rem .85rem;font-size:.72rem;white-space:nowrap;color:var(--muted)}
    .topbar-stat-num{font-family:'Geologica',sans-serif;font-weight:700;font-size:.8rem;color:var(--text)}
    .topbar-btn{background:var(--bg3);border:1px solid var(--border);color:var(--muted);font-family:'Inter',sans-serif;font-size:.76rem;padding:.35rem .9rem;border-radius:9px;cursor:pointer;transition:all .18s}
    .topbar-btn:hover{border-color:var(--border2);color:var(--text)}

    .btn{display:inline-flex;align-items:center;gap:6px;padding:.6rem 1.2rem;border-radius:9px;font-family:'Inter',sans-serif;font-size:.8rem;font-weight:500;cursor:pointer;border:none;transition:all .15s;text-decoration:none}
    .btn-primary{background:var(--accent);color:#fff}
    .btn-primary:hover{box-shadow:0 4px 12px rgba(30,222,123,.35)}
    .btn-ghost{background:var(--bg3);border:1px solid var(--border);color:var(--muted)}
    .btn-ghost:hover{border-color:var(--border2);color:var(--text)}
    .btn-danger{background:#fee2e2;border:1px solid #fca5a5;color:var(--error)}
    .btn-danger:hover{background:#fecaca}
    .btn-sm{padding:.38rem .8rem;font-size:.74rem;border-radius:7px}
    .btn-xs{padding:.22rem .55rem;font-size:.66rem;border-radius:6px}

    .toast{position:fixed;bottom:1.5rem;right:1.5rem;z-index:600;padding:.6rem 1.3rem;border-radius:10px;font-size:.8rem;font-weight:500;opacity:0;transition:opacity .26s,transform .26s;pointer-events:none;transform:translateY(8px)}
    .toast.show{opacity:1;transform:translateY(0)}
    .toast.success{background:var(--success);color:#fff}
    .toast.error{background:var(--error);color:#fff}
    .toast.info{background:#3b82f6;color:#fff}
    .toast.warn{background:var(--warn);color:#1a1a1e}

    /* ── LAYOUT ── */
    .chat-shell{margin-left:var(--sidebar-w);margin-top:var(--topbar-h);display:grid;grid-template-columns:320px 1fr;height:calc(100vh - var(--topbar-h));animation:fadeIn .25s ease}

    /* ── LEFT: список тикетов ── */
    .ticket-list-col{border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--bg2);overflow:hidden}
    .list-header{padding:1rem 1.1rem .7rem;border-bottom:1px solid var(--border);flex-shrink:0}
    .list-search{display:flex;align-items:center;gap:.5rem;background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:.4rem .7rem;margin-bottom:.7rem}
    .list-search svg{width:14px;height:14px;stroke:var(--muted);flex-shrink:0}
    .list-search input{background:none;border:none;outline:none;color:var(--text);font-family:'Inter',sans-serif;font-size:.82rem;flex:1;min-width:0}
    .list-search input::placeholder{color:var(--muted2)}
    .list-tabs{display:flex;gap:.3rem;flex-wrap:wrap}
    .list-tab{background:transparent;border:1px solid transparent;color:var(--muted);font-family:'Inter',sans-serif;font-size:.72rem;padding:.22rem .6rem;border-radius:7px;cursor:pointer;transition:all .15s}
    .list-tab:hover{color:var(--text);background:rgba(0,0,0,.04)}
    .list-tab.active{background:rgba(30,222,123,.12);color:var(--accent2);border-color:rgba(30,222,123,.2)}
    .list-actions{display:flex;gap:.4rem;margin-top:.5rem}
    .tickets-scroll{flex:1;overflow-y:auto}
    .ticket-item{padding:.8rem 1.1rem;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;position:relative}
    .ticket-item:hover{background:var(--bg3)}
    .ticket-item.selected{background:rgba(30,222,123,.06);border-left:3px solid var(--accent)}
    .ticket-item-subject{font-size:.84rem;font-weight:500;color:var(--text);margin-bottom:.2rem;display:flex;align-items:center;gap:.4rem}
    .ticket-item-meta{font-size:.72rem;color:var(--muted);display:flex;align-items:center;gap:.4rem;flex-wrap:wrap}
    .ticket-item-preview{font-size:.74rem;color:var(--muted2);margin-top:.2rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .unread-dot{width:7px;height:7px;border-radius:50%;background:var(--error);flex-shrink:0;animation:pulse 1.5s infinite}
    .empty-list{text-align:center;padding:2.5rem 1rem;color:var(--muted);font-size:.82rem}

    /* status badges */
    .sbadge{display:inline-flex;align-items:center;padding:.15rem .5rem;border-radius:50px;font-size:.62rem;font-weight:600;white-space:nowrap}
    .s-open{background:#dbeafe;color:#1d4ed8}
    .s-in-progress{background:#fef3c7;color:#b45309}
    .s-resolved{background:#d1fae5;color:#065f46}
    .s-closed{background:#f3f4f6;color:var(--muted)}

    /* priority */
    .pri-high{color:var(--error);font-size:.7rem;font-weight:600}
    .pri-medium{color:var(--warn);font-size:.7rem;font-weight:600}
    .pri-low{color:var(--muted);font-size:.7rem}

    /* ── RIGHT: чат тикета ── */
    .ticket-chat-col{display:flex;flex-direction:column;background:var(--bg);overflow:hidden}
    .no-selection{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:.7rem;color:var(--muted);text-align:center;padding:2rem}
    .no-selection svg{width:40px;height:40px;stroke:var(--muted2);stroke-width:1.2;fill:none;opacity:.5;margin-bottom:.5rem}

    .chat-topbar{padding:.8rem 1.4rem;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0;display:flex;align-items:flex-start;justify-content:space-between;gap:1rem}
    .chat-topbar-left{min-width:0}
    .chat-topbar-subject{font-family:'Geologica',sans-serif;font-weight:600;font-size:.95rem;color:var(--text);margin-bottom:.25rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .chat-topbar-meta{font-size:.74rem;color:var(--muted);display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
    .chat-topbar-actions{display:flex;gap:.4rem;flex-shrink:0;align-items:flex-start}

    .chat-msgs{flex:1;overflow-y:auto;padding:1.2rem 1.4rem;display:flex;flex-direction:column;gap:6px;scroll-behavior:smooth}
    .chat-msg{padding:.65rem .9rem;border-radius:10px;max-width:78%;font-size:.84rem;line-height:1.5}
    .chat-msg.user{background:#e8f4ff;color:#1e3a5f;align-self:flex-end;border-bottom-right-radius:2px}
    .chat-msg.support{background:var(--bg2);border:1px solid var(--border);color:var(--text);align-self:flex-start;border-bottom-left-radius:2px}
    .chat-msg .msg-time{font-size:.65rem;color:var(--muted2);display:block;margin-top:3px}
    .chat-msg .msg-img{max-width:200px;border-radius:8px;margin-top:6px;border:1px solid var(--border);display:block;cursor:pointer}
    .msg-divider{font-size:.69rem;color:var(--muted2);text-align:center;padding:6px 0;font-weight:500}
    .msg-sender-label{font-size:.68rem;font-weight:600;margin-bottom:2px}
    .msg-sender-label.support-label{color:var(--accent2)}
    .msg-sender-label.user-label{color:var(--muted);text-align:right}

    .chat-input-area{padding:.9rem 1.4rem;border-top:1px solid var(--border);background:var(--bg2);flex-shrink:0}
    .chat-input-row{display:flex;gap:.5rem;align-items:flex-end}
    .chat-textarea{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:.6rem .9rem;color:var(--text);font-family:'Inter',sans-serif;font-size:.84rem;outline:none;resize:none;min-height:38px;max-height:120px;line-height:1.5;transition:border-color .18s}
    .chat-textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(30,222,123,.1)}
    .chat-textarea::placeholder{color:var(--muted2)}
    .status-select{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:.38rem .7rem;color:var(--text);font-family:'Inter',sans-serif;font-size:.76rem;outline:none;cursor:pointer;transition:border-color .18s}
    .status-select:focus{border-color:var(--accent)}

    /* lightbox */
    .lightbox{position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.9);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
    .lightbox.show{opacity:1;pointer-events:all}
    .lightbox img{max-width:94vw;max-height:92vh;border-radius:10px;object-fit:contain}
    .lb-close{position:fixed;top:1rem;right:1.2rem;background:rgba(255,255,255,.1);border:none;color:#fff;width:38px;height:38px;border-radius:50%;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center}

    /* MODAL */
    .modal-overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:1.5rem;opacity:0;pointer-events:none;transition:opacity .22s}
    .modal-overlay.show{opacity:1;pointer-events:all}
    .modal{background:var(--bg2);border-radius:20px;padding:1.8rem;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15)}
    .modal-title{font-family:'Geologica',sans-serif;font-weight:600;font-size:.95rem;margin-bottom:1.4rem;display:flex;align-items:center;justify-content:space-between}
    .modal-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.1rem;padding:0;line-height:1}
    .modal-footer{display:flex;gap:.7rem;margin-top:1.4rem}
    .modal-footer .btn{flex:1;justify-content:center}
    .form-group{margin-bottom:1rem}
    .form-label{display:block;font-size:.66rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:.4rem;font-weight:600}
    .form-input,.form-textarea,.form-select{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:.7rem 1rem;color:var(--text);font-family:'Inter',sans-serif;font-size:.86rem;font-weight:400;outline:none;transition:border-color .18s}
    .form-input:focus,.form-textarea:focus,.form-select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(30,222,123,.15)}
    .form-input::placeholder,.form-textarea::placeholder{color:var(--muted2)}
    .form-textarea{resize:vertical;min-height:70px;line-height:1.55}
    .form-select{cursor:pointer}
  </style>
</head>
<body>
<div class="loading-screen" id="loadingScreen"><div class="spinner"></div></div>

<div class="sidebar">
  <a href="/admin" class="sidebar-logo">
    <img src="../img/favicon.png" alt="Antviz">
    <span class="sidebar-logo-text">Antviz</span>
    <span class="sidebar-logo-badge">ADMIN</span>
  </a>
  <nav class="sidebar-nav">
    <div class="sidebar-section">Основное</div>
    <a href="/admin" class="nav-item" data-page="index">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Дашборд
    </a>
    <a href="/admin/orders" class="nav-item" data-page="orders">
      <svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h4"/></svg>
      Заказы
      <span class="nav-item-badge" id="navBadgeOrders" style="display:none"></span>
    </a>
    <a href="/admin/chats" class="nav-item active" data-page="chats">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      Тикеты
      <span class="nav-item-badge" id="navBadgeChats" style="display:none"></span>
    </a>
    <div class="sidebar-section">Клиенты</div>
    <a href="/admin/tickets" class="nav-item" data-page="tickets">
      <svg viewBox="0 0 24 24"><path d="M2 9a3 3 0 010-6h20a3 3 0 010 6"/><path d="M2 15a3 3 0 000 6h20a3 3 0 000-6"/><path d="M6 12h12"/></svg>
      Обслуживание
      <span class="nav-item-badge" id="navBadgeTickets" style="display:none"></span>
    </a>
    <a href="/admin/promos" class="nav-item" data-page="promos">
      <svg viewBox="0 0 24 24"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><circle cx="7" cy="7" r="1.5" fill="currentColor" stroke="none"/></svg>
      Промокоды
    </a>
    <div class="sidebar-section">Система</div>
    <a href="/admin/reviews" class="nav-item" data-page="reviews">
      <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      Отзывы
    </a>
  </nav>
  <div class="sidebar-footer">
    <button class="nav-item" onclick="doLogout()" style="color:var(--error)">
      <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
      Выйти
    </button>
  </div>
</div>

<div class="topbar">
  <div class="topbar-title">Тикеты поддержки</div>
  <div class="topbar-right">
    <div class="topbar-stat">Открытых: <span class="topbar-stat-num" id="statOpen" style="color:var(--error)">—</span></div>
    <div class="topbar-stat">Всего: <span class="topbar-stat-num" id="statTotal">—</span></div>
  </div>
</div>

<div class="chat-shell" id="appWrap" style="display:none">

  <!-- Левая колонка: список -->
  <div class="ticket-list-col">
    <div class="list-header">
      <div class="list-search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input type="text" id="listSearch" placeholder="Поиск..." oninput="filterList()"/>
      </div>
      <div class="list-tabs">
        <button class="list-tab active" onclick="switchTab('all',this)">Все</button>
        <button class="list-tab" onclick="switchTab('open',this)">Открытые</button>
        <button class="list-tab" onclick="switchTab('in-progress',this)">В работе</button>
        <button class="list-tab" onclick="switchTab('resolved',this)">Решённые</button>
      </div>
      <div class="list-actions">
        <button class="btn btn-primary btn-sm" onclick="openCreateTicket()">➕ Создать тикет</button>
      </div>
    </div>
    <div class="tickets-scroll" id="ticketsList">
      <div class="empty-list">Загрузка...</div>
    </div>
  </div>

  <!-- Правая колонка: чат -->
  <div class="ticket-chat-col" id="chatCol">
    <div class="no-selection" id="noSelection">
      <svg viewBox="0 0 24 24" fill="none"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      <div style="font-family:'Geologica',sans-serif;font-weight:600;font-size:.9rem;color:var(--text)">Выберите тикет</div>
      <div style="font-size:.8rem">Нажмите на тикет слева, чтобы открыть переписку</div>
    </div>

    <div id="chatView" style="display:none;flex:1;flex-direction:column;overflow:hidden;display:none">
      <div class="chat-topbar">
        <div class="chat-topbar-left">
          <div class="chat-topbar-subject" id="chatSubject">—</div>
          <div class="chat-topbar-meta" id="chatMeta"></div>
        </div>
        <div class="chat-topbar-actions">
          <select class="status-select" id="statusSelect" onchange="changeStatus()">
            <option value="open">Открыт</option>
            <option value="in-progress">В обработке</option>
            <option value="resolved">Решён</option>
            <option value="closed">Закрыт</option>
          </select>
          <button class="btn btn-danger btn-sm" onclick="deleteTicket()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:13px;height:13px"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
            Удалить
          </button>
        </div>
      </div>
      <div class="chat-msgs" id="chatMsgs"></div>
      <div class="chat-input-area">
        <div class="chat-input-row">
          <textarea class="chat-textarea" id="chatInp" rows="1" placeholder="Ответить клиенту..." onkeydown="onKey(event)" oninput="autoResize(this)"></textarea>
          <label class="btn btn-ghost btn-sm" style="cursor:pointer" title="Прикрепить изображение">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            <input type="file" id="fileInp" accept="image/*" style="display:none" onchange="sendImg()"/>
          </label>
          <button class="btn btn-primary btn-sm" onclick="sendReply()">Отправить</button>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- MODAL: Создание тикета -->
<div class="modal-overlay" id="createTicketModal" onclick="if(event.target===this)closeCreateTicket()">
  <div class="modal">
    <div class="modal-title">📝 Создать тикет <button class="modal-close" onclick="closeCreateTicket()">✕</button></div>
    <div class="form-group">
      <label class="form-label">Пользователь</label>
      <select class="form-select" id="ticketUser">
        <option value="">Выберите пользователя...</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Тема</label>
      <input class="form-input" id="ticketTopic" type="text" placeholder="Например: Техническая проблема"/>
    </div>
    <div class="form-group">
      <label class="form-label">Заголовок</label>
      <input class="form-input" id="ticketSubject" type="text" placeholder="Краткий заголовок"/>
    </div>
    <div class="form-group">
      <label class="form-label">Сообщение</label>
      <textarea class="form-textarea" id="ticketMessage" placeholder="Опишите проблему..." rows="4"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Приоритет</label>
      <select class="form-select" id="ticketPriority">
        <option value="low">Низкий</option>
        <option value="medium" selected>Средний</option>
        <option value="high">Высокий</option>
      </select>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeCreateTicket()">Отмена</button>
      <button class="btn btn-primary" onclick="createTicket()">Создать</button>
    </div>
  </div>
</div>

<div class="lightbox" id="lightbox" onclick="document.getElementById('lightbox').classList.remove('show')">
  <button class="lb-close">✕</button>
  <img id="lbImg" src="" alt=""/>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { auth, db, ADMIN_EMAIL } from '../firebase-config.js';
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  collection, query, orderBy, onSnapshot, doc,
  updateDoc, deleteDoc, addDoc, serverTimestamp, getDocs, getDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

let allTickets = [];
let selectedId = null;
let currentFilter = 'all';
let unsubMsgs = null;

// ─── UTILS ────────────────────────────────────────────────────────────────────
function toast(m, t = 'info') {
  const el = document.getElementById('toast');
  el.textContent = m; el.className = `toast ${t} show`;
  setTimeout(() => el.className = 'toast', 3400);
}
function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function fmtDT(ts) {
  if (!ts) return '—';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('ru', {day:'numeric',month:'short'}) + ' ' + d.toLocaleTimeString('ru', {hour:'2-digit',minute:'2-digit'});
}
function fmtTime(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  const now = new Date();
  const today = new Date(now.getFullYear(),now.getMonth(),now.getDate());
  if (d >= today) return d.toLocaleTimeString('ru', {hour:'2-digit',minute:'2-digit'});
  return d.toLocaleDateString('ru',{day:'numeric',month:'short'}) + ' ' + d.toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});
}
function statusBadge(s) {
  const map = {
    open: ['s-open','Открыт'],
    'in-progress': ['s-in-progress','В обработке'],
    resolved: ['s-resolved','Решён'],
    closed: ['s-closed','Закрыт']
  };
  const [cls, label] = map[s] || ['s-closed', s];
  return `<span class="sbadge ${cls}">${label}</span>`;
}
function priorityLabel(p) {
  if (p === 'high') return '<span class="pri-high">Высокий</span>';
  if (p === 'medium') return '<span class="pri-medium">Средний</span>';
  return '<span class="pri-low">Низкий</span>';
}

// ─── LIST ─────────────────────────────────────────────────────────────────────
window.switchTab = (f, btn) => {
  currentFilter = f;
  document.querySelectorAll('.list-tab').forEach(b => b.classList.toggle('active', b === btn));
  renderList();
};
window.filterList = () => renderList();

function renderList() {
  const q = (document.getElementById('listSearch').value || '').toLowerCase();
  let list = allTickets.filter(t => {
    if (currentFilter !== 'all' && t.status !== currentFilter) return false;
    if (q) return (t.subject||'').toLowerCase().includes(q) || (t.userName||'').toLowerCase().includes(q) || (t.topic||'').toLowerCase().includes(q);
    return true;
  });

  const open = allTickets.filter(t => t.status === 'open' || t.status === 'in-progress').length;
  document.getElementById('statOpen').textContent = open;
  document.getElementById('statTotal').textContent = allTickets.length;

  const badge = document.getElementById('navBadgeChats');
  badge.style.display = open ? '' : 'none';
  badge.textContent = open;

  const el = document.getElementById('ticketsList');
  if (!list.length) {
    el.innerHTML = `<div class="empty-list">${allTickets.length ? 'Ничего не найдено' : 'Тикетов пока нет'}</div>`;
    return;
  }
  el.innerHTML = list.map(t => {
    const isSelected = t.id === selectedId;
    const lastMsg = (t._lastMsg || '');
    const unread = t.status === 'open' && !t._adminRead;
    return `<div class="ticket-item ${isSelected ? 'selected' : ''}" onclick="selectTicket('${t.id}')">
      <div class="ticket-item-subject">
        ${unread ? '<span class="unread-dot"></span>' : ''}
        ${esc(t.subject || 'Без темы')}
      </div>
      <div class="ticket-item-meta">
        ${statusBadge(t.status)}
        <span>·</span>
        <span>${esc(t.userName || '—')}</span>
        ${t.priority ? `<span>·</span>${priorityLabel(t.priority)}` : ''}
      </div>
      ${lastMsg ? `<div class="ticket-item-preview">${esc(lastMsg)}</div>` : ''}
      <div style="font-size:.68rem;color:var(--muted2);margin-top:.2rem">${fmtDT(t.updatedAt || t.createdAt)}</div>
    </div>`;
  }).join('');
}

// ─── SELECT & CHAT ────────────────────────────────────────────────────────────
window.selectTicket = function(id) {
  selectedId = id;
  const ticket = allTickets.find(t => t.id === id);
  if (!ticket) return;

  document.getElementById('noSelection').style.display = 'none';
  const cv = document.getElementById('chatView');
  cv.style.display = 'flex';
  cv.style.flexDirection = 'column';
  cv.style.overflow = 'hidden';
  cv.style.flex = '1';

  document.getElementById('chatSubject').textContent = `${ticket.topic || ''} · ${ticket.subject || ''}`;
  document.getElementById('chatMeta').innerHTML = `
    <span>${esc(ticket.userName || '—')}</span>
    <span>·</span>
    <span>${esc(ticket.userEmail || '—')}</span>
    <span>·</span>
    <span>${fmtDT(ticket.createdAt)}</span>
    ${ticket.priority ? `<span>·</span>${priorityLabel(ticket.priority)}` : ''}
  `;
  document.getElementById('statusSelect').value = ticket.status || 'open';

  // отметить как прочитанное админом
  updateDoc(doc(db, 'tickets', id), { _adminRead: true }).catch(() => {});
  ticket._adminRead = true;
  renderList();

  // подписаться на сообщения
  if (unsubMsgs) unsubMsgs();
  const q = query(collection(db, 'tickets', id, 'messages'), orderBy('createdAt', 'asc'));
  unsubMsgs = onSnapshot(q, snap => {
    const msgs = snap.docs.map(d => ({id:d.id,...d.data()}));
    renderChat(msgs);
    // обновить превью последнего сообщения
    const last = msgs[msgs.length-1];
    if (last && ticket) ticket._lastMsg = last.text || '';
    renderList();
  });
};

function renderChat(msgs) {
  const el = document.getElementById('chatMsgs');
  if (!msgs.length) {
    el.innerHTML = '<div style="text-align:center;color:var(--muted2);font-size:.8rem;padding:2rem">Нет сообщений</div>';
    return;
  }
  let html = '', lastDate = null;
  msgs.forEach(m => {
    const d = m.createdAt?.toDate ? m.createdAt.toDate() : new Date(m.createdAt || 0);
    const dateStr = d.toLocaleDateString('ru', {day:'numeric',month:'long',year:'numeric'});
    if (lastDate !== dateStr) {
      html += `<div class="msg-divider">${dateStr}</div>`;
      lastDate = dateStr;
    }
    const isUser = m.sender === 'user';
    html += `
      <div class="msg-sender-label ${isUser ? 'user-label' : 'support-label'}">${isUser ? esc(allTickets.find(t=>t.id===selectedId)?.userName||'Клиент') : 'Поддержка'}</div>
      <div class="chat-msg ${isUser ? 'user' : 'support'}">
        ${esc(m.text)}
        ${m.imageUrl ? `<img class="msg-img" src="${m.imageUrl}" alt="вложение" onclick="showLightbox('${m.imageUrl}')" />` : ''}
        <span class="msg-time">${fmtTime(m.createdAt)}</span>
      </div>`;
  });
  el.innerHTML = html;
  el.scrollTop = el.scrollHeight;
}

// ─── CREATE TICKET ──────────────────────────────────────────────────────────
window.openCreateTicket = async function() {
  try {
    const usersSnap = await getDocs(collection(db, 'users'));
    const userSelect = document.getElementById('ticketUser');
    userSelect.innerHTML = '<option value="">Выберите пользователя...</option>';
    usersSnap.forEach(d => {
      const data = d.data();
      const name = data.displayName || data.name || d.id;
      const email = data.email || '';
      userSelect.innerHTML += `<option value="${d.id}">${esc(name)}${email ? ' · '+esc(email) : ''}</option>`;
    });
    
    document.getElementById('ticketTopic').value = '';
    document.getElementById('ticketSubject').value = '';
    document.getElementById('ticketMessage').value = '';
    document.getElementById('ticketPriority').value = 'medium';
    document.getElementById('createTicketModal').classList.add('show');
  } catch(e) {
    toast('Ошибка загрузки пользователей: '+e.message, 'error');
  }
};

window.closeCreateTicket = function() {
  document.getElementById('createTicketModal').classList.remove('show');
};

window.createTicket = async function() {
  const uid = document.getElementById('ticketUser').value;
  const topic = document.getElementById('ticketTopic').value.trim();
  const subject = document.getElementById('ticketSubject').value.trim();
  const message = document.getElementById('ticketMessage').value.trim();
  const priority = document.getElementById('ticketPriority').value;
  
  if (!uid) { toast('Выберите пользователя', 'error'); return; }
  if (!subject) { toast('Введите заголовок', 'error'); return; }
  if (!message) { toast('Введите сообщение', 'error'); return; }
  
  try {
    const userDoc = await getDoc(doc(db, 'users', uid));
    const userData = userDoc.data();
    
    // Создаём тикет
    const ticketRef = await addDoc(collection(db, 'tickets'), {
      uid: uid,
      userName: userData?.displayName || userData?.name || 'Пользователь',
      userEmail: userData?.email || '—',
      topic: topic || 'Общий вопрос',
      subject: subject,
      status: 'open',
      priority: priority,
      _read: false,
      _adminRead: true,
      createdAt: serverTimestamp(),
      updatedAt: serverTimestamp()
    });
    
    // Добавляем первое сообщение
    await addDoc(collection(db, 'tickets', ticketRef.id, 'messages'), {
      sender: 'support',
      senderName: 'Поддержка',
      text: message,
      imageUrl: null,
      createdAt: serverTimestamp()
    });
    
    // Отправляем уведомление пользователю
    await addDoc(collection(db, 'notifications', uid, 'items'), {
      title: '📝 Новый тикет поддержки',
      text: `«${subject}»: ${message}`,
      read: false,
      createdAt: serverTimestamp()
    });
    
    toast('Тикет создан и пользователь уведомлён ✅', 'success');
    closeCreateTicket();
  } catch(e) {
    toast('Ошибка: ' + e.message, 'error');
  }
};

// ─── ACTIONS ──────────────────────────────────────────────────────────────────
window.sendReply = async function() {
  if (!selectedId) return;
  const inp = document.getElementById('chatInp');
  const text = inp.value.trim();
  if (!text) return toast('Напишите сообщение', 'error');
  inp.value = ''; inp.style.height = 'auto';
  try {
    await addDoc(collection(db, 'tickets', selectedId, 'messages'), {
      sender: 'support',
      senderName: 'Поддержка',
      text,
      imageUrl: null,
      createdAt: serverTimestamp()
    });
    await updateDoc(doc(db, 'tickets', selectedId), {
      updatedAt: serverTimestamp(),
      _read: false,
      _adminRead: true
    });
  } catch(e) { toast('Ошибка: ' + e.message, 'error'); }
};

window.sendImg = async function() {
  if (!selectedId) return;
  const inp = document.getElementById('fileInp');
  const file = inp.files[0];
  if (!file) return;
  if (file.size > 4 * 1024 * 1024) return toast('Файл слишком большой (макс. 4 МБ)', 'error');
  const reader = new FileReader();
  reader.onload = async e => {
    try {
      await addDoc(collection(db, 'tickets', selectedId, 'messages'), {
        sender: 'support',
        senderName: 'Поддержка',
        text: 'Изображение',
        imageUrl: e.target.result,
        createdAt: serverTimestamp()
      });
      await updateDoc(doc(db, 'tickets', selectedId), { updatedAt: serverTimestamp(), _read: false, _adminRead: true });
      toast('Изображение отправлено ✓', 'success');
    } catch(err) { toast('Ошибка', 'error'); }
    inp.value = '';
  };
  reader.readAsDataURL(file);
};

window.changeStatus = async function() {
  if (!selectedId) return;
  const val = document.getElementById('statusSelect').value;
  try {
    await updateDoc(doc(db, 'tickets', selectedId), { status: val, updatedAt: serverTimestamp() });
    toast('Статус обновлён ✓', 'success');
  } catch(e) { toast('Ошибка', 'error'); }
};

window.deleteTicket = async function() {
  if (!selectedId || !confirm('Удалить тикет и все сообщения?')) return;
  try {
    const snap = await getDocs(collection(db, 'tickets', selectedId, 'messages'));
    await Promise.all(snap.docs.map(d => deleteDoc(d.ref)));
    await deleteDoc(doc(db, 'tickets', selectedId));
    toast('Тикет удалён', 'info');
    selectedId = null;
    document.getElementById('chatView').style.display = 'none';
    document.getElementById('noSelection').style.display = 'flex';
    if (unsubMsgs) { unsubMsgs(); unsubMsgs = null; }
  } catch(e) { toast('Ошибка', 'error'); }
};

window.onKey = function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); window.sendReply(); }
};
window.autoResize = function(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
};
window.showLightbox = function(src) {
  document.getElementById('lbImg').src = src;
  document.getElementById('lightbox').classList.add('show');
};
window.doLogout = async () => {
  const { signOut } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js");
  await signOut(auth); window.location.href = '/';
};

// ─── INIT ─────────────────────────────────────────────────────────────────────
onAuthStateChanged(auth, user => {
  document.getElementById('loadingScreen').style.display = 'none';
  if (!user || user.email !== ADMIN_EMAIL) { window.location.href = '/'; return; }
  document.getElementById('appWrap').style.display = 'grid';

  const q = query(collection(db, 'tickets'), orderBy('createdAt', 'desc'));
  onSnapshot(q, async snap => {
    const incoming = snap.docs.map(d => ({id:d.id,...d.data()}));
    // сохраняем _lastMsg из предыдущего состояния
    incoming.forEach(t => {
      const old = allTickets.find(x => x.id === t.id);
      t._lastMsg = old?._lastMsg || '';
    });
    allTickets = incoming;
    renderList();

    // загружаем последнее сообщение для превью
    for (const t of allTickets) {
      if (!t._lastMsg) {
        getDocs(query(collection(db, 'tickets', t.id, 'messages'), orderBy('createdAt', 'desc')))
          .then(s => {
            if (s.docs.length) t._lastMsg = s.docs[0].data().text || '';
            renderList();
          }).catch(()=>{});
      }
    }
  });
});
</script>
</body>
</html>
