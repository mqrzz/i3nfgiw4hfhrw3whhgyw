<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Отзывы — Antviz Admin.</title>
<link rel="icon" href="../img/favicon.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Geologica:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#f2f4f7}
:root{--green:#1ede7b;--green-h:#1ac16b;--green-d:#149955;--bg:#fff;--bg2:#f2f4f7;--bg3:#f9fafc;--text:#191b1e;--muted:#707a8a;--border:#dfe3e8;--border2:#cbcdd6;--dark:#191b1e;--dark2:#2b2f33;--red:#e8634f;--warn:#f59e0b;--info:#3b82f6;--font:'Geologica','Inter',sans-serif;--sw:256px;--th:68px}
body{color:var(--text);font-family:var(--font);font-weight:300;-webkit-font-smoothing:antialiased}
@keyframes spin{to{transform:rotate(360deg)}}@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.ls{position:fixed;inset:0;z-index:9000;background:var(--dark);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.sp{width:26px;height:26px;border:2px solid rgba(255,255,255,.1);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite}
.lt{font-size:13px;color:rgba(255,255,255,.35)}
.sb{position:fixed;top:0;left:0;bottom:0;width:var(--sw);background:var(--dark);display:flex;flex-direction:column;z-index:200}
.sb-logo{padding:24px 20px 20px;display:flex;align-items:center;gap:12px;text-decoration:none;border-bottom:1px solid rgba(255,255,255,.07)}
.lm{width:34px;height:34px;border-radius:12px;background:var(--green);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.lm svg{width:18px;height:18px;fill:var(--dark)}
.ln{font-weight:500;font-size:.95rem;color:#fff;letter-spacing:-.02em}
.lbadge{margin-left:auto;font-size:.58rem;font-weight:500;letter-spacing:.07em;text-transform:uppercase;background:rgba(232,99,79,.15);color:var(--red);border:1px solid rgba(232,99,79,.25);padding:.15rem .5rem;border-radius:7px}
.sb-nav{flex:1;padding:14px 12px;overflow-y:auto;display:flex;flex-direction:column;gap:2px}
.ns{font-size:.6rem;font-weight:500;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.25);padding:14px 10px 5px;margin-top:6px}
.ni{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:14px;text-decoration:none;color:rgba(255,255,255,.45);font-size:.85rem;font-weight:300;transition:background .12s,color .12s;cursor:pointer;border:none;background:none;width:100%;font-family:var(--font);position:relative}
.ni:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.85)}
.ni.active{background:rgba(30,222,123,.12);color:var(--green)}
.ni svg{width:16px;height:16px;flex-shrink:0;stroke:currentColor;stroke-width:1.7;fill:none;stroke-linecap:round;stroke-linejoin:round}
.nb{position:absolute;right:10px;background:var(--red);color:#fff;font-size:.58rem;font-weight:500;min-width:17px;height:17px;border-radius:50px;display:flex;align-items:center;justify-content:center;padding:0 4px}
.sb-foot{padding:12px;border-top:1px solid rgba(255,255,255,.07)}
.tb{position:fixed;top:0;left:var(--sw);right:0;height:var(--th);background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 32px;z-index:100}
.tb-l{display:flex;align-items:center;gap:16px}
.tb-title{font-weight:500;font-size:1rem;letter-spacing:-.02em}
.tb-stats{display:flex;gap:6px}
.ts{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:.3rem .85rem;font-size:.75rem;color:var(--muted);display:flex;align-items:center;gap:5px}
.ts strong{font-weight:500;color:var(--text)}
.main{margin-left:var(--sw);margin-top:var(--th);padding:36px 40px;min-height:calc(100vh - var(--th));animation:fadeIn .25s ease}

/* HERO */
.hero{background:var(--dark);border-radius:32px;padding:36px 40px;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;gap:24px}
.hero-text h1{font-size:clamp(22px,2vw,32px);font-weight:500;color:#fff;letter-spacing:-.03em;margin-bottom:6px}
.hero-text p{font-size:.88rem;color:rgba(255,255,255,.4)}
.hero-stats{display:flex;gap:12px}
.hs{background:rgba(255,255,255,.07);border-radius:20px;padding:18px 22px;text-align:center;min-width:90px}
.hs-n{font-size:1.8rem;font-weight:500;letter-spacing:-.04em;color:#fff;line-height:1}
.hs-l{font-size:.68rem;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.35);margin-top:5px;font-weight:500}
.hs-n.warn{color:var(--warn)}

/* FILTERS */
.filter-row{display:flex;gap:5px;margin-bottom:24px}
.tab{background:none;border:1.5px solid var(--border);border-radius:10px;padding:.35rem .9rem;font-family:var(--font);font-size:.8rem;font-weight:300;color:var(--muted);cursor:pointer;transition:all .12s}
.tab:hover{border-color:var(--border2);color:var(--text)}
.tab.active{background:var(--dark);border-color:var(--dark);color:#fff;font-weight:500}

/* REVIEW GRID */
.rv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:14px}
.rc{background:var(--bg);border:1.5px solid var(--border);border-radius:24px;padding:26px 28px;transition:border-color .15s,box-shadow .15s}
.rc:hover{border-color:var(--border2);box-shadow:0 6px 20px rgba(0,0,0,.06)}
.rc.hidden-card{opacity:.5;border-style:dashed}
.rc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:14px}
.rc-name{font-size:1rem;font-weight:500;letter-spacing:-.02em;margin-bottom:5px}
.rc-stars{font-size:1.1rem;color:var(--warn);letter-spacing:.05em}
.rc-date{font-size:.75rem;color:var(--muted);margin-top:2px}
.rc-text{font-size:.9rem;color:var(--muted);line-height:1.65;margin-bottom:18px}
.rc-order{font-size:.74rem;color:var(--info);margin-bottom:14px}
.rc-actions{display:flex;gap:8px}

/* EMPTY */
.empty{padding:64px 32px;text-align:center;color:var(--muted);display:flex;flex-direction:column;gap:12px;align-items:center}
.empty-icon{font-size:2.5rem}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;font-family:var(--font);font-weight:500;font-size:.84rem;border:none;border-radius:12px;padding:.55rem 1.1rem;cursor:pointer;transition:background .1s,transform .1s;text-decoration:none;white-space:nowrap}
.btn:hover{transform:translateY(-1px)}
.btn-green{background:var(--green);color:var(--dark)}.btn-green:hover{background:var(--green-h)}
.btn-outline{background:transparent;border:1.5px solid var(--border2);color:var(--muted)}.btn-outline:hover{border-color:var(--text);color:var(--text)}
.btn-danger{background:rgba(232,99,79,.08);color:var(--red);border:1px solid rgba(232,99,79,.2)}.btn-danger:hover{background:rgba(232,99,79,.15)}
.btn-sm{padding:.4rem .9rem;font-size:.8rem;border-radius:10px}

.toast{position:fixed;bottom:28px;right:28px;z-index:900;padding:.7rem 1.4rem;border-radius:16px;font-size:.84rem;font-weight:500;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;transform:translateY(8px)}
.toast.show{opacity:1;transform:none}
.toast.success{background:var(--green);color:#0d3320}.toast.error{background:var(--red);color:#fff}.toast.info{background:var(--dark);color:#fff}
</style>
</head>
<body>
<div class="ls" id="loadingScreen"><div class="sp"></div><span class="lt">Загрузка...</span></div>

<div class="sb">
  <a href="/admin" class="sb-logo"><div class="lm"><svg viewBox="0 0 20 20"><path d="M10 2L3 7v11h5v-5h4v5h5V7L10 2z"/></svg></div><span class="ln">Antviz</span><span class="lbadge">Admin</span></a>
  <nav class="sb-nav">
    <span class="ns">Основное</span>
    <a href="/admin" class="ni"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="2"/><rect x="14" y="3" width="7" height="7" rx="2"/><rect x="3" y="14" width="7" height="7" rx="2"/><rect x="14" y="14" width="7" height="7" rx="2"/></svg>Дашборд</a>
    <a href="/admin/orders" class="ni"><svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h4"/></svg>Заказы<span class="nb" id="navBadgeOrders" style="display:none"></span></a>
    <span class="ns">Клиенты</span>
    <a href="/admin/tickets" class="ni"><svg viewBox="0 0 24 24"><path d="M2 9a3 3 0 010-6h20a3 3 0 010 6"/><path d="M2 15a3 3 0 000 6h20a3 3 0 000-6"/><path d="M6 12h12"/></svg>Обслуживание</a>
    <a href="/admin/chats" class="ni"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>Чаты</a>
    <a href="/admin/bans" class="ni"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M4.93 4.93l14.14 14.14"/></svg>Баны</a>
    <a href="/admin/promos" class="ni"><svg viewBox="0 0 24 24"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><circle cx="7" cy="7" r="1.5" fill="currentColor" stroke="none"/></svg>Промокоды</a>
    <span class="ns">Система</span>
    <a href="/admin/reviews" class="ni active"><svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>Отзывы</a>
  </nav>
  <div class="sb-foot"><button class="ni" onclick="doLogout()" style="color:rgba(232,99,79,.8)"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>Выйти</button></div>
</div>

<div class="tb">
  <div class="tb-l">
    <span class="tb-title">Отзывы</span>
    <div class="tb-stats">
      <div class="ts">Всего: <strong id="totalCount">—</strong></div>
      <div class="ts">Средняя: <strong id="avgRating" style="color:var(--warn)">—</strong> ★</div>
    </div>
  </div>
</div>

<div class="main" id="appWrap" style="display:none">
  <div class="hero">
    <div class="hero-text"><h1>Отзывы клиентов ⭐</h1><p>Управляйте видимостью отзывов на сайте</p></div>
    <div class="hero-stats">
      <div class="hs"><div class="hs-n" id="heroTotal">—</div><div class="hs-l">Всего</div></div>
      <div class="hs"><div class="hs-n warn" id="heroAvg">—</div><div class="hs-l">Средняя</div></div>
      <div class="hs"><div class="hs-n" id="heroVisible" style="color:var(--green-d)">—</div><div class="hs-l">Видимых</div></div>
    </div>
  </div>
  <div class="filter-row">
    <button class="tab active" onclick="switchFilter('all',this)">Все</button>
    <button class="tab" onclick="switchFilter('visible',this)">Опубликованные</button>
    <button class="tab" onclick="switchFilter('hidden',this)">Скрытые</button>
  </div>
  <div id="reviewsList"><div class="empty"><span class="empty-icon">⭐</span>Загрузка...</div></div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { auth, db, ADMIN_EMAIL } from '../firebase-config.js';
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { collection, query, where, orderBy, onSnapshot, getCountFromServer, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

let allReviews=[], currentFilter='all';
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function toast(m,t='info'){const el=document.getElementById('toast');el.textContent=m;el.className=`toast ${t} show`;setTimeout(()=>el.className='toast',3400);}
function fmtDate(ts){if(!ts)return'—';const d=ts.toDate?ts.toDate():new Date(ts);return d.toLocaleDateString('ru',{day:'numeric',month:'long',year:'numeric'});}
function stars(n){return'★'.repeat(n)+'☆'.repeat(5-n);}
window.doLogout=async()=>{await signOut(auth);window.location.href='/';};
window.switchFilter=(f,btn)=>{currentFilter=f;document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderReviews();};

function renderReviews(){
  const el=document.getElementById('reviewsList');
  let list=allReviews;
  if(currentFilter==='visible') list=list.filter(r=>!r.hidden);
  else if(currentFilter==='hidden') list=list.filter(r=>r.hidden);
  const total=allReviews.length;
  const avg=total?allReviews.reduce((s,r)=>s+(r.stars||0),0)/total:0;
  const visible=allReviews.filter(r=>!r.hidden).length;
  document.getElementById('totalCount').textContent=total;
  document.getElementById('avgRating').textContent=avg.toFixed(1);
  document.getElementById('heroTotal').textContent=total;
  document.getElementById('heroAvg').textContent=avg.toFixed(1)+'★';
  document.getElementById('heroVisible').textContent=visible;
  if(!list.length){el.innerHTML=`<div class="empty"><span class="empty-icon">⭐</span>Нет отзывов</div>`;return;}
  el.innerHTML=`<div class="rv-grid">${list.map(r=>`
    <div class="rc${r.hidden?' hidden-card':''}">
      <div class="rc-top">
        <div>
          <div class="rc-name">${esc(r.clientName||r.authorName||'Аноним')}</div>
          <div class="rc-stars">${stars(r.stars||0)}</div>
          <div class="rc-date">${fmtDate(r.createdAt)}</div>
        </div>
        ${r.hidden?'<span style="font-size:.72rem;color:var(--muted);background:var(--bg2);padding:.2rem .6rem;border-radius:8px;font-weight:500">Скрыт</span>':'<span style="font-size:.72rem;color:var(--green-d);background:rgba(30,222,123,.1);padding:.2rem .6rem;border-radius:8px;font-weight:500">Опубликован</span>'}
      </div>
      <div class="rc-text">${esc(r.text||'Без текста')}</div>
      ${r.orderId?`<div class="rc-order">Заказ №${r.orderId.slice(0,8).toUpperCase()}</div>`:''}
      <div class="rc-actions">
        <button class="btn btn-${r.hidden?'green':'outline'} btn-sm" onclick="toggleReview('${r.id}',${!r.hidden})">${r.hidden?'👁 Опубликовать':'🙈 Скрыть'}</button>
        <button class="btn btn-danger btn-sm" onclick="deleteReview('${r.id}')">Удалить</button>
      </div>
    </div>`).join('')}</div>`;
}
window.toggleReview=async(id,hidden)=>{await updateDoc(doc(db,'reviews',id),{hidden});toast(hidden?'Скрыт':'Опубликован ✓',hidden?'info':'success');};
window.deleteReview=async id=>{if(!confirm('Удалить отзыв?'))return;await deleteDoc(doc(db,'reviews',id));toast('Удалён','info');};

onAuthStateChanged(auth,async user=>{
  if(!user){document.getElementById('loadingScreen').style.display='none';window.location.href='/';return;}
  let isAdmin=user.email===ADMIN_EMAIL;
  try{const t=await user.getIdTokenResult(true);if(t.claims&&t.claims.admin===true)isAdmin=true;}catch(e){}
  document.getElementById('loadingScreen').style.display='none';
  if(!isAdmin){window.location.href='/';return;}
  document.getElementById('appWrap').style.display='block';
  getCountFromServer(query(collection(db,'orders'),where('refundStatus','==','requested'))).then(s=>{const n=s.data().count;const b=document.getElementById('navBadgeOrders');if(b){b.style.display=n?'':'none';b.textContent=n;}}).catch(()=>{});
  onSnapshot(query(collection(db,'reviews'),orderBy('createdAt','desc')),snap=>{
    allReviews=snap.docs.map(d=>({id:d.id,...d.data()}));renderReviews();
  });
});
</script>
<script src="../GEOBLOCK.js"></script>
<script src="../maintenance.js"></script>
</body>
</html>
