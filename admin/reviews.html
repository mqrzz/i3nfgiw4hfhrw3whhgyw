<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Отзывы — Antviz Admin</title>
  <link rel="icon" href="../img/favicon.png"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Geologica:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#f5f7fa;
      --bg2:#ffffff;
      --bg3:#f0f2f5;
      --card:#ffffff;
      --border:#e8ecf0;
      --border2:#d0d5db;
      --accent:#1ede7b;
      --accent2:#17b86a;
      --accent3:#0d9f56;
      --text:#1a1a1e;
      --muted:#6b7280;
      --muted2:#9ca3af;
      --success:#1ede7b;
      --error:#ff2d50;
      --warn:#fbbf24;
      --sidebar-w:240px;
      --topbar-h:60px;
    }
    html,body{height:100%;font-size:16px;background:var(--bg)}
    body{color:var(--text);font-family:'Inter',sans-serif;font-weight:400;display:flex;flex-direction:column}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-thumb{background:rgba(0,0,0,.12);border-radius:2px}

    .loading-screen{position:fixed;inset:0;z-index:1000;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem}
    .spinner{width:30px;height:30px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}

    .sidebar{position:fixed;top:0;left:0;bottom:0;width:var(--sidebar-w);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100}
    .sidebar-logo{padding:1.2rem 1.2rem 1rem;display:flex;align-items:center;gap:10px;text-decoration:none;border-bottom:1px solid var(--border)}
    .sidebar-logo img{width:28px;height:28px;border-radius:8px;object-fit:cover;flex-shrink:0}
    .sidebar-logo-text{font-family:'Geologica',sans-serif;font-weight:700;font-size:.85rem;color:var(--text)}
    .sidebar-logo-badge{background:rgba(255,45,80,.1);color:var(--error);border:1px solid rgba(255,45,80,.15);padding:.08rem .45rem;border-radius:50px;font-size:.55rem;font-weight:700;margin-left:auto;flex-shrink:0}
    .sidebar-nav{flex:1;padding:1rem .7rem;overflow-y:auto;display:flex;flex-direction:column;gap:.15rem}
    .sidebar-section{font-size:.58rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:.6rem .6rem .3rem;font-weight:600}
    .nav-item{display:flex;align-items:center;gap:10px;padding:.6rem .85rem;border-radius:10px;text-decoration:none;color:var(--muted);font-size:.84rem;transition:all .15s;cursor:pointer;border:none;background:none;width:100%;font-family:'Inter',sans-serif;position:relative}
    .nav-item:hover{background:rgba(0,0,0,.04);color:var(--text)}
    .nav-item.active{background:rgba(30,222,123,.12);color:var(--accent2)}
    .nav-item svg{width:17px;height:17px;flex-shrink:0;stroke:currentColor;stroke-width:1.7;fill:none}
    .nav-item-badge{position:absolute;right:.7rem;background:var(--error);color:#fff;font-size:.58rem;font-weight:700;min-width:18px;height:18px;border-radius:50px;display:flex;align-items:center;justify-content:center;padding:0 4px;animation:pulse 2s infinite}
    .sidebar-footer{padding:.8rem .7rem;border-top:1px solid var(--border)}

    .topbar{position:fixed;top:0;left:var(--sidebar-w);right:0;height:var(--topbar-h);background:rgba(255,255,255,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 1.6rem;z-index:90}
    .topbar-title{font-family:'Geologica',sans-serif;font-weight:600;font-size:.95rem;color:var(--text)}
    .topbar-right{display:flex;align-items:center;gap:.7rem}
    .topbar-stat{display:flex;align-items:center;gap:.4rem;background:var(--bg3);border:1px solid var(--border);border-radius:50px;padding:.28rem .85rem;font-size:.72rem;white-space:nowrap;color:var(--muted)}
    .topbar-stat-num{font-family:'Geologica',sans-serif;font-weight:700;font-size:.8rem;color:var(--text)}
    .topbar-btn{background:var(--bg3);border:1px solid var(--border);color:var(--muted);font-family:'Inter',sans-serif;font-size:.76rem;padding:.35rem .9rem;border-radius:9px;cursor:pointer;transition:all .18s}
    .topbar-btn:hover{border-color:var(--border2);color:var(--text)}
    .topbar-btn.danger:hover{border-color:rgba(255,45,80,.3);color:var(--error)}
    .maint-btn{display:flex;align-items:center;gap:.5rem}
    .maint-btn.on{border-color:rgba(255,209,26,.4)!important;color:var(--warn)!important}
    .toggle-track{width:28px;height:16px;background:var(--bg);border-radius:50px;position:relative;border:1px solid var(--border);flex-shrink:0;transition:background .2s}
    .maint-btn.on .toggle-track{background:rgba(255,209,26,.15);border-color:rgba(255,209,26,.3)}
    .toggle-track::after{content:'';position:absolute;top:2px;left:2px;width:10px;height:10px;border-radius:50%;background:var(--muted);transition:transform .2s,background .2s}
    .maint-btn.on .toggle-track::after{transform:translateX(12px);background:var(--warn)}

    .btn{display:inline-flex;align-items:center;gap:6px;padding:.6rem 1.2rem;border-radius:9px;font-family:'Inter',sans-serif;font-size:.8rem;font-weight:500;cursor:pointer;border:none;transition:all .15s;text-decoration:none}
    .btn-primary{background:var(--accent);color:#fff}
    .btn-primary:hover{box-shadow:0 4px 12px rgba(30,222,123,.35)}
    .btn-ghost{background:var(--bg3);border:1px solid var(--border);color:var(--muted)}
    .btn-ghost:hover{border-color:var(--border2);color:var(--text)}
    .btn-danger{background:#fee2e2;border:1px solid #fca5a5;color:var(--error)}
    .btn-danger:hover{background:#fecaca}
    .btn-success{background:#d1fae5;border:1px solid #a7f3d0;color:#065f46}
    .btn-success:hover{background:#a7f3d0}
    .btn-sm{padding:.38rem .8rem;font-size:.74rem;border-radius:7px}
    .btn-xs{padding:.22rem .55rem;font-size:.66rem;border-radius:6px}

    .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem;color:var(--muted);gap:.7rem;text-align:center}
    .empty-state-icon{font-size:2.5rem;opacity:.3}
    .empty-state-text{font-size:.84rem}

    .toast{position:fixed;bottom:1.5rem;right:1.5rem;z-index:600;padding:.6rem 1.3rem;border-radius:10px;font-size:.8rem;font-weight:500;opacity:0;transition:opacity .26s,transform .26s;pointer-events:none;transform:translateY(8px)}
    .toast.show{opacity:1;transform:translateY(0)}
    .toast.success{background:var(--success);color:#fff}
    .toast.error{background:var(--error);color:#fff}
    .toast.info{background:#3b82f6;color:#fff}
    .toast.warn{background:var(--warn);color:#1a1a1e}

    .sbadge{display:inline-flex;align-items:center;gap:.2rem;padding:.22rem .65rem;border-radius:50px;font-size:.66rem;font-weight:600;white-space:nowrap}
    .sdot{width:4px;height:4px;border-radius:50%;background:currentColor;flex-shrink:0}
    .s0{background:#f3f4f6;color:var(--muted);border:1px solid var(--border)}
    .s1{background:#fef3c7;color:#b45309;border:1px solid #fde68a}
    .s2{background:#dbeafe;color:#1d4ed8;border:1px solid #bfdbfe}
    .s3{background:#e0e7ff;color:#4f46e5;border:1px solid #c7d2fe}
    .s4{background:#fef3c7;color:#b45309;border:1px solid #fde68a}
    .s5{background:#d1fae5;color:#065f46;border:1px solid #a7f3d0}

    .tab{background:transparent;border:1px solid transparent;color:var(--muted);font-family:"Inter",sans-serif;font-size:.72rem;padding:.28rem .65rem;border-radius:7px;cursor:pointer;transition:all .15s;white-space:nowrap}
    .tab:hover{color:var(--text);background:rgba(0,0,0,.04)}
    .tab.active{background:rgba(30,222,123,.12);color:var(--accent2);border-color:rgba(30,222,123,.25)}

    .review-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:1.2rem 1.4rem;margin-bottom:.8rem;transition:border-color .15s;box-shadow:0 1px 2px rgba(0,0,0,.03)}
    .review-card:hover{border-color:var(--border2)}
    .review-card.hidden-card{opacity:.5;border-style:dashed}
    .stars{color:var(--warn);font-size:1rem;letter-spacing:.1em}
  </style>
</head>
<body>
<div class="loading-screen" id="loadingScreen"><div class="spinner"></div></div>

<div class="sidebar" id="sidebar">
  <a href="/admin" class="sidebar-logo">
    <img src="../img/favicon.png" alt="Antviz">
    <span class="sidebar-logo-text">Antviz</span>
    <span class="sidebar-logo-badge">ADMIN</span>
  </a>
  <nav class="sidebar-nav">
    <div class="sidebar-section">Основное</div>
    <a href="/admin" class="nav-item" data-page="index">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Дашборд
    </a>
    <a href="/admin/orders" class="nav-item" data-page="orders">
      <svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h4"/></svg>
      Заказы
      <span class="nav-item-badge" id="navBadgeOrders" style="display:none"></span>
    </a>
    <a href="/admin/chats" class="nav-item" data-page="chats">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      Чаты
      <span class="nav-item-badge" id="navBadgeChats" style="display:none"></span>
    </a>
    <div class="sidebar-section">Клиенты</div>
    <a href="/admin/tickets" class="nav-item" data-page="tickets">
      <svg viewBox="0 0 24 24"><path d="M2 9a3 3 0 010-6h20a3 3 0 010 6"/><path d="M2 15a3 3 0 000 6h20a3 3 0 000-6"/><path d="M6 12h12"/></svg>
      Обслуживание
      <span class="nav-item-badge" id="navBadgeTickets" style="display:none"></span>
    </a>
    <a href="/admin/promos" class="nav-item" data-page="promos">
      <svg viewBox="0 0 24 24"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><circle cx="7" cy="7" r="1.5" fill="currentColor" stroke="none"/></svg>
      Промокоды
    </a>
    <div class="sidebar-section">Система</div>
    <a href="/admin/reviews" class="nav-item active" data-page="reviews">
      <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      Отзывы
    </a>
  </nav>
  <div class="sidebar-footer">
    <button class="nav-item" onclick="doLogout()" style="color:var(--error)">
      <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
      Выйти
    </button>
  </div>
</div>

<div class="topbar">
  <div class="topbar-title">Отзывы</div>
  <div class="topbar-right">
    <div class="topbar-stat">Всего: <span class="topbar-stat-num" id="totalCount">—</span></div>
    <div class="topbar-stat">Средняя: <span class="topbar-stat-num" id="avgRating" style="color:var(--warn)">—</span> ★</div>
  </div>
</div>

<div style="margin-left:var(--sidebar-w);margin-top:var(--topbar-h)" id="appWrap" style="display:none">
  <div class="main-inner" style="padding:1.8rem 2rem;max-width:1400px;animation:fadeIn .25s ease">

    <div style="display:flex;gap:.6rem;margin-bottom:1.5rem;flex-wrap:wrap">
      <button class="btn btn-ghost btn-sm tab active" onclick="switchFilter('all',this)">Все</button>
      <button class="btn btn-ghost btn-sm tab" onclick="switchFilter('visible',this)">Опубликованные</button>
      <button class="btn btn-ghost btn-sm tab" onclick="switchFilter('hidden',this)">Скрытые</button>
    </div>

    <div id="reviewsList"><div class="empty-state"><span class="empty-state-icon">⭐</span><span class="empty-state-text">Загрузка...</span></div></div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { auth, db, ADMIN_EMAIL } from '../firebase-config.js';
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { collection, query, orderBy, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

let allReviews=[], currentFilter='all';
function escapeHtml(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function toast(m,t='info'){const el=document.getElementById('toast');el.textContent=m;el.className=`toast ${t} show`;setTimeout(()=>el.className='toast',3400);}
function fmtDate(ts){if(!ts)return '—';const d=ts.toDate?ts.toDate():new Date(ts);return d.toLocaleDateString('ru',{day:'numeric',month:'long',year:'numeric'});}
function stars(n){return '★'.repeat(n)+'☆'.repeat(5-n);}
document.querySelectorAll('.nav-item[data-page]').forEach(el=>{if(el.dataset.page==='reviews')el.classList.add('active');});
window.doLogout=async()=>{const {signOut}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js");await signOut(auth);window.location.href='/';};
window.switchFilter=(f,btn)=>{currentFilter=f;document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderReviews();};

function renderReviews(){
  const el=document.getElementById('reviewsList');
  let list=allReviews;
  if(currentFilter==='visible') list=list.filter(r=>!r.hidden);
  else if(currentFilter==='hidden') list=list.filter(r=>r.hidden);
  document.getElementById('totalCount').textContent=allReviews.length;
  const avg=allReviews.length?allReviews.reduce((s,r)=>s+(r.stars||0),0)/allReviews.length:0;
  document.getElementById('avgRating').textContent=avg.toFixed(1);
  if(!list.length){el.innerHTML=`<div class="empty-state"><span class="empty-state-icon">⭐</span><span class="empty-state-text">Нет отзывов</span></div>`;return;}
  el.innerHTML=list.map(r=>`
    <div class="review-card${r.hidden?' hidden-card':''}">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:.6rem">
        <div>
          <div style="font-weight:500;font-size:.9rem;margin-bottom:.2rem">${escapeHtml(r.clientName||r.authorName||'Аноним')}</div>
          <div class="stars">${stars(r.stars||0)}</div>
        </div>
        <div style="display:flex;gap:.4rem;align-items:center;flex-shrink:0">
          <span style="font-size:.72rem;color:var(--muted)">${fmtDate(r.createdAt)}</span>
          <button class="btn ${r.hidden?'btn-success':'btn-ghost'} btn-xs" onclick="toggleReview('${r.id}',${!r.hidden})">${r.hidden?'👁 Показать':'🙈 Скрыть'}</button>
          <button class="btn btn-danger btn-xs" onclick="deleteReview('${r.id}')">🗑</button>
        </div>
      </div>
      <div style="font-size:.86rem;color:var(--muted2);line-height:1.6">${escapeHtml(r.text||'Без текста')}</div>
      ${r.orderId?`<div style="font-size:.7rem;color:var(--muted);margin-top:.5rem">Заказ: №${r.orderId.slice(0,8).toUpperCase()}</div>`:''}
    </div>`).join('');
}
window.toggleReview=async(id,hidden)=>{await updateDoc(doc(db,'reviews',id),{hidden});toast(hidden?'Скрыт':'Опубликован',hidden?'info':'success');};
window.deleteReview=async id=>{if(!confirm('Удалить отзыв?'))return;await deleteDoc(doc(db,'reviews',id));toast('Удалён','info');};

onAuthStateChanged(auth,async user=>{
  document.getElementById('loadingScreen').style.display='none';
  if(!user||user.email!==ADMIN_EMAIL){window.location.href='/';return;}
  document.getElementById('appWrap').style.display='block';
  onSnapshot(query(collection(db,'reviews'),orderBy('createdAt','desc')),snap=>{
    allReviews=snap.docs.map(d=>({id:d.id,...d.data()}));
    renderReviews();
  });
});
</script>
</body>
</html>
