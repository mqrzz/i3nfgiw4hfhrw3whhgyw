<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Обслуживание — Antviz Admin</title>
<link rel="icon" href="../img/favicon.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Geologica:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#f2f4f7}
:root{
  --green:#1ede7b;--green-h:#1ac16b;--green-d:#149955;
  --bg:#fff;--bg2:#f2f4f7;--bg3:#f9fafc;
  --text:#191b1e;--muted:#707a8a;--border:#dfe3e8;--border2:#cbcdd6;
  --dark:#191b1e;--dark2:#2b2f33;
  --red:#e8634f;--warn:#f59e0b;--info:#3b82f6;
  --font:'Geologica','Inter',sans-serif;
  --sw:256px;--th:68px;
}
body{color:var(--text);font-family:var(--font);font-weight:300;-webkit-font-smoothing:antialiased}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

.ls{position:fixed;inset:0;z-index:9000;background:var(--dark);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.sp{width:26px;height:26px;border:2px solid rgba(255,255,255,.1);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite}
.lt{font-size:13px;color:rgba(255,255,255,.35)}

/* SIDEBAR */
.sb{position:fixed;top:0;left:0;bottom:0;width:var(--sw);background:var(--dark);display:flex;flex-direction:column;z-index:200}
.sb-logo{padding:24px 20px 20px;display:flex;align-items:center;gap:12px;text-decoration:none;border-bottom:1px solid rgba(255,255,255,.07)}
.lm{width:34px;height:34px;border-radius:12px;background:var(--green);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.lm svg{width:18px;height:18px;fill:var(--dark)}
.ln{font-weight:500;font-size:.95rem;color:#fff;letter-spacing:-.02em}
.lbadge{margin-left:auto;font-size:.58rem;font-weight:500;letter-spacing:.07em;text-transform:uppercase;background:rgba(232,99,79,.15);color:var(--red);border:1px solid rgba(232,99,79,.25);padding:.15rem .5rem;border-radius:7px}
.sb-nav{flex:1;padding:14px 12px;overflow-y:auto;display:flex;flex-direction:column;gap:2px}
.ns{font-size:.6rem;font-weight:500;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.25);padding:14px 10px 5px;margin-top:6px}
.ni{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:14px;text-decoration:none;color:rgba(255,255,255,.45);font-size:.85rem;font-weight:300;transition:background .12s,color .12s;cursor:pointer;border:none;background:none;width:100%;font-family:var(--font);position:relative}
.ni:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.85)}
.ni.active{background:rgba(30,222,123,.12);color:var(--green)}
.ni svg{width:16px;height:16px;flex-shrink:0;stroke:currentColor;stroke-width:1.7;fill:none;stroke-linecap:round;stroke-linejoin:round}
.nb{position:absolute;right:10px;background:var(--red);color:#fff;font-size:.58rem;font-weight:500;min-width:17px;height:17px;border-radius:50px;display:flex;align-items:center;justify-content:center;padding:0 4px}
.sb-foot{padding:12px;border-top:1px solid rgba(255,255,255,.07)}

/* TOPBAR */
.tb{position:fixed;top:0;left:var(--sw);right:0;height:var(--th);background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 32px;z-index:100}
.tb-l{display:flex;align-items:center;gap:16px}
.tb-title{font-weight:500;font-size:1rem;letter-spacing:-.02em}
.tb-stats{display:flex;gap:6px}
.ts{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:.3rem .85rem;font-size:.75rem;color:var(--muted);display:flex;align-items:center;gap:5px}
.ts strong{font-weight:500;color:var(--text)}
.tab-row{display:flex;gap:5px}
.tab{background:none;border:1.5px solid var(--border);border-radius:10px;padding:.35rem .9rem;font-family:var(--font);font-size:.8rem;font-weight:300;color:var(--muted);cursor:pointer;transition:all .12s}
.tab:hover{border-color:var(--border2);color:var(--text)}
.tab.active{background:var(--dark);border-color:var(--dark);color:#fff;font-weight:500}

/* MAIN */
.main{margin-left:var(--sw);margin-top:var(--th);padding:36px 40px;min-height:calc(100vh - var(--th));animation:fadeIn .25s ease}

/* SEARCH ROW */
.sb-box{display:flex;align-items:center;gap:8px;background:var(--bg);border:1.5px solid var(--border);border-radius:14px;padding:.65rem 1.1rem;transition:border-color .15s;flex:1;max-width:480px}
.sb-box:focus-within{border-color:var(--green);box-shadow:0 0 0 3px rgba(30,222,123,.08)}
.sb-box svg{width:15px;height:15px;stroke:var(--muted);flex-shrink:0;stroke-width:2;fill:none}
.sb-box input{background:none;border:none;outline:none;font-family:var(--font);font-size:.9rem;font-weight:300;color:var(--text);width:100%}

/* ACTIVE SUPPORTS HERO */
.sup-hero{background:var(--dark);border-radius:32px;padding:36px 40px;margin-bottom:24px}
.sup-hero-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
.sup-hero-title{font-size:1.6rem;font-weight:500;color:#fff;letter-spacing:-.03em}
.sup-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.sup-card{background:rgba(255,255,255,.07);border-radius:20px;padding:20px 22px}
.sup-card.expiring{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.2)}
.sup-name{font-size:1rem;font-weight:400;color:#fff;margin-bottom:4px}
.sup-email{font-size:.78rem;color:rgba(255,255,255,.4);margin-bottom:14px}
.sup-prog-wrap{margin-bottom:14px}
.sup-prog-labels{display:flex;justify-content:space-between;font-size:.72rem;color:rgba(255,255,255,.35);margin-bottom:6px}
.sup-prog{height:5px;background:rgba(255,255,255,.1);border-radius:3px}
.sup-prog-fill{height:100%;border-radius:3px;background:var(--green);transition:width .4s}
.sup-prog-fill.warn{background:linear-gradient(90deg,var(--warn),var(--red))}

/* TICKET CARDS */
.tc{background:var(--bg);border:1.5px solid var(--border);border-radius:28px;padding:28px 32px;margin-bottom:16px;transition:border-color .15s;animation:fadeIn .15s ease}
.tc:hover{border-color:var(--border2)}
.tc.open{border-left:4px solid var(--green)}
.tc.done{border-left:4px solid var(--border2)}
.tc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:12px}
.tc-title{font-size:1.15rem;font-weight:500;color:var(--text);letter-spacing:-.02em}
.tc-meta{font-size:.82rem;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tc-desc{font-size:.9rem;color:var(--muted);line-height:1.65;margin-bottom:18px;padding:18px 20px;background:var(--bg2);border-radius:16px}
.tc-reply-box{background:rgba(30,222,123,.06);border:1.5px solid rgba(30,222,123,.2);border-radius:16px;padding:16px 20px;font-size:.88rem;color:var(--green-d);line-height:1.5;margin-bottom:18px}
.tc-order{display:inline-flex;align-items:center;gap:6px;background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2);color:var(--info);font-size:.8rem;font-weight:500;padding:.4rem 1rem;border-radius:10px;text-decoration:none;margin-bottom:16px;transition:background .12s}
.tc-order:hover{background:rgba(59,130,246,.14)}
.tc-order svg{width:13px;height:13px;stroke:currentColor;stroke-width:2;fill:none;flex-shrink:0}
.tc-no-order{display:inline-flex;align-items:center;gap:6px;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);color:var(--warn);font-size:.8rem;padding:.4rem 1rem;border-radius:10px;margin-bottom:16px}
.tc-inp{width:100%;background:var(--bg2);border:1.5px solid var(--border);border-radius:14px;padding:.8rem 1.1rem;color:var(--text);font-family:var(--font);font-size:.9rem;font-weight:300;outline:none;transition:border-color .15s;margin-bottom:14px;resize:vertical;min-height:80px;line-height:1.5}
.tc-inp:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(30,222,123,.08)}
.tc-actions{display:flex;gap:8px;flex-wrap:wrap}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:.25rem .75rem;border-radius:8px;font-size:.72rem;font-weight:500;white-space:nowrap}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}
.b-open{background:rgba(59,130,246,.1);color:var(--info)}
.b-done{background:rgba(30,222,123,.12);color:var(--green-d)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;font-family:var(--font);font-weight:500;font-size:.84rem;border:none;border-radius:12px;padding:.55rem 1.1rem;cursor:pointer;transition:background .1s,transform .1s;text-decoration:none;white-space:nowrap}
.btn:hover{transform:translateY(-1px)}
.btn-green{background:var(--green);color:var(--dark)}.btn-green:hover{background:var(--green-h)}
.btn-dark{background:var(--dark);color:#fff}.btn-dark:hover{background:var(--dark2)}
.btn-outline{background:transparent;border:1.5px solid var(--border2);color:var(--muted)}.btn-outline:hover{border-color:var(--text);color:var(--text)}
.btn-danger{background:rgba(232,99,79,.08);color:var(--red);border:1px solid rgba(232,99,79,.2)}.btn-danger:hover{background:rgba(232,99,79,.15)}
.btn-sm{padding:.4rem .9rem;font-size:.8rem;border-radius:10px}

.empty{padding:64px 32px;text-align:center;color:var(--muted);display:flex;flex-direction:column;gap:12px;align-items:center}
.empty-icon{font-size:2.5rem}

.toast{position:fixed;bottom:28px;right:28px;z-index:900;padding:.7rem 1.4rem;border-radius:16px;font-size:.84rem;font-weight:500;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;transform:translateY(8px)}
.toast.show{opacity:1;transform:none}
.toast.success{background:var(--green);color:#0d3320}.toast.error{background:var(--red);color:#fff}.toast.info{background:var(--dark);color:#fff}.toast.warn{background:var(--warn);color:#fff}
</style>
</head>
<body>

<div class="ls" id="loadingScreen"><div class="sp"></div><span class="lt">Загрузка...</span></div>

<!-- SIDEBAR -->
<div class="sb">
  <a href="/admin" class="sb-logo">
    <div class="lm"><svg viewBox="0 0 20 20"><path d="M10 2L3 7v11h5v-5h4v5h5V7L10 2z"/></svg></div>
    <span class="ln">Antviz</span><span class="lbadge">Admin</span>
  </a>
  <nav class="sb-nav">
    <span class="ns">Основное</span>
    <a href="/admin" class="ni"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="2"/><rect x="14" y="3" width="7" height="7" rx="2"/><rect x="3" y="14" width="7" height="7" rx="2"/><rect x="14" y="14" width="7" height="7" rx="2"/></svg>Дашборд</a>
    <a href="/admin/orders" class="ni"><svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h4"/></svg>Заказы<span class="nb" id="navBadgeOrders" style="display:none"></span></a>
    <span class="ns">Клиенты</span>
    <a href="/admin/tickets" class="ni active"><svg viewBox="0 0 24 24"><path d="M2 9a3 3 0 010-6h20a3 3 0 010 6"/><path d="M2 15a3 3 0 000 6h20a3 3 0 000-6"/><path d="M6 12h12"/></svg>Обслуживание<span class="nb" id="navBadgeTickets" style="display:none"></span></a>
    <a href="/admin/chats" class="ni"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>Чаты<span class="nb" id="navBadgeChats" style="display:none"></span></a>
    <a href="/admin/promos" class="ni"><svg viewBox="0 0 24 24"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><circle cx="7" cy="7" r="1.5" fill="currentColor" stroke="none"/></svg>Промокоды</a>
    <span class="ns">Система</span>
    <a href="/admin/reviews" class="ni"><svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>Отзывы</a>
  </nav>
  <div class="sb-foot">
    <button class="ni" onclick="doLogout()" style="color:rgba(232,99,79,.8)"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>Выйти</button>
  </div>
</div>

<!-- TOPBAR -->
<div class="tb">
  <div class="tb-l">
    <span class="tb-title">Обслуживание</span>
    <div class="tb-stats">
      <div class="ts">Открытых: <strong id="openCount">—</strong></div>
      <div class="ts">Активных: <strong id="activeSupports">—</strong></div>
    </div>
  </div>
  <div class="tab-row">
    <button class="tab active" onclick="switchFilter('all',this)">Все</button>
    <button class="tab" onclick="switchFilter('open',this)">Открытые</button>
    <button class="tab" onclick="switchFilter('done',this)">Закрытые</button>
  </div>
</div>

<!-- MAIN -->
<div class="main" id="appWrap" style="display:none">

  <!-- ACTIVE SUPPORTS HERO -->
  <div class="sup-hero">
    <div class="sup-hero-top">
      <div class="sup-hero-title">Активные обслуживания</div>
    </div>
    <div class="sup-grid" id="supportsList">
      <div style="color:rgba(255,255,255,.3);font-size:.88rem">Загрузка...</div>
    </div>
  </div>

  <!-- SEARCH -->
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px">
    <div class="sb-box">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input type="text" placeholder="Поиск по имени, email, заявке..." id="searchInp" oninput="renderTickets()"/>
    </div>
  </div>

  <!-- TICKETS -->
  <div id="ticketsList"><div class="empty"><span class="empty-icon">🎫</span>Загрузка...</div></div>

</div>

<div class="toast" id="toast"></div>

<script type="module">
import { auth, db, ADMIN_EMAIL } from '../firebase-config.js';
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { collection, query, orderBy, getDocs, doc, updateDoc, deleteDoc, addDoc, serverTimestamp, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

let allTickets=[], allOrders=[], currentFilter='all';
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function toast(m,t='info'){const el=document.getElementById('toast');el.textContent=m;el.className=`toast ${t} show`;setTimeout(()=>el.className='toast',3400);}
function fmtDT(ts){if(!ts)return'—';const d=ts.toDate?ts.toDate():new Date(ts);return d.toLocaleDateString('ru',{day:'numeric',month:'short'})+' '+d.toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});}

window.switchFilter=(f,btn)=>{currentFilter=f;document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderTickets();};
window.doLogout=async()=>{await signOut(auth);window.location.href='/';};

function renderTickets(){
  const el=document.getElementById('ticketsList');
  const q=(document.getElementById('searchInp').value||'').toLowerCase();
  let list=allTickets;
  if(currentFilter==='open') list=list.filter(t=>t.status!=='done');
  else if(currentFilter==='done') list=list.filter(t=>t.status==='done');
  if(q) list=list.filter(t=>(t.title||'').toLowerCase().includes(q)||(t.userName||'').toLowerCase().includes(q)||(t.userEmail||'').toLowerCase().includes(q)||(t.orderDomain||'').toLowerCase().includes(q));
  const open=allTickets.filter(t=>t.status!=='done').length;
  document.getElementById('openCount').textContent=open;
  const badge=document.getElementById('navBadgeTickets');
  if(badge){badge.style.display=open?'':'none';badge.textContent=open;}
  if(!list.length){el.innerHTML=`<div class="empty"><span class="empty-icon">✅</span>Нет заявок</div>`;return;}
  el.innerHTML=list.map(t=>`
    <div class="tc ${t.status==='done'?'done':'open'}">
      <div class="tc-top">
        <div class="tc-title">${esc(t.title||'Без темы')}</div>
        <span class="badge ${t.status==='done'?'b-done':'b-open'}">${t.status==='done'?'Закрыта':'Открыта'}</span>
      </div>
      <div class="tc-meta">
        <strong>${esc(t.userName||'—')}</strong>
        <span>·</span>
        <span>${esc(t.userEmail||'—')}</span>
        <span>·</span>
        <span>${fmtDT(t.createdAt)}</span>
      </div>
      ${t.orderId
        ?`<a class="tc-order" href="/admin/orders?id=${t.orderId}"><svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>${esc(t.orderDomain||'№ '+t.orderId.slice(0,8).toUpperCase())}${t.orderSiteType?' · '+esc(t.orderSiteType):''}</a>`
        :`<span class="tc-no-order">⚠ Заказ не привязан</span>`}
      ${t.orderId
        ?`<a class="tc-order" href="/admin/orders?id=${t.orderId}"><svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>${esc(t.orderDomain||'№ '+t.orderId.slice(0,8).toUpperCase())}${t.orderSiteType?' · '+esc(t.orderSiteType):''}</a>`
        :`<span class="tc-no-order">⚠ Заказ не привязан</span>`}
      ${t.adminReply?`<div class="tc-reply-box">💬 Ваш ответ: ${esc(t.adminReply)}</div>`:''}
      <textarea class="tc-inp" id="tr_${t.id}" rows="3" placeholder="Написать ответ клиенту...">${esc(t.adminReply||'')}</textarea>
      <div class="tc-actions">
        <button class="btn btn-green btn-sm" onclick="saveReply('${t.id}','${esc(t.uid||'')}','${esc(t.title||'')}')">Сохранить ответ</button>
        ${t.status!=='done'
          ?`<button class="btn btn-dark btn-sm" onclick="closeTick('${t.id}')">Закрыть заявку</button>`
          :`<button class="btn btn-outline btn-sm" onclick="reopenTick('${t.id}')">Открыть снова</button>`}
        <button class="btn btn-danger btn-sm" onclick="deleteTick('${t.id}')">Удалить</button>
      </div>
    </div>`).join('');
}

function renderSupports(){
  const el=document.getElementById('supportsList');
  const now=new Date();
  const active=allOrders.filter(o=>{
    if(!(o.supportActive===true||o.support===true))return false;
    if(o.supportExpiresAt){const exp=o.supportExpiresAt.toDate?o.supportExpiresAt.toDate():new Date(o.supportExpiresAt);return exp>now;}
    return true;
  });
  document.getElementById('activeSupports').textContent=active.length;
  if(!active.length){el.innerHTML=`<div style="color:rgba(255,255,255,.3);font-size:.88rem">Нет активных обслуживаний</div>`;return;}
  el.innerHTML=active.map(o=>{
    let days='∞',pct=100,expiring=false;
    if(o.supportExpiresAt){
      const exp=o.supportExpiresAt.toDate?o.supportExpiresAt.toDate():new Date(o.supportExpiresAt);
      days=Math.ceil((exp-now)/864e5);pct=Math.max(0,Math.min(100,((exp-now)/(30*864e5))*100));expiring=days<3;
    }
    return`<div class="sup-card${expiring?' expiring':''}">
      <div class="sup-name">${esc(o.clientName||'—')}</div>
      <div class="sup-email">${esc(o.clientEmail||'—')}</div>
      ${days!=='∞'?`<div class="sup-prog-wrap">
        <div class="sup-prog-labels"><span>Прогресс</span><span style="color:${expiring?'var(--warn)':'rgba(255,255,255,.4)'}">${days} дн. осталось</span></div>
        <div class="sup-prog"><div class="sup-prog-fill${expiring?' warn':''}" style="width:${pct}%"></div></div>
      </div>`:''}
      ${expiring?`<button class="btn btn-outline btn-sm" style="font-size:.74rem;padding:.3rem .8rem" onclick="notifyExpiry('${o.uid||''}')">🔔 Уведомить</button>`:''}
    </div>`;
  }).join('');
}

window.saveReply=async(id,uid,title)=>{
  const val=document.getElementById('tr_'+id)?.value.trim()||'';
  try{
    await updateDoc(doc(db,'service_tickets',id),{adminReply:val});
    if(uid&&val)await addDoc(collection(db,'notifications',uid,'items'),{title:'💬 Ответ на заявку',text:`«${title}»: ${val}`,read:false,createdAt:serverTimestamp()}).catch(()=>{});
    toast('Ответ сохранён и клиент уведомлён ✓','success');
    await loadTickets();renderTickets();
  }catch(e){toast('Ошибка','error');}
};
window.closeTick=async id=>{
  try{await updateDoc(doc(db,'service_tickets',id),{status:'done'});toast('Закрыта ✓','success');await loadTickets();renderTickets();}
  catch(e){toast('Ошибка','error');}
};
window.reopenTick=async id=>{
  try{await updateDoc(doc(db,'service_tickets',id),{status:'open'});toast('Открыта','info');await loadTickets();renderTickets();}
  catch(e){toast('Ошибка','error');}
};
window.deleteTick=async id=>{
  if(!confirm('Удалить заявку?'))return;
  try{await deleteDoc(doc(db,'service_tickets',id));toast('Удалена','info');await loadTickets();renderTickets();}
  catch(e){toast('Ошибка','error');}
};
window.notifyExpiry=async uid=>{
  if(!uid)return;
  try{
    await addDoc(collection(db,'notifications',uid,'items'),{title:'⚠️ Обслуживание заканчивается',text:'До окончания обслуживания осталось менее 3 дней. Свяжитесь с нами для продления.',read:false,createdAt:serverTimestamp()});
    toast('Уведомление отправлено ✓','success');
  }catch(e){toast('Ошибка','error');}
};

async function loadTickets(){
  try{
    const snap=await getDocs(collection(db,'service_tickets'));
    allTickets=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>{
      if((a.status==='done')!==(b.status==='done'))return a.status==='done'?1:-1;
      return(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0);
    });
  }catch(e){console.error(e);}
}

onAuthStateChanged(auth,async user=>{
  document.getElementById('loadingScreen').style.display='none';
  if(!user||user.email!==ADMIN_EMAIL){window.location.href='/';return;}
  document.getElementById('appWrap').style.display='block';
  await loadTickets();renderTickets();
  onSnapshot(query(collection(db,'orders'),orderBy('createdAt','desc')),snap=>{
    allOrders=snap.docs.map(d=>({id:d.id,...d.data()}));
    renderSupports();
  });
  setInterval(async()=>{await loadTickets();renderTickets();},30000);
});
</script>
