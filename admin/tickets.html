<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Обслуживание — Antviz Admin</title>
  <link rel="icon" href="../img/favicon.png"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Geologica:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#f5f7fa;
      --bg2:#ffffff;
      --bg3:#f0f2f5;
      --card:#ffffff;
      --border:#e8ecf0;
      --border2:#d0d5db;
      --accent:#1ede7b;
      --accent2:#17b86a;
      --accent3:#0d9f56;
      --text:#1a1a1e;
      --muted:#6b7280;
      --muted2:#9ca3af;
      --success:#1ede7b;
      --error:#ff2d50;
      --warn:#ffd11a;
      --sidebar-w:240px;
      --topbar-h:60px;
    }
    html,body{height:100%;font-size:16px;background:var(--bg)}
    body{color:var(--text);font-family:'Inter',sans-serif;font-weight:400;display:flex;flex-direction:column}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-thumb{background:rgba(0,0,0,.12);border-radius:2px}

    .loading-screen{position:fixed;inset:0;z-index:1000;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem}
    .spinner{width:30px;height:30px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}

    .sidebar{position:fixed;top:0;left:0;bottom:0;width:var(--sidebar-w);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100}
    .sidebar-logo{padding:1.2rem 1.2rem 1rem;display:flex;align-items:center;gap:10px;text-decoration:none;border-bottom:1px solid var(--border)}
    .sidebar-logo img{width:28px;height:28px;border-radius:8px;object-fit:cover;flex-shrink:0}
    .sidebar-logo-text{font-family:'Geologica',sans-serif;font-weight:700;font-size:.85rem;color:var(--text)}
    .sidebar-logo-badge{background:rgba(255,45,80,.1);color:var(--error);border:1px solid rgba(255,45,80,.15);padding:.08rem .45rem;border-radius:50px;font-size:.55rem;font-weight:700;margin-left:auto;flex-shrink:0}
    .sidebar-nav{flex:1;padding:1rem .7rem;overflow-y:auto;display:flex;flex-direction:column;gap:.15rem}
    .sidebar-section{font-size:.58rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:.6rem .6rem .3rem;font-weight:600}
    .nav-item{display:flex;align-items:center;gap:10px;padding:.6rem .85rem;border-radius:10px;text-decoration:none;color:var(--muted);font-size:.84rem;transition:all .15s;cursor:pointer;border:none;background:none;width:100%;font-family:'Inter',sans-serif;position:relative}
    .nav-item:hover{background:rgba(0,0,0,.04);color:var(--text)}
    .nav-item.active{background:rgba(30,222,123,.12);color:var(--accent2)}
    .nav-item svg{width:17px;height:17px;flex-shrink:0;stroke:currentColor;stroke-width:1.7;fill:none}
    .nav-item-badge{position:absolute;right:.7rem;background:var(--error);color:#fff;font-size:.58rem;font-weight:700;min-width:18px;height:18px;border-radius:50px;display:flex;align-items:center;justify-content:center;padding:0 4px;animation:pulse 2s infinite}
    .sidebar-footer{padding:.8rem .7rem;border-top:1px solid var(--border)}

    .topbar{position:fixed;top:0;left:var(--sidebar-w);right:0;height:var(--topbar-h);background:rgba(255,255,255,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 1.6rem;z-index:90}
    .topbar-title{font-family:'Geologica',sans-serif;font-weight:600;font-size:.95rem;color:var(--text)}
    .topbar-right{display:flex;align-items:center;gap:.7rem}
    .topbar-stat{display:flex;align-items:center;gap:.4rem;background:var(--bg3);border:1px solid var(--border);border-radius:50px;padding:.28rem .85rem;font-size:.72rem;white-space:nowrap;color:var(--muted)}
    .topbar-stat-num{font-family:'Geologica',sans-serif;font-weight:700;font-size:.8rem;color:var(--text)}
    .topbar-btn{background:var(--bg3);border:1px solid var(--border);color:var(--muted);font-family:'Inter',sans-serif;font-size:.76rem;padding:.35rem .9rem;border-radius:9px;cursor:pointer;transition:all .18s}
    .topbar-btn:hover{border-color:var(--border2);color:var(--text)}
    .topbar-btn.danger:hover{border-color:rgba(255,45,80,.3);color:var(--error)}
    .maint-btn{display:flex;align-items:center;gap:.5rem}
    .maint-btn.on{border-color:rgba(255,209,26,.4)!important;color:var(--warn)!important}
    .toggle-track{width:28px;height:16px;background:var(--bg);border-radius:50px;position:relative;border:1px solid var(--border);flex-shrink:0;transition:background .2s}
    .maint-btn.on .toggle-track{background:rgba(255,209,26,.15);border-color:rgba(255,209,26,.3)}
    .toggle-track::after{content:'';position:absolute;top:2px;left:2px;width:10px;height:10px;border-radius:50%;background:var(--muted);transition:transform .2s,background .2s}
    .maint-btn.on .toggle-track::after{transform:translateX(12px);background:var(--warn)}

    .btn{display:inline-flex;align-items:center;gap:6px;padding:.6rem 1.2rem;border-radius:9px;font-family:'Inter',sans-serif;font-size:.8rem;font-weight:500;cursor:pointer;border:none;transition:all .15s;text-decoration:none}
    .btn-primary{background:var(--accent);color:#fff}
    .btn-primary:hover{box-shadow:0 4px 12px rgba(30,222,123,.35)}
    .btn-ghost{background:var(--bg3);border:1px solid var(--border);color:var(--muted)}
    .btn-ghost:hover{border-color:var(--border2);color:var(--text)}
    .btn-danger{background:#fee2e2;border:1px solid #fca5a5;color:var(--error)}
    .btn-danger:hover{background:#fecaca}
    .btn-success{background:#d1fae5;border:1px solid #a7f3d0;color:#065f46}
    .btn-success:hover{background:#a7f3d0}
    .btn-sm{padding:.38rem .8rem;font-size:.74rem;border-radius:7px}
    .btn-xs{padding:.22rem .55rem;font-size:.66rem;border-radius:6px}

    .form-input,.form-textarea,.form-select{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:.7rem 1rem;color:var(--text);font-family:'Inter',sans-serif;font-size:.86rem;font-weight:400;outline:none;transition:border-color .18s}
    .form-input:focus,.form-textarea:focus,.form-select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(30,222,123,.15)}
    .form-input::placeholder,.form-textarea::placeholder{color:var(--muted2)}
    .form-textarea{resize:vertical;min-height:70px;line-height:1.55}
    .form-select{cursor:pointer}
    .form-group{margin-bottom:1rem}
    .form-label{display:block;font-size:.66rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:.4rem;font-weight:600}

    .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem;color:var(--muted);gap:.7rem;text-align:center}
    .empty-state-icon{font-size:2.5rem;opacity:.3}
    .empty-state-text{font-size:.84rem}

    .toast{position:fixed;bottom:1.5rem;right:1.5rem;z-index:600;padding:.6rem 1.3rem;border-radius:10px;font-size:.8rem;font-weight:500;opacity:0;transition:opacity .26s,transform .26s;pointer-events:none;transform:translateY(8px)}
    .toast.show{opacity:1;transform:translateY(0)}
    .toast.success{background:var(--success);color:#fff}
    .toast.error{background:var(--error);color:#fff}
    .toast.info{background:#3b82f6;color:#fff}
    .toast.warn{background:var(--warn);color:#1a1a1e}

    .sbadge{display:inline-flex;align-items:center;gap:.2rem;padding:.22rem .65rem;border-radius:50px;font-size:.66rem;font-weight:600;white-space:nowrap}
    .sdot{width:4px;height:4px;border-radius:50%;background:currentColor;flex-shrink:0}
    .s0{background:#f3f4f6;color:var(--muted);border:1px solid var(--border)}
    .s1{background:#fef3c7;color:#b45309;border:1px solid #fde68a}
    .s2{background:#dbeafe;color:#1d4ed8;border:1px solid #bfdbfe}
    .s3{background:#e0e7ff;color:#4f46e5;border:1px solid #c7d2fe}
    .s4{background:#fef3c7;color:#b45309;border:1px solid #fde68a}
    .s5{background:#d1fae5;color:#065f46;border:1px solid #a7f3d0}

    .search-box{display:flex;align-items:center;gap:.5rem;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:.5rem .9rem;transition:border-color .18s}
    .search-box:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(30,222,123,.1)}
    .search-box svg{width:15px;height:15px;color:var(--muted);flex-shrink:0}
    .search-box input{background:none;border:none;outline:none;color:var(--text);font-family:'Inter',sans-serif;font-size:.84rem;flex:1;min-width:0}
    .search-box input::placeholder{color:var(--muted2)}
    .tab{background:transparent;border:1px solid transparent;color:var(--muted);font-family:"Inter",sans-serif;font-size:.72rem;padding:.28rem .65rem;border-radius:7px;cursor:pointer;transition:all .15s;white-space:nowrap}
    .tab:hover{color:var(--text);background:rgba(0,0,0,.04)}
    .tab.active{background:rgba(30,222,123,.12);color:var(--accent2);border-color:rgba(30,222,123,.25)}

    .ticket-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:1.2rem 1.4rem;margin-bottom:.8rem;transition:border-color .15s;box-shadow:0 1px 2px rgba(0,0,0,.03)}
    .ticket-card:hover{border-color:var(--border2)}
    .ticket-card.open{border-left:3px solid var(--accent)}
    .ticket-card.done{border-left:3px solid var(--success)}
    .ticket-card-hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:.6rem}
    .ticket-card-title{font-size:.95rem;font-weight:500}
    .ticket-card-meta{font-size:.76rem;color:var(--muted);margin-bottom:.5rem;display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
    .ticket-card-desc{font-size:.82rem;color:var(--muted2);line-height:1.6;margin-bottom:.8rem}
    .ticket-card-reply{background:rgba(30,222,123,.06);border:1px solid rgba(30,222,123,.15);border-radius:9px;padding:.7rem .9rem;font-size:.82rem;color:var(--accent2);line-height:1.5;margin-bottom:.8rem}
    .ticket-order-link{display:inline-flex;align-items:center;gap:.4rem;background:#eef2ff;border:1px solid #c7d2fe;color:#4338ca;font-size:.74rem;font-weight:500;padding:.3rem .75rem;border-radius:8px;text-decoration:none;margin-bottom:.7rem;transition:background .15s}
    .ticket-order-link:hover{background:#e0e7ff}
    .ticket-order-link svg{width:12px;height:12px;stroke:currentColor;stroke-width:2;fill:none;flex-shrink:0}
    .ticket-no-order{display:inline-flex;align-items:center;gap:.4rem;background:#fef3c7;border:1px solid #fde68a;color:#b45309;font-size:.74rem;font-weight:500;padding:.3rem .75rem;border-radius:8px;margin-bottom:.7rem}
    .ticket-reply-inp{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:.65rem .9rem;color:var(--text);font-family:'Inter',sans-serif;font-size:.82rem;outline:none;transition:border-color .18s;margin-bottom:.5rem}
    .ticket-reply-inp:focus{border-color:var(--accent)}
    .ticket-reply-inp::placeholder{color:var(--muted2)}
    .ticket-actions{display:flex;gap:.5rem;flex-wrap:wrap}

    .support-card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:1.1rem 1.2rem}
    .support-card.active{border-color:rgba(30,222,123,.25);background:rgba(30,222,123,.04)}
    .support-card.expiring{border-color:rgba(255,209,26,.3);background:rgba(255,209,26,.04)}
    .support-card.requested{border-color:rgba(59,130,246,.2);background:rgba(59,130,246,.04)}
    .support-card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem}
    .support-card-label{font-size:.86rem;font-weight:500}
    .support-prog-wrap{margin:.6rem 0}
    .support-prog-labels{display:flex;justify-content:space-between;font-size:.7rem;color:var(--muted);margin-bottom:.3rem}
    .support-prog{height:5px;background:var(--bg);border-radius:3px;overflow:hidden}
    .support-prog-fill{height:100%;border-radius:3px;background:var(--success);transition:width .4s}
    .support-prog-fill.warn{background:linear-gradient(90deg,var(--warn),var(--error))}

    .section{background:var(--bg2);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:1.5rem;box-shadow:0 1px 3px rgba(0,0,0,.04)}
    .section-hdr{padding:1rem 1.4rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:1rem}
    .section-title{font-family:'Geologica',sans-serif;font-weight:600;font-size:.82rem;color:var(--text)}
    .section-body{padding:1.2rem 1.4rem}
    .section-body.no-pad{padding:0}

    .modal-overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:1.5rem;opacity:0;pointer-events:none;transition:opacity .22s}
    .modal-overlay.show{opacity:1;pointer-events:all}
    .modal{background:var(--bg2);border-radius:20px;padding:1.8rem;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15)}
    .modal-title{font-family:'Geologica',sans-serif;font-weight:600;font-size:.95rem;margin-bottom:1.4rem;display:flex;align-items:center;justify-content:space-between}
    .modal-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.1rem;padding:0;line-height:1}
    .modal-footer{display:flex;gap:.7rem;margin-top:1.4rem}
    .modal-footer .btn{flex:1;justify-content:center}
  </style>
</head>
<body>
<div class="loading-screen" id="loadingScreen"><div class="spinner"></div></div>

<div class="sidebar" id="sidebar">
  <a href="/admin" class="sidebar-logo">
    <img src="../img/favicon.png" alt="Antviz">
    <span class="sidebar-logo-text">Antviz</span>
    <span class="sidebar-logo-badge">ADMIN</span>
  </a>
  <nav class="sidebar-nav">
    <div class="sidebar-section">Основное</div>
    <a href="/admin" class="nav-item" data-page="index">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Дашборд
    </a>
    <a href="/admin/orders" class="nav-item" data-page="orders">
      <svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h4"/></svg>
      Заказы
      <span class="nav-item-badge" id="navBadgeOrders" style="display:none"></span>
    </a>
    <a href="/admin/chats" class="nav-item" data-page="chats">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      Чаты
      <span class="nav-item-badge" id="navBadgeChats" style="display:none"></span>
    </a>
    <div class="sidebar-section">Клиенты</div>
    <a href="/admin/tickets" class="nav-item active" data-page="tickets">
      <svg viewBox="0 0 24 24"><path d="M2 9a3 3 0 010-6h20a3 3 0 010 6"/><path d="M2 15a3 3 0 000 6h20a3 3 0 000-6"/><path d="M6 12h12"/></svg>
      Обслуживание
      <span class="nav-item-badge" id="navBadgeTickets" style="display:none"></span>
    </a>
    <a href="/admin/promos" class="nav-item" data-page="promos">
      <svg viewBox="0 0 24 24"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><circle cx="7" cy="7" r="1.5" fill="currentColor" stroke="none"/></svg>
      Промокоды
    </a>
    <div class="sidebar-section">Система</div>
    <a href="/admin/reviews" class="nav-item" data-page="reviews">
      <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      Отзывы
    </a>
  </nav>
  <div class="sidebar-footer">
    <button class="nav-item" onclick="doLogout()" style="color:var(--error)">
      <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
      Выйти
    </button>
  </div>
</div>

<div class="topbar">
  <div class="topbar-title">Обслуживание сайтов</div>
  <div class="topbar-right">
    <div class="topbar-stat">Открытых: <span class="topbar-stat-num" id="openCount" style="color:var(--accent)">—</span></div>
    <div class="topbar-stat">Активных обслуживаний: <span class="topbar-stat-num" id="activeSupports" style="color:var(--success)">—</span></div>
  </div>
</div>

<div style="margin-left:var(--sidebar-w);margin-top:var(--topbar-h)" id="appWrap" style="display:none">
  <div class="main-inner" style="padding:1.8rem 2rem;max-width:1400px;animation:fadeIn .25s ease">

    <div style="display:flex;gap:1rem;margin-bottom:1.5rem;align-items:center;flex-wrap:wrap">
      <div class="search-box" style="flex:1;min-width:200px">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input type="text" placeholder="Поиск по имени, email, заявке..." id="searchInp" oninput="renderTickets()"/>
      </div>
      <div style="display:flex;gap:.4rem">
        <button class="btn btn-ghost btn-sm tab active" onclick="switchFilter('all',this)">Все</button>
        <button class="btn btn-ghost btn-sm tab" onclick="switchFilter('open',this)">Открытые</button>
        <button class="btn btn-ghost btn-sm tab" onclick="switchFilter('done',this)">Закрытые</button>
      </div>
      <button class="btn btn-primary" onclick="openCreateTicket()">➕ Создать тикет</button>
    </div>

    <div style="display:grid;grid-template-columns:1fr 380px;gap:1.5rem;align-items:start">

      <!-- Tickets list -->
      <div id="ticketsList"><div class="empty-state"><span class="empty-state-icon">🎫</span><span class="empty-state-text">Загрузка...</span></div></div>

      <!-- Right panel: active supports -->
      <div>
        <div class="section">
          <div class="section-hdr"><div class="section-title">Активные обслуживания</div></div>
          <div class="section-body" id="supportsList"><div style="text-align:center;color:var(--muted);font-size:.82rem;padding:1rem">Загрузка...</div></div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Modal for creating ticket -->
<div class="modal-overlay" id="createTicketModal" onclick="if(event.target===this)closeCreateTicket()">
  <div class="modal">
    <div class="modal-title">📝 Создать заявку <button class="modal-close" onclick="closeCreateTicket()">✕</button></div>
    <div class="form-group">
      <label class="form-label">Пользователь</label>
      <select class="form-select" id="ticketUser">
        <option value="">Выберите пользователя...</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Заголовок</label>
      <input class="form-input" id="ticketTitle" type="text" placeholder="Краткий заголовок..."/>
    </div>
    <div class="form-group">
      <label class="form-label">Описание</label>
      <textarea class="form-textarea" id="ticketDesc" placeholder="Подробное описание проблемы..." rows="4"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Привязать к заказу (опционально)</label>
      <select class="form-select" id="ticketOrder">
        <option value="">Без заказа</option>
      </select>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeCreateTicket()">Отмена</button>
      <button class="btn btn-primary" onclick="createTicket()">Создать</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { auth, db, ADMIN_EMAIL } from '../firebase-config.js';
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { collection, query, orderBy, getDocs, doc, updateDoc, deleteDoc, addDoc, serverTimestamp, onSnapshot, Timestamp, getDoc, where, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

let allTickets=[], allOrders=[], currentFilter='all';
function escapeHtml(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function toast(m,t='info'){const el=document.getElementById('toast');el.textContent=m;el.className=`toast ${t} show`;setTimeout(()=>el.className='toast',3400);}
function fmtDate(ts){if(!ts)return '—';const d=ts.toDate?ts.toDate():new Date(ts);return d.toLocaleDateString('ru',{day:'numeric',month:'short',year:'numeric'});}
function fmtDT(ts){if(!ts)return '—';const d=ts.toDate?ts.toDate():new Date(ts);return d.toLocaleDateString('ru',{day:'numeric',month:'short'})+' '+d.toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});}

document.querySelectorAll('.nav-item[data-page]').forEach(el=>{if(el.dataset.page==='tickets')el.classList.add('active');});
window.switchFilter=(f,btn)=>{currentFilter=f;document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderTickets();};
window.doLogout=async()=>{const {signOut:so}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js");await so(auth);window.location.href='/';};

function renderTickets(){
  const el=document.getElementById('ticketsList');
  const q=(document.getElementById('searchInp').value||'').toLowerCase();
  let list=allTickets;
  if(currentFilter==='open') list=list.filter(t=>t.status!=='done');
  else if(currentFilter==='done') list=list.filter(t=>t.status==='done');
  if(q) list=list.filter(t=>(t.title||'').toLowerCase().includes(q)||(t.userName||'').toLowerCase().includes(q)||(t.userEmail||'').toLowerCase().includes(q)||(t.orderDomain||'').toLowerCase().includes(q)||(t.orderSiteType||'').toLowerCase().includes(q));
  document.getElementById('openCount').textContent=allTickets.filter(t=>t.status!=='done').length;
  if(!list.length){el.innerHTML=`<div class="empty-state"><span class="empty-state-icon">✅</span><span class="empty-state-text">Нет заявок</span></div>`;return;}
  el.innerHTML=list.map(t=>`
    <div class="ticket-card ${t.status==='done'?'done':'open'}" id="tc_${t.id}">
      <div class="ticket-card-hdr">
        <div class="ticket-card-title">${escapeHtml(t.title)}</div>
        <span class="sbadge ${t.status==='done'?'s5':'s2'}">${t.status==='done'?'Закрыта':'Открыта'}</span>
      </div>
      <div class="ticket-card-meta">
        <span style="font-weight:500">${escapeHtml(t.userName||'—')}</span>
        <span>·</span>
        <span>${escapeHtml(t.userEmail||'—')}</span>
        <span>·</span>
        <span>${fmtDT(t.createdAt)}</span>
        ${t.createdBy === 'admin' ? `<span style="background:var(--accent);color:#fff;padding:0.1rem 0.5rem;border-radius:50px;font-size:0.55rem;font-weight:700;">АДМИН</span>` : ''}
      </div>
      ${t.orderId?`<a class="ticket-order-link" href="/admin/orders?id=${t.orderId}">
        <svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>
        ${escapeHtml(t.orderDomain || ('№ '+t.orderId.slice(0,8).toUpperCase()))}${t.orderSiteType||t.orderTariff?` · ${escapeHtml(t.orderSiteType||'Сайт')}${t.orderTariff?' · '+escapeHtml(t.orderTariff):''}`:''}
      </a>`:`<span class="ticket-no-order">⚠ Заказ не привязан</span>`}
      ${t.description?`<div class="ticket-card-desc">${escapeHtml(t.description)}</div>`:''}
      ${t.adminReply?`<div class="ticket-card-reply">💬 Ваш ответ: ${escapeHtml(t.adminReply)}</div>`:''}
      <textarea class="ticket-reply-inp" id="tr_${t.id}" placeholder="Написать ответ клиенту..." rows="2">${escapeHtml(t.adminReply||'')}</textarea>
      <div class="ticket-actions">
        <button class="btn btn-primary btn-sm" onclick="saveReply('${t.id}')">💾 Сохранить ответ</button>
        ${t.status!=='done'?`<button class="btn btn-success btn-sm" onclick="closeTick('${t.id}')">✅ Закрыть заявку</button>`:`<button class="btn btn-ghost btn-sm" onclick="reopenTick('${t.id}')">↩ Открыть</button>`}
        <button class="btn btn-danger btn-sm" onclick="deleteTick('${t.id}')">🗑</button>
      </div>
    </div>`).join('');
}

function renderSupports(){
  const el=document.getElementById('supportsList');
  const now=new Date();
  const active=allOrders.filter(o=>o.supportActive&&o.supportExpiresAt&&o.supportExpiresAt.toDate()>now);
  document.getElementById('activeSupports').textContent=active.length;
  if(!active.length){el.innerHTML=`<div class="empty-state"><span class="empty-state-icon" style="font-size:1.5rem">🔧</span><span class="empty-state-text">Нет активных</span></div>`;return;}
  el.innerHTML=active.map(o=>{
    const exp=o.supportExpiresAt.toDate();
    const days=Math.ceil((exp-now)/864e5);
    const pct=Math.max(0,Math.min(100,(exp-now)/(30*864e5)*100));
    return`<div style="margin-bottom:.85rem">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.3rem">
        <div><div style="font-size:.86rem;font-weight:500">${escapeHtml(o.clientName||'—')}</div><div style="font-size:.72rem;color:var(--muted)">${escapeHtml(o.clientEmail||'—')}</div></div>
        <span style="font-size:.72rem;color:${days<3?'var(--error)':'var(--muted)'}">осталось ${days} дн.</span>
      </div>
      <div style="height:4px;background:var(--bg);border-radius:2px"><div style="height:100%;border-radius:2px;background:${days<3?'var(--warn)':'var(--success)'};width:${pct}%"></div></div>
      ${days<3?`<button class="btn btn-ghost btn-xs" style="margin-top:.4rem" onclick="notifyExpiry('${o.uid||''}')">🔔 Уведомить</button>`:''}
    </div>`;}).join('');
}

window.saveReply=async id=>{
  const val=document.getElementById('tr_'+id)?.value.trim()||'';
  try{
    await updateDoc(doc(db,'service_tickets',id),{adminReply:val});
    const ticket=allTickets.find(t=>t.id===id);
    if(ticket?.uid&&val){
      await addDoc(collection(db,'notifications',ticket.uid,'items'),{title:'💬 Ответ на вашу заявку',text:`«${ticket.title}»: ${val}`,read:false,createdAt:serverTimestamp()}).catch(()=>{});
    }
    toast('Ответ сохранён и клиент уведомлён ✓','success');
    await loadTickets();renderTickets();
  }catch(e){toast('Ошибка','error');}
};
window.closeTick=async id=>{
  try{await updateDoc(doc(db,'service_tickets',id),{status:'done'});toast('Закрыта ✓','success');await loadTickets();renderTickets();}
  catch(e){toast('Ошибка','error');}
};
window.reopenTick=async id=>{
  try{await updateDoc(doc(db,'service_tickets',id),{status:'open'});toast('Открыта','info');await loadTickets();renderTickets();}
  catch(e){toast('Ошибка','error');}
};
window.deleteTick=async id=>{
  if(!confirm('Удалить заявку?'))return;
  try{await deleteDoc(doc(db,'service_tickets',id));toast('Удалена','info');await loadTickets();renderTickets();}
  catch(e){toast('Ошибка','error');}
};
window.notifyExpiry=async uid=>{
  if(!uid)return;
  await addDoc(collection(db,'notifications',uid,'items'),{title:'⚠️ Обслуживание заканчивается',text:'До окончания обслуживания осталось менее 3 дней. Обратитесь в поддержку для продления.',read:false,createdAt:serverTimestamp()});
  toast('Уведомление отправлено ✓','success');
};

window.openCreateTicket = async () => {
  const usersSnap = await getDocs(collection(db, 'users'));
  const userSelect = document.getElementById('ticketUser');
  userSelect.innerHTML = '<option value="">Выберите пользователя...</option>' + 
    usersSnap.docs.map(d => `<option value="${d.id}">${escapeHtml(d.data().displayName || d.data().name || d.id)} · ${escapeHtml(d.data().email || '')}</option>`).join('');
  
  const ordersSnap = await getDocs(collection(db, 'orders'));
  const orderSelect = document.getElementById('ticketOrder');
  orderSelect.innerHTML = '<option value="">Без заказа</option>' + 
    ordersSnap.docs.map(d => {
      const data = d.data();
      return `<option value="${d.id}">${escapeHtml(data.clientName || '—')} · ${escapeHtml(data.siteType || 'Сайт')}${data.domain ? ' · '+escapeHtml(data.domain) : ''}</option>`;
    }).join('');
  
  document.getElementById('ticketTitle').value = '';
  document.getElementById('ticketDesc').value = '';
  document.getElementById('createTicketModal').classList.add('show');
};

window.closeCreateTicket = () => {
  document.getElementById('createTicketModal').classList.remove('show');
};

window.createTicket = async () => {
  const uid = document.getElementById('ticketUser').value;
  const title = document.getElementById('ticketTitle').value.trim();
  const desc = document.getElementById('ticketDesc').value.trim();
  const orderId = document.getElementById('ticketOrder').value;
  
  if (!uid) { toast('Выберите пользователя', 'error'); return; }
  if (!title) { toast('Введите заголовок', 'error'); return; }
  if (!desc) { toast('Введите описание', 'error'); return; }
  
  try {
    const userDoc = await getDoc(doc(db, 'users', uid));
    const userData = userDoc.data();
    
    let orderData = {};
    if (orderId) {
      const orderDoc = await getDoc(doc(db, 'orders', orderId));
      orderData = orderDoc.data() || {};
    }
    
    await addDoc(collection(db, 'service_tickets'), {
      uid: uid,
      userName: userData?.displayName || userData?.name || 'Пользователь',
      userEmail: userData?.email || '—',
      title: title,
      description: desc,
      orderId: orderId || null,
      orderDomain: orderData?.domain || null,
      orderSiteType: orderData?.siteType || null,
      orderTariff: orderData?.tariff || orderData?.package || null,
      status: 'open',
      adminReply: '',
      createdAt: serverTimestamp(),
      createdBy: 'admin'
    });
    
    await addDoc(collection(db, 'notifications', uid, 'items'), {
      title: '📝 Новая заявка от администратора',
      text: `«${title}»: ${desc}`,
      read: false,
      createdAt: serverTimestamp()
    });
    
    toast('Тикет создан и пользователь уведомлён ✅', 'success');
    closeCreateTicket();
    await loadTickets();
    renderTickets();
  } catch(e) {
    toast('Ошибка: ' + e.message, 'error');
  }
};

async function loadTickets(){
  const snap=await getDocs(collection(db,'service_tickets'));
  allTickets=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>{
    if((a.status==='done')!=(b.status==='done'))return a.status==='done'?1:-1;
    return(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0);
  });
}

onAuthStateChanged(auth,async user=>{
  document.getElementById('loadingScreen').style.display='none';
  if(!user||user.email!==ADMIN_EMAIL){window.location.href='/';return;}
  document.getElementById('appWrap').style.display='block';
  await loadTickets();renderTickets();
  onSnapshot(query(collection(db,'orders'),orderBy('createdAt','desc')),snap=>{
    allOrders=snap.docs.map(d=>({id:d.id,...d.data()}));
    renderSupports();
    const badge=document.getElementById('navBadgeTickets');
    const open=allTickets.filter(t=>t.status!=='done').length;
    if(badge){badge.style.display=open?'':'none';badge.textContent=open;}
  });
  setInterval(async()=>{await loadTickets();renderTickets();},30000);
});
</script>
</body>
</html>
