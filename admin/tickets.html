<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Обслуживание — Antviz Admin</title>
  <link rel="icon" href="../img/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Geologica:wght@300;500&display=swap" rel="stylesheet" />
  <style>
    /* ===== БАЗА ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #1ede7b;
      --green-h: #1ac16b;
      --green-d: #149955;
      --green-light: #d2f8e5;
      --bg: #fff;
      --bg2: #f2f4f7;
      --bg3: #f9fafc;
      --text: #191b1e;
      --muted: #707a8a;
      --border: #dfe3e8;
      --border2: #cbcdd6;
      --dark: #191b1e;
      --dark2: #2b2f33;
      --red: #e8634f;
      --warn: #f59e0b;
      --info: #3b82f6;
      --sh1: 0 4px 16px rgba(0,51,153,.04), 0 2px 2px rgba(0,51,153,.08);
      --sh2: 0 8px 20px rgba(0,51,153,.08), 0 4px 8px rgba(0,51,153,.08);
      --font: 'Geologica', 'Inter', 'Arial', sans-serif;
      --sidebar-w: 240px;
      --topbar-h: 60px;
      --sp-l: 60px;
      --sp-m: 40px;
    }
    html, body { height: 100%; background: var(--bg2); }
    body { color: var(--text); font-family: var(--font); font-weight: 300; line-height: 1.25; -webkit-font-smoothing: antialiased; display: flex; flex-direction: column; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    .loading-screen { position: fixed; inset: 0; z-index: 9999; background: var(--bg); display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 14px; }
    .spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin .7s linear infinite; }

    /* ===== REVEAL ===== */
    .reveal { opacity: 0; transform: translateY(20px); transition: opacity .55s ease, transform .55s ease; }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    /* ===== SIDEBAR ===== */
    .sidebar { position: fixed; top: 0; left: 0; bottom: 0; width: var(--sidebar-w); background: var(--bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 200; }
    .sidebar-logo { padding: 18px 20px 14px; display: flex; align-items: center; gap: 10px; text-decoration: none; border-bottom: 1px solid var(--border); }
    .sidebar-logo-mark { width: 30px; height: 30px; border-radius: 10px; background: var(--dark); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .sidebar-logo-mark svg { width: 16px; height: 16px; fill: var(--green); }
    .sidebar-logo-name { font-weight: 500; font-size: .88rem; color: var(--text); letter-spacing: -.01em; }
    .sidebar-logo-badge { margin-left: auto; font-size: .6rem; font-weight: 500; letter-spacing: .06em; text-transform: uppercase; background: rgba(232,99,79,.1); color: var(--red); border: 1px solid rgba(232,99,79,.2); padding: .1rem .45rem; border-radius: 6px; flex-shrink: 0; }
    .sidebar-nav { flex: 1; padding: 12px 10px; overflow-y: auto; display: flex; flex-direction: column; gap: 2px; }
    .sidebar-section { font-size: .62rem; font-weight: 500; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); padding: 10px 10px 4px; margin-top: 4px; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 12px; text-decoration: none; color: var(--muted); font-size: .84rem; font-weight: 300; transition: background .15s, color .15s; cursor: pointer; border: none; background: none; width: 100%; font-family: var(--font); position: relative; }
    .nav-item:hover { background: var(--bg2); color: var(--text); }
    .nav-item.active { background: rgba(30,222,123,.1); color: var(--green-d); font-weight: 500; }
    .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; stroke: currentColor; stroke-width: 1.7; fill: none; }
    .nav-badge { position: absolute; right: 10px; background: var(--red); color: #fff; font-size: .58rem; font-weight: 500; min-width: 17px; height: 17px; border-radius: 50px; display: flex; align-items: center; justify-content: center; padding: 0 4px; animation: pulse 2s infinite; }
    .sidebar-footer { padding: 10px; border-top: 1px solid var(--border); }

    /* ===== TOPBAR ===== */
    .topbar { position: fixed; top: 0; left: var(--sidebar-w); right: 0; height: var(--topbar-h); background: rgba(255,255,255,.95); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 28px; z-index: 100; }
    .topbar-title { font-weight: 500; font-size: .92rem; color: var(--text); letter-spacing: -.01em; }
    .topbar-right { display: flex; align-items: center; gap: 8px; }
    .topbar-stat { display: flex; align-items: center; gap: 4px; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: .2rem .7rem; font-size: .7rem; color: var(--muted); }
    .topbar-stat-num { font-weight: 500; color: var(--text); }

    /* ===== MAIN ===== */
    .main { margin-left: var(--sidebar-w); margin-top: var(--topbar-h); padding: 28px 32px; min-height: calc(100vh - var(--topbar-h)); animation: fadeUp .25s ease; max-width: 1400px; display: grid; grid-template-columns: 1fr 380px; gap: 24px; align-items: start; }
    @media (max-width: 1000px) { .main { grid-template-columns: 1fr; } }
    @media (max-width: 700px) { .main { padding: 16px; } }

    /* ===== BUTTONS ===== */
    .btn { display: inline-flex; align-items: center; gap: 6px; font-family: var(--font); font-weight: 500; text-decoration: none; cursor: pointer; border: none; border-radius: 10px; padding: .5rem 1rem; font-size: .78rem; letter-spacing: -.01em; transition: background .1s, transform .1s; white-space: nowrap; }
    .btn:hover { transform: translateY(-1px); }
    .btn-green { background: var(--green); color: var(--dark); }
    .btn-green:hover { background: var(--green-h); }
    .btn-dark { background: var(--dark); color: #fff; }
    .btn-dark:hover { background: var(--dark2); }
    .btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--text); }
    .btn-outline:hover { border-color: var(--border2); }
    .btn-danger { background: rgba(232,99,79,.08); color: var(--red); border: 1px solid rgba(232,99,79,.2); }
    .btn-danger:hover { background: rgba(232,99,79,.16); }
    .btn-success { background: rgba(30,222,123,.12); color: var(--green-d); border: 1px solid rgba(30,222,123,.2); }
    .btn-success:hover { background: rgba(30,222,123,.18); }
    .btn-sm { padding: .3rem .7rem; font-size: .7rem; border-radius: 8px; }
    .btn-xs { padding: .2rem .5rem; font-size: .65rem; border-radius: 6px; }

    /* ===== SEARCH & FILTERS ===== */
    .search-box { display: flex; align-items: center; gap: 8px; background: var(--bg2); border: 1.5px solid var(--border); border-radius: 12px; padding: .5rem .9rem; transition: border-color .15s; flex: 1; min-width: 200px; }
    .search-box:focus-within { border-color: var(--green); box-shadow: 0 0 0 3px rgba(30,222,123,.08); }
    .search-box svg { width: 14px; height: 14px; stroke: var(--muted); flex-shrink: 0; }
    .search-box input { background: none; border: none; outline: none; font-family: var(--font); font-size: .82rem; font-weight: 300; color: var(--text); width: 100%; }

    .tab { background: none; border: 1.5px solid var(--border); border-radius: 10px; padding: .3rem .85rem; font-family: var(--font); font-size: .78rem; font-weight: 300; color: var(--muted); cursor: pointer; transition: all .12s; }
    .tab:hover { border-color: var(--border2); color: var(--text); }
    .tab.active { background: var(--dark); border-color: var(--dark); color: #fff; font-weight: 500; }

    /* ===== TICKET CARDS ===== */
    .ticket-card { background: var(--bg); border: 1px solid var(--border); border-radius: 20px; padding: 18px 20px; margin-bottom: 12px; transition: box-shadow .15s, border-color .15s; }
    .ticket-card:hover { box-shadow: var(--sh1); }
    .ticket-card.open { border-left: 4px solid var(--green-d); }
    .ticket-card.done { border-left: 4px solid var(--muted); opacity: .7; }
    .ticket-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 8px; flex-wrap: wrap; }
    .ticket-title { font-weight: 500; font-size: .9rem; }
    .ticket-meta { font-size: .76rem; color: var(--muted); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; }
    .ticket-desc { font-size: .82rem; color: var(--muted); line-height: 1.5; margin-bottom: 10px; }
    .ticket-reply { background: rgba(30,222,123,.06); border: 1px solid rgba(30,222,123,.15); border-radius: 10px; padding: .6rem .9rem; font-size: .82rem; color: var(--green-d); line-height: 1.5; margin-bottom: 10px; }
    .ticket-order-link { display: inline-flex; align-items: center; gap: 4px; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: .2rem .7rem; font-size: .72rem; color: var(--text); text-decoration: none; margin-bottom: 8px; transition: background .15s; }
    .ticket-order-link:hover { background: var(--bg3); }
    .ticket-reply-inp { width: 100%; background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: .5rem .8rem; font-family: var(--font); font-size: .82rem; font-weight: 300; color: var(--text); outline: none; resize: none; min-height: 44px; transition: border-color .15s; margin-bottom: 8px; }
    .ticket-reply-inp:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(30,222,123,.08); }
    .ticket-actions { display: flex; gap: 6px; flex-wrap: wrap; }

    /* ===== BADGES ===== */
    .sbadge { display: inline-flex; align-items: center; gap: 4px; padding: .2rem .7rem; border-radius: 8px; font-size: .66rem; font-weight: 500; white-space: nowrap; }
    .sbadge-dot { width: 4px; height: 4px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
    .s0 { background: #f2f4f7; color: var(--muted); }
    .s2 { background: rgba(59,130,246,.1); color: var(--info); }
    .s5 { background: rgba(30,222,123,.12); color: var(--green-d); }

    /* ===== SUPPORT CARDS (правая панель) ===== */
    .support-card { background: var(--bg); border: 1px solid var(--border); border-radius: 16px; padding: 14px 16px; margin-bottom: 10px; transition: box-shadow .15s; }
    .support-card:hover { box-shadow: var(--sh1); }
    .support-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
    .support-name { font-weight: 500; font-size: .84rem; }
    .support-email { font-size: .72rem; color: var(--muted); }
    .support-days { font-size: .72rem; font-weight: 500; }
    .support-days.urgent { color: var(--red); }
    .support-progress { height: 4px; background: var(--bg2); border-radius: 2px; margin-top: 6px; overflow: hidden; }
    .support-progress-fill { height: 100%; border-radius: 2px; transition: width .4s; }
    .support-progress-fill.green { background: var(--green-d); }
    .support-progress-fill.warn { background: var(--warn); }
    .support-progress-fill.red { background: var(--red); }

    /* ===== SECTION ===== */
    .section { background: var(--bg); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; }
    .section-hdr { padding: 14px 20px; border-bottom: 1px solid var(--border); font-weight: 500; font-size: .84rem; }
    .section-body { padding: 16px 20px; }

    /* ===== TOAST ===== */
    .toast { position: fixed; bottom: 24px; right: 24px; z-index: 900; padding: .6rem 1.2rem; border-radius: 14px; font-size: .8rem; font-weight: 500; opacity: 0; transition: opacity .2s, transform .2s; pointer-events: none; transform: translateY(6px); }
    .toast.show { opacity: 1; transform: none; }
    .toast.success { background: var(--green); color: #0d3320; }
    .toast.error { background: var(--red); color: #fff; }
    .toast.info { background: var(--dark); color: #fff; }
    .toast.warn { background: var(--warn); color: #fff; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 700px) {
      .topbar-stat { display: none; }
      .ticket-header { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

<div class="loading-screen" id="loadingScreen"><div class="spinner"></div></div>

<!-- ===== SIDEBAR ===== -->
<div class="sidebar">
  <a href="/admin" class="sidebar-logo">
    <div class="sidebar-logo-mark"><svg viewBox="0 0 20 20"><path d="M10 2L3 7v11h5v-5h4v5h5V7L10 2z"/></svg></div>
    <span class="sidebar-logo-name">Antviz</span>
    <span class="sidebar-logo-badge">Admin</span>
  </a>
  <nav class="sidebar-nav">
    <div class="sidebar-section">Основное</div>
    <a href="/admin" class="nav-item"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Дашборд</a>
    <a href="/admin/orders" class="nav-item"><svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h4"/></svg>Заказы<span class="nav-badge" id="navBadgeOrders" style="display:none"></span></a>
    <div class="sidebar-section">Клиенты</div>
    <a href="/admin/tickets" class="nav-item active"><svg viewBox="0 0 24 24"><path d="M2 9a3 3 0 010-6h20a3 3 0 010 6"/><path d="M2 15a3 3 0 000 6h20a3 3 0 000-6"/><path d="M6 12h12"/></svg>Обслуживание<span class="nav-badge" id="navBadgeTickets" style="display:none"></span></a>
    <a href="/admin/chats" class="nav-item"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>Поддержка<span class="nav-badge" id="navBadgeChats" style="display:none"></span></a>
    <a href="/admin/promos" class="nav-item"><svg viewBox="0 0 24 24"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><circle cx="7" cy="7" r="1.5" fill="currentColor" stroke="none"/></svg>Промокоды</a>
    <div class="sidebar-section">Система</div>
    <a href="/admin/reviews" class="nav-item"><svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>Отзывы</a>
  </nav>
  <div class="sidebar-footer">
    <button class="nav-item" onclick="doLogout()" style="color:var(--red)"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>Выйти</button>
  </div>
</div>

<!-- ===== TOPBAR ===== -->
<div class="topbar" id="appTopbar" style="display:none">
  <span class="topbar-title">Обслуживание</span>
  <div class="topbar-right">
    <div class="topbar-stat">Открытых: <span class="topbar-stat-num" id="openCount" style="color:var(--green-d)">—</span></div>
    <div class="topbar-stat">Активных обслуживаний: <span class="topbar-stat-num" id="activeSupports">—</span></div>
  </div>
</div>

<!-- ===== MAIN ===== -->
<div class="main" id="appWrap" style="display:none">

  <!-- Левая колонка: тикеты -->
  <div>
    <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom:16px;">
      <div class="search-box" style="flex:1;">
        <svg viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input type="text" placeholder="Поиск по имени, email, заявке..." id="searchInp" oninput="renderTickets()" />
      </div>
      <button class="tab active" onclick="switchFilter('all',this)">Все</button>
      <button class="tab" onclick="switchFilter('open',this)">Открытые</button>
      <button class="tab" onclick="switchFilter('done',this)">Закрытые</button>
    </div>

    <div id="ticketsList">
      <div style="text-align:center;color:var(--muted);padding:32px;">Загрузка...</div>
    </div>
  </div>

  <!-- Правая колонка: активные обслуживания -->
  <div>
    <div class="section">
      <div class="section-hdr">Активные обслуживания</div>
      <div class="section-body" id="supportsList">
        <div style="text-align:center;color:var(--muted);font-size:.82rem;padding:12px;">Загрузка...</div>
      </div>
    </div>
  </div>

</div>

<!-- ===== TOAST ===== -->
<div class="toast" id="toast"></div>

<script type="module">
import { auth, db, ADMIN_EMAIL } from '../firebase-config.js';
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { collection, query, orderBy, onSnapshot, doc, updateDoc, deleteDoc, addDoc, serverTimestamp, getDocs, where, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ===== UTILS =====
function toast(m, t = 'info') { const el = document.getElementById('toast'); el.textContent = m; el.className = `toast ${t} show`; setTimeout(() => el.className = 'toast', 3400); }
function esc(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }
function fmtDate(ts) { if (!ts) return '—'; const d = ts.toDate ? ts.toDate() : new Date(ts); return d.toLocaleDateString('ru', { day: 'numeric', month: 'short', year: 'numeric' }); }
function fmtDT(ts) { if (!ts) return '—'; const d = ts.toDate ? ts.toDate() : new Date(ts); return d.toLocaleDateString('ru', { day: 'numeric', month: 'short' }) + ' ' + d.toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' }); }

let allTickets = [], allOrders = [], currentFilter = 'all', unsubOrders = null;

// ===== REVEAL =====
const revealObs = new IntersectionObserver(e => { e.forEach(el => { if (el.isIntersecting) el.target.classList.add('visible'); }); }, { threshold: .07 });
document.querySelectorAll('.reveal').forEach(el => revealObs.observe(el));

// ===== FILTER =====
window.switchFilter = (f, btn) => {
  currentFilter = f;
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTickets();
};

// ===== RENDER TICKETS =====
function renderTickets() {
  const q = (document.getElementById('searchInp').value || '').toLowerCase();
  let list = allTickets;
  if (currentFilter === 'open') list = list.filter(t => t.status !== 'done');
  else if (currentFilter === 'done') list = list.filter(t => t.status === 'done');
  if (q) list = list.filter(t => (t.title || '').toLowerCase().includes(q) || (t.userName || '').toLowerCase().includes(q) || (t.userEmail || '').toLowerCase().includes(q) || (t.orderDomain || '').toLowerCase().includes(q) || (t.orderSiteType || '').toLowerCase().includes(q));

  document.getElementById('openCount').textContent = allTickets.filter(t => t.status !== 'done').length;

  const el = document.getElementById('ticketsList');
  if (!list.length) {
    el.innerHTML = `<div style="text-align:center;color:var(--muted);padding:32px;">✅ Нет заявок</div>`;
    return;
  }

  el.innerHTML = list.map(t => {
    const statusClass = t.status === 'done' ? 'done' : 'open';
    const statusLabel = t.status === 'done' ? 'Закрыта' : 'Открыта';
    const badgeClass = t.status === 'done' ? 's0' : 's2';
    return `<div class="ticket-card ${statusClass} reveal">
      <div class="ticket-header">
        <div class="ticket-title">${esc(t.title)}</div>
        <span class="sbadge ${badgeClass}"><span class="sbadge-dot"></span>${statusLabel}</span>
      </div>
      <div class="ticket-meta">
        <span style="font-weight:500;">${esc(t.userName || '—')}</span>
        <span>·</span>
        <span>${esc(t.userEmail || '—')}</span>
        <span>·</span>
        <span>${fmtDT(t.createdAt)}</span>
      </div>
      ${t.orderId ? `<a class="ticket-order-link" href="/admin/orders?id=${t.orderId}">
        <svg viewBox="0 0 24 24" style="width:12px;height:12px;stroke:currentColor;stroke-width:2;fill:none;"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>
        ${esc(t.orderDomain || ('№ ' + t.orderId.slice(0,8).toUpperCase()))}${t.orderSiteType || t.orderTariff ? ' · ' + esc(t.orderSiteType || 'Сайт') + (t.orderTariff ? ' · ' + esc(t.orderTariff) : '') : ''}
      </a>` : `<span style="display:inline-block;background:#fef3c7;border:1px solid #fde68a;color:#b45309;font-size:.72rem;padding:.2rem .7rem;border-radius:8px;margin-bottom:8px;">⚠ Заказ не привязан</span>`}
      ${t.description ? `<div class="ticket-desc">${esc(t.description)}</div>` : ''}
      ${t.adminReply ? `<div class="ticket-reply">💬 Ваш ответ: ${esc(t.adminReply)}</div>` : ''}
      <textarea class="ticket-reply-inp" id="tr_${t.id}" placeholder="Написать ответ клиенту..." rows="2">${esc(t.adminReply || '')}</textarea>
      <div class="ticket-actions">
        <button class="btn btn-green btn-sm" onclick="saveReply('${t.id}')">💾 Сохранить ответ</button>
        ${t.status !== 'done' ? `<button class="btn btn-success btn-sm" onclick="closeTick('${t.id}')">✅ Закрыть заявку</button>` : `<button class="btn btn-outline btn-sm" onclick="reopenTick('${t.id}')">↩ Открыть</button>`}
        <button class="btn btn-danger btn-sm" onclick="deleteTick('${t.id}')">🗑</button>
      </div>
    </div>`;
  }).join('');

  // повторно инициализируем reveal
  document.querySelectorAll('.reveal:not(.visible)').forEach(el => revealObs.observe(el));
}

// ===== RENDER SUPPORTS (правая панель) =====
function renderSupports() {
  const el = document.getElementById('supportsList');
  const now = new Date();

  const active = allOrders.filter(o => {
    const hasSupport = o.supportActive === true || o.support === true || o.maintenance === true;
    if (!hasSupport) return false;
    if (o.supportExpiresAt) {
      const exp = o.supportExpiresAt.toDate ? o.supportExpiresAt.toDate() : new Date(o.supportExpiresAt);
      return exp > now;
    }
    return true;
  });

  document.getElementById('activeSupports').textContent = active.length;

  if (!active.length) {
    el.innerHTML = `<div style="text-align:center;color:var(--muted);font-size:.82rem;padding:12px;">🔧 Нет активных обслуживаний</div>`;
    return;
  }

  el.innerHTML = active.map(o => {
    let days = '∞', pct = 100, isExpiring = false, fillClass = 'green';
    if (o.supportExpiresAt) {
      const exp = o.supportExpiresAt.toDate ? o.supportExpiresAt.toDate() : new Date(o.supportExpiresAt);
      days = Math.ceil((exp - now) / 864e5);
      pct = Math.max(0, Math.min(100, ((exp - now) / (30 * 864e5)) * 100));
      isExpiring = days < 3;
      if (isExpiring) fillClass = 'red';
      else if (days < 7) fillClass = 'warn';
    }
    return `<div class="support-card">
      <div class="support-card-header">
        <div>
          <div class="support-name">${esc(o.clientName || o.name || '—')}</div>
          <div class="support-email">${esc(o.clientEmail || o.email || '—')}</div>
          ${o.domain ? `<div style="font-size:.7rem;color:var(--muted2);">${esc(o.domain)}</div>` : ''}
        </div>
        <div class="support-days${isExpiring ? ' urgent' : ''}">${days === '∞' ? 'бессрочно' : days + ' дн.'}</div>
      </div>
      ${days !== '∞' ? `
        <div class="support-progress">
          <div class="support-progress-fill ${fillClass}" style="width:${pct}%;"></div>
        </div>
      ` : ''}
      ${isExpiring ? `<button class="btn btn-outline btn-xs" style="margin-top:6px;" onclick="notifyExpiry('${o.uid || ''}')">🔔 Уведомить</button>` : ''}
    </div>`;
  }).join('');
}

// ===== TICKET ACTIONS =====
window.saveReply = async id => {
  const val = document.getElementById('tr_' + id)?.value.trim() || '';
  try {
    await updateDoc(doc(db, 'service_tickets', id), { adminReply: val });
    const ticket = allTickets.find(t => t.id === id);
    if (ticket?.uid && val) {
      await addDoc(collection(db, 'notifications', ticket.uid, 'items'), {
        title: '💬 Ответ на вашу заявку',
        text: `«${ticket.title}»: ${val}`,
        read: false,
        createdAt: serverTimestamp()
      }).catch(() => {});
    }
    toast('Ответ сохранён и клиент уведомлён ✓', 'success');
    await loadTickets();
    renderTickets();
  } catch (e) { toast('Ошибка', 'error'); }
};

window.closeTick = async id => {
  try {
    await updateDoc(doc(db, 'service_tickets', id), { status: 'done' });
    toast('Закрыта ✓', 'success');
    await loadTickets();
    renderTickets();
  } catch (e) { toast('Ошибка', 'error'); }
};

window.reopenTick = async id => {
  try {
    await updateDoc(doc(db, 'service_tickets', id), { status: 'open' });
    toast('Открыта', 'info');
    await loadTickets();
    renderTickets();
  } catch (e) { toast('Ошибка', 'error'); }
};

window.deleteTick = async id => {
  if (!confirm('Удалить заявку?')) return;
  try {
    await deleteDoc(doc(db, 'service_tickets', id));
    toast('Удалена', 'info');
    await loadTickets();
    renderTickets();
  } catch (e) { toast('Ошибка', 'error'); }
};

window.notifyExpiry = async uid => {
  if (!uid) return;
  try {
    await addDoc(collection(db, 'notifications', uid, 'items'), {
      title: '⚠️ Обслуживание заканчивается',
      text: 'До окончания обслуживания осталось менее 3 дней. Обратитесь в поддержку для продления.',
      read: false,
      createdAt: serverTimestamp()
    });
    toast('Уведомление отправлено ✓', 'success');
  } catch (e) { toast('Ошибка: ' + e.message, 'error'); }
};

// ===== LOAD TICKETS =====
async function loadTickets() {
  try {
    const snap = await getDocs(collection(db, 'service_tickets'));
    allTickets = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a, b) => {
      if ((a.status === 'done') !== (b.status === 'done')) return a.status === 'done' ? 1 : -1;
      return (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0);
    });
  } catch (e) {
    console.error('Ошибка загрузки тикетов:', e);
  }
}

// ===== LOGOUT =====
window.doLogout = async () => { await signOut(auth); window.location.href = '/'; };

// ===== AUTH =====
onAuthStateChanged(auth, async user => {
  document.getElementById('loadingScreen').style.display = 'none';
  if (!user || user.email !== ADMIN_EMAIL) { window.location.href = '/'; return; }
  document.getElementById('appWrap').style.display = 'grid';
  document.getElementById('appTopbar').style.display = 'flex';

  await loadTickets();
  renderTickets();

  // подписываемся на заказы для активных обслуживаний
  if (unsubOrders) unsubOrders();
  unsubOrders = onSnapshot(query(collection(db, 'orders'), orderBy('createdAt', 'desc')), snap => {
    allOrders = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderSupports();
    // обновляем бейдж в сайдбаре
    const badge = document.getElementById('navBadgeTickets');
    const open = allTickets.filter(t => t.status !== 'done').length;
    if (badge) { badge.style.display = open ? '' : 'none'; badge.textContent = open; }
  });

  // обновляем тикеты раз в 30 секунд
  setInterval(async () => {
    await loadTickets();
    renderTickets();
  }, 30000);
});
</script>
