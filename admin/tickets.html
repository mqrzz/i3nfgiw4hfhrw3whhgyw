<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Обслуживание — Antviz Admin</title>
<link rel="icon" href="../img/favicon.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Geologica:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#f2f4f7;overflow:hidden}
:root{
  --green:#1ede7b;--green-h:#1ac16b;--green-d:#149955;
  --bg:#fff;--bg2:#f2f4f7;--bg3:#f9fafc;
  --text:#191b1e;--muted:#707a8a;--border:#dfe3e8;--border2:#cbcdd6;
  --dark:#191b1e;--dark2:#2b2f33;
  --red:#e8634f;--warn:#f59e0b;--info:#3b82f6;--purple:#8b5cf6;
  --font:'Geologica','Inter',sans-serif;
  --sw:256px;--th:64px;--rail:340px;
}
body{color:var(--text);font-family:var(--font);font-weight:300;-webkit-font-smoothing:antialiased}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
@keyframes popIn{from{opacity:0;transform:scale(.97) translateY(4px)}to{opacity:1;transform:none}}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

.ls{position:fixed;inset:0;z-index:9000;background:var(--dark);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.sp{width:26px;height:26px;border:2px solid rgba(255,255,255,.1);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite}
.lt{font-size:13px;color:rgba(255,255,255,.35)}

/* SIDEBAR (shared admin nav — unchanged across admin pages) */
.sb{position:fixed;top:0;left:0;bottom:0;width:var(--sw);background:var(--dark);display:flex;flex-direction:column;z-index:200}
.sb-logo{padding:24px 20px 20px;display:flex;align-items:center;gap:12px;text-decoration:none;border-bottom:1px solid rgba(255,255,255,.07)}
.lm{width:34px;height:34px;border-radius:12px;background:var(--green);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.lm svg{width:18px;height:18px;fill:var(--dark)}
.ln{font-weight:500;font-size:.95rem;color:#fff;letter-spacing:-.02em}
.lbadge{margin-left:auto;font-size:.58rem;font-weight:500;letter-spacing:.07em;text-transform:uppercase;background:rgba(232,99,79,.15);color:var(--red);border:1px solid rgba(232,99,79,.25);padding:.15rem .5rem;border-radius:7px}
.sb-nav{flex:1;padding:14px 12px;overflow-y:auto;display:flex;flex-direction:column;gap:2px}
.ns{font-size:.6rem;font-weight:500;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.25);padding:14px 10px 5px;margin-top:6px}
.ni{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:14px;text-decoration:none;color:rgba(255,255,255,.45);font-size:.85rem;font-weight:300;transition:background .12s,color .12s;cursor:pointer;border:none;background:none;width:100%;font-family:var(--font);position:relative}
.ni:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.85)}
.ni.active{background:rgba(30,222,123,.12);color:var(--green)}
.ni svg{width:16px;height:16px;flex-shrink:0;stroke:currentColor;stroke-width:1.7;fill:none;stroke-linecap:round;stroke-linejoin:round}
.nb{position:absolute;right:10px;background:var(--red);color:#fff;font-size:.58rem;font-weight:500;min-width:17px;height:17px;border-radius:50px;display:flex;align-items:center;justify-content:center;padding:0 4px}
.sb-foot{padding:12px;border-top:1px solid rgba(255,255,255,.07)}

/* TOPBAR */
.tb{position:fixed;top:0;left:var(--sw);right:0;height:var(--th);background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 28px;z-index:100;gap:16px}
.tb-title{font-weight:600;font-size:1.05rem;letter-spacing:-.02em}
.tb-back{display:none;background:none;border:none;cursor:pointer;color:var(--muted);width:32px;height:32px;align-items:center;justify-content:center;border-radius:10px}
.tb-back svg{width:18px;height:18px;stroke:currentColor;stroke-width:2;fill:none}
.tb-back:hover{background:var(--bg2)}

/* WORKSPACE: two-pane */
.workspace{position:fixed;top:var(--th);left:var(--sw);right:0;bottom:0;display:grid;grid-template-columns:var(--rail) 1fr}

/* RAIL */
.rail{background:var(--bg);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.rail-switch{display:flex;gap:4px;padding:14px 14px 10px;flex-shrink:0}
.rs-btn{flex:1;background:var(--bg2);border:none;border-radius:11px;padding:.55rem 0;font-family:var(--font);font-size:.8rem;font-weight:500;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .12s}
.rs-btn.active{background:var(--dark);color:#fff}
.rs-btn .badge-cnt{background:rgba(232,99,79,.9);color:#fff;font-size:.62rem;padding:.05rem .38rem;border-radius:20px;font-weight:600}
.rs-btn.active .badge-cnt{background:var(--red)}

.rail-search{padding:0 14px 10px;flex-shrink:0}
.rail-search-box{display:flex;align-items:center;gap:8px;background:var(--bg2);border-radius:11px;padding:.5rem .8rem}
.rail-search-box svg{width:14px;height:14px;stroke:var(--muted);stroke-width:2;fill:none;flex-shrink:0}
.rail-search-box input{background:none;border:none;outline:none;font-family:var(--font);font-size:.83rem;font-weight:300;color:var(--text);width:100%}

.rail-filters{display:flex;gap:5px;padding:0 14px 12px;flex-shrink:0}
.rf{background:none;border:1px solid var(--border);border-radius:8px;padding:.3rem .7rem;font-family:var(--font);font-size:.73rem;color:var(--muted);cursor:pointer}
.rf.active{background:var(--bg2);border-color:var(--border2);color:var(--text);font-weight:500}

.rail-list{flex:1;overflow-y:auto;border-top:1px solid var(--bg2)}
.trow{display:flex;gap:11px;padding:13px 16px;cursor:pointer;border-left:3px solid transparent;border-bottom:1px solid var(--bg2);position:relative}
.trow:hover{background:var(--bg3)}
.trow.selected{background:var(--bg2);border-left-color:var(--green)}
.trow.urgent{border-left-color:var(--red)}
.trow-av{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:.7rem;font-weight:600;flex-shrink:0}
.trow-mid{flex:1;min-width:0}
.trow-top{display:flex;align-items:center;gap:6px;margin-bottom:2px}
.trow-name{font-size:.85rem;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.trow-time{font-size:.68rem;color:var(--muted);flex-shrink:0}
.trow-subj{font-size:.79rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:5px}
.trow-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}
.trow-urgent-tag{font-size:.62rem;font-weight:600;color:var(--red);text-transform:uppercase;letter-spacing:.03em}

/* DETAIL */
.detail{display:flex;flex-direction:column;overflow:hidden;background:var(--bg3)}
.detail-empty{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;color:var(--muted)}
.detail-empty svg{width:44px;height:44px;stroke:var(--border2);stroke-width:1.3;fill:none}
.detail-empty span{font-size:.9rem}

.dhead{background:var(--bg);border-bottom:1px solid var(--border);padding:20px 32px;flex-shrink:0;animation:fadeIn .2s ease}
.dhead-top{display:flex;align-items:center;gap:14px;margin-bottom:12px}
.dhead-av{width:44px;height:44px;border-radius:13px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:.9rem;font-weight:600;flex-shrink:0}
.dhead-name{font-size:1.15rem;font-weight:600;letter-spacing:-.02em}
.dhead-email{font-size:.8rem;color:var(--muted)}
.dhead-badges{display:flex;gap:8px;margin-left:auto;flex-shrink:0}
.dhead-subj{font-size:1rem;font-weight:500;color:var(--text);margin-bottom:8px}
.dhead-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap}

.badge{display:inline-flex;align-items:center;gap:4px;padding:.25rem .7rem;border-radius:8px;font-size:.71rem;font-weight:500;white-space:nowrap;flex-shrink:0}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}
.b-open{background:rgba(59,130,246,.1);color:var(--info)}
.b-done{background:rgba(30,222,123,.12);color:var(--green-d)}
.b-urgent{background:rgba(232,99,79,.1);color:var(--red)}

.tc-order{display:inline-flex;align-items:center;gap:6px;background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2);color:var(--info);font-size:.79rem;font-weight:500;padding:.35rem .9rem;border-radius:10px;text-decoration:none}
.tc-order:hover{background:rgba(59,130,246,.14)}
.tc-order svg{width:13px;height:13px;stroke:currentColor;stroke-width:2;fill:none;flex-shrink:0}
.tc-no-order{display:inline-flex;align-items:center;gap:6px;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);color:var(--warn);font-size:.79rem;padding:.35rem .9rem;border-radius:10px}

.dbody{flex:1;overflow-y:auto;padding:24px 32px;display:flex;flex-direction:column;gap:16px}
.msg{max-width:70%;padding:14px 18px;border-radius:18px;font-size:.88rem;line-height:1.55;animation:popIn .18s ease}
.msg-lbl{font-size:.68rem;text-transform:uppercase;letter-spacing:.05em;font-weight:600;margin-bottom:5px;opacity:.6}
.msg.client{align-self:flex-start;background:var(--bg);border:1px solid var(--border);border-radius:18px 18px 18px 4px;color:var(--text)}
.msg.admin{align-self:flex-end;background:var(--green);border-radius:18px 18px 4px 18px;color:#0d3320}
.msg.admin .msg-lbl{opacity:.55}
.dbody-images{display:flex;flex-wrap:wrap;gap:8px;align-self:flex-start;max-width:70%}
.tc-img{width:84px;height:84px;border-radius:12px;object-fit:cover;border:1px solid var(--border);cursor:pointer;transition:opacity .15s}
.tc-img:hover{opacity:.85}

.dcompose{background:var(--bg);border-top:1px solid var(--border);padding:18px 32px 20px;flex-shrink:0;display:flex;flex-direction:column;gap:10px}
.tc-inp{width:100%;background:var(--bg2);border:1.5px solid var(--border);border-radius:14px;padding:.75rem 1.05rem;color:var(--text);font-family:var(--font);font-size:.89rem;font-weight:300;outline:none;transition:border-color .15s;resize:vertical;min-height:64px;line-height:1.5}
.tc-inp:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(30,222,123,.08)}
.tc-actions{display:flex;gap:8px;flex-wrap:wrap}

.btn{display:inline-flex;align-items:center;gap:6px;font-family:var(--font);font-weight:500;font-size:.84rem;border:none;border-radius:12px;padding:.55rem 1.1rem;cursor:pointer;transition:background .1s,transform .1s;text-decoration:none;white-space:nowrap}
.btn:hover{transform:translateY(-1px)}
.btn-green{background:var(--green);color:var(--dark)}.btn-green:hover{background:var(--green-h)}
.btn-dark{background:var(--dark);color:#fff}.btn-dark:hover{background:var(--dark2)}
.btn-outline{background:transparent;border:1.5px solid var(--border2);color:var(--muted)}.btn-outline:hover{border-color:var(--text);color:var(--text)}
.btn-danger{background:rgba(232,99,79,.08);color:var(--red);border:1px solid rgba(232,99,79,.2)}.btn-danger:hover{background:rgba(232,99,79,.15)}
.btn-sm{padding:.4rem .9rem;font-size:.8rem;border-radius:10px}

/* SUPPORTS TAB (inside rail) */
.sup-row{display:flex;gap:11px;padding:13px 16px;border-bottom:1px solid var(--bg2);align-items:center}
.sup-row.expiring{background:rgba(245,158,11,.06)}
.sup-av{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:.7rem;font-weight:600;flex-shrink:0}
.sup-mid{flex:1;min-width:0}
.sup-name{font-size:.83rem;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sup-email{font-size:.7rem;color:var(--muted);margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sup-prog{height:4px;background:var(--bg2);border-radius:3px;margin-bottom:4px}
.sup-prog-fill{height:100%;border-radius:3px;background:var(--green)}
.sup-prog-fill.warn{background:linear-gradient(90deg,var(--warn),var(--red))}
.sup-days{font-size:.68rem;color:var(--muted)}
.sup-days.warn{color:var(--warn);font-weight:600}
.sup-notify{background:none;border:1px solid var(--border2);border-radius:8px;font-size:.65rem;padding:.25rem .5rem;color:var(--muted);cursor:pointer;flex-shrink:0}

.rail-empty{padding:40px 20px;text-align:center;color:var(--muted);font-size:.84rem}

.toast{position:fixed;bottom:24px;right:24px;z-index:900;padding:.7rem 1.4rem;border-radius:16px;font-size:.84rem;font-weight:500;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;transform:translateY(8px)}
.toast.show{opacity:1;transform:none}
.toast.success{background:var(--green);color:#0d3320}.toast.error{background:var(--red);color:#fff}.toast.info{background:var(--dark);color:#fff}.toast.warn{background:var(--warn);color:#fff}

@media(max-width:880px){
  :root{--rail:100%}
  .workspace{grid-template-columns:1fr}
  .rail{display:flex}
  .detail{position:fixed;top:var(--th);left:0;right:0;bottom:0;z-index:150;transform:translateX(100%);transition:transform .22s ease}
  .workspace.detail-open .rail{display:none}
  .workspace.detail-open .detail{transform:translateX(0)}
  .tb-back{display:flex}
  .msg{max-width:88%}
}
</style>
</head>
<body>

<div class="ls" id="loadingScreen"><div class="sp"></div><span class="lt">Загрузка...</span></div>

<!-- SIDEBAR -->
<div class="sb">
  <a href="/admin" class="sb-logo">
    <div class="lm"><svg viewBox="0 0 20 20"><path d="M10 2L3 7v11h5v-5h4v5h5V7L10 2z"/></svg></div>
    <span class="ln">Antviz</span><span class="lbadge">Admin</span>
  </a>
  <nav class="sb-nav">
    <span class="ns">Основное</span>
    <a href="/admin" class="ni"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="2"/><rect x="14" y="3" width="7" height="7" rx="2"/><rect x="3" y="14" width="7" height="7" rx="2"/><rect x="14" y="14" width="7" height="7" rx="2"/></svg>Дашборд</a>
    <a href="/admin/orders" class="ni"><svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h4"/></svg>Заказы<span class="nb" id="navBadgeOrders" style="display:none"></span></a>
    <span class="ns">Клиенты</span>
    <a href="/admin/tickets" class="ni active"><svg viewBox="0 0 24 24"><path d="M2 9a3 3 0 010-6h20a3 3 0 010 6"/><path d="M2 15a3 3 0 000 6h20a3 3 0 000-6"/><path d="M6 12h12"/></svg>Обслуживание<span class="nb" id="navBadgeTickets" style="display:none"></span></a>
    <a href="/admin/chats" class="ni"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>Чаты<span class="nb" id="navBadgeChats" style="display:none"></span></a>
    <a href="/admin/bans" class="ni"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M4.93 4.93l14.14 14.14"/></svg>Баны</a>
    <a href="/admin/promos" class="ni"><svg viewBox="0 0 24 24"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><circle cx="7" cy="7" r="1.5" fill="currentColor" stroke="none"/></svg>Промокоды</a>
    <span class="ns">Система</span>
    <a href="/admin/reviews" class="ni"><svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>Отзывы</a>
  </nav>
  <div class="sb-foot">
    <button class="ni" onclick="doLogout()" style="color:rgba(232,99,79,.8)"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>Выйти</button>
  </div>
</div>

<!-- TOPBAR -->
<div class="tb">
  <button class="tb-back" id="tbBack" onclick="closeDetail()"><svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg></button>
  <span class="tb-title">Обслуживание</span>
</div>

<!-- WORKSPACE -->
<div class="workspace" id="workspace">

  <!-- RAIL -->
  <div class="rail">
    <div class="rail-switch">
      <button class="rs-btn active" id="tabTickets" onclick="switchMode('tickets')">Заявки <span class="badge-cnt" id="urgentBadge" style="display:none">0</span></button>
      <button class="rs-btn" id="tabSupports" onclick="switchMode('supports')">Обслуживание</button>
    </div>

    <div id="ticketsPane">
      <div class="rail-search">
        <div class="rail-search-box">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
          <input type="text" placeholder="Поиск..." id="searchInp" oninput="renderTicketList()"/>
        </div>
      </div>
      <div class="rail-filters">
        <button class="rf active" onclick="switchFilter('all',this)">Все <span id="cntAll">0</span></button>
        <button class="rf" onclick="switchFilter('open',this)">Открытые <span id="cntOpen">0</span></button>
        <button class="rf" onclick="switchFilter('done',this)">Закрытые <span id="cntDone">0</span></button>
      </div>
      <div class="rail-list" id="ticketsList"></div>
    </div>

    <div id="supportsPane" style="display:none;flex-direction:column;overflow:hidden;flex:1">
      <div class="rail-list" id="supportsList" style="flex:1"></div>
    </div>
  </div>

  <!-- DETAIL -->
  <div class="detail" id="detailPane">
    <div class="detail-empty">
      <svg viewBox="0 0 24 24"><path d="M2 9a3 3 0 010-6h20a3 3 0 010 6"/><path d="M2 15a3 3 0 000 6h20a3 3 0 000-6"/><path d="M6 12h12"/></svg>
      <span>Выберите заявку слева</span>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script type="module">
import { auth, db, ADMIN_EMAIL } from '../firebase-config.js';
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { collection, query, where, orderBy, getDocs, getCountFromServer, doc, updateDoc, deleteDoc, addDoc, serverTimestamp, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

let allTickets=[], allOrders=[], currentFilter='all', selectedId=null, mode='tickets';
const AVATAR_COLORS=['#1ede7b','#3b82f6','#8b5cf6','#f59e0b','#ec4899','#14b8a6','#6366f1'];
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function toast(m,t='info'){const el=document.getElementById('toast');el.textContent=m;el.className=`toast ${t} show`;setTimeout(()=>el.className='toast',3400);}
function fmtDT(ts){if(!ts)return'—';const d=ts.toDate?ts.toDate():new Date(ts);return d.toLocaleDateString('ru',{day:'numeric',month:'short'})+' '+d.toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});}
function toDate(ts){return ts?(ts.toDate?ts.toDate():new Date(ts)):null;}
function timeAgo(ts){
  const d=toDate(ts); if(!d) return '—';
  const min=Math.floor((Date.now()-d.getTime())/60000);
  if(min<1) return 'сейчас';
  if(min<60) return min+' мин';
  const h=Math.floor(min/60);
  if(h<24) return h+' ч';
  return Math.floor(h/24)+' дн';
}
function hoursSince(ts){const d=toDate(ts); if(!d) return 0; return(Date.now()-d.getTime())/36e5;}
function isUrgent(t){return t.status!=='done' && !t.adminReply && hoursSince(t.createdAt)>24;}
function initials(name){const p=String(name||'?').trim().split(/\s+/);return((p[0]?.[0]||'')+(p[1]?.[0]||'')).toUpperCase()||'?';}
function avatarColor(seed){let h=0;for(const c of String(seed||''))h=(h*31+c.charCodeAt(0))>>>0;return AVATAR_COLORS[h%AVATAR_COLORS.length];}

window.doLogout=async()=>{await signOut(auth);window.location.href='/';};
window.switchFilter=(f,btn)=>{currentFilter=f;document.querySelectorAll('.rf').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderTicketList();};
window.switchMode=m=>{
  mode=m;
  document.getElementById('tabTickets').classList.toggle('active',m==='tickets');
  document.getElementById('tabSupports').classList.toggle('active',m==='supports');
  document.getElementById('ticketsPane').style.display=m==='tickets'?'block':'none';
  document.getElementById('supportsPane').style.display=m==='supports'?'flex':'none';
};
window.selectTicket=id=>{
  selectedId=id;
  renderTicketList();
  renderDetail();
  if(window.matchMedia('(max-width:880px)').matches) document.getElementById('workspace').classList.add('detail-open');
};
window.closeDetail=()=>{document.getElementById('workspace').classList.remove('detail-open');};

function renderTicketList(){
  const el=document.getElementById('ticketsList');
  const q=(document.getElementById('searchInp').value||'').toLowerCase();
  let list=allTickets;
  if(currentFilter==='open') list=list.filter(t=>t.status!=='done');
  else if(currentFilter==='done') list=list.filter(t=>t.status==='done');
  if(q) list=list.filter(t=>(t.title||'').toLowerCase().includes(q)||(t.userName||'').toLowerCase().includes(q)||(t.userEmail||'').toLowerCase().includes(q)||(t.orderDomain||'').toLowerCase().includes(q));
  list=[...list].sort((a,b)=>(isUrgent(b)-isUrgent(a))||((b.createdAt?.seconds||0)-(a.createdAt?.seconds||0)));

  const open=allTickets.filter(t=>t.status!=='done').length;
  const done=allTickets.filter(t=>t.status==='done').length;
  const urgentCount=allTickets.filter(isUrgent).length;
  document.getElementById('cntAll').textContent=allTickets.length;
  document.getElementById('cntOpen').textContent=open;
  document.getElementById('cntDone').textContent=done;
  const ub=document.getElementById('urgentBadge');
  ub.style.display=urgentCount?'inline-flex':'none';ub.textContent=urgentCount;
  const nb=document.getElementById('navBadgeTickets');
  if(nb){nb.style.display=open?'':'none';nb.textContent=open;}

  if(!list.length){el.innerHTML=`<div class="rail-empty">Нет заявок по фильтру</div>`;return;}

  el.innerHTML=list.map(t=>{
    const urgent=isUrgent(t);
    return `<div class="trow${t.id===selectedId?' selected':''}${urgent?' urgent':''}" onclick="selectTicket('${t.id}')">
      <div class="trow-av" style="background:${avatarColor(t.userEmail||t.userName)}">${initials(t.userName)}</div>
      <div class="trow-mid">
        <div class="trow-top"><span class="trow-name">${esc(t.userName||'—')}</span><span class="trow-time">${timeAgo(t.createdAt)}</span></div>
        <div class="trow-subj">${t.adminReply?'<span class="trow-dot"></span>':''}${esc(t.title||'Без темы')}</div>
        ${urgent?'<span class="trow-urgent-tag">Ждёт ответа &gt;24ч</span>':''}
      </div>
    </div>`;
  }).join('');
}

function renderDetail(){
  const el=document.getElementById('detailPane');
  const t=allTickets.find(x=>x.id===selectedId);
  if(!t){el.innerHTML=`<div class="detail-empty"><svg viewBox="0 0 24 24"><path d="M2 9a3 3 0 010-6h20a3 3 0 010 6"/><path d="M2 15a3 3 0 000 6h20a3 3 0 000-6"/><path d="M6 12h12"/></svg><span>Выберите заявку слева</span></div>`;return;}
  const urgent=isUrgent(t);
  const orderChip=t.orderId
    ?`<a class="tc-order" href="/admin/orders?id=${t.orderId}"><svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>${esc(t.orderDomain||'№ '+t.orderId.slice(0,8).toUpperCase())}${t.orderSiteType?' · '+esc(t.orderSiteType):''}</a>`
    :`<span class="tc-no-order">⚠ Заказ не привязан</span>`;
  el.innerHTML=`
    <div class="dhead">
      <div class="dhead-top">
        <div class="dhead-av" style="background:${avatarColor(t.userEmail||t.userName)}">${initials(t.userName)}</div>
        <div>
          <div class="dhead-name">${esc(t.userName||'—')}</div>
          <div class="dhead-email">${esc(t.userEmail||'—')}</div>
        </div>
        <div class="dhead-badges">
          ${urgent?'<span class="badge b-urgent">Срочно</span>':`<span class="badge ${t.status==='done'?'b-done':'b-open'}">${t.status==='done'?'Закрыта':'Открыта'}</span>`}
        </div>
      </div>
      <div class="dhead-subj">${esc(t.title||'Без темы')}</div>
      <div class="dhead-meta">${orderChip}<span style="font-size:.78rem;color:var(--muted)">Создана ${fmtDT(t.createdAt)}</span></div>
    </div>
    <div class="dbody">
      ${t.description?`<div class="msg client"><div class="msg-lbl">${esc(t.userName||'Клиент')}</div>${esc(t.description)}</div>`:''}
      ${t.images&&t.images.length?`<div class="dbody-images">${t.images.map(src=>`<img class="tc-img" src="${src}" alt="" onclick="window.open('${src}','_blank')"/>`).join('')}</div>`:''}
      ${t.adminReply?`<div class="msg admin"><div class="msg-lbl">Вы</div>${esc(t.adminReply)}</div>`:''}
    </div>
    <div class="dcompose">
      <textarea class="tc-inp" id="replyInp" rows="3" placeholder="Написать ответ клиенту...">${esc(t.adminReply||'')}</textarea>
      <div class="tc-actions">
        <button class="btn btn-green btn-sm" onclick="saveReply('${t.id}','${esc(t.uid||'')}','${esc(t.title||'')}')">Сохранить ответ</button>
        ${t.status!=='done'
          ?`<button class="btn btn-dark btn-sm" onclick="closeTick('${t.id}')">Закрыть заявку</button>`
          :`<button class="btn btn-outline btn-sm" onclick="reopenTick('${t.id}')">Открыть снова</button>`}
        <button class="btn btn-danger btn-sm" onclick="deleteTick('${t.id}')">Удалить</button>
      </div>
    </div>`;
}

function renderSupports(){
  const el=document.getElementById('supportsList');
  const now=new Date();
  const active=allOrders.filter(o=>{
    if(!(o.supportActive===true||o.support===true))return false;
    if(o.supportExpiresAt){const exp=o.supportExpiresAt.toDate?o.supportExpiresAt.toDate():new Date(o.supportExpiresAt);return exp>now;}
    return true;
  });
  if(!active.length){el.innerHTML=`<div class="rail-empty">Нет активных обслуживаний</div>`;return;}
  const withMeta=active.map(o=>{
    let days=Infinity,pct=100,expiring=false;
    if(o.supportExpiresAt){
      const exp=o.supportExpiresAt.toDate?o.supportExpiresAt.toDate():new Date(o.supportExpiresAt);
      days=Math.ceil((exp-now)/864e5);pct=Math.max(0,Math.min(100,((exp-now)/(30*864e5))*100));expiring=days<3;
    }
    return{o,days,pct,expiring};
  }).sort((a,b)=>a.days-b.days);
  el.innerHTML=withMeta.map(({o,days,pct,expiring})=>`
    <div class="sup-row${expiring?' expiring':''}">
      <div class="sup-av" style="background:${avatarColor(o.clientEmail||o.clientName)}">${initials(o.clientName)}</div>
      <div class="sup-mid">
        <div class="sup-name">${esc(o.clientName||'—')}</div>
        <div class="sup-email">${esc(o.clientEmail||'—')}</div>
        ${days!==Infinity?`<div class="sup-prog"><div class="sup-prog-fill${expiring?' warn':''}" style="width:${pct}%"></div></div><div class="sup-days${expiring?' warn':''}">${days} дн. осталось</div>`:'<div class="sup-days">Бессрочно</div>'}
      </div>
      ${expiring?`<button class="sup-notify" onclick="notifyExpiry('${o.uid||''}')">🔔</button>`:''}
    </div>`).join('');
}

window.saveReply=async(id,uid,title)=>{
  const val=document.getElementById('replyInp')?.value.trim()||'';
  try{
    await updateDoc(doc(db,'service_tickets',id),{adminReply:val});
    if(uid&&val)await addDoc(collection(db,'notifications',uid,'items'),{title:'💬 Ответ на заявку',text:`«${title}»: ${val}`,read:false,createdAt:serverTimestamp()}).catch(()=>{});
    toast('Ответ сохранён и клиент уведомлён ✓','success');
    await loadTickets();renderTicketList();renderDetail();
  }catch(e){toast('Ошибка','error');}
};
window.closeTick=async id=>{
  try{await updateDoc(doc(db,'service_tickets',id),{status:'done'});toast('Закрыта ✓','success');await loadTickets();renderTicketList();renderDetail();}
  catch(e){toast('Ошибка','error');}
};
window.reopenTick=async id=>{
  try{await updateDoc(doc(db,'service_tickets',id),{status:'open'});toast('Открыта','info');await loadTickets();renderTicketList();renderDetail();}
  catch(e){toast('Ошибка','error');}
};
window.deleteTick=async id=>{
  if(!confirm('Удалить заявку?'))return;
  try{
    await deleteDoc(doc(db,'service_tickets',id));
    if(selectedId===id){selectedId=null;closeDetail();}
    toast('Удалена','info');await loadTickets();renderTicketList();renderDetail();
  }catch(e){toast('Ошибка','error');}
};
window.notifyExpiry=async uid=>{
  if(!uid)return;
  try{
    await addDoc(collection(db,'notifications',uid,'items'),{title:'⚠️ Обслуживание заканчивается',text:'До окончания обслуживания осталось менее 3 дней. Свяжитесь с поддержкой для продления.',read:false,createdAt:serverTimestamp()});
    toast('Уведомление отправлено ✓','success');
  }catch(e){toast('Ошибка','error');}
};

async function loadTickets(){
  try{
    const snap=await getDocs(collection(db,'service_tickets'));
    allTickets=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>{
      if((a.status==='done')!==(b.status==='done'))return a.status==='done'?1:-1;
      return(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0);
    });
  }catch(e){console.error(e);}
}

onAuthStateChanged(auth,async user=>{
  if(!user){document.getElementById('loadingScreen').style.display='none';window.location.href='/';return;}
  let isAdmin=user.email===ADMIN_EMAIL;
  try{const t=await user.getIdTokenResult(true);if(t.claims&&t.claims.admin===true)isAdmin=true;}catch(e){}
  document.getElementById('loadingScreen').style.display='none';
  if(!isAdmin){window.location.href='/';return;}
  getCountFromServer(query(collection(db,'orders'),where('refundStatus','==','requested'))).then(s=>{const n=s.data().count;const b=document.getElementById('navBadgeOrders');if(b){b.style.display=n?'':'none';b.textContent=n;}}).catch(()=>{});
  await loadTickets();renderTicketList();renderDetail();
  onSnapshot(query(collection(db,'orders'),orderBy('createdAt','desc')),snap=>{
    allOrders=snap.docs.map(d=>({id:d.id,...d.data()}));
    renderSupports();
  });
  setInterval(async()=>{await loadTickets();renderTicketList();renderDetail();},30000);
});
</script>

<script src="../maintenance.js"></script>
