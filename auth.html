<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Вход — Design Antviz</title>
  <link rel="icon" href="favicon.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;600;900&family=Onest:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0a0a0c;--bg2:#111116;--bg3:#18181f;--card:#16161d;--border:rgba(255,255,255,0.07);--accent:#6c63ff;--accent2:#a78bfa;--accent3:#38bdf8;--text:#f0f0f5;--muted:#777789;--success:#4ade80;--error:#f87171}
    html{scroll-behavior:smooth}
    body{background:var(--bg);color:var(--text);font-family:'Onest',sans-serif;font-weight:300;line-height:1.65;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem}
    body::before{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(108,99,255,.18) 0%,transparent 70%);pointer-events:none}
    .auth-card{position:relative;z-index:1;background:var(--card);border:1px solid var(--border);border-radius:28px;padding:2.5rem 2.8rem;width:100%;max-width:420px;box-shadow:0 30px 80px rgba(0,0,0,.5)}
    .auth-logo{display:flex;align-items:center;gap:10px;font-family:'Unbounded',sans-serif;font-weight:600;font-size:.9rem;text-decoration:none;color:var(--text);margin-bottom:2rem}
    .logo-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent);animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.3)}}
    .auth-title{font-family:'Unbounded',sans-serif;font-weight:700;font-size:1.6rem;line-height:1.1;margin-bottom:.4rem}
    .auth-sub{color:var(--muted);font-size:.85rem;margin-bottom:2rem}
    .tabs{display:flex;gap:.5rem;background:var(--bg3);border-radius:14px;padding:4px;margin-bottom:1.8rem}
    .tab-btn{flex:1;background:none;border:none;color:var(--muted);font-family:'Onest',sans-serif;font-size:.82rem;font-weight:500;padding:.55rem;border-radius:10px;cursor:pointer;transition:all .2s}
    .tab-btn.active{background:var(--accent);color:#fff}
    .form-group{margin-bottom:1rem}
    .form-label{display:block;font-size:.7rem;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:.45rem}
    .form-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:.75rem 1rem;color:var(--text);font-family:'Onest',sans-serif;font-size:.9rem;font-weight:300;outline:none;transition:border-color .2s,box-shadow .2s;-webkit-appearance:none}
    .form-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(108,99,255,.12)}
    .form-input.err{border-color:var(--error)!important}
    .err-msg{color:var(--error);font-size:.72rem;margin-top:.25rem;display:none}
    .err-msg.show{display:block}
    .btn-submit{width:100%;background:var(--accent);color:#fff;border:none;border-radius:50px;padding:.9rem;font-family:'Onest',sans-serif;font-size:.95rem;font-weight:500;cursor:pointer;transition:box-shadow .2s,transform .15s,opacity .2s;margin-top:1.2rem;display:flex;align-items:center;justify-content:center;gap:.5rem}
    .btn-submit:hover{box-shadow:0 6px 30px rgba(108,99,255,.45);transform:translateY(-2px)}
    .btn-submit:disabled{opacity:.55;cursor:default;transform:none!important;box-shadow:none!important}
    .divider{display:flex;align-items:center;gap:.75rem;margin:1.4rem 0;color:var(--muted);font-size:.75rem}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
    .btn-google{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:50px;padding:.8rem;font-family:'Onest',sans-serif;font-size:.9rem;font-weight:400;cursor:pointer;transition:border-color .2s,box-shadow .2s;display:flex;align-items:center;justify-content:center;gap:.7rem}
    .btn-google:hover{border-color:rgba(108,99,255,.4);box-shadow:0 4px 20px rgba(0,0,0,.3)}
    .google-icon{width:18px;height:18px}
    .toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(20px);z-index:300;padding:.65rem 1.4rem;border-radius:50px;font-size:.8rem;font-weight:500;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;white-space:nowrap}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .toast.success{background:var(--success);color:#000}
    .toast.error{background:var(--error);color:#fff}
    .tab-panel{display:none}.tab-panel.active{display:block}
    .back-link{display:block;text-align:center;color:var(--muted);font-size:.8rem;text-decoration:none;margin-top:1.5rem;transition:color .2s}
    .back-link:hover{color:var(--text)}
  </style>
</head>
<body>

<div class="auth-card">
  <a href="index.html" class="auth-logo"><span class="logo-dot"></span>Design Antviz</a>
  <h1 class="auth-title">Добро<br>пожаловать</h1>
  <p class="auth-sub">Войдите или создайте аккаунт</p>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('login')">Войти</button>
    <button class="tab-btn" onclick="switchTab('register')">Регистрация</button>
  </div>

  <!-- LOGIN -->
  <div class="tab-panel active" id="panel-login">
    <div class="form-group">
      <label class="form-label">Email</label>
      <input class="form-input" type="email" id="l-email" placeholder="your@email.com" />
      <div class="err-msg" id="err-l-email"></div>
    </div>
    <div class="form-group">
      <label class="form-label">Пароль</label>
      <input class="form-input" type="password" id="l-pass" placeholder="••••••••" />
      <div class="err-msg" id="err-l-pass"></div>
    </div>
    <button class="btn-submit" id="loginBtn" onclick="doLogin()">
      Войти
    </button>
    <div class="divider">или</div>
    <button class="btn-google" onclick="doGoogle()">
      <svg class="google-icon" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Войти через Google
    </button>
  </div>

  <!-- REGISTER -->
  <div class="tab-panel" id="panel-register">
    <div class="form-group">
      <label class="form-label">Ваше имя <span style="color:var(--accent2)">*</span></label>
      <input class="form-input" type="text" id="r-name" placeholder="Как вас зовут?" />
      <div class="err-msg" id="err-r-name">Введите ваше имя</div>
    </div>
    <div class="form-group">
      <label class="form-label">Email <span style="color:var(--accent2)">*</span></label>
      <input class="form-input" type="email" id="r-email" placeholder="your@email.com" />
      <div class="err-msg" id="err-r-email"></div>
    </div>
    <div class="form-group">
      <label class="form-label">Пароль <span style="color:var(--accent2)">*</span></label>
      <input class="form-input" type="password" id="r-pass" placeholder="Минимум 6 символов" />
      <div class="err-msg" id="err-r-pass"></div>
    </div>
    <button class="btn-submit" id="registerBtn" onclick="doRegister()">
      Создать аккаунт
    </button>
    <div class="divider">или</div>
    <button class="btn-google" onclick="doGoogle()">
      <svg class="google-icon" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Регистрация через Google
    </button>
  </div>

  <a href="index.html" class="back-link">← Вернуться на главную</a>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { auth, db } from './firebase-config.js';
  import {
    signInWithEmailAndPassword,
    createUserWithEmailAndPassword,
    GoogleAuthProvider,
    signInWithPopup,
    onAuthStateChanged,
    updateProfile
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { doc, setDoc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // Если уже залогинен — сразу на профиль
  onAuthStateChanged(auth, user => {
    if (user) window.location.href = 'profile.html';
  });

  function toast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type} show`;
    setTimeout(() => t.className = 'toast', 3000);
  }

  function setLoading(btnId, loading) {
    const btn = document.getElementById(btnId);
    btn.disabled = loading;
    btn.textContent = loading ? 'Подождите...' : (btnId === 'loginBtn' ? 'Войти' : 'Создать аккаунт');
  }

  // Сохраняем профиль в Firestore при первом входе
  async function saveUserProfile(user, displayName) {
    const ref = doc(db, 'users', user.uid);
    const snap = await getDoc(ref);
    if (!snap.exists()) {
      await setDoc(ref, {
        uid: user.uid,
        name: displayName || user.displayName || 'Пользователь',
        email: user.email,
        createdAt: serverTimestamp(),
        ordersCount: 0
      });
    }
  }

  window.switchTab = function(tab) {
    document.querySelectorAll('.tab-btn').forEach((b, i) =>
      b.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'))
    );
    document.getElementById('panel-login').classList.toggle('active', tab === 'login');
    document.getElementById('panel-register').classList.toggle('active', tab === 'register');
  };

  window.doLogin = async function() {
    const email = document.getElementById('l-email').value.trim();
    const pass = document.getElementById('l-pass').value;
    let ok = true;
    const ee = document.getElementById('err-l-email');
    const ep = document.getElementById('err-l-pass');
    ee.className = 'err-msg'; ep.className = 'err-msg';
    if (!email) { ee.textContent = 'Введите email'; ee.className = 'err-msg show'; ok = false; }
    if (!pass) { ep.textContent = 'Введите пароль'; ep.className = 'err-msg show'; ok = false; }
    if (!ok) return;
    setLoading('loginBtn', true);
    try {
      await signInWithEmailAndPassword(auth, email, pass);
      // onAuthStateChanged сам перенаправит
    } catch(e) {
      setLoading('loginBtn', false);
      const msg = e.code === 'auth/invalid-credential' ? 'Неверный email или пароль'
        : e.code === 'auth/too-many-requests' ? 'Слишком много попыток, подождите'
        : 'Ошибка входа: ' + e.message;
      toast(msg, 'error');
    }
  };

  window.doRegister = async function() {
    const name = document.getElementById('r-name').value.trim();
    const email = document.getElementById('r-email').value.trim();
    const pass = document.getElementById('r-pass').value;
    let ok = true;
    const en = document.getElementById('err-r-name');
    const ee = document.getElementById('err-r-email');
    const ep = document.getElementById('err-r-pass');
    en.className = 'err-msg'; ee.className = 'err-msg'; ep.className = 'err-msg';
    if (!name) { en.className = 'err-msg show'; ok = false; }
    if (!email) { ee.textContent = 'Введите email'; ee.className = 'err-msg show'; ok = false; }
    if (pass.length < 6) { ep.textContent = 'Минимум 6 символов'; ep.className = 'err-msg show'; ok = false; }
    if (!ok) return;
    setLoading('registerBtn', true);
    try {
      const cred = await createUserWithEmailAndPassword(auth, email, pass);
      await updateProfile(cred.user, { displayName: name });
      await saveUserProfile(cred.user, name);
      // onAuthStateChanged перенаправит
    } catch(e) {
      setLoading('registerBtn', false);
      const msg = e.code === 'auth/email-already-in-use' ? 'Этот email уже зарегистрирован'
        : e.code === 'auth/invalid-email' ? 'Некорректный email'
        : 'Ошибка регистрации: ' + e.message;
      toast(msg, 'error');
    }
  };

  window.doGoogle = async function() {
    const provider = new GoogleAuthProvider();
    try {
      const cred = await signInWithPopup(auth, provider);
      await saveUserProfile(cred.user, cred.user.displayName);
      // onAuthStateChanged перенаправит
    } catch(e) {
      if (e.code !== 'auth/popup-closed-by-user') {
        toast('Ошибка Google входа', 'error');
      }
    }
  };
</script>
</body>
</html>
