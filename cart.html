<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Корзина — Design Antviz</title>
  <link rel="icon" href="favicon.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;600;900&family=Onest:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0a0a0c; --bg2: #111116; --bg3: #18181f; --card: #16161d; --border: rgba(255,255,255,0.07); --accent: #6c63ff; --accent2: #a78bfa; --accent3: #38bdf8; --text: #f0f0f5; --muted: #777789; --success: #4ade80; --error: #f87171; }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: 'Onest', sans-serif; font-weight: 300; line-height: 1.65; overflow-x: hidden; min-height: 100vh; }
    body::before { content: ''; position: fixed; inset: 0; z-index: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E"); pointer-events: none; }
    nav.desktop-nav { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem; height: 52px; width: calc(100% - 40px); max-width: 1100px; background: rgba(22,22,30,0.82); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 28px; box-shadow: 0 4px 30px rgba(0,0,0,.4); }
    .logo { font-family: 'Unbounded', sans-serif; font-weight: 600; font-size: 0.9rem; letter-spacing: .04em; color: var(--text); text-decoration: none; display: flex; align-items: center; gap: 10px; }
    .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 12px var(--accent); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.6;transform:scale(1.3)} }
    .nav-links { display: flex; gap: 1.5rem; align-items: center; }
    .nav-links a { color: var(--muted); text-decoration: none; font-size: .8rem; letter-spacing: .02em; transition: color .2s; }
    .nav-links a:hover { color: var(--text); }
    .nav-cta { background: var(--accent) !important; color: #fff !important; padding: .4rem 1.1rem; border-radius: 50px; font-weight: 500 !important; }
    .cart-badge { position: absolute; top: -6px; right: -10px; width: 18px; height: 18px; border-radius: 50%; background: var(--accent); color: #fff; font-size: .65rem; font-weight: 700; display: none; align-items: center; justify-content: center; }
    .cart-badge.show { display: flex; }
    .cart-link { position: relative; }

    .page-wrap { padding: 110px 5vw 80px; max-width: 700px; margin: 0 auto; }
    .breadcrumb { color: var(--muted); font-size: .8rem; margin-bottom: 1.5rem; }
    .breadcrumb a { color: var(--muted); text-decoration: none; }
    .page-title { font-family: 'Unbounded', sans-serif; font-weight: 900; font-size: clamp(2rem, 5vw, 3rem); line-height: 1.08; letter-spacing: -.03em; margin-bottom: 2rem; }
    .page-title span { color: var(--accent2); }

    .cart-list { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 2rem; }
    .cart-item { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; display: flex; align-items: center; gap: 1rem; }
    .cart-item-info { flex-grow: 1; }
    .cart-item-info h3 { font-weight: 500; font-size: .95rem; margin-bottom: .3rem; }
    .cart-item-info p { color: var(--muted); font-size: .8rem; }
    .cart-item-price { font-family: 'Unbounded', sans-serif; font-weight: 600; font-size: 1.1rem; white-space: nowrap; }
    .cart-item-actions { display: flex; align-items: center; gap: .5rem; }
    .btn-qty { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border); background: var(--bg3); color: var(--text); cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; transition: border-color .2s; }
    .btn-qty:hover { border-color: var(--accent2); }
    .btn-remove { background: none; border: none; color: var(--error); cursor: pointer; font-size: .8rem; padding: .3rem .6rem; border-radius: 6px; transition: background .2s; }
    .btn-remove:hover { background: rgba(248,113,113,.1); }

    .cart-empty { text-align: center; padding: 4rem 2rem; color: var(--muted); }
    .cart-empty h3 { font-family: 'Unbounded', sans-serif; margin-bottom: .5rem; color: var(--text); }

    .cart-total { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; text-align: right; margin-bottom: 2rem; }
    .cart-total-label { color: var(--muted); font-size: .8rem; margin-bottom: .3rem; }
    .cart-total-amount { font-family: 'Unbounded', sans-serif; font-weight: 900; font-size: 2rem; color: var(--accent2); }
    .cart-total-note { color: var(--muted); font-size: .72rem; }

    .btn { display: inline-flex; align-items: center; gap: 8px; padding: .8rem 2rem; border-radius: 50px; font-family: 'Onest', sans-serif; font-size: .9rem; font-weight: 500; text-decoration: none; cursor: pointer; border: none; transition: transform .15s, box-shadow .2s; }
    .btn:hover { transform: translateY(-2px); }
    .btn-primary { background: var(--accent); color: #fff; box-shadow: 0 4px 20px rgba(108,99,255,.3); width: 100%; justify-content: center; }
    .btn-primary:hover { box-shadow: 0 6px 30px rgba(108,99,255,.5); }
    .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); }
    .btn-ghost:hover { border-color: var(--accent); color: var(--text); }

    footer { border-top: 1px solid var(--border); padding: 3rem 5vw; display: flex; gap: 2rem; align-items: center; justify-content: space-between; flex-wrap: wrap; }
    footer p { color: var(--muted); font-size: .8rem; }
    .footer-links { display: flex; gap: 1.5rem; }
    .footer-links a { color: var(--muted); text-decoration: none; font-size: .8rem; transition: color .2s; }
    .footer-links a:hover { color: var(--text); }

    .mobile-nav-bar { display: none; position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); z-index: 200; background: rgba(22,22,30,0.88); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,.12); border-radius: 28px; padding: 10px 20px; width: calc(100% - 32px); max-width: 420px; justify-content: space-around; align-items: center; box-shadow: 0 8px 40px rgba(0,0,0,.5); }
    .mobile-nav-item { display: flex; flex-direction: column; align-items: center; gap: 3px; text-decoration: none; color: var(--muted); font-size: .62rem; letter-spacing: .04em; padding: 6px 10px; border-radius: 18px; transition: background .18s, color .18s; position: relative; }
    .mobile-nav-item svg { width: 20px; height: 20px; }
    .mobile-nav-item.active { color: var(--accent2); background: rgba(108,99,255,.13); }
    .mobile-cart-badge { position: absolute; top: 2px; right: 2px; width: 14px; height: 14px; border-radius: 50%; background: var(--accent); color: #fff; font-size: .55rem; font-weight: 700; display: none; align-items: center; justify-content: center; }
    .mobile-cart-badge.show { display: flex; }

    @media (max-width: 768px) {
      .desktop-nav { display: none; }
      .page-wrap { padding: 85px 5vw 100px; }
      .cart-item { flex-wrap: wrap; }
      .mobile-nav-bar { display: flex; }
      body { padding-bottom: 90px; }
      footer { flex-direction: column; gap: 1rem; text-align: center; }
      .footer-links { justify-content: center; }
    }
  </style>
</head>
<body>
<nav class="desktop-nav">
  <a class="logo" href="index.html"><span class="logo-dot"></span>Design Antviz</a>
  <div class="nav-links">
    <a href="index.html">Главная</a>
    <a href="services.html">Услуги</a>
    <a href="pricing.html">Цены</a>
    <a href="cart.html" class="cart-link">Корзина <span class="cart-badge" id="desktopCartBadge">0</span></a>
    <a href="faq.html">FAQ</a>
    <a href="contact.html" class="nav-cta">Заказать сайт</a>
  </div>
</nav>

<div class="page-wrap">
  <div class="breadcrumb"><a href="index.html">Главная</a> / Корзина</div>
  <h1 class="page-title">Корзина<br /><span>ваш заказ</span></h1>

  <div id="cartContent"></div>
</div>

<footer>
  <a class="logo" href="index.html"><span class="logo-dot"></span>Design Antviz</a>
  <p>© 2025 Design Antviz. Все права защищены.</p>
  <div class="footer-links"><a href="services.html">Услуги</a><a href="pricing.html">Цены</a><a href="cart.html">Корзина</a><a href="contact.html">Контакты</a></div>
</footer>

<nav class="mobile-nav-bar">
  <a href="index.html" class="mobile-nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>Главная</a>
  <a href="services.html" class="mobile-nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="8" height="8" rx="1.5"/><rect x="13" y="3" width="8" height="8" rx="1.5"/><rect x="3" y="13" width="8" height="8" rx="1.5"/><rect x="13" y="13" width="8" height="8" rx="1.5"/></svg>Услуги</a>
  <a href="cart.html" class="mobile-nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 01-8 0"/></svg>Корзина <span class="mobile-cart-badge" id="mobileCartBadge">0</span></a>
  <a href="contact.html" class="mobile-nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>Заказать</a>
</nav>

<script>
  function getCart() { try { return JSON.parse(localStorage.getItem('antviz_cart') || '[]'); } catch(e) { return []; } }
  function saveCart(cart) { localStorage.setItem('antviz_cart', JSON.stringify(cart)); updateCartBadges(); renderCart(); }
  function updateCartBadges() {
    const cart = getCart();
    const totalItems = cart.reduce((sum, item) => sum + item.qty, 0);
    ['desktopCartBadge', 'mobileCartBadge'].forEach(id => {
      const badge = document.getElementById(id);
      if (badge) { badge.textContent = totalItems; badge.classList.toggle('show', totalItems > 0); }
    });
  }

  function removeItem(index) {
    const cart = getCart();
    cart.splice(index, 1);
    saveCart(cart);
  }
  function changeQty(index, delta) {
    const cart = getCart();
    cart[index].qty += delta;
    if (cart[index].qty < 1) cart[index].qty = 1;
    saveCart(cart);
  }

  function renderCart() {
    const cart = getCart();
    const container = document.getElementById('cartContent');
    if (cart.length === 0) {
      container.innerHTML = `<div class="cart-empty"><h3>Корзина пуста</h3><p>Добавьте услуги из <a href="services.html" style="color:var(--accent2);">раздела услуг</a> или выберите <a href="pricing.html" style="color:var(--accent2);">тариф</a>.</p></div>`;
      updateCartBadges();
      return;
    }
    let totalMin = 0;
    let html = '<div class="cart-list">';
    cart.forEach((item, i) => {
      const minCost = item.pricePerPage * item.minPages * item.qty;
      totalMin += minCost;
      html += `<div class="cart-item">
        <div class="cart-item-info">
          <h3>${item.name}</h3>
          <p>${item.pricePerPage} ₽/стр · мин. ${item.minPages} стр · от ${minCost} ₽</p>
        </div>
        <div class="cart-item-actions">
          <button class="btn-qty" onclick="changeQty(${i}, -1)">−</button>
          <span style="min-width:24px;text-align:center;">${item.qty}</span>
          <button class="btn-qty" onclick="changeQty(${i}, 1)">+</button>
          <button class="btn-remove" onclick="removeItem(${i})">✕</button>
        </div>
      </div>`;
    });
    html += '</div>';
    html += `<div class="cart-total"><div class="cart-total-label">Примерная стоимость (без учёта точного количества страниц):</div><div class="cart-total-amount">от ${totalMin} ₽</div><div class="cart-total-note">Точная цена — после обсуждения в Telegram</div></div>`;
    html += `<a href="contact.html" class="btn btn-primary" style="width:100%;">Оформить заявку <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></a>`;
    container.innerHTML = html;
    updateCartBadges();
  }

  renderCart();
  updateCartBadges();
</script>
</body>
</html>
