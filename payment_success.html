<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оплата прошла — Antviz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;500;600;700&family=Onest:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #0a0a0c;
            min-height: 100vh;
            font-family: 'Onest', sans-serif;
            color: #f0f0f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .card {
            max-width: 520px;
            width: 100%;
            background: #111114;
            border: 1px solid rgba(255,255,255,.07);
            border-radius: 24px;
            padding: 56px 48px 48px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* subtle glow behind the checkmark */
        .card::before {
            content: '';
            position: absolute;
            top: -60px;
            left: 50%;
            transform: translateX(-50%);
            width: 320px;
            height: 320px;
            background: radial-gradient(circle, rgba(167,139,250,.12) 0%, transparent 70%);
            pointer-events: none;
        }

        /* checkmark circle */
        .check-wrap {
            width: 88px;
            height: 88px;
            margin: 0 auto 36px;
            position: relative;
        }

        .check-circle {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            border: 2px solid rgba(167,139,250,.15);
            background: rgba(167,139,250,.06);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pop-in .5s cubic-bezier(.34,1.56,.64,1) both;
            animation-delay: .1s;
        }

        @keyframes pop-in {
            from { transform: scale(0.5); opacity: 0; }
            to   { transform: scale(1);   opacity: 1; }
        }

        /* SVG check animation */
        .check-svg {
            width: 42px;
            height: 42px;
        }

        .check-path {
            stroke: #a78bfa;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
            stroke-dasharray: 60;
            stroke-dashoffset: 60;
            animation: draw-check .5s ease forwards;
            animation-delay: .45s;
        }

        @keyframes draw-check {
            to { stroke-dashoffset: 0; }
        }

        /* ring pulse */
        .ring-pulse {
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            border: 1.5px solid rgba(167,139,250,.3);
            animation: ring-out .8s ease-out forwards;
            animation-delay: .7s;
            opacity: 0;
        }

        @keyframes ring-out {
            0%   { transform: scale(1);   opacity: .6; }
            100% { transform: scale(1.35); opacity: 0; }
        }

        .title {
            font-family: 'Unbounded', sans-serif;
            font-weight: 600;
            font-size: clamp(22px, 5vw, 28px);
            letter-spacing: -.03em;
            color: #f0f0f5;
            margin-bottom: 14px;
            animation: fade-up .5s ease both;
            animation-delay: .55s;
        }

        .subtitle {
            font-size: 16px;
            line-height: 1.65;
            color: rgba(255,255,255,.38);
            max-width: 380px;
            margin: 0 auto 40px;
            animation: fade-up .5s ease both;
            animation-delay: .65s;
        }

        @keyframes fade-up {
            from { transform: translateY(10px); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #a78bfa;
            color: #0a0a0c;
            font-family: 'Unbounded', sans-serif;
            font-weight: 600;
            font-size: 14px;
            letter-spacing: -.01em;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 14px;
            transition: background .2s, transform .15s;
            animation: fade-up .5s ease both;
            animation-delay: .75s;
        }

        .btn:hover {
            background: #c4b5fd;
            transform: translateY(-1px);
        }
        .btn:active { transform: translateY(0); }

        .btn svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }

        .divider {
            width: 40px;
            height: 1px;
            background: rgba(255,255,255,.07);
            margin: 36px auto 0;
            animation: fade-up .5s ease both;
            animation-delay: .85s;
        }

        .note {
            margin-top: 20px;
            font-size: 13px;
            color: rgba(255,255,255,.2);
            line-height: 1.6;
            animation: fade-up .5s ease both;
            animation-delay: .9s;
        }

        .note a {
            color: rgba(167,139,250,.6);
            text-decoration: none;
            transition: color .2s;
        }
        .note a:hover { color: #a78bfa; }

        /* brand watermark at bottom */
        .brand {
            margin-top: 48px;
            font-family: 'Unbounded', sans-serif;
            font-size: 11px;
            font-weight: 500;
            color: rgba(255,255,255,.1);
            letter-spacing: .04em;
            text-transform: uppercase;
            animation: fade-up .5s ease both;
            animation-delay: 1s;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="check-wrap">
            <div class="check-circle">
                <svg class="check-svg" viewBox="0 0 42 42" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path class="check-path" d="M10 21.5L17.5 29L32 13"/>
                </svg>
            </div>
            <div class="ring-pulse"></div>
        </div>

        <h1 class="title">Оплата прошла!</h1>
        <p class="subtitle">Платёж успешно подтверждён. Все готово — посмотрите статус в личном кабинете.</p>

        <a href="https://antviz.ru/profile" class="btn">
            Перейти в профиль
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 8h10M9 4l4 4-4 4"/>
            </svg>
        </a>

        <div class="divider"></div>
        <p class="note">
            Вопросы? Напишите на <a href="mailto:support@antviz.ru">support@antviz.ru</a><br>
            или в <a href="https://antviz.ru/profile/support">чат поддержки</a>.
        </p>
    </div>

    <div class="brand">Antviz</div>

</body>
</html>
