<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Оплата прошла успешно — Antviz</title>
  <meta name="description" content="Ваш платёж успешно подтверждён. Спасибо, что выбрали Antviz." />
  <link rel="canonical" href="https://antviz.ru/payment-success" />
  <link rel="icon" href="img/favicon.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Geologica:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #1ede7b;
      --green-h: #1ac16b;
      --green-d: #149955;
      --green-light: #d2f8e5;
      --bg: #fff;
      --bg2: #f2f4f7;
      --bg3: #f9fafc;
      --text: #191b1e;
      --muted: #707a8a;
      --border: #dfe3e8;
      --border2: #cbcdd6;
      --dark: #191b1e;
      --dark2: #2b2f33;
      --sh1: 0 4px 16px rgba(0,51,153,.04), 0 2px 2px rgba(0,51,153,.08);
      --sh2: 0 8px 20px rgba(0,51,153,.08), 0 4px 8px rgba(0,51,153,.08);
      --font: 'Geologica', 'Inter', 'Arial', sans-serif;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-weight: 300;
      line-height: 1.5;
      letter-spacing: -0.02em;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }

    .success-card {
      max-width: 540px;
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 48px;
      padding: 64px 48px 48px;
      text-align: center;
      box-shadow: var(--sh2);
      position: relative;
      overflow: hidden;
    }
    @media (max-width: 600px) {
      .success-card { padding: 40px 24px 32px; border-radius: 32px; }
    }

    .success-card::before {
      content: '';
      position: absolute;
      top: -80px;
      left: 50%;
      transform: translateX(-50%);
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(30,222,123,.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .icon-wrap {
      width: 96px;
      height: 96px;
      margin: 0 auto 32px;
      position: relative;
    }
    .icon-circle {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: var(--green-light);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pop-in .5s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes pop-in {
      from { transform: scale(0.4); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .icon-circle svg { width: 44px; height: 44px; }

    .ring-pulse {
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 2px solid rgba(30,222,123,.25);
      animation: ring-out .9s ease-out forwards;
      animation-delay: .5s;
      opacity: 0;
    }
    @keyframes ring-out {
      0% { transform: scale(1); opacity: .5; }
      100% { transform: scale(1.4); opacity: 0; }
    }

    .success-title {
      font-size: clamp(28px, 5vw, 38px);
      font-weight: 600;
      letter-spacing: -0.03em;
      margin-bottom: 12px;
      animation: fade-up .5s ease both;
      animation-delay: .2s;
    }
    .success-title em { font-style: normal; color: var(--green); }

    .success-desc {
      font-size: 16px;
      color: var(--muted);
      line-height: 1.7;
      max-width: 380px;
      margin: 0 auto 32px;
      animation: fade-up .5s ease both;
      animation-delay: .3s;
    }

    @keyframes fade-up {
      from { transform: translateY(12px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
      animation: fade-up .5s ease both;
      animation-delay: .4s;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: var(--font);
      font-weight: 500;
      text-decoration: none;
      border: none;
      border-radius: 12px;
      padding: 16px 32px;
      font-size: 16px;
      letter-spacing: -0.01em;
      transition: background .15s, transform .12s, box-shadow .15s;
      cursor: pointer;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn-primary {
      background: var(--dark);
      color: #fff;
    }
    .btn-primary:hover { background: var(--dark2); }
    .btn-secondary {
      background: transparent;
      border: 1.5px solid var(--border);
      color: var(--text);
    }
    .btn-secondary:hover { border-color: var(--border2); background: var(--bg2); }

    .support-link {
      display: inline-block;
      margin-top: 20px;
      font-size: 14px;
      color: var(--muted);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color .2s, color .2s;
    }
    .support-link:hover { color: var(--text); border-color: var(--border); }

    #site-footer {
      margin-top: 40px;
      width: 100%;
      max-width: 540px;
    }
  </style>
</head>
<body>

  <div class="success-card">
    <div class="icon-wrap">
      <div class="icon-circle">
        <svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M9 22.5L18.5 32L35 12" stroke="#149955" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="ring-pulse"></div>
    </div>

    <h1 class="success-title">Оплата <em>прошла</em></h1>
    <p class="success-desc">Спасибо, что выбрали Antviz. Все готово — посмотрите статус в личном кабинете.</p>

    <div class="btn-group">
      <a href="profile" class="btn btn-primary">Перейти в личный кабинет</a>
      <a href="/" class="btn btn-secondary">На главную</a>
    </div>

    <a href="profile/support" class="support-link">Есть вопросы? Напишите в поддержку</a>
  </div>

  <div id="site-footer"></div>
  <script src="footer.js"></script>
</body>
</html>
