<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WHOIS Проверка</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#111827;
    color:#fff;
    margin:0;
    padding:40px 20px;
}

.container{
    max-width:900px;
    margin:auto;
}

h1{
    text-align:center;
    margin-bottom:30px;
}

.search-box{
    display:flex;
    gap:10px;
    margin-bottom:30px;
}

input{
    flex:1;
    padding:15px;
    border:none;
    border-radius:12px;
    font-size:16px;
}

button{
    padding:15px 25px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    background:#3b82f6;
    color:white;
    font-size:16px;
}

button:hover{
    opacity:.9;
}

.result{
    background:#1f2937;
    border-radius:16px;
    padding:25px;
    white-space:pre-wrap;
    line-height:1.7;
}

.loading{
    text-align:center;
}
</style>
</head>
<body>

<div class="container">
    <h1>WHOIS / RDAP Lookup</h1>

    <div class="search-box">
        <input id="domain" placeholder="example.com">
        <button onclick="lookup()">Проверить</button>
    </div>

    <div class="result" id="result">
Введите домен и нажмите "Проверить"
    </div>
</div>

<script>

async function lookup(){

    const domain = document.getElementById('domain').value
        .trim()
        .replace(/^https?:\/\//,'')
        .replace(/^www\./,'')
        .split('/')[0];

    if(!domain){
        alert('Введите домен');
        return;
    }

    const result = document.getElementById('result');
    result.innerHTML = '<div class="loading">Загрузка...</div>';

    try{

        // rdap.org автоматически перенаправляет на нужный реестр
        const response = await fetch(
            `https://rdap.org/domain/${domain}`
        );

        if(!response.ok){
            throw new Error('Домен не найден');
        }

        const data = await response.json();

        let created = '-';
        let updated = '-';
        let expires = '-';

        if(data.events){
            data.events.forEach(event => {
                if(event.eventAction === 'registration')
                    created = event.eventDate;

                if(event.eventAction === 'last changed')
                    updated = event.eventDate;

                if(event.eventAction === 'expiration')
                    expires = event.eventDate;
            });
        }

        let nameservers = '';

        if(data.nameservers){
            nameservers = data.nameservers
                .map(ns => ns.ldhName)
                .join('\n');
        }

        result.textContent =
`Домен: ${data.ldhName || '-'}

Регистратор:
${data.entities?.[0]?.vcardArray?.[1]?.find(v => v[0] === 'fn')?.[3] || '-'}

Дата регистрации:
${created}

Дата обновления:
${updated}

Дата окончания:
${expires}

Статус:
${data.status?.join(', ') || '-'}

Nameservers:
${nameservers || '-'}

DNSSEC:
${data.secureDNS ? 'Включен' : 'Нет'}
`;

    }catch(e){
        result.textContent =
            'Не удалось получить данные.\n\nНекоторые зоны (.ru, .su и др.) не поддерживают RDAP.';
    }

}

</script>

</body>
</html>
