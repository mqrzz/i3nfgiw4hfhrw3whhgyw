<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Проверка домена</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            max-width: 700px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        h1 { margin-bottom: 10px; }
        .subtitle { color: #666; margin-bottom: 20px; }
        .input-group { display: flex; gap: 10px; margin: 20px 0; flex-wrap: wrap; }
        input {
            flex: 1;
            padding: 14px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            min-width: 200px;
        }
        input:focus { outline: none; border-color: #667eea; }
        button {
            padding: 14px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover { background: #5a6fd6; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        #loading {
            display: none;
            color: #667eea;
            font-weight: bold;
            margin: 10px 0;
        }
        #loading.show { display: block; }
        #result {
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            display: none;
        }
        #result.show { display: block; }
        .status {
            font-weight: bold;
            padding: 8px 16px;
            border-radius: 6px;
            display: inline-block;
            margin-bottom: 15px;
        }
        .status.free { background: #d4edda; color: #155724; }
        .status.taken { background: #f8d7da; color: #721c24; }
        .status.error { background: #fff3cd; color: #856404; }
        .info-item { margin: 6px 0; }
        .info-item strong { display: inline-block; min-width: 140px; }
        .examples {
            margin-top: 15px;
            color: #888;
            font-size: 13px;
        }
        .examples span {
            cursor: pointer;
            color: #667eea;
            text-decoration: underline;
            margin: 0 5px;
        }
        .examples span:hover { color: #4a5fc4; }
        pre {
            background: #fff;
            padding: 10px;
            border-radius: 4px;
            font-size: 12px;
            overflow-x: auto;
            margin-top: 10px;
            border: 1px solid #eee;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Проверка домена</h1>
        <p class="subtitle">Проверяет, занят ли домен, через публичный WHOIS API</p>

        <div class="input-group">
            <input type="text" id="domainInput" placeholder="example.com" />
            <button id="checkBtn">Проверить</button>
        </div>

        <div id="loading">⏳ Загрузка...</div>
        <div id="result"></div>

        <div class="examples">
            📌 Примеры:
            <span onclick="checkDomain('google.com')">google.com</span>
            <span onclick="checkDomain('yandex.ru')">yandex.ru</span>
            <span onclick="checkDomain('example.com')">example.com</span>
        </div>
    </div>

    <script>
        const domainInput = document.getElementById('domainInput');
        const checkBtn = document.getElementById('checkBtn');
        const resultDiv = document.getElementById('result');
        const loadingDiv = document.getElementById('loading');

        checkBtn.addEventListener('click', () => {
            const domain = domainInput.value.trim();
            if (domain) checkDomain(domain);
            else alert('Введите домен');
        });

        domainInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkBtn.click();
        });

        // ═══════════════════════════════════════════════════════
        //  ИСПОЛЬЗУЕМ ПУБЛИЧНЫЙ API who-dat.as93.net
        //  Документация: https://who-dat.as93.net
        // ═══════════════════════════════════════════════════════
        async function checkDomain(domain) {
            resultDiv.className = '';
            resultDiv.style.display = 'none';
            loadingDiv.className = 'show';
            checkBtn.disabled = true;

            try {
                // Используем версионированный эндпоинт /v1/whois/
                const response = await fetch(`https://who-dat.as93.net/v1/whois/${domain}`);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();
                displayResult(data, domain);
            } catch (error) {
                displayError(error.message || 'Не удалось получить данные');
            } finally {
                loadingDiv.className = '';
                checkBtn.disabled = false;
            }
        }

        function displayResult(data, domain) {
            let html = '';

            // Определяем статус
            const isRegistered = data.isRegistered;
            let statusClass = 'error';
            let statusText = '❓ Неизвестно';

            if (isRegistered === true) {
                statusClass = 'taken';
                statusText = '❌ Домен занят';
            } else if (isRegistered === false) {
                statusClass = 'free';
                statusText = '✅ Домен свободен!';
            }

            html += `<div class="status ${statusClass}">${statusText}</div>`;

            // Информация о домене
            const fields = [
                { label: 'Дата регистрации', key: 'dates.created' },
                { label: 'Дата окончания', key: 'dates.expires' },
                { label: 'Регистратор', key: 'registrar.name' },
                { label: 'DNS-серверы', key: 'nameservers' },
                { label: 'Статус', key: 'status' },
            ];

            let hasInfo = false;
            for (const field of fields) {
                let value = getNestedValue(data, field.key);
                if (value) {
                    hasInfo = true;
                    if (Array.isArray(value)) {
                        value = value.map(item => typeof item === 'object' ? item.name : item).join(', ');
                    }
                    html += `<div class="info-item"><strong>${field.label}:</strong> ${escapeHtml(String(value))}</div>`;
                }
            }

            if (!hasInfo) {
                html += '<p style="color:#666;font-style:italic;">Нет дополнительной информации</p>';
            }

            // Полный ответ (для отладки)
            html += `
                <details style="margin-top:15px;">
                    <summary style="cursor:pointer;color:#667eea;font-weight:600;">📄 Показать полный ответ</summary>
                    <pre>${escapeHtml(JSON.stringify(data, null, 2))}</pre>
                </details>
            `;

            resultDiv.innerHTML = html;
            resultDiv.className = 'show';
            resultDiv.style.display = 'block';
            domainInput.value = domain;
        }

        // Функция для получения значения по пути типа "dates.created"
        function getNestedValue(obj, path) {
            return path.split('.').reduce((current, key) => current && current[key] !== undefined ? current[key] : null, obj);
        }

        function displayError(message) {
            resultDiv.innerHTML = `
                <div class="status error">⚠️ Ошибка</div>
                <p style="color:#721c24;">${escapeHtml(message)}</p>
                <p style="color:#666;font-size:14px;margin-top:8px;">
                    💡 Проверь: правильный ли домен? Есть ли интернет?
                </p>
            `;
            resultDiv.className = 'show';
            resultDiv.style.display = 'block';
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Клик по примерам
        document.querySelectorAll('.examples span').forEach(el => {
            el.addEventListener('click', function() {
                domainInput.value = this.textContent;
                checkBtn.click();
            });
        });

        // Автозапуск
        window.addEventListener('load', () => {
            setTimeout(() => checkDomain('example.com'), 500);
        });
    </script>
</body>
</html>
