<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Кабинет — Antviz</title>
  <link rel="icon" href="img/favicon.png" type="image/png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Geologica:wght@300;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2/src/fill/style.css"/>
  <style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#1ede7b;--green-h:#1ac16b;--green-d:#149955;--green-tint:rgba(30,222,123,.12);
  --bg:#fff;--bg3:#f9fafc;
  --text:#191b1e;--muted:#707a8a;--muted2:#9aa2b1;
  --border:#dfe3e8;--border2:#cbcdd6;
  --dark:#191b1e;--dark2:#2b2f33;
  --warn:#f59e0b;--warn-tint:rgba(245,158,11,.1);
  --info:#3b82f6;--info-tint:rgba(59,130,246,.1);
  --font:'Geologica','Inter','Arial',sans-serif;
}
html{scroll-behavior:smooth;overflow-x:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-weight:300;line-height:1.3;letter-spacing:-.01em;-webkit-font-smoothing:antialiased;overflow-x:hidden}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
:focus-visible{outline:2px solid var(--green-h);outline-offset:2px}
@keyframes spin{to{transform:rotate(360deg)}}
.reveal{opacity:0;transform:translateY(22px);transition:opacity .6s ease,transform .6s ease}
.reveal.visible{opacity:1;transform:translateY(0)}

/* Раньше .container был скопирован из index.html (лендинга): свой
   max-width:1328px + собственные брейкпоинты отступов 20/64/96px.
   Но profile.html лежит внутри #sbContent, которому sidebar.js уже даёт
   padding:20px 56px 60px — получались двойные отступы и контент был уже
   и мельче, чем на остальных страницах кабинета (orders/sites/settings и
   т.д.), где используется .shell{max-width:1240px} без своих отступов.
   Приводим .container к тому же max-width и убираем дублирующие отступы —
   масштаб теперь совпадает с остальным кабинетом. */
.container{max-width:1240px;margin:0 auto;width:100%}

.loading-screen{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:.9rem}
.spinner{width:28px;height:28px;border:2px solid var(--border2);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite}
#cabinet{display:none}

.eyebrow{font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:12px}
.eyebrow.g{color:var(--green-d)}

.btn{display:inline-flex;align-items:center;gap:8px;font-family:var(--font);font-weight:500;text-decoration:none;cursor:pointer;border:none;border-radius:12px;padding:15px 28px;font-size:15px;letter-spacing:-.01em;transition:background .1s,transform .12s,border-color .12s,color .12s;white-space:nowrap}
.btn:hover{transform:translateY(-1px)}
.btn-green{background:var(--green);color:var(--dark)}
.btn-green:hover{background:var(--green-h)}
.btn svg,.btn i{font-size:16px}

/* ══ HERO ══ */
.hero-wrap{padding:44px 0 0}
.hero-block{background:var(--dark);border-radius:56px;padding:56px 64px;position:relative;overflow:hidden}
@media(max-width:860px){.hero-block{padding:36px 28px;border-radius:32px}}

.hero-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:40px}
.hero-id{display:flex;align-items:center;gap:16px;min-width:0}
.avatar{width:56px;height:56px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-weight:500;font-size:1.4rem;color:#fff;overflow:hidden;cursor:pointer;position:relative;flex-shrink:0;transition:opacity .2s}
.avatar:hover{opacity:.85}
.avatar img{width:100%;height:100%;object-fit:cover;display:block}
.avatar-overlay{position:absolute;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;font-size:16px;color:#fff}
.avatar:hover .avatar-overlay{opacity:1}
#avatarInput{display:none}
.hero-id-text{min-width:0}
.hero-greeting{color:rgba(255,255,255,.35);font-size:.72rem;font-weight:500;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.hero-name{font-weight:500;font-size:clamp(1.5rem,2.6vw,2rem);letter-spacing:-.03em;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.hero-actions{display:flex;gap:8px;flex-shrink:0}
.icon-btn{width:44px;height:44px;border-radius:13px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;transition:background .18s;text-decoration:none;flex-shrink:0;font-size:18px;color:rgba(255,255,255,.65)}
.icon-btn:hover{background:rgba(255,255,255,.14)}
.icon-btn .dot{position:absolute;top:9px;right:9px;width:7px;height:7px;border-radius:50%;background:#ff6b54;border:1.5px solid var(--dark);display:none}
.icon-btn .dot.show{display:block}

.hero-headline{font-weight:500;font-size:clamp(2rem,4.5vw,3.4rem);letter-spacing:-.04em;line-height:1.04;color:#fff;margin-bottom:36px;max-width:720px}
.hero-headline em{font-style:normal;color:var(--green)}

.hero-bar{border-top:1px solid rgba(255,255,255,.08);display:grid;grid-template-columns:repeat(3,1fr)}
.hero-stat{padding:24px 0 0;border-right:1px solid rgba(255,255,255,.07)}
.hero-stat:last-child{border-right:none}
.hero-stat-n{font-size:clamp(1.6rem,3vw,2.2rem);font-weight:500;color:#fff;letter-spacing:-.03em;line-height:1;margin-bottom:6px}
.hero-stat-l{font-size:12px;color:rgba(255,255,255,.32);font-weight:300}


/* ══ ГЛАВНАЯ РАСКЛАДКА — реальная 2-колоночная композиция для ПК,
   а не растянутая мобильная колонка ══ */
.main-grid{display:grid;grid-template-columns:1fr 340px;gap:56px;padding:64px 0;align-items:start}
@media(max-width:960px){.main-grid{grid-template-columns:1fr;gap:48px;padding:48px 0}}
.rail{position:sticky;top:24px;display:flex;flex-direction:column;gap:14px}
@media(max-width:960px){.rail{position:static}}

.sec-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:28px}
.sec-head h2{font-size:clamp(24px,2.6vw,32px);font-weight:500;letter-spacing:-.03em;line-height:1.08}
.sec-link{font-size:.86rem;font-weight:500;color:var(--text);text-decoration:none;display:flex;align-items:center;gap:6px;flex-shrink:0}
.sec-link i{font-size:13px}
.sec-link:hover{color:var(--green-d)}
.main-col>section+section{margin-top:56px}

/* ══ ЗАКАЗЫ — верхний активный заказ получает отдельную визуальную подачу
   (не строка списка, а акцентная карточка с прогрессом), остальные — списком ══ */
.featured-project{border:1.5px solid var(--border);border-radius:28px;padding:28px 30px;margin-bottom:4px;position:relative;overflow:hidden}
.fp-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:18px}
.fp-eyebrow{font-size:.68rem;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--green-d);margin-bottom:6px}
.fp-title{font-size:1.15rem;font-weight:500;letter-spacing:-.01em}
.fp-icon{width:40px;height:40px;border-radius:12px;background:var(--dark);display:flex;align-items:center;justify-content:center;color:var(--green);font-size:18px;flex-shrink:0}
.fp-progress-track{height:6px;background:var(--bg3);border-radius:100px;overflow:hidden;margin-bottom:10px}
.fp-progress-fill{height:100%;background:var(--green);border-radius:100px;transition:width .8s cubic-bezier(.22,1,.36,1)}
.fp-meta{display:flex;justify-content:space-between;font-size:.78rem;color:var(--muted)}
.fp-meta b{color:var(--text);font-weight:500}

.plain-list{display:flex;flex-direction:column}
.p-row{display:grid;grid-template-columns:36px 1fr auto;gap:16px;align-items:center;padding:16px 0;border-bottom:1px solid var(--border);text-decoration:none;color:inherit;transition:padding-left .15s}
.p-row:last-child{border-bottom:none}
.p-row:hover{padding-left:8px}
.p-row-ico{font-size:20px;color:var(--muted2);flex-shrink:0}
.p-row-body{min-width:0}
.p-row-title{font-size:.92rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p-row-sub{font-size:.8rem;color:var(--muted)}
.p-tag{font-size:.7rem;font-weight:500;padding:.32rem .7rem;border-radius:8px;white-space:nowrap;flex-shrink:0}
.p-tag.done{background:var(--green-tint);color:var(--green-d)}
.p-tag.progress{background:var(--info-tint);color:var(--info)}
.list-empty{padding:32px 0;text-align:center;color:var(--muted);font-size:.9rem}

/* ══ АКТИВНОСТЬ — настоящая временная лента (точка + линия), а не полоса ══ */
.timeline{position:relative;padding-left:26px}
.timeline::before{content:'';position:absolute;left:5px;top:6px;bottom:6px;width:1.5px;background:var(--border)}
.tl-item{position:relative;padding-bottom:26px}
.tl-item:last-child{padding-bottom:0}
.tl-dot{position:absolute;left:-26px;top:3px;width:11px;height:11px;border-radius:50%;background:var(--bg);border:2px solid var(--border2)}
.tl-item.on .tl-dot{border-color:var(--green);background:var(--green)}
.tl-title{font-size:.92rem;font-weight:500;margin-bottom:2px}
.tl-sub{font-size:.8rem;color:var(--muted)}
.tl-date{font-size:.72rem;color:var(--muted2);margin-top:4px}

/* ══ BENTO-СЕТКА (правая колонка) ══ */
.bento-tile{border:1.5px solid var(--border);border-radius:22px;padding:22px}
.bento-tile.dark{background:var(--dark);border-color:var(--dark);color:#fff}
.bento-tile.accent{background:var(--green);border-color:var(--green);color:var(--dark)}
.bt-icon{width:34px;height:34px;border-radius:10px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--muted);margin-bottom:14px}
.bento-tile.dark .bt-icon{background:rgba(255,255,255,.1);color:var(--green)}
.bento-tile.accent .bt-icon{background:rgba(0,0,0,.1);color:var(--dark)}
.bt-label{font-size:.68rem;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:6px}
.bento-tile.dark .bt-label{color:rgba(255,255,255,.4)}
.bento-tile.accent .bt-label{color:rgba(25,27,30,.6)}
.bt-value{font-size:1.4rem;font-weight:500;letter-spacing:-.02em;margin-bottom:3px}
.bt-sub{font-size:.78rem;color:var(--muted);line-height:1.4}
.bento-tile.dark .bt-sub{color:rgba(255,255,255,.4)}
.bento-tile.accent .bt-sub{color:rgba(25,27,30,.6)}
.bt-track{height:5px;background:var(--bg3);border-radius:100px;margin-top:12px;overflow:hidden}
.bento-tile.dark .bt-track{background:rgba(255,255,255,.12)}
.bt-fill{height:100%;background:var(--green);border-radius:100px}
.bt-cta{display:inline-flex;align-items:center;gap:5px;font-size:.78rem;font-weight:500;color:var(--dark);text-decoration:none;margin-top:12px}
.bento-tile.dark .bt-cta{color:var(--green)}
.bento-tile.accent .bt-cta{color:var(--dark)}

/* ══ БЫСТРЫЙ ДОСТУП — компактно, внизу, без сетки плиток-иконок ══ */
.quick-links{display:flex;flex-direction:column;gap:2px}
.quick-links a{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-radius:16px;text-decoration:none;color:var(--text);font-size:.88rem;font-weight:500;transition:background .15s}
.quick-links a:hover{background:var(--bg3)}
.quick-links a i:first-child{font-size:17px;color:var(--muted);margin-right:12px}
.quick-links a span{flex:1}
.quick-links a i:last-child{font-size:13px;color:var(--muted2)}
.ql-badge{background:var(--green);color:var(--dark);font-size:.66rem;font-weight:500;padding:.16rem .5rem;border-radius:8px;margin-right:8px}

.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(14px);z-index:700;padding:.6rem 1.3rem;border-radius:14px;font-size:.8rem;font-weight:500;opacity:0;transition:opacity .26s,transform .26s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.success{background:var(--green);color:var(--dark)}
.toast.error{background:#e8634f;color:#fff}

@media(max-width:600px){
  .hero-wrap{padding:24px 0 0}
  .hero-block{border-radius:28px;padding:28px 22px}
  .main-grid{padding:40px 0}
}
  </style>
</head>
<body>
<script src="sidebar.js" data-page="profile"></script>

<div id="sbContent">

<div class="loading-screen" id="loadingScreen"><div class="spinner"></div></div>

<div id="cabinet">

  <section class="hero-wrap">
    <div class="container">
      <div class="hero-block">
        <div class="hero-top">
          <div class="hero-id">
            <div class="avatar" id="heroAvatar" onclick="document.getElementById('avatarInput').click()">
              <span id="avatarLetter">А</span>
              <div class="avatar-overlay"><i class="ph-fill ph-camera"></i></div>
            </div>
            <input type="file" id="avatarInput" accept="image/*" onchange="handleAvatarUpload(this.files[0])"/>
            <div class="hero-id-text">
              <div class="hero-greeting">Личный кабинет</div>
              <div class="hero-name" id="heroSince">Antviz</div>
            </div>
          </div>
          <div class="hero-actions">
            <a class="icon-btn" href="profile/notifications" title="Уведомления">
              <i class="ph-fill ph-bell"></i>
              <span class="dot" id="notifDot"></span>
            </a>
            <a class="icon-btn" href="profile/settings" title="Настройки">
              <i class="ph-fill ph-gear-six"></i>
            </a>
          </div>
        </div>

        <div class="hero-headline" id="heroHeadline">Здравствуйте, <em>Пользователь</em></div>

        <div class="hero-bar">
          <div class="hero-stat"><div class="hero-stat-n" data-count id="statTotal">0</div><div class="hero-stat-l">Всего заказов</div></div>
          <div class="hero-stat"><div class="hero-stat-n" data-count id="statActive">0</div><div class="hero-stat-l">В работе</div></div>
          <div class="hero-stat"><div class="hero-stat-n" data-count id="statDone">0</div><div class="hero-stat-l">Завершено</div></div>
        </div>
      </div>
    </div>
  </section>

  <div class="container">
    <div class="main-grid">

      <div class="main-col">

        <section class="reveal">
          <div class="sec-head">
            <div><p class="eyebrow g">Ваши заказы</p><h2>Заказы</h2></div>
            <a href="profile/orders" class="sec-link">Все заказы <i class="ph-fill ph-arrow-right"></i></a>
          </div>
          <div id="featuredProjectSlot"></div>
          <div class="plain-list" id="recentProjects"><div class="list-empty">Загрузка...</div></div>
        </section>

        <section class="reveal">
          <div class="sec-head"><div><p class="eyebrow g">История</p><h2>Активность</h2></div></div>
          <div class="timeline" id="activityTimeline"><div class="list-empty">Загрузка...</div></div>
        </section>

      </div>

      <div class="rail">

        <div class="reveal" id="bentoSupport"></div>
        <div class="reveal" id="bentoMessages"></div>
        <div class="reveal" id="bentoReview" style="display:none"></div>

        <div class="reveal bento-tile" style="padding:8px 6px">
          <div class="quick-links">
            <a href="profile/orders"><i class="ph-fill ph-briefcase"></i><span>Заказы</span><span class="ql-badge" id="qlProjectsBadge" style="display:none">0</span><i class="ph-fill ph-caret-right"></i></a>
            <a href="profile/support"><i class="ph-fill ph-headset"></i><span>Поддержка</span><span class="ql-badge" id="qlHelpBadge" style="display:none">!</span><i class="ph-fill ph-caret-right"></i></a>
            <a href="profile/notifications"><i class="ph-fill ph-bell"></i><span>Уведомления</span><i class="ph-fill ph-caret-right"></i></a>
            <a href="order"><i class="ph-fill ph-plus-circle"></i><span>Новый заказ</span><i class="ph-fill ph-caret-right"></i></a>
          </div>
        </div>

      </div>

    </div>
  </div>

</div><!-- /cabinet -->

<div class="toast" id="toast"></div>

<script type="module">
import { auth, db } from './firebase-config.js';
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { collection, query, where, orderBy, onSnapshot, doc, updateDoc, getDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

let currentUser=null, unsubOrders=null;

function toast(msg,type='info'){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast ${type} show`;setTimeout(()=>t.className='toast',3200);}
function fmtDateShort(ts){if(!ts) return '';const d=ts.toDate?ts.toDate():new Date(ts);return d.toLocaleDateString('ru',{day:'numeric',month:'short'});}
function fmtDateLong(ts){if(!ts) return '';const d=ts.toDate?ts.toDate():new Date(ts);return d.toLocaleDateString('ru',{day:'numeric',month:'long',year:'numeric'});}

/* Градиентная аватарка вместо плоской заливки — генерируется из имени/uid,
   у каждого пользователя свой оттенок, а не одинаковый зелёный квадрат */
function avatarGradient(seed){
  let h=0; for(let i=0;i<seed.length;i++) h=seed.charCodeAt(i)+((h<<5)-h);
  const hueA=Math.abs(h)%360, hueB=(hueA+42)%360;
  return `linear-gradient(135deg, hsl(${hueA} 70% 45%), hsl(${hueB} 65% 38%))`;
}

window.handleAvatarUpload=async function(file){
  if(!file) return;
  if(file.size>3*1024*1024){toast('Файл больше 3 МБ','error');return;}
  const reader=new FileReader();
  reader.onload=async function(e){
    const dataUrl=e.target.result;
    const av=document.getElementById('heroAvatar');
    document.getElementById('avatarLetter').style.display='none';
    let img=av.querySelector('img');
    if(!img){img=document.createElement('img');av.insertBefore(img,av.firstChild);}
    img.src=dataUrl;
    try{await updateDoc(doc(db,'users',currentUser.uid),{avatarDataUrl:dataUrl});toast('Фото обновлено ✓','success');}catch(e){console.error(e);}
  };
  reader.readAsDataURL(file);
};

/* ══ Scroll reveal — тот же приём, что и на сайте ══ */
const revealObs=new IntersectionObserver(es=>{es.forEach(el=>{if(el.isIntersecting)el.target.classList.add('visible')})},{threshold:.08});
document.querySelectorAll('.reveal').forEach(el=>revealObs.observe(el));

/* ══ Живой счётчик цифр — тот же приём, что и на сайте ══ */
function animCount(el){
  const target=parseInt(el.textContent)||0;
  if(!target){return;}
  let cur=0; const step=Math.max(1,Math.ceil(target/30));
  const t=setInterval(()=>{cur+=step; if(cur>=target){cur=target;clearInterval(t);} el.textContent=cur;},28);
}
const countObs=new IntersectionObserver(es=>{es.forEach(el=>{if(el.isIntersecting){animCount(el.target);countObs.unobserve(el.target)}})},{threshold:.5});

const STATUS_LABEL={0:'Новый',1:'В работе',2:'В работе',3:'На проверке',4:'Финал',5:'Завершён',6:'Ожидает доплаты'};
const STATUS_PROGRESS={0:5,1:25,2:45,3:70,4:85,5:100,6:70};
const STATUS_ICON={0:'ph-file-text',1:'ph-hammer',2:'ph-hammer',3:'ph-eye',4:'ph-pencil-simple',5:'ph-check-circle',6:'ph-wallet'};

function renderFeaturedAndList(orders){
  const slot=document.getElementById('featuredProjectSlot');
  const list=document.getElementById('recentProjects');
  if(!orders.length){
    slot.innerHTML='';
    list.innerHTML='<div class="list-empty">Заказов пока нет — <a href="order" style="color:var(--green-d);text-decoration:none;font-weight:500">оформите первый</a></div>';
    document.getElementById('qlProjectsBadge').style.display='none';
    return;
  }
  const active=orders.filter(o=>(o.status||0)>=1&&(o.status||0)<=4);
  const featured=active[0];
  const rest=orders.filter(o=>o.id!==featured?.id).slice(0,4);

  if(featured){
    const pct=STATUS_PROGRESS[featured.status]||10;
    slot.innerHTML=`<div class="featured-project">
      <div class="fp-top">
        <div><div class="fp-eyebrow">Сейчас в работе</div><div class="fp-title">${featured.siteName||featured.siteDomain||featured.siteType||'Проект'}</div></div>
        <div class="fp-icon"><i class="ph-fill ${STATUS_ICON[featured.status]||'ph-hammer'}"></i></div>
      </div>
      <div class="fp-progress-track"><div class="fp-progress-fill" style="width:0%" data-target="${pct}"></div></div>
      <div class="fp-meta"><span>Этап: <b>${STATUS_LABEL[featured.status]}</b></span><a href="profile/orders" style="color:var(--green-d);text-decoration:none;font-weight:500">Подробнее →</a></div>
    </div>`;
    requestAnimationFrame(()=>{const f=slot.querySelector('.fp-progress-fill');setTimeout(()=>f.style.width=f.dataset.target+'%',100);});
  } else slot.innerHTML='';

  if(!rest.length){
    list.innerHTML=featured?'':'<div class="list-empty">Больше заказов нет</div>';
  } else {
    list.innerHTML=rest.map(o=>{
      const st=o.status||0, done=st===5;
      return `<a href="profile/orders" class="p-row">
        <i class="ph-fill ${STATUS_ICON[st]} p-row-ico"></i>
        <div class="p-row-body"><div class="p-row-title">${o.siteName||o.siteDomain||o.siteType||'Заказ'}</div><div class="p-row-sub">${fmtDateShort(o.createdAt)?'Создан '+fmtDateShort(o.createdAt):''}</div></div>
        <span class="p-tag ${done?'done':'progress'}">${STATUS_LABEL[st]}</span>
      </a>`;
    }).join('');
  }

  const activeCount=active.length;
  const badge=document.getElementById('qlProjectsBadge');
  if(activeCount>0){badge.textContent=activeCount;badge.style.display='inline-block';}else badge.style.display='none';
}

function buildTimeline(orders){
  const events=[];
  orders.forEach(o=>{
    const name=o.siteName||o.siteDomain||o.siteType||'Заказ';
    if(o.createdAt) events.push({ts:o.createdAt,title:'Создан заказ',sub:name,on:false});
    if(o.status===5&&o.updatedAt) events.push({ts:o.updatedAt,title:'Заказ завершён',sub:name,on:true});
    else if(o.status>=1&&o.status<=4&&o.updatedAt) events.push({ts:o.updatedAt,title:'Статус обновлён',sub:`${name} — ${STATUS_LABEL[o.status]}`,on:false});
    if(o.supportActive&&o.supportExpiresAt) events.push({ts:o.supportExpiresAt,title:'Поддержка активна',sub:name,on:true});
  });
  events.sort((a,b)=>{
    const ta=a.ts?.toDate?a.ts.toDate():new Date(a.ts);
    const tb=b.ts?.toDate?b.ts.toDate():new Date(b.ts);
    return tb-ta;
  });
  const tl=document.getElementById('activityTimeline');
  const top=events.slice(0,5);
  if(!top.length){tl.innerHTML='<div class="list-empty">Активность появится после первого заказа</div>';return;}
  tl.innerHTML=top.map(e=>`<div class="tl-item${e.on?' on':''}">
    <div class="tl-dot"></div>
    <div class="tl-title">${e.title}</div>
    <div class="tl-sub">${e.sub}</div>
    <div class="tl-date">${fmtDateShort(e.ts)}</div>
  </div>`).join('');
}

function loadOrderStats(uid){
  if(unsubOrders) unsubOrders();
  const q=query(collection(db,'orders'),where('uid','==',uid),orderBy('createdAt','desc'));
  unsubOrders=onSnapshot(q,snap=>{
    // status:-1 = заявка создана, оплата ещё не подтверждена — такой заказ
    // не должен попадать ни в счётчики, ни в списки на главной кабинета
    // (ровно как их уже не показывает profile/orders.html), иначе цифра
    // "Всего заказов" не совпадает со списком, а неоплаченная заявка может
    // всплыть с пустым статусом.
    const orders=snap.docs.map(d=>({id:d.id,...d.data()})).filter(o=>(o.status??0)!==-1);
    const active=orders.filter(o=>(o.status||0)>=1&&(o.status||0)<=4).length;
    document.getElementById('statTotal').textContent=orders.length;
    document.getElementById('statActive').textContent=active;
    document.getElementById('statDone').textContent=orders.filter(o=>o.status===5).length;
    document.querySelectorAll('.hero-stat-n[data-count]').forEach(el=>countObs.observe(el));
    renderFeaturedAndList(orders);
    buildTimeline(orders);
  },err=>console.error('Orders:',err));
}

async function loadBento(uid){
  try{
    const [ordersSnap, chatSnap] = await Promise.all([
      getDocs(query(collection(db,'orders'),where('uid','==',uid))),
      getDocs(query(collection(db,'chats',uid,'messages'),where('sender','==','admin'),where('readByUser','==',false))),
    ]);
    const orders=ordersSnap.docs.map(d=>({id:d.id,...d.data()}));

    const activeSupport=orders.find(o=>o.supportActive&&o.supportExpiresAt&&o.supportExpiresAt.toDate()>new Date());
    const supportSlot=document.getElementById('bentoSupport');
    if(activeSupport){
      const days=Math.ceil((activeSupport.supportExpiresAt.toDate()-new Date())/86400000);
      const pct=Math.max(4,Math.min(100,Math.round(days/30*100)));
      supportSlot.innerHTML=`<div class="bento-tile dark">
        <div class="bt-icon"><i class="ph-fill ph-shield-check"></i></div>
        <div class="bt-label">Обслуживание</div>
        <div class="bt-value">${days} дн.</div>
        <div class="bt-sub">${activeSupport.siteName||activeSupport.siteDomain||'осталось по подписке'}</div>
        <div class="bt-track"><div class="bt-fill" style="width:${pct}%"></div></div>
      </div>`;
    } else {
      supportSlot.innerHTML=`<div class="bento-tile">
        <div class="bt-icon"><i class="ph-fill ph-shield-check"></i></div>
        <div class="bt-label">Обслуживание</div>
        <div class="bt-value" style="font-size:1rem">Не подключено</div>
        <a class="bt-cta" href="profile/support">Подключить <i class="ph-fill ph-arrow-right"></i></a>
      </div>`;
    }

    const msgSlot=document.getElementById('bentoMessages');
    const unread=chatSnap.size;
    msgSlot.innerHTML=unread>0?`<div class="bento-tile accent">
        <div class="bt-icon"><i class="ph-fill ph-chat-circle-dots"></i></div>
        <div class="bt-label">Сообщения</div>
        <div class="bt-value">${unread} новых</div>
        <a class="bt-cta" href="profile/support">Открыть <i class="ph-fill ph-arrow-right"></i></a>
      </div>`:`<div class="bento-tile">
        <div class="bt-icon"><i class="ph-fill ph-chat-circle-dots"></i></div>
        <div class="bt-label">Сообщения</div>
        <div class="bt-value" style="font-size:1rem">Всё прочитано</div>
        <div class="bt-sub">Команда на связи в поддержке</div>
      </div>`;

    const doneUnreviewed=orders.find(o=>o.status===5&&!o.reviewed);
    const reviewSlot=document.getElementById('bentoReview');
    if(doneUnreviewed){
      reviewSlot.style.display='block';
      reviewSlot.innerHTML=`<div class="bento-tile">
        <div class="bt-icon"><i class="ph-fill ph-star"></i></div>
        <div class="bt-label">Отзыв</div>
        <div class="bt-value" style="font-size:1rem">Как всё прошло?</div>
        <a class="bt-cta" href="profile/orders">Оставить отзыв <i class="ph-fill ph-arrow-right"></i></a>
      </div>`;
    }

    document.getElementById('qlHelpBadge').style.display=unread>0?'inline-block':'none';
    document.querySelectorAll('.rail .reveal').forEach(el=>revealObs.observe(el));
  }catch(e){console.error(e);}
}

function watchNotifDot(uid){
  const q=query(collection(db,'notifications',uid,'items'),orderBy('createdAt','desc'));
  onSnapshot(q,snap=>{
    const hasUnread=snap.docs.some(d=>!d.data().read);
    document.getElementById('notifDot').classList.toggle('show',hasUnread);
  },()=>{});
}

onAuthStateChanged(auth,async user=>{
  if(!user){window.location.href='auth';return;}
  currentUser=user;
  const name=user.displayName||'Пользователь';
  document.getElementById('heroHeadline').innerHTML='Здравствуйте, <em>'+name+'</em>';
  document.getElementById('avatarLetter').textContent=name[0].toUpperCase();
  document.getElementById('heroAvatar').style.background=avatarGradient(user.uid||name);
  document.getElementById('loadingScreen').style.display='none';
  document.getElementById('cabinet').style.display='block';

  getDoc(doc(db,'users',user.uid)).then(snap=>{
    if(snap.exists()){const d=snap.data();
      if(d.createdAt) document.getElementById('heroSince').textContent='В Antviz с '+fmtDateLong(d.createdAt);
      if(d.avatarDataUrl){const av=document.getElementById('heroAvatar');document.getElementById('avatarLetter').style.display='none';const img=document.createElement('img');img.src=d.avatarDataUrl;av.insertBefore(img,av.firstChild);}
    }
  }).catch(e=>console.warn('users doc:',e));

  loadOrderStats(user.uid);
  loadBento(user.uid);
  watchNotifDot(user.uid);
});
