<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Мои заказы — Antviz</title>
  <link rel="icon" href="../img/favicon.png" type="image/png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Geologica:wght@300;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#ffffff; --surface:#f9fafc; --surface-2:#f2f4f7; --surface-3:#e9ecf1;
      --line:#dfe3e8; --line-strong:#cbcdd6;
      --ink:#191b1e; --ink-dim:#707a8a; --ink-faint:#9aa2b1;
      --accent:#1ede7b; --accent-soft:#1ac16b; --accent-wash:rgba(30,222,123,.12);
      --good:#1ede7b; --good-wash:rgba(30,222,123,.12);
      --warn:#f59e0b; --warn-wash:rgba(245,158,11,.1);
      --bad:#e8634f; --bad-wash:rgba(232,99,79,.1);
      --info:#3b82f6; --info-wash:rgba(59,130,246,.1);
      --r-xs:6px; --r-sm:10px; --r-md:16px; --r-lg:24px; --r-xl:40px;
      --nav-h:64px;
      --font:'Geologica','Inter','Arial',sans-serif;
    }
    html{scroll-behavior:smooth}
    body{background:var(--bg);color:var(--ink);font-family:var(--font);font-weight:300;line-height:1.6;min-height:100vh;font-size:15px;-webkit-font-smoothing:antialiased}
    @media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important;scroll-behavior:auto!important}}
    :focus-visible{outline:2px solid var(--accent-soft);outline-offset:2px}

    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes cFall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}
    @keyframes rowIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

    .loading-screen{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px}
    .spinner{width:22px;height:22px;border:1.5px solid var(--line-strong);border-top-color:var(--accent);border-radius:50%;animation:spin .65s linear infinite}
    .loading-text{color:var(--ink-faint);font-size:12px}

    .confetti-wrap{position:fixed;inset:0;z-index:1000;pointer-events:none;overflow:hidden}
    .c-piece{position:absolute;top:-10px;border-radius:2px;animation:cFall linear forwards}

    /* SHELL */
    .ord-shell{max-width:1100px;width:100%;animation:fadeUp .25s ease}

    .ord-head{display:flex;justify-content:space-between;align-items:flex-end;gap:24px;flex-wrap:wrap;margin-bottom:36px}
    .ord-title{font-family:var(--font);font-weight:500;font-size:clamp(1.7rem,3vw,2.3rem);letter-spacing:-.025em;margin-bottom:8px}
    .ord-sub{color:var(--ink-dim);font-size:.92rem}
    .btn{display:inline-flex;align-items:center;gap:6px;padding:.7rem 1.3rem;border-radius:var(--r-md);font-family:var(--font);font-size:.84rem;font-weight:500;text-decoration:none;cursor:pointer;border:none;transition:background .15s,opacity .15s,border-color .15s,color .15s;white-space:nowrap}
    .btn svg{width:13px;height:13px}
    .btn-primary{background:var(--accent);color:#191b1e}
    .btn-primary:hover{background:var(--accent-soft)}
    .btn-ghost{background:transparent;border:1px solid var(--line-strong);color:var(--ink-dim)}
    .btn-ghost:hover{border-color:var(--accent-soft);color:var(--accent-soft)}
    .btn-success{background:var(--good-wash);color:var(--good);border:1px solid rgba(52,211,153,.22)}
    .btn-success:hover{background:rgba(52,211,153,.18)}
    .btn-warn{background:var(--warn-wash);color:var(--warn);border:1px solid rgba(251,191,36,.22)}
    .btn-warn:hover{background:rgba(251,191,36,.16)}
    .btn-xs{padding:.36rem .7rem;font-size:.72rem}
    .btn-sm{padding:.55rem 1rem;font-size:.78rem}

    /* TOOLBAR: summary + filters */
    .ord-toolbar{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:18px}
    .ord-tabs{display:inline-flex;background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:3px;gap:2px}
    .ord-tab{border:none;background:transparent;color:var(--ink-faint);font-family:var(--font);font-size:.78rem;font-weight:500;padding:.45rem .9rem;border-radius:12px;cursor:pointer;transition:background .15s,color .15s;white-space:nowrap}
    .ord-tab:hover{color:var(--ink)}
    .ord-tab.is-active{background:var(--accent-wash);color:var(--accent-soft)}
    .ord-count{color:var(--ink-faint);font-size:.78rem}

    /* TABLE-STYLE LIST */
    .ord-cols{display:grid;grid-template-columns:1fr 130px 120px 110px 22px;gap:16px;padding:0 20px 10px;font-size:.68rem;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-faint);font-weight:500}
    .ord-list{border:1px solid var(--line);border-radius:var(--r-lg);overflow:hidden}
    .ord-row-wrap{border-bottom:1px solid var(--line);animation:rowIn .2s ease both}
    .ord-row-wrap:last-child{border-bottom:none}
    .ord-row-wrap.is-filtered{display:none}
    .ord-row{all:unset;display:grid;grid-template-columns:1fr 130px 120px 110px 22px;gap:16px;align-items:center;width:100%;padding:18px 20px;cursor:pointer;transition:background .15s;font-family:var(--font)}
    .ord-row:hover{background:var(--surface)}
    .ord-cell-main{display:flex;flex-direction:column;gap:3px;min-width:0}
    .ord-num{font-size:.92rem;font-weight:500;color:var(--ink)}
    .ord-meta{font-size:.78rem;color:var(--ink-faint)}
    .ord-tag{display:inline-flex;align-items:center;gap:6px;font-size:.74rem;font-weight:500;padding:.3rem .65rem;border-radius:var(--r-xs);width:fit-content}
    .ord-dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}
    .ord-tag.s0{background:var(--surface-3);color:var(--ink-faint)}
    .ord-tag.s1{background:var(--warn-wash);color:var(--warn)}
    .ord-tag.s2{background:var(--info-wash);color:var(--info)}
    .ord-tag.s3{background:var(--accent-wash);color:var(--accent-soft)}
    .ord-tag.s4{background:var(--warn-wash);color:var(--warn)}
    .ord-tag.s5{background:var(--good-wash);color:var(--good)}
    .ord-pay{display:inline-flex;align-items:center;gap:5px;font-size:.74rem;font-weight:500}
    .ord-pay.is-paid{color:var(--good)}
    .ord-pay.is-unpaid{color:var(--bad)}
    .ord-pay svg{width:12px;height:12px;stroke:currentColor;stroke-width:2.4;fill:none}
    .ord-price{font-size:.92rem;font-weight:500;text-align:right}
    .ord-chevron{width:16px;height:16px;stroke:var(--ink-faint);stroke-width:2;fill:none;transition:transform .2s;justify-self:end}
    .ord-row-wrap:has(.ord-body.open) .ord-chevron{transform:rotate(180deg)}

    .ord-comment{display:flex;align-items:flex-start;gap:7px;margin:0 20px 16px;padding:10px 13px;background:var(--accent-wash);border-radius:var(--r-sm);font-size:.8rem;color:var(--accent-soft);line-height:1.55}
    .ord-comment svg{width:13px;height:13px;stroke:currentColor;stroke-width:1.8;flex-shrink:0;margin-top:2px;fill:none}

    .ord-body{display:none;border-top:1px solid var(--line);padding:24px 20px 26px;background:var(--surface)}
    .ord-body.open{display:block;animation:fadeUp .2s ease}

    /* TRACKER */
    .trk{margin-bottom:18px}
    .trk-row{display:flex;align-items:flex-start;gap:0}
    .trk-step{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;min-width:44px;position:relative}
    .trk-step:not(:last-child)::after{content:'';position:absolute;top:15px;left:calc(50% + 16px);right:calc(-50% + 16px);height:1px;background:var(--line);z-index:0;transition:background .3s}
    .trk-step.done:not(:last-child)::after{background:var(--accent)}
    .trk-step.current:not(:last-child)::after{background:linear-gradient(to right,var(--accent),var(--line))}
    .trk-ico{width:30px;height:30px;border-radius:50%;border:1px solid var(--line-strong);background:var(--surface-2);display:flex;align-items:center;justify-content:center;z-index:1;position:relative;transition:all .25s;flex-shrink:0}
    .trk-ico svg{width:13px;height:13px;stroke:var(--ink-faint);stroke-width:1.8;fill:none;transition:stroke .25s}
    .trk-step.done .trk-ico{border-color:var(--accent);background:var(--accent-wash)}
    .trk-step.done .trk-ico svg{stroke:var(--accent-soft)}
    .trk-step.done .trk-ico .check-icon{display:block}
    .trk-step.done .trk-ico .step-icon{display:none}
    .check-icon{display:none}
    .trk-step.current .trk-ico{border-color:var(--accent-soft);background:var(--accent-wash);box-shadow:0 0 0 3px var(--accent-wash)}
    .trk-step.current .trk-ico svg{stroke:var(--accent-soft)}
    .trk-step.pending .trk-ico{opacity:.35}
    .trk-lbl{font-size:.66rem;color:var(--ink-faint);text-align:center;line-height:1.3;max-width:56px}
    .trk-step.done .trk-lbl{color:var(--ink-dim)}
    .trk-step.current .trk-lbl{color:var(--ink);font-weight:500}
    .trk-info{margin-top:14px;padding:12px 14px;background:var(--surface-2);border:1px solid var(--line);border-radius:var(--r-sm);display:flex;align-items:flex-start;gap:11px}
    .trk-info-ico{width:30px;height:30px;border-radius:var(--r-xs);flex-shrink:0;display:flex;align-items:center;justify-content:center}
    .trk-info-ico svg{width:14px;height:14px;stroke-width:1.8}
    .trk-info-title{font-size:.86rem;font-weight:500;margin-bottom:2px}
    .trk-info-sub{font-size:.78rem;color:var(--ink-faint);line-height:1.5}

    /* SUBSTEPS */
    .sub-list{display:flex;flex-direction:column;gap:5px;margin:14px 0;padding:12px 14px;background:var(--surface-2);border:1px solid var(--line);border-radius:var(--r-sm)}
    .sub-item{display:flex;align-items:center;gap:9px;font-size:.8rem}
    .sub-ico{width:16px;height:16px;border-radius:50%;border:1px solid var(--line-strong);display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .sub-ico svg{width:8px;height:8px;stroke:var(--ink-faint);stroke-width:2.5;fill:none}
    .sub-item.done .sub-ico{border-color:var(--good);background:var(--good-wash)}
    .sub-item.done .sub-ico svg{stroke:var(--good)}
    .sub-lbl{flex:1;color:var(--ink-faint)}
    .sub-item.done .sub-lbl{color:var(--ink)}
    .sub-date{font-size:.72rem;color:var(--ink-faint);white-space:nowrap}

    /* DELIVERY CARD (also reused inside the delivery modal) */
    .delivery-card{background:var(--good-wash);border:1px solid rgba(52,211,153,.2);border-radius:var(--r-sm);padding:16px;margin-bottom:14px}
    .delivery-card h4{font-size:.72rem;font-weight:500;color:var(--good);margin-bottom:10px;display:flex;align-items:center;gap:6px;letter-spacing:.04em;text-transform:uppercase}
    .delivery-card h4 svg{width:13px;height:13px;stroke:currentColor;stroke-width:1.8;fill:none}
    .site-domain-big{font-size:1rem;font-weight:500;margin-bottom:4px;letter-spacing:-.01em}
    .site-favicon{width:24px;height:24px;border-radius:5px;object-fit:contain;background:var(--surface-2);border:1px solid var(--line);margin-bottom:8px}
    .site-pages-list{display:flex;flex-direction:column;gap:3px;margin-bottom:12px}
    .site-page-item{display:flex;align-items:center;gap:6px;font-size:.8rem;color:var(--ink-dim)}
    .site-page-item::before{content:'';width:4px;height:4px;border-radius:50%;background:var(--good);flex-shrink:0}

    .ord-eta{display:flex;align-items:center;gap:7px;background:var(--info-wash);border-radius:var(--r-sm);padding:9px 13px;font-size:.8rem;color:var(--info);margin-bottom:14px}
    .ord-eta svg{width:13px;height:13px;stroke:currentColor;stroke-width:1.8;fill:none;flex-shrink:0}
    .ord-actions{display:flex;gap:8px;flex-wrap:wrap}

    /* EMPTY */
    .empty{text-align:center;padding:64px 16px;color:var(--ink-faint)}
    .empty-icon{margin-bottom:16px;display:flex;justify-content:center}
    .empty-icon svg{width:42px;height:42px;stroke:var(--ink-faint);stroke-width:1.2;fill:none;opacity:.5}
    .empty h3{font-family:var(--font);font-size:1.05rem;font-weight:500;color:var(--ink);margin-bottom:6px}
    .empty p{font-size:.86rem;margin-bottom:20px}

    /* TOAST */
    .toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(10px);z-index:700;padding:.6rem 1.3rem;border-radius:14px;font-size:.78rem;font-weight:500;opacity:0;transition:opacity .22s,transform .22s;pointer-events:none;white-space:nowrap;max-width:90vw}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .toast.success{background:var(--good);color:#0d3320}
    .toast.error{background:var(--bad);color:#fff}
    .toast.info{background:var(--accent);color:#191b1e}

    /* MODAL */
    .modal-overlay{position:fixed;inset:0;z-index:800;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
    .modal-overlay.show{opacity:1;pointer-events:all}
    .modal{background:var(--surface);border:1px solid var(--line-strong);border-radius:var(--r-xl);padding:36px 32px;width:100%;max-width:420px;transform:translateY(14px) scale(.98);transition:transform .2s}
    .modal-overlay.show .modal{transform:translateY(0) scale(1)}
    .modal-icon-wrap{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
    .modal-icon-wrap svg{width:22px;height:22px;stroke-width:1.7;fill:none}
    .modal h3{font-family:var(--font);font-size:1.1rem;font-weight:500;margin-bottom:8px;text-align:center}
    .modal-p{color:var(--ink-dim);font-size:.86rem;text-align:center;margin-bottom:20px;line-height:1.6}
    .modal-btns{display:flex;gap:10px}
    .modal-btns .btn{flex:1;justify-content:center}
    .stars-row{display:flex;justify-content:center;gap:6px;margin-bottom:16px}
    .star{width:30px;height:30px;cursor:pointer;color:var(--line-strong);transition:color .14s,transform .12s}
    .star svg{width:100%;height:100%;fill:currentColor}
    .star.on{color:var(--warn)}
    .star:hover{transform:scale(1.12)}
    .review-textarea{width:100%;background:var(--surface-2);border:1px solid var(--line-strong);border-radius:var(--r-sm);padding:.7rem .85rem;color:var(--ink);font-family:var(--font);font-size:.88rem;outline:none;resize:vertical;min-height:84px;margin-bottom:16px;transition:border-color .18s}
    .review-textarea:focus{border-color:var(--accent)}
    .review-textarea::placeholder{color:var(--ink-faint)}

    /* BANNER */
    .ord-banner{position:fixed;top:78px;left:50%;transform:translateX(-50%) translateY(-8px);z-index:300;background:var(--surface);border:1px solid var(--line-strong);border-radius:18px;padding:.55rem 1rem .55rem .8rem;display:flex;align-items:center;gap:10px;font-size:.84rem;font-weight:500;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;white-space:nowrap}
    .ord-banner.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:all}
    #bannerIcon:empty::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--accent-soft);display:inline-block}
    .ord-banner-close{background:none;border:none;color:var(--ink-faint);cursor:pointer;padding:0;display:flex}
    .ord-banner-close svg{width:13px;height:13px;stroke:currentColor;stroke-width:2;fill:none}

    @media (max-width:840px){
      .ord-cols{display:none}
      .ord-row,.ord-row-wrap .ord-row{grid-template-columns:1fr;gap:4px}
      .ord-cell-status,.ord-cell-pay,.ord-cell-price{display:none}
      .ord-row{position:relative}
      .ord-chevron{position:absolute;top:50%;right:16px;transform:translateY(-50%)}
      .ord-row-wrap .ord-row{padding-right:44px;padding-top:16px;padding-bottom:16px}
      .ord-tags-mobile{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;align-items:center}
      .ord-num{font-size:.88rem}
      .ord-meta{font-size:.76rem}
      .ord-tag{font-size:.72rem;padding:.25rem .6rem}
      .ord-pay{font-size:.72rem}
      .ord-body{padding:18px 16px 20px}
      .trk-lbl{font-size:.62rem;max-width:48px}
      .trk-ico{width:26px;height:26px}
      .ord-actions{flex-direction:column;gap:6px}
      .ord-actions .btn{width:100%;justify-content:center}
    }
    @media (max-width:480px){
      .ord-head{flex-direction:column;align-items:flex-start;gap:12px}
      .ord-toolbar{flex-direction:column;align-items:flex-start;gap:10px}
      .ord-tabs{overflow-x:auto;max-width:100%;width:100%}
      .ord-shell{padding-bottom:72px}
    }
    /* footer gap */
    #sbContent{padding-bottom:80px}
  </style>
</head>
<body>
<script src="../nav.js" data-page="orders"></script>
<script src="../sidebar.js" data-page="orders"></script>

<div class="loading-screen" id="loadingScreen">
  <div class="spinner"></div>
  <span class="loading-text">Загружаю заказы...</span>
</div>

<div class="confetti-wrap" id="confettiWrap"></div>

<div class="ord-banner" id="statusBanner">
  <span id="bannerIcon"></span>
  <span id="bannerText">Статус заказа изменился</span>
  <button class="ord-banner-close" onclick="closeBanner()">
    <svg viewBox="0 0 24 24" fill="none"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
  </button>
</div>

<!-- REVIEW MODAL -->
<div class="modal-overlay" id="reviewModal">
  <div class="modal">
    <div class="modal-icon-wrap" style="background:var(--warn-wash)">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--warn)" stroke-width="1.6"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
    </div>
    <h3>Оставить отзыв</h3>
    <p class="modal-p">Расскажите, как прошла работа над проектом</p>
    <div class="stars-row">
      <span class="star" data-v="1" onclick="setStar(1)"><svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></span>
      <span class="star" data-v="2" onclick="setStar(2)"><svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></span>
      <span class="star" data-v="3" onclick="setStar(3)"><svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></span>
      <span class="star" data-v="4" onclick="setStar(4)"><svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></span>
      <span class="star" data-v="5" onclick="setStar(5)"><svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></span>
    </div>
    <textarea class="review-textarea" id="reviewText" placeholder="Пару слов о сотрудничестве (необязательно)..."></textarea>
    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="closeReview()">Позже</button>
      <button class="btn btn-primary" onclick="submitReview()">Отправить</button>
    </div>
  </div>
</div>

<!-- DELIVERY MODAL -->
<div class="modal-overlay" id="deliveryModal">
  <div class="modal">
    <div class="modal-icon-wrap" style="background:var(--good-wash)">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--good)" stroke-width="1.7"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
    </div>
    <h3>Ваш сайт готов!</h3>
    <p class="modal-p">Работа завершена — можно посмотреть результат</p>
    <div id="deliveryModalContent"></div>
    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="closeDelivery()">Закрыть</button>
      <a class="btn btn-primary" id="deliveryLink" href="#" target="_blank" rel="noopener">Открыть сайт →</a>
    </div>
  </div>
</div>

<div id="sbContent" style="display:none">
<div class="ord-shell" id="appWrap">

  <div class="ord-head">
    <div>
      <div class="ord-title">Заказы</div>
      <div class="ord-sub">Статусы, документы и история работ по вашим сайтам</div>
    </div>
    <a href="../order" class="btn btn-primary">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M12 5v14M5 12h14"/></svg>
      Новый заказ
    </a>
  </div>

  <div class="ord-toolbar">
    <div class="ord-tabs" id="ordTabs">
      <button class="ord-tab is-active" data-filter="all">Все</button>
      <button class="ord-tab" data-filter="active">Активные</button>
      <button class="ord-tab" data-filter="done">Завершено</button>
      <button class="ord-tab" data-filter="unpaid">Не оплачены</button>
    </div>
    <span class="ord-count" id="ordCount"></span>
  </div>

  <div class="ord-cols">
    <span>Заказ</span><span>Статус</span><span>Оплата</span><span>Сумма</span><span></span>
  </div>

  <div class="ord-list" id="ordersList">
    <div style="padding:20px;color:var(--ink-faint);font-size:.85rem">Загрузка...</div>
  </div>

</div><!-- /ord-shell -->
</div><!-- /sbContent -->

<div class="toast" id="toast"></div>

<script type="module">
import { auth, db } from '../firebase-config.js';
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { collection, query, where, orderBy, onSnapshot, addDoc, serverTimestamp, doc, updateDoc, getDoc, deleteDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const STATUS_LABELS = ['Новая заявка','Обсуждение','В работе','На проверке','Правки','Готово'];
const STATUS_SUBS   = ['Заявка получена, скоро свяжемся','Уточняем детали проекта','Ведётся активная разработка','Отправлено на ваше согласование','Вносим правки по вашим пожеланиям','Проект завершён и сдан'];

const STEP_ICONS = [
  `<svg class="step-icon" viewBox="0 0 24 24" fill="none"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg>`,
  `<svg class="step-icon" viewBox="0 0 24 24" fill="none"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>`,
  `<svg class="step-icon" viewBox="0 0 24 24" fill="none"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>`,
  `<svg class="step-icon" viewBox="0 0 24 24" fill="none"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`,
  `<svg class="step-icon" viewBox="0 0 24 24" fill="none"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`,
  `<svg class="step-icon" viewBox="0 0 24 24" fill="none"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`,
];
const INFO_ICONS = [
  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>`,
  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>`,
  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>`,
  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`,
  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`,
  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`,
];
const INFO_COLORS = ['var(--surface-3)','var(--warn-wash)','var(--info-wash)','var(--accent-wash)','var(--warn-wash)','var(--good-wash)'];
const INFO_STROKE = ['var(--ink-faint)','var(--warn)','var(--info)','var(--accent-soft)','var(--warn)','var(--good)'];
const CHECK_SVG = `<svg class="check-icon" viewBox="0 0 24 24" fill="none"><polyline points="20 6 9 17 4 12"/></svg>`;

let currentUser = null, unsubOrders = null, unsubChat = null;
let lastStatuses = {}, reviewOrderId = null, reviewStars = 0, bannerTimer = null;
let isInitialLoad = true;

function escapeHtml(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function toast(msg, type='info'){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast ${type} show`;setTimeout(()=>t.className='toast',3200);}
function fmtDate(ts){if(!ts) return null;const d=ts.toDate?ts.toDate():new Date(ts);return d.toLocaleDateString('ru',{day:'numeric',month:'short',year:'numeric'});}
function getEstimate(pages=1,extras=[],status=0){if(status>=5) return null;let days=Math.max(2,Math.ceil(pages/3));if((extras||[]).includes('urgent')) days=1;const d=new Date();d.setDate(d.getDate()+days);return d.toLocaleDateString('ru',{day:'numeric',month:'long'});}

function showBanner(text, icon=''){clearTimeout(bannerTimer);document.getElementById('bannerText').textContent=text;document.getElementById('bannerIcon').innerHTML=icon;document.getElementById('statusBanner').classList.add('show');bannerTimer=setTimeout(closeBanner,6500);}
window.closeBanner=()=>document.getElementById('statusBanner').classList.remove('show');

function buildTracker(o){
  const s = o.status || 0;
  const stepLabels = ['Заявка','Обсуждение','В работе','Проверка','Правки','Готово'];
  const steps = stepLabels.map((label, i) => {
    const state = i < s ? 'done' : i === s ? 'current' : 'pending';
    return `<div class="trk-step ${state}">
      <div class="trk-ico">${STEP_ICONS[i]}${CHECK_SVG}</div>
      <div class="trk-lbl">${label}</div>
    </div>`;
  }).join('');
  return `<div class="trk">
    <div class="trk-row">${steps}</div>
    <div class="trk-info">
      <div class="trk-info-ico" style="background:${INFO_COLORS[s]};color:${INFO_STROKE[s]}">${INFO_ICONS[s]}</div>
      <div>
        <div class="trk-info-title">${STATUS_LABELS[s]}</div>
        <div class="trk-info-sub">${STATUS_SUBS[s]}</div>
      </div>
    </div>
  </div>`;
}

function buildSubsteps(o){
  const ss = o.substeps || [];
  if (!ss.length) return '';
  return `<div class="sub-list">${ss.map(s=>`
    <div class="sub-item ${s.done?'done':''}">
      <div class="sub-ico"><svg viewBox="0 0 24 24" fill="none"><polyline points="20 6 9 17 4 12"/></svg></div>
      <span class="sub-lbl">${s.label}</span>
      <span class="sub-date">${s.done&&s.date?s.date:''}</span>
    </div>`).join('')}</div>`;
}

function orderCard(o){
  const s = o.status || 0;
  const paid = o.paid || false;
  const estDate = getEstimate(o.pages, o.extras, s);
  const hasSite = s >= 5 && (o.siteUrl || o.siteDomain);
  let siteBlock = '';
  if(hasSite){
    const siteHref = o.siteUrl ? (o.siteUrl.match(/^https?:\/\//) ? o.siteUrl : 'https://'+o.siteUrl) : (o.siteDomain ? 'https://'+o.siteDomain : '#');
    const pages = (o.sitePages||'').split('\n').filter(Boolean);
    siteBlock = `<div class="delivery-card">
      <h4><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>Ваш сайт</h4>
      ${o.siteFaviconUrl?`<img class="site-favicon" src="${o.siteFaviconUrl}" alt=""/>`:''}
      ${o.siteDomain?`<div class="site-domain-big">${escapeHtml(o.siteDomain)}</div>`:''}
      ${pages.length?`<div class="site-pages-list">${pages.map(p=>`<div class="site-page-item">${escapeHtml(p)}</div>`).join('')}</div>`:''}
      <a href="${siteHref}" target="_blank" rel="noopener" class="btn btn-success btn-sm" onclick="event.stopPropagation()">Открыть сайт →</a>
    </div>`;
  }

  const statusComment = o.statusComment
    ? `<div class="ord-comment"><svg viewBox="0 0 24 24" fill="none"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>${escapeHtml(o.statusComment)}</div>`
    : '';

  return `<div class="ord-row-wrap" data-status="${s}" data-paid="${paid?1:0}">
    <button type="button" class="ord-row" onclick="toggleOrder(this)">
      <div class="ord-cell-main">
        <span class="ord-num">№ ${o.id.slice(0,8).toUpperCase()} · ${escapeHtml(o.siteType||'Сайт')}</span>
        <span class="ord-meta">${fmtDate(o.createdAt)||'—'}</span>
        <div class="ord-tags-mobile">
          <span class="ord-tag s${s}"><span class="ord-dot"></span>${STATUS_LABELS[s]}</span>
          <span class="ord-pay ${paid?'is-paid':'is-unpaid'}">${paid?'Оплачен':'Не оплачен'}</span>
        </div>
      </div>
      <div class="ord-cell-status"><span class="ord-tag s${s}"><span class="ord-dot"></span>${STATUS_LABELS[s]}</span></div>
      <div class="ord-cell-pay"><span class="ord-pay ${paid?'is-paid':'is-unpaid'}">
        <svg viewBox="0 0 24 24">${paid?'<polyline points="20 6 9 17 4 12"/>':'<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>'}</svg>
        ${paid?'Оплачен':'Не оплачен'}</span></div>
      <div class="ord-cell-price ord-price">${o.totalPrice?o.totalPrice.toLocaleString('ru')+' ₽':'—'}</div>
      <svg class="ord-chevron" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
    ${statusComment}
    <div class="ord-body">
      ${buildTracker(o)}
      ${buildSubsteps(o)}
      ${estDate?`<div class="ord-eta"><svg viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Ожидаемый срок: <strong style="color:var(--ink);margin-left:4px">${estDate}</strong></div>`:''}
      ${siteBlock}
      <div class="ord-actions">
        <button class="btn btn-ghost btn-xs" onclick="event.stopPropagation();printReceipt('${o.id}')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" style="width:11px;height:11px;stroke-width:2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
          Квитанция
        </button>
        ${s>=5&&!o.reviewed?`<button class="btn btn-xs btn-success" onclick="event.stopPropagation();openReview('${o.id}')">★ Отзыв</button>`:''}
        ${s===3?`<button class="btn btn-xs btn-warn" onclick="event.stopPropagation();requestRevision('${o.id}')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" style="width:11px;height:11px;stroke-width:2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          Запросить правки
        </button>`:''}
      </div>
    </div>
  </div>`;
}

window.toggleOrder = function(el){const exp=el.closest('.ord-row-wrap').querySelector('.ord-body');if(exp) exp.classList.toggle('open');};
window.requestRevision = async function(id){try{await updateDoc(doc(db,'orders',id),{revisionRequested:true});toast('Запрос отправлен ✓','success');}catch(e){toast('Ошибка','error');}};

function renderOrders(orders){
  const el = document.getElementById('ordersList');
  if(!orders.length){
    el.innerHTML = `<div class="empty">
      <div class="empty-icon"><svg viewBox="0 0 24 24" fill="none"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg></div>
      <h3>Здесь появятся ваши заказы</h3>
      <p>Оформите первый проект — это займёт пару минут</p>
      <a href="../order" class="btn btn-primary btn-sm">Заказать сайт</a>
    </div>`;
    return;
  }
  el.innerHTML = orders.map(o => orderCard(o)).join('');
}

function showDeliveryPopup(o){
  const rawUrl = o.siteUrl||'';
  const link = document.getElementById('deliveryLink');
  const siteHref = rawUrl ? (rawUrl.match(/^https?:\/\//) ? rawUrl : 'https://'+rawUrl) : (o.siteDomain ? 'https://'+o.siteDomain : '');
  link.href = siteHref||'#';
  if(!siteHref) link.style.display='none'; else link.style.display='';
  const pages = (o.sitePages||'').split('\n').filter(Boolean);
  document.getElementById('deliveryModalContent').innerHTML =
    `${o.siteDomain?`<div class="site-domain-big" style="margin-bottom:6px">${o.siteDomain}</div>`:''}
     ${o.siteFaviconUrl?`<img class="site-favicon" src="${o.siteFaviconUrl}" alt="fav"/>`:''}
     ${pages.length?`<div class="site-pages-list" style="margin-bottom:12px">${pages.map(p=>`<div class="site-page-item">${p}</div>`).join('')}</div>`:''}`;
  document.getElementById('deliveryModal').classList.add('show');
  launchConfetti();
}
window.closeDelivery = function(){document.getElementById('deliveryModal').classList.remove('show');};

window.openReview = function(id){reviewOrderId=id;reviewStars=0;document.querySelectorAll('.star').forEach(s=>s.classList.remove('on'));document.getElementById('reviewText').value='';document.getElementById('reviewModal').classList.add('show');};
window.closeReview = function(){document.getElementById('reviewModal').classList.remove('show');};
window.setStar = function(n){reviewStars=n;document.querySelectorAll('.star').forEach(s=>s.classList.toggle('on',+s.dataset.v<=n));};
window.submitReview = async function(){
  if(!reviewStars){toast('Выберите оценку','error');return;}
  if(!currentUser||!reviewOrderId) return;
  try{
    await addDoc(collection(db,'reviews'),{uid:currentUser.uid,orderId:reviewOrderId,stars:reviewStars,text:document.getElementById('reviewText').value.trim(),clientName:currentUser.displayName||'',clientEmail:currentUser.email,createdAt:serverTimestamp()});
    await updateDoc(doc(db,'orders',reviewOrderId),{reviewed:true}).catch(()=>{});
    closeReview();
    toast('Спасибо за отзыв! ✓','success');
  }catch(e){toast('Ошибка','error');}
};

// Кэш всех заказов для безопасного доступа из printReceipt
let _ordersCache = [];
window.printReceipt = function(id){
  const o = _ordersCache.find(x=>x.id===id);
  if(!o) return;
  const w = window.open('', '_blank', 'width=600,height=700');
  const date = o.createdAt ? new Date(o.createdAt.seconds * 1000).toLocaleDateString('ru', {day:'numeric', month:'long', year:'numeric'}) : '—';
  const extrasLabels = {domain:'Домен',seo:'SEO',content:'Контент',shop:'Каталог',urgent:'Срочно',support:'Обслуживание'};
  const extrasHtml = (o.extras||[]).length ? `<tr><td>Дополнения</td><td>${o.extras.map(e=>extrasLabels[e]||e).join(', ')}</td></tr>` : '';
  const totalHtml = `<tr class="total"><td>Итого</td><td>${o.totalPrice ? o.totalPrice.toLocaleString('ru') + ' ₽' : '—'}</td></tr>`;
  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Квитанция</title><style>body{font-family:system-ui,sans-serif;max-width:500px;margin:36px auto;padding:0 18px;color:#111;font-size:13px}h1{font-size:17px}table{width:100%;border-collapse:collapse}td{padding:6px 0;border-bottom:1px solid #eee}td:last-child{text-align:right;font-weight:600}.total td{font-size:14px;font-weight:700;border-bottom:none;padding-top:11px}</style></head><body><h1>Antviz</h1><p style="color:#666;font-size:11px">Квитанция по заказу</p><table><tr><td>Номер</td><td>№ ${o.id.slice(0,8).toUpperCase()}</td></tr><tr><td>Дата</td><td>${date}</td></tr><tr><td>Клиент</td><td>${o.clientName||'—'}</td></tr><tr><td>Email</td><td>${o.clientEmail||'—'}</td></tr><tr><td>Тип сайта</td><td>${o.siteType||'—'}</td></tr><tr><td>Тариф</td><td>${o.tariff||o.package||'—'}</td></tr><tr><td>Страниц</td><td>${o.pages||'—'}</td></tr>${extrasHtml}<tr><td>Оплата</td><td>${o.paid?'Оплачен':'Не оплачен'}</td></tr>${totalHtml}</table><script>window.onload=function(){window.print();};<\/script></body></html>`;
  w.document.write(html);
  w.document.close();
};

function launchConfetti(){const wrap=document.getElementById('confettiWrap');wrap.innerHTML='';const colors=['#1ede7b','#1ac16b','#191b1e','#3b82f6','#f59e0b','#e8634f','#dfe3e8'];for(let i=0;i<90;i++){const p=document.createElement('div');p.className='c-piece';p.style.cssText=`left:${Math.random()*100}%;background:${colors[Math.floor(Math.random()*colors.length)]};width:${6+Math.random()*6}px;height:${6+Math.random()*6}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${2.5+Math.random()*2}s;animation-delay:${Math.random()}s;opacity:1`;wrap.appendChild(p);}setTimeout(()=>{wrap.innerHTML='';},5000);}

function watchChatBadge(uid){
  // Уведомления о новых сообщениях поддержки — смотрим непрочитанные тикеты
  const q = query(collection(db,'tickets'),where('uid','==',uid),where('_read','==',false));
  unsubChat = onSnapshot(q, snap=>{
    const badge = document.getElementById('navChatBadge');
    if(badge) badge.style.display = snap.size?'':'none';
  }, ()=>{});
}

function loadOrders(uid){
  if(unsubOrders) unsubOrders();
  const q = query(collection(db,'orders'),where('uid','==',uid));
  unsubOrders = onSnapshot(q, snap=>{
    const orders = snap.docs.map(d=>({id:d.id,...d.data()}))
      .sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
    _ordersCache = orders;
    renderOrders(orders);
    snap.docChanges().forEach(ch=>{
      if(ch.type==='modified'){
        const o={id:ch.doc.id,...ch.doc.data()};
        const prev=lastStatuses[ch.doc.id];const cur=o.status??0;
        if(prev!==undefined&&prev!==cur){
          showBanner(STATUS_LABELS[cur]);
          if(cur===5&&!o.deliveryShown){const lsKey='antviz_delivery_seen_'+ch.doc.id;if(!localStorage.getItem(lsKey)){localStorage.setItem(lsKey,'1');setTimeout(()=>showDeliveryPopup(o),800);updateDoc(doc(db,'orders',ch.doc.id),{deliveryShown:true}).catch(()=>{});}}
          if(cur===5&&!o.reviewed) setTimeout(()=>openReview(o.id),4500);
        }
        lastStatuses[ch.doc.id]=cur;
      } else if(ch.type==='added'){
        const o={id:ch.doc.id,...ch.doc.data()};lastStatuses[ch.doc.id]=o.status??0;
        const lsKey='antviz_delivery_seen_'+ch.doc.id;
        if(!isInitialLoad&&o.status===5&&!o.deliveryShown&&!localStorage.getItem(lsKey)){
          localStorage.setItem(lsKey,'1');
          setTimeout(()=>{showDeliveryPopup(o);updateDoc(doc(db,'orders',ch.doc.id),{deliveryShown:true}).catch(()=>{});},1500);
        }
      }
    });
    if(isInitialLoad) isInitialLoad=false;
  }, err=>{
    console.error('Orders error:',err);
    renderOrders([]);
  });
}

document.addEventListener('keydown', e=>{if(e.key==='Escape'){closeReview();closeDelivery();}});

onAuthStateChanged(auth, async user=>{
  if(!user){window.location.href='../auth';return;}
  currentUser = user;
  document.getElementById('loadingScreen').style.display='none';
  document.getElementById('sbContent').style.display='block';
  loadOrders(user.uid);
  watchChatBadge(user.uid);
});
</script>

<script>
/* Presentation-only enhancement: filter tabs + live counts.
   Reads data-status/data-paid attributes already present on rendered rows;
   never touches Firebase data or the module above. */
(function(){
  const list = document.getElementById('ordersList');
  const tabs = document.getElementById('ordTabs');
  const countEl = document.getElementById('ordCount');
  let activeFilter = 'all';

  function matches(row, filter){
    const status = +row.dataset.status;
    const paid = row.dataset.paid === '1';
    if(filter==='all') return true;
    if(filter==='active') return status < 5;
    if(filter==='done') return status === 5;
    if(filter==='unpaid') return !paid;
    return true;
  }

  function apply(){
    const rows = Array.from(list.querySelectorAll('.ord-row-wrap'));
    let shown = 0;
    rows.forEach(r=>{
      const ok = matches(r, activeFilter);
      r.classList.toggle('is-filtered', !ok);
      if(ok) shown++;
    });
    countEl.textContent = rows.length ? `Показано ${shown} из ${rows.length}` : '';
  }

  if(tabs){
    tabs.addEventListener('click', e=>{
      const btn = e.target.closest('.ord-tab');
      if(!btn) return;
      tabs.querySelectorAll('.ord-tab').forEach(b=>b.classList.toggle('is-active', b===btn));
      activeFilter = btn.dataset.filter;
      apply();
    });
  }

  if(list){
    const mo = new MutationObserver(apply);
    mo.observe(list, { childList:true });
    apply();
  }
})();
</script>
