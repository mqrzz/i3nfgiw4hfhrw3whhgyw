<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Мои заказы — Antviz</title>
  <link rel="icon" href="../img/favicon.png" type="image/png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #0c0c0e;
      --bg2:      #111114;
      --bg3:      #161619;
      --card:     #131316;
      --border:   rgba(255,255,255,0.06);
      --border-hi:rgba(255,255,255,0.11);
      --accent:   #6c63ff;
      --accent2:  #a78bfa;
      --accent3:  #38bdf8;
      --text:     #ededf2;
      --muted:    #6b6b80;
      --muted2:   #8f8fa3;
      --success:  #4ade80;
      --error:    #f87171;
      --warn:     #fbbf24;
      --nav-h:    64px;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Inter', sans-serif; font-weight: 400;
      line-height: 1.6; min-height: 100vh; font-size: 14px;
      -webkit-font-smoothing: antialiased;
    }

    @keyframes spin   { to { transform: rotate(360deg); } }
    @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    @keyframes cFall  { to { transform: translateY(110vh) rotate(720deg); opacity: 0; } }

    .loading-screen {
      position: fixed; inset: 0; z-index: 999; background: var(--bg);
      display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 12px;
    }
    .spinner { width: 22px; height: 22px; border: 1.5px solid var(--border-hi); border-top-color: var(--accent); border-radius: 50%; animation: spin .65s linear infinite; }
    .loading-text { color: var(--muted); font-size: 12px; }

    /* Mobile top bar */
    .mobile-top-bar {
      display: none; position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
      z-index: 200; height: 42px;
      background: var(--bg2); border: 1px solid var(--border-hi);
      border-radius: 8px;
      align-items: center; padding: 0 12px; gap: 8px;
      width: auto; min-width: 200px; max-width: calc(100% - 28px);
    }
    .mobile-top-bar a { display: flex; align-items: center; gap: 4px; color: var(--muted); text-decoration: none; font-size: 13px; transition: color .15s; flex-shrink: 0; }
    .mobile-top-bar a:hover { color: var(--text); }
    .mobile-top-bar a svg { width: 14px; height: 14px; stroke: currentColor; stroke-width: 2; fill: none; }
    .mtb-title { font-size: 13px; font-weight: 600; white-space: nowrap; flex: 1; text-align: center; }
    @media (max-width: 768px) {
      .mobile-top-bar { display: flex !important; }
      .page-wrap { padding-top: calc(42px + 20px) !important; }
    }

    /* PAGE */
    .page-wrap {
      max-width: 640px; margin: 0 auto;
      padding: calc(var(--nav-h) + 32px) 16px 80px;
      animation: fadeUp .25s ease;
    }

    .page-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px; flex-wrap: wrap; gap: 10px;
    }
    .page-header-left { display: flex; align-items: center; gap: 12px; }
    .back-btn {
      display: inline-flex; align-items: center; gap: 5px;
      color: var(--muted); font-size: 13px;
      background: none; border: none; cursor: pointer; padding: 0;
      font-family: 'Inter', sans-serif; transition: color .15s; text-decoration: none;
    }
    .back-btn:hover { color: var(--text); }
    .back-btn svg { width: 15px; height: 15px; stroke: currentColor; stroke-width: 2; fill: none; flex-shrink: 0; }
    .page-title { font-size: 18px; font-weight: 600; letter-spacing: -.02em; }

    /* ORDERS */
    .orders-list { display: flex; flex-direction: column; gap: 8px; }
    .order-card  { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; transition: border-color .15s; }
    .order-card:hover { border-color: var(--border-hi); }
    .order-card-head { padding: 14px 16px; cursor: pointer; display: flex; flex-direction: column; gap: 8px; }
    .oc-top    { display: flex; align-items: center; gap: 8px; }
    .oc-num    { font-size: 11px; font-weight: 600; color: var(--muted2); letter-spacing: .05em; }
    .oc-meta   { color: var(--muted); font-size: 12px; }
    .oc-price  { font-size: 13px; font-weight: 600; margin-left: auto; color: var(--text); }
    .oc-status-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }

    .pay-pill    { display: inline-flex; align-items: center; gap: 3px; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; flex-shrink: 0; }
    .pay-yes     { background: rgba(74,222,128,.08);  color: var(--success); border: 1px solid rgba(74,222,128,.2); }
    .pay-no      { background: rgba(248,113,113,.08); color: var(--error);   border: 1px solid rgba(248,113,113,.2); }
    .status-pill { display: inline-flex; align-items: center; gap: 5px; padding: 2px 9px; border-radius: 4px; font-size: 11px; font-weight: 500; flex-shrink: 0; }
    .sp-dot      { width: 4px; height: 4px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
    .s0 { background: rgba(102,102,120,.1);  color: var(--muted2); border: 1px solid rgba(102,102,120,.18); }
    .s1 { background: rgba(251,191,36,.08);  color: var(--warn);   border: 1px solid rgba(251,191,36,.18); }
    .s2 { background: rgba(56,189,248,.08);  color: var(--accent3);border: 1px solid rgba(56,189,248,.18); }
    .s3 { background: rgba(167,139,250,.08); color: var(--accent2);border: 1px solid rgba(167,139,250,.18); }
    .s4 { background: rgba(251,191,36,.08);  color: var(--warn);   border: 1px solid rgba(251,191,36,.18); }
    .s5 { background: rgba(74,222,128,.08);  color: var(--success);border: 1px solid rgba(74,222,128,.18); }

    .status-comment {
      background: rgba(108,99,255,.05); border: 1px solid rgba(108,99,255,.12);
      border-radius: 8px; padding: 8px 12px; font-size: 12.5px;
      color: var(--accent2); line-height: 1.5;
      display: flex; align-items: flex-start; gap: 7px;
    }
    .status-comment svg { width: 12px; height: 12px; stroke: currentColor; stroke-width: 1.8; flex-shrink: 0; margin-top: 2px; fill: none; }

    .order-expand { display: none; border-top: 1px solid var(--border); padding: 14px 16px; }
    .order-expand.open { display: block; }

    /* TRACKER */
    .tracker-wrap { margin-bottom: 14px; }
    .tracker-row  { display: flex; align-items: flex-start; gap: 0; }
    .tr-step { display: flex; flex-direction: column; align-items: center; gap: 5px; flex: 1; min-width: 44px; position: relative; }
    .tr-step:not(:last-child)::after {
      content: ''; position: absolute; top: 16px;
      left: calc(50% + 17px); right: calc(-50% + 17px);
      height: 1px; background: var(--border); z-index: 0; transition: background .3s;
    }
    .tr-step.done:not(:last-child)::after    { background: var(--accent); }
    .tr-step.current:not(:last-child)::after { background: linear-gradient(to right, var(--accent), var(--border)); }
    .tr-ico {
      width: 32px; height: 32px; border-radius: 50%;
      border: 1px solid var(--border); background: var(--bg3);
      display: flex; align-items: center; justify-content: center;
      z-index: 1; position: relative; transition: all .25s; flex-shrink: 0;
    }
    .tr-ico svg { width: 13px; height: 13px; stroke: var(--muted); stroke-width: 1.8; fill: none; transition: stroke .25s; }
    .tr-step.done .tr-ico    { border-color: var(--accent); background: rgba(108,99,255,.12); }
    .tr-step.done .tr-ico svg { stroke: var(--accent2); }
    .tr-step.done .tr-ico .check-icon { display: block; }
    .tr-step.done .tr-ico .step-icon  { display: none; }
    .check-icon { display: none; }
    .tr-step.current .tr-ico { border-color: var(--accent2); background: rgba(167,139,250,.14); box-shadow: 0 0 0 3px rgba(108,99,255,.1); }
    .tr-step.current .tr-ico svg { stroke: var(--accent2); }
    .tr-step.pending .tr-ico { opacity: .3; }
    .tr-lbl { font-size: 10px; color: var(--muted); text-align: center; line-height: 1.3; max-width: 52px; }
    .tr-step.done .tr-lbl    { color: var(--muted2); }
    .tr-step.current .tr-lbl { color: var(--text); font-weight: 500; }

    .tracker-info {
      margin-top: 10px; padding: 10px 12px;
      background: var(--bg3); border: 1px solid var(--border); border-radius: 9px;
      display: flex; align-items: flex-start; gap: 10px;
    }
    .tracker-info-ico { width: 30px; height: 30px; border-radius: 7px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .tracker-info-ico svg { width: 14px; height: 14px; stroke-width: 1.8; }
    .tr-info-title { font-size: 13px; font-weight: 500; margin-bottom: 2px; }
    .tr-info-sub   { font-size: 12px; color: var(--muted); line-height: 1.5; }

    /* Substeps */
    .substeps { display: flex; flex-direction: column; gap: 4px; margin: 10px 0; padding: 10px 12px; background: var(--bg3); border: 1px solid var(--border); border-radius: 9px; }
    .substep  { display: flex; align-items: center; gap: 8px; font-size: 12.5px; }
    .substep-ico { width: 16px; height: 16px; border-radius: 50%; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .substep-ico svg { width: 8px; height: 8px; stroke: var(--muted); stroke-width: 2.5; fill: none; }
    .substep.done .substep-ico { border-color: var(--success); background: rgba(74,222,128,.08); }
    .substep.done .substep-ico svg { stroke: var(--success); }
    .substep-lbl  { flex: 1; color: var(--muted); }
    .substep.done .substep-lbl { color: var(--text); }
    .substep-date { font-size: 11px; color: var(--muted); white-space: nowrap; }

    /* Delivery card */
    .site-delivery-card {
      background: rgba(74,222,128,.04); border: 1px solid rgba(74,222,128,.16);
      border-radius: 10px; padding: 14px; margin-bottom: 10px;
    }
    .site-delivery-card h4 {
      font-size: 12px; font-weight: 600; color: var(--success); margin-bottom: 10px;
      display: flex; align-items: center; gap: 6px; letter-spacing: .02em; text-transform: uppercase;
    }
    .site-delivery-card h4 svg { width: 13px; height: 13px; stroke: currentColor; stroke-width: 1.8; fill: none; }
    .site-domain-big { font-size: 15px; font-weight: 600; margin-bottom: 4px; letter-spacing: -.01em; }
    .site-favicon    { width: 24px; height: 24px; border-radius: 5px; object-fit: contain; background: var(--bg3); border: 1px solid var(--border); margin-bottom: 8px; }
    .site-pages-list { display: flex; flex-direction: column; gap: 3px; margin-bottom: 10px; }
    .site-page-item  { display: flex; align-items: center; gap: 6px; font-size: 12.5px; color: var(--muted2); }
    .site-page-item::before { content: ''; width: 4px; height: 4px; border-radius: 50%; background: var(--success); flex-shrink: 0; }

    .delivery-row {
      display: flex; align-items: center; gap: 6px;
      background: rgba(56,189,248,.05); border: 1px solid rgba(56,189,248,.12);
      border-radius: 8px; padding: 7px 10px; font-size: 12.5px; color: var(--accent3); margin-bottom: 10px;
    }
    .delivery-row svg { width: 12px; height: 12px; stroke: currentColor; stroke-width: 1.8; fill: none; flex-shrink: 0; }
    .order-actions { display: flex; gap: 6px; flex-wrap: wrap; }

    /* EMPTY */
    .empty { text-align: center; padding: 48px 16px; color: var(--muted); }
    .empty-icon { margin-bottom: 14px; display: flex; justify-content: center; }
    .empty-icon svg { width: 40px; height: 40px; stroke: var(--muted); stroke-width: 1.2; fill: none; opacity: .4; }
    .empty h3 { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 5px; }
    .empty p  { font-size: 13px; margin-bottom: 18px; }

    /* BUTTONS */
    .btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 9px 18px; border-radius: 8px;
      font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500;
      text-decoration: none; cursor: pointer; border: none;
      transition: background .15s, opacity .15s;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #7c74ff; }
    .btn-ghost   { background: transparent; border: 1px solid var(--border); color: var(--muted); }
    .btn-ghost:hover { border-color: var(--border-hi); color: var(--text); }
    .btn-danger  { background: rgba(248,113,113,.07); color: var(--error); border: 1px solid rgba(248,113,113,.16); }
    .btn-danger:hover { background: rgba(248,113,113,.13); }
    .btn-success { background: rgba(74,222,128,.08); color: var(--success); border: 1px solid rgba(74,222,128,.18); }
    .btn-xs { padding: 4px 10px; font-size: 11.5px; }
    .btn-sm { padding: 6px 13px; font-size: 12px; }

    /* TOAST */
    .toast {
      position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(10px);
      z-index: 700; padding: 7px 16px; border-radius: 7px; font-size: 12px; font-weight: 500;
      opacity: 0; transition: opacity .22s, transform .22s; pointer-events: none; white-space: nowrap;
    }
    .toast.show    { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.success { background: rgba(74,222,128,.12);  border: 1px solid rgba(74,222,128,.3);  color: var(--success); }
    .toast.error   { background: rgba(248,113,113,.12); border: 1px solid rgba(248,113,113,.3); color: var(--error); }
    .toast.info    { background: rgba(108,99,255,.12);  border: 1px solid rgba(108,99,255,.3);  color: var(--accent2); }

    /* MODAL */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 800; background: rgba(0,0,0,.65);
      display: flex; align-items: center; justify-content: center; padding: 16px;
      opacity: 0; pointer-events: none; transition: opacity .22s;
    }
    .modal-overlay.show { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--bg2); border: 1px solid var(--border-hi);
      border-radius: 14px; padding: 24px 20px; width: 100%; max-width: 420px;
      transform: scale(.96); transition: transform .22s;
    }
    .modal-overlay.show .modal { transform: scale(1); }
    .modal-icon { font-size: 26px; margin-bottom: 10px; text-align: center; }
    .modal h3   { font-size: 15px; font-weight: 600; margin-bottom: 6px; text-align: center; }
    .modal-p    { color: var(--muted); font-size: 13px; text-align: center; margin-bottom: 16px; line-height: 1.55; }
    .modal-btns { display: flex; gap: 8px; }
    .modal-btns .btn { flex: 1; justify-content: center; }

    .stars-row { display: flex; justify-content: center; gap: 4px; margin-bottom: 14px; }
    .star { font-size: 28px; cursor: pointer; filter: grayscale(1) opacity(.3); transition: filter .14s, transform .12s; }
    .star.on { filter: none; }
    .star:hover { transform: scale(1.12); }
    .review-textarea {
      width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px;
      padding: 9px 12px; color: var(--text);
      font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 400;
      outline: none; resize: vertical; min-height: 80px; margin-bottom: 14px;
      transition: border-color .18s;
    }
    .review-textarea:focus { border-color: rgba(108,99,255,.4); }

    /* Confetti */
    .confetti-wrap { position: fixed; inset: 0; z-index: 1000; pointer-events: none; overflow: hidden; }
    .c-piece       { position: absolute; top: -10px; border-radius: 2px; animation: cFall linear forwards; }

    /* Banner */
    .status-banner {
      position: fixed; top: 76px; left: 50%; transform: translateX(-50%) translateY(-8px); z-index: 300;
      background: var(--card); border: 1px solid var(--border-hi); border-radius: 8px;
      padding: 8px 16px 8px 12px;
      display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 500;
      opacity: 0; pointer-events: none; transition: opacity .25s, transform .25s; white-space: nowrap;
    }
    .status-banner.show { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: all; }
    .banner-close { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 13px; padding: 0; }
  </style>
</head>
<body>
<script src="../nav.js" data-page="orders"></script>

<div class="loading-screen" id="loadingScreen">
  <div class="spinner"></div>
  <span class="loading-text">Загружаю заказы...</span>
</div>

<div class="confetti-wrap" id="confettiWrap"></div>

<div class="status-banner" id="statusBanner">
  <span id="bannerIcon"></span>
  <span id="bannerText">Статус заказа изменился</span>
  <button class="banner-close" onclick="closeBanner()">✕</button>
</div>

<!-- REVIEW MODAL -->
<div class="modal-overlay" id="reviewModal">
  <div class="modal">
    <div class="modal-icon">⭐</div>
    <h3>Оставить отзыв</h3>
    <p class="modal-p">Расскажите как прошла работа</p>
    <div class="stars-row">
      <span class="star" data-v="1" onclick="setStar(1)">★</span>
      <span class="star" data-v="2" onclick="setStar(2)">★</span>
      <span class="star" data-v="3" onclick="setStar(3)">★</span>
      <span class="star" data-v="4" onclick="setStar(4)">★</span>
      <span class="star" data-v="5" onclick="setStar(5)">★</span>
    </div>
    <textarea class="review-textarea" id="reviewText" placeholder="Напишите пару слов о сотрудничестве..."></textarea>
    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="closeReview()">Позже</button>
      <button class="btn btn-primary" onclick="submitReview()">Отправить</button>
    </div>
  </div>
</div>

<!-- DELIVERY MODAL -->
<div class="modal-overlay" id="deliveryModal">
  <div class="modal">
    <div class="modal-icon">🎉</div>
    <h3>Ваш сайт готов!</h3>
    <p class="modal-p">Работа завершена — посмотрите результат</p>
    <div id="deliveryModalContent"></div>
    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="closeDelivery()">Закрыть</button>
      <a class="btn btn-primary" id="deliveryLink" href="#" target="_blank" rel="noopener">Открыть сайт →</a>
    </div>
  </div>
</div>

<!-- Mobile top bar -->
<div class="mobile-top-bar">
  <a href="../profile">
    <svg viewBox="0 0 24 24" fill="none"><polyline points="15 18 9 12 15 6"/></svg>
    Кабинет
  </a>
  <span style="flex:1"></span>
  <span class="mtb-title">Мои заказы</span>
  <span style="flex:1"></span>
</div>

<div class="page-wrap" id="appWrap" style="display:none">

  <div class="page-header">
    <div class="page-header-left">
      <a href="../profile" class="back-btn">
        <svg viewBox="0 0 24 24" fill="none"><polyline points="15 18 9 12 15 6"/></svg>
        Назад
      </a>
      <div class="page-title">Мои заказы</div>
    </div>
    <a href="../order" class="btn btn-primary btn-sm">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" style="width:12px;height:12px;stroke-width:2.5"><path d="M12 5v14M5 12h14"/></svg>
      Новый заказ
    </a>
  </div>

  <div class="orders-list" id="ordersList">
    <p style="color:var(--muted);font-size:13px">Загрузка...</p>
  </div>

</div>

<div class="toast" id="toast"></div>

<script type="module">
import { auth, db } from '../firebase-config.js';
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { collection, query, where, orderBy, onSnapshot, addDoc, serverTimestamp, doc, updateDoc, getDoc, deleteDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const STATUS_LABELS = ['Новая заявка','Обсуждение','В работе','На проверке','Правки','Готово'];
const STATUS_SUBS   = ['Заявка получена, скоро свяжемся','Уточняем детали проекта','Ведётся активная разработка','Отправлено на ваше согласование','Вносим правки по вашим пожеланиям','Проект завершён и сдан'];

const STEP_ICONS = [
  `<svg class="step-icon" viewBox="0 0 24 24" fill="none"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg>`,
  `<svg class="step-icon" viewBox="0 0 24 24" fill="none"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>`,
  `<svg class="step-icon" viewBox="0 0 24 24" fill="none"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>`,
  `<svg class="step-icon" viewBox="0 0 24 24" fill="none"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`,
  `<svg class="step-icon" viewBox="0 0 24 24" fill="none"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`,
  `<svg class="step-icon" viewBox="0 0 24 24" fill="none"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`,
];
const INFO_ICONS = [
  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>`,
  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>`,
  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>`,
  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`,
  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`,
  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`,
];
const INFO_COLORS = ['rgba(102,102,120,.12)','rgba(251,191,36,.1)','rgba(56,189,248,.1)','rgba(167,139,250,.1)','rgba(251,191,36,.1)','rgba(74,222,128,.1)'];
const INFO_STROKE = ['var(--muted2)','var(--warn)','var(--accent3)','var(--accent2)','var(--warn)','var(--success)'];
const CHECK_SVG = `<svg class="check-icon" viewBox="0 0 24 24" fill="none"><polyline points="20 6 9 17 4 12"/></svg>`;

let currentUser = null, unsubOrders = null, unsubChat = null;
let lastStatuses = {}, reviewOrderId = null, reviewStars = 0, bannerTimer = null;
let isInitialLoad = true;

function toast(msg, type='info'){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast ${type} show`;setTimeout(()=>t.className='toast',3200);}
function fmtDate(ts){if(!ts) return null;const d=ts.toDate?ts.toDate():new Date(ts);return d.toLocaleDateString('ru',{day:'numeric',month:'short',year:'numeric'});}
function getEstimate(pages=1,extras=[],status=0){if(status>=5) return null;let days=Math.max(2,Math.ceil(pages/3));if((extras||[]).includes('urgent')) days=1;const d=new Date();d.setDate(d.getDate()+days);return d.toLocaleDateString('ru',{day:'numeric',month:'long'});}

function showBanner(text, icon=''){clearTimeout(bannerTimer);document.getElementById('bannerText').textContent=text;document.getElementById('bannerIcon').innerHTML=icon;document.getElementById('statusBanner').classList.add('show');bannerTimer=setTimeout(closeBanner,6500);}
window.closeBanner=()=>document.getElementById('statusBanner').classList.remove('show');

function buildTracker(o){
  const s = o.status || 0;
  const stepLabels = ['Заявка','Обсуждение','В работе','Проверка','Правки','Готово'];
  const steps = stepLabels.map((label, i) => {
    const state = i < s ? 'done' : i === s ? 'current' : 'pending';
    return `<div class="tr-step ${state}">
      <div class="tr-ico">${STEP_ICONS[i]}${CHECK_SVG}</div>
      <div class="tr-lbl">${label}</div>
    </div>`;
  }).join('');
  return `<div class="tracker-wrap">
    <div class="tracker-row">${steps}</div>
    <div class="tracker-info">
      <div class="tracker-info-ico" style="background:${INFO_COLORS[s]};color:${INFO_STROKE[s]}">${INFO_ICONS[s]}</div>
      <div>
        <div class="tr-info-title">${STATUS_LABELS[s]}</div>
        <div class="tr-info-sub">${STATUS_SUBS[s]}</div>
      </div>
    </div>
  </div>`;
}

function buildSubsteps(o){
  const ss = o.substeps || [];
  if (!ss.length) return '';
  return `<div class="substeps">${ss.map(s=>`
    <div class="substep ${s.done?'done':''}">
      <div class="substep-ico"><svg viewBox="0 0 24 24" fill="none"><polyline points="20 6 9 17 4 12"/></svg></div>
      <span class="substep-lbl">${s.label}</span>
      <span class="substep-date">${s.done&&s.date?s.date:''}</span>
    </div>`).join('')}</div>`;
}

function orderCard(o){
  const s = o.status || 0;
  const paid = o.paid || false;
  const estDate = getEstimate(o.pages, o.extras, s);
  const hasSite = s >= 5 && (o.siteUrl || o.siteDomain);
  let siteBlock = '';
  if(hasSite){
    const siteHref = o.siteUrl ? (o.siteUrl.match(/^https?:\/\//) ? o.siteUrl : 'https://'+o.siteUrl) : (o.siteDomain ? 'https://'+o.siteDomain : '#');
    const pages = (o.sitePages||'').split('\n').filter(Boolean);
    siteBlock = `<div class="site-delivery-card">
      <h4><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>Ваш сайт</h4>
      ${o.siteFaviconUrl?`<img class="site-favicon" src="${o.siteFaviconUrl}" alt=""/>`:''}
      ${o.siteDomain?`<div class="site-domain-big">${o.siteDomain}</div>`:''}
      ${pages.length?`<div class="site-pages-list">${pages.map(p=>`<div class="site-page-item">${p}</div>`).join('')}</div>`:''}
      <a href="${siteHref}" target="_blank" rel="noopener" class="btn btn-success btn-sm" onclick="event.stopPropagation()">Открыть сайт →</a>
    </div>`;
  }

  const statusComment = o.statusComment
    ? `<div class="status-comment"><svg viewBox="0 0 24 24" fill="none"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>${o.statusComment}</div>`
    : '';

  return `<div class="order-card">
    <div class="order-card-head" onclick="toggleOrder(this)">
      <div class="oc-top">
        <span class="oc-num">№ ${o.id.slice(0,8).toUpperCase()}</span>
        <span class="oc-meta">${o.siteType||'Сайт'} · ${fmtDate(o.createdAt)||'—'}</span>
        <span class="oc-price">${o.totalPrice?o.totalPrice.toLocaleString('ru')+' ₽':'—'}</span>
      </div>
      <div class="oc-status-row">
        <span class="status-pill s${s}"><span class="sp-dot"></span>${STATUS_LABELS[s]}</span>
        <span class="pay-pill ${paid?'pay-yes':'pay-no'}">${paid?'✓ Оплачен':'✕ Не оплачен'}</span>
      </div>
      ${statusComment}
    </div>
    <div class="order-expand">
      ${buildTracker(o)}
      ${buildSubsteps(o)}
      ${estDate?`<div class="delivery-row"><svg viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Ожидаемый срок: <strong style="color:var(--text);margin-left:4px">${estDate}</strong></div>`:''}
      ${siteBlock}
      <div class="order-actions">
        <button class="btn btn-ghost btn-xs" onclick="event.stopPropagation();printReceipt(${JSON.stringify(o).replace(/"/g,'&quot;')})">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" style="width:11px;height:11px;stroke-width:2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
          Квитанция
        </button>
        ${s>=5&&!o.reviewed?`<button class="btn btn-xs btn-success" onclick="event.stopPropagation();openReview('${o.id}')">★ Отзыв</button>`:''}
        ${s===3?`<button class="btn btn-xs" style="background:rgba(251,191,36,.08);color:var(--warn);border:1px solid rgba(251,191,36,.18)" onclick="event.stopPropagation();requestRevision('${o.id}')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" style="width:11px;height:11px;stroke-width:2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          Запросить правки
        </button>`:''}
      </div>
    </div>
  </div>`;
}

window.toggleOrder = function(el){const exp=el.closest('.order-card').querySelector('.order-expand');if(exp) exp.classList.toggle('open');};
window.requestRevision = async function(id){try{await updateDoc(doc(db,'orders',id),{revisionRequested:true});toast('Запрос отправлен ✓','success');}catch(e){toast('Ошибка','error');}};

function renderOrders(orders){
  const el = document.getElementById('ordersList');
  if(!orders.length){
    el.innerHTML = `<div class="empty">
      <div class="empty-icon"><svg viewBox="0 0 24 24" fill="none"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg></div>
      <h3>Заказов пока нет</h3>
      <p>Оформите первый заказ — займёт 2 минуты</p>
      <a href="../order" class="btn btn-primary btn-sm">Заказать сайт</a>
    </div>`;
    return;
  }
  el.innerHTML = orders.map(o => orderCard(o)).join('');
}

function showDeliveryPopup(o){
  const rawUrl = o.siteUrl||'';
  const link = document.getElementById('deliveryLink');
  const siteHref = rawUrl ? (rawUrl.match(/^https?:\/\//) ? rawUrl : 'https://'+rawUrl) : (o.siteDomain ? 'https://'+o.siteDomain : '');
  link.href = siteHref||'#';
  if(!siteHref) link.style.display='none'; else link.style.display='';
  const pages = (o.sitePages||'').split('\n').filter(Boolean);
  document.getElementById('deliveryModalContent').innerHTML =
    `${o.siteDomain?`<div class="site-domain-big" style="margin-bottom:6px">${o.siteDomain}</div>`:''}
     ${o.siteFaviconUrl?`<img class="site-favicon" src="${o.siteFaviconUrl}" alt="fav"/>`:''}
     ${pages.length?`<div class="site-pages-list" style="margin-bottom:12px">${pages.map(p=>`<div class="site-page-item">${p}</div>`).join('')}</div>`:''}`;
  document.getElementById('deliveryModal').classList.add('show');
  launchConfetti();
}
window.closeDelivery = function(){document.getElementById('deliveryModal').classList.remove('show');};

window.openReview = function(id){reviewOrderId=id;reviewStars=0;document.querySelectorAll('.star').forEach(s=>s.classList.remove('on'));document.getElementById('reviewText').value='';document.getElementById('reviewModal').classList.add('show');};
window.closeReview = function(){document.getElementById('reviewModal').classList.remove('show');};
window.setStar = function(n){reviewStars=n;document.querySelectorAll('.star').forEach(s=>s.classList.toggle('on',+s.dataset.v<=n));};
window.submitReview = async function(){
  if(!reviewStars){toast('Выберите оценку','error');return;}
  if(!currentUser||!reviewOrderId) return;
  try{
    await addDoc(collection(db,'reviews'),{uid:currentUser.uid,orderId:reviewOrderId,stars:reviewStars,text:document.getElementById('reviewText').value.trim(),clientName:currentUser.displayName||'',clientEmail:currentUser.email,createdAt:serverTimestamp()});
    await updateDoc(doc(db,'orders',reviewOrderId),{reviewed:true}).catch(()=>{});
    closeReview();
    toast('Спасибо за отзыв! ✓','success');
  }catch(e){toast('Ошибка','error');}
};

window.printReceipt = function(o){
  const w = window.open('', '_blank', 'width=600,height=700');
  const date = o.createdAt ? new Date(o.createdAt.seconds * 1000).toLocaleDateString('ru', {day:'numeric', month:'long', year:'numeric'}) : '—';
  const extrasHtml = (o.extras || []).length ? `<tr><td>Дополнения</td><td>${o.extras.join(', ')}</td></tr>` : '';
  const totalHtml = `<tr class="total"><td>Итого</td><td>${o.totalPrice ? o.totalPrice.toLocaleString('ru') + ' ₽' : '—'}</td></tr>`;
  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Квитанция</title><style>body{font-family:system-ui,sans-serif;max-width:500px;margin:36px auto;padding:0 18px;color:#111;font-size:13px}h1{font-size:17px}table{width:100%;border-collapse:collapse}td{padding:6px 0;border-bottom:1px solid #eee}td:last-child{text-align:right;font-weight:600}.total td{font-size:14px;font-weight:700;border-bottom:none;padding-top:11px}</style></head><body><h1>Design Antviz</h1><p style="color:#666;font-size:11px">Квитанция по заказу</p><table><tr><td>Номер</td><td>№ ${o.id.slice(0,8).toUpperCase()}</td></tr><tr><td>Дата</td><td>${date}</td></tr><tr><td>Клиент</td><td>${o.clientName||'—'}</td></tr><tr><td>Email</td><td>${o.clientEmail||'—'}</td></tr><tr><td>Тип сайта</td><td>${o.siteType||'—'}</td></tr><tr><td>Тариф</td><td>${o.tariff||'—'}</td></tr><tr><td>Страниц</td><td>${o.pages||'—'}</td></tr>${extrasHtml}<tr><td>Оплата</td><td>${o.paid?'Оплачен':'Не оплачен'}</td></tr>${totalHtml}</table><script>window.onload=function(){window.print();};<\/script></body></html>`;
  w.document.write(html);
  w.document.close();
};

function launchConfetti(){const wrap=document.getElementById('confettiWrap');wrap.innerHTML='';const colors=['#6c63ff','#a78bfa','#38bdf8','#4ade80','#fbbf24','#f87171','#fff'];for(let i=0;i<90;i++){const p=document.createElement('div');p.className='c-piece';p.style.cssText=`left:${Math.random()*100}%;background:${colors[Math.floor(Math.random()*colors.length)]};width:${6+Math.random()*6}px;height:${6+Math.random()*6}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${2.5+Math.random()*2}s;animation-delay:${Math.random()}s;opacity:1`;wrap.appendChild(p);}setTimeout(()=>{wrap.innerHTML='';},5000);}

function watchChatBadge(uid){
  const q = collection(db,'chats',uid,'messages');
  unsubChat = onSnapshot(q, snap=>{
    const hasUnread = snap.docs.some(d=>{const m=d.data();return m.sender==='admin'&&!m.readByUser;});
    document.getElementById('navChatBadge').style.display = hasUnread?'':'none';
  }, ()=>{});
}

function loadOrders(uid){
  if(unsubOrders) unsubOrders();
  const q = query(collection(db,'orders'),where('uid','==',uid));
  unsubOrders = onSnapshot(q, snap=>{
    const orders = snap.docs.map(d=>({id:d.id,...d.data()}))
      .sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
    renderOrders(orders);
    snap.docChanges().forEach(ch=>{
      if(ch.type==='modified'){
        const o={id:ch.doc.id,...ch.doc.data()};
        const prev=lastStatuses[ch.doc.id];const cur=o.status??0;
        if(prev!==undefined&&prev!==cur){
          showBanner(STATUS_LABELS[cur]);
          if(cur===5&&!o.deliveryShown){const lsKey='antviz_delivery_seen_'+ch.doc.id;if(!localStorage.getItem(lsKey)){localStorage.setItem(lsKey,'1');setTimeout(()=>showDeliveryPopup(o),800);updateDoc(doc(db,'orders',ch.doc.id),{deliveryShown:true}).catch(()=>{});}}
          if(cur===5&&!o.reviewed) setTimeout(()=>openReview(o.id),4500);
        }
        lastStatuses[ch.doc.id]=cur;
      } else if(ch.type==='added'){
        const o={id:ch.doc.id,...ch.doc.data()};lastStatuses[ch.doc.id]=o.status??0;
        const lsKey='antviz_delivery_seen_'+ch.doc.id;
        if(!isInitialLoad&&o.status===5&&!o.deliveryShown&&!localStorage.getItem(lsKey)){
          localStorage.setItem(lsKey,'1');
          setTimeout(()=>{showDeliveryPopup(o);updateDoc(doc(db,'orders',ch.doc.id),{deliveryShown:true}).catch(()=>{});},1500);
        }
      }
    });
    if(isInitialLoad) isInitialLoad=false;
  }, err=>{
    console.error('Orders error:',err);
    renderOrders([]);
  });
}

document.addEventListener('keydown', e=>{if(e.key==='Escape'){closeReview();closeDelivery();}});

onAuthStateChanged(auth, async user=>{
  if(!user){window.location.href='../auth';return;}
  currentUser = user;
  document.getElementById('loadingScreen').style.display='none';
  document.getElementById('appWrap').style.display='block';
  loadOrders(user.uid);
  watchChatBadge(user.uid);
});
</script>

<script src="../footer.js" data-page="orders"></script>
</body>
</html>
