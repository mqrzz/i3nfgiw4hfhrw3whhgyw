<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Поддержка — Antviz</title>
  <link rel="icon" href="../img/favicon.png" type="image/png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0c0c0e;
      --bg2:      #111114;
      --bg3:      #161619;
      --card:     #131316;
      --border:   rgba(255,255,255,0.06);
      --border-hi:rgba(255,255,255,0.11);
      --accent:   #6c63ff;
      --accent2:  #a78bfa;
      --accent3:  #38bdf8;
      --text:     #ededf2;
      --muted:    #6b6b80;
      --muted2:   #8f8fa3;
      --success:  #4ade80;
      --error:    #f87171;
      --warn:     #fbbf24;
      --nav-h:    64px;
    }

    html, body { height: 100%; overflow: hidden; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
    }

    /* ── animations ── */
    @keyframes spin       { to { transform: rotate(360deg); } }
    @keyframes fadeUp     { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
    @keyframes msgIn      { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } }
    @keyframes botTyping  { 0%,60%,100% { transform:translateY(0); } 30% { transform:translateY(-3px); } }

    /* ── loading ── */
    .loading-screen {
      position: fixed; inset: 0; z-index: 999;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 12px;
    }
    .spinner {
      width: 22px; height: 22px;
      border: 1.5px solid var(--border-hi);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .65s linear infinite;
    }
    .loading-text { color: var(--muted); font-size: 12px; letter-spacing: .02em; }

    /* ── layout ── */
    .chat-layout {
      position: fixed;
      top: var(--nav-h); left: 0; right: 0; bottom: 0;
      display: flex; flex-direction: column;
      max-width: 680px; margin: 0 auto;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }
    @media (max-width: 768px) {
      .chat-layout { top: 0; border: none; }
    }

    /* ── header ── */
    .chat-hdr {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--bg);
    }
    .back-link {
      display: flex; align-items: center; justify-content: center;
      width: 32px; height: 32px;
      border-radius: 8px;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      text-decoration: none;
      flex-shrink: 0;
      transition: border-color .15s, color .15s, background .15s;
    }
    .back-link:hover { background: var(--bg3); border-color: var(--border-hi); color: var(--text); }
    .back-link svg { width: 15px; height: 15px; stroke: currentColor; stroke-width: 2; fill: none; }

    .chat-hdr-info {
      display: flex; flex-direction: column; gap: 1px; flex: 1;
    }
    .chat-hdr-name {
      font-size: 13px; font-weight: 600; color: var(--text); letter-spacing: -.01em;
    }
    .chat-hdr-sub {
      font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 5px;
    }
    .online-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--success);
      display: inline-block; flex-shrink: 0;
    }
    .chat-av {
      width: 32px; height: 32px; border-radius: 8px;
      background: var(--bg3);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; flex-shrink: 0;
    }
    .chat-av img { width: 20px; height: 20px; object-fit: contain; }

    /* ── messages ── */
    .chat-msgs {
      flex: 1; overflow-y: auto;
      padding: 20px 16px 16px;
      display: flex; flex-direction: column; gap: 6px;
      scroll-behavior: smooth;
    }
    .chat-msgs::-webkit-scrollbar { width: 3px; }
    .chat-msgs::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 2px; }

    .msg { max-width: 78%; display: flex; flex-direction: column; gap: 3px; animation: msgIn .2s ease both; }
    .msg.mine   { align-self: flex-end; align-items: flex-end; }
    .msg.theirs { align-self: flex-start; align-items: flex-start; }

    .msg-bubble {
      padding: 9px 13px;
      font-size: 13.5px; line-height: 1.55; word-break: break-word;
      border-radius: 16px;
    }
    .msg.mine .msg-bubble {
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg.theirs .msg-bubble {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }
    .msg-time {
      font-size: 10.5px; color: var(--muted); padding: 0 2px;
    }

    /* ── typing ── */
    .typing-indicator {
      align-self: flex-start;
      display: flex; align-items: center; gap: 4px;
      padding: 10px 14px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 16px; border-bottom-left-radius: 4px;
      animation: fadeUp .18s ease;
    }
    .typing-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--muted);
      animation: botTyping 1.2s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: .18s; }
    .typing-dot:nth-child(3) { animation-delay: .36s; }

    /* ── bot action buttons ── */
    .bot-actions {
      display: flex; flex-wrap: wrap; gap: 6px;
      margin-top: 6px;
      animation: fadeUp .2s ease both;
    }
    .bot-btn {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--muted2);
      font-family: 'Inter', sans-serif;
      font-size: 12px; font-weight: 400;
      padding: 6px 13px;
      border-radius: 6px;
      cursor: pointer;
      white-space: nowrap;
      transition: background .13s, border-color .13s, color .13s;
    }
    .bot-btn:hover { background: var(--bg2); border-color: var(--border-hi); color: var(--text); }
    .bot-btn.accent {
      border-color: rgba(108,99,255,.35);
      color: var(--accent2);
      background: rgba(108,99,255,.06);
    }
    .bot-btn.accent:hover {
      background: rgba(108,99,255,.12);
      border-color: rgba(108,99,255,.55);
      color: #c4b5fd;
    }
    .bot-btn.back { color: var(--muted); font-size: 11.5px; }
    .bot-btn.back:hover { color: var(--muted2); }

    /* ── order card ── */
    .order-info-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 12px;
      margin-top: 4px;
      min-width: 200px;
    }
    .oi-num {
      font-size: 10.5px; font-weight: 600;
      color: var(--muted); letter-spacing: .06em; text-transform: uppercase;
      margin-bottom: 10px;
    }
    .oi-row {
      display: flex; justify-content: space-between; align-items: center;
      gap: 8px; padding: 6px 0;
      border-bottom: 1px solid var(--border);
    }
    .oi-row:last-child { border-bottom: none; }
    .oi-lbl { color: var(--muted); }
    .oi-val { font-weight: 500; text-align: right; }

    .s-pill {
      display: inline-block;
      padding: 2px 8px; border-radius: 4px;
      font-size: 11px; font-weight: 500;
    }
    .s0 { background: rgba(107,107,128,.12); color: var(--muted2); }
    .s1 { background: rgba(251,191,36,.1);   color: var(--warn); }
    .s2 { background: rgba(56,189,248,.1);   color: var(--accent3); }
    .s3 { background: rgba(167,139,250,.1);  color: var(--accent2); }
    .s4 { background: rgba(251,191,36,.1);   color: var(--warn); }
    .s5 { background: rgba(74,222,128,.1);   color: var(--success); }

    /* ── input ── */
    .chat-input-wrap {
      flex-shrink: 0;
      padding: 10px 12px 14px;
      border-top: 1px solid var(--border);
      background: var(--bg);
    }
    .chat-input-bar {
      display: flex; align-items: center; gap: 6px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 6px 8px 6px 10px;
      transition: border-color .18s;
    }
    .chat-input-bar:focus-within {
      border-color: rgba(108,99,255,.4);
    }
    .attach-btn {
      width: 28px; height: 28px;
      background: none; border: none;
      color: var(--muted); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; padding: 0;
      border-radius: 6px;
      transition: color .13s, background .13s;
    }
    .attach-btn:hover { color: var(--muted2); background: var(--border); }
    .attach-btn svg { width: 16px; height: 16px; stroke: currentColor; stroke-width: 1.8; fill: none; }

    .chat-textarea {
      flex: 1; background: transparent; border: none;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 13.5px; font-weight: 400;
      outline: none; resize: none;
      max-height: 110px; line-height: 1.5;
      padding: 3px 0;
      caret-color: var(--accent2);
    }
    .chat-textarea::placeholder { color: var(--muted); }

    .send-btn {
      width: 30px; height: 30px;
      border-radius: 7px;
      background: var(--accent);
      border: none; color: #fff; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: opacity .15s, background .15s;
      opacity: .35;
    }
    .send-btn.active { opacity: 1; }
    .send-btn.active:hover { background: #7c74ff; }
    .send-btn svg { width: 13px; height: 13px; stroke: currentColor; stroke-width: 2.2; fill: none; }

    /* ── files / images ── */
    .msg-img {
      max-width: 200px; max-height: 180px; border-radius: 10px;
      display: block; cursor: pointer;
      border: 1px solid var(--border);
      transition: opacity .15s;
    }
    .msg-img:hover { opacity: .82; }
    .msg-file-link {
      display: flex; align-items: center; gap: 6px;
      background: var(--bg3); border: 1px solid var(--border); border-radius: 8px;
      padding: 6px 10px; font-size: 12px; text-decoration: none; color: var(--muted2);
    }

    /* ── lightbox ── */
    .lightbox {
      position: fixed; inset: 0; z-index: 999;
      background: rgba(0,0,0,.9);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity .2s;
    }
    .lightbox.show { opacity: 1; pointer-events: all; }
    .lightbox img { max-width: 90vw; max-height: 88vh; border-radius: 10px; object-fit: contain; }
    .lb-close {
      position: fixed; top: 14px; right: 16px;
      background: rgba(255,255,255,.1); border: none; color: #fff;
      font-size: 16px; width: 34px; height: 34px; border-radius: 7px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .lb-close:hover { background: rgba(255,255,255,.18); }

    /* ── new topic btn ── */
    .new-topic-btn {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      z-index: 150;
      background: var(--bg3);
      border: 1px solid var(--border-hi);
      border-radius: 7px;
      padding: 7px 16px;
      font-family: 'Inter', sans-serif;
      font-size: 12px; color: var(--muted);
      cursor: pointer; display: none; align-items: center; gap: 6px;
      transition: all .15s; white-space: nowrap;
    }
    .new-topic-btn.show { display: flex; }
    .new-topic-btn:hover { color: var(--text); border-color: var(--border-hi); background: var(--bg2); }

    /* ── toast ── */
    .toast {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(10px);
      z-index: 700; padding: 7px 16px; border-radius: 7px;
      font-size: 12px; font-weight: 500;
      opacity: 0; transition: opacity .22s, transform .22s;
      pointer-events: none; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.success { background: rgba(74,222,128,.1);  border: 1px solid rgba(74,222,128,.25);  color: var(--success); }
    .toast.error   { background: rgba(248,113,113,.1); border: 1px solid rgba(248,113,113,.25); color: var(--error); }
    .toast.info    { background: rgba(108,99,255,.1);  border: 1px solid rgba(108,99,255,.3);   color: var(--accent2); }
  </style>
</head>
<body>

<script src="../nav.js" data-page="support"></script>

<div class="loading-screen" id="loadingScreen">
  <div class="spinner"></div>
  <span class="loading-text">Загружаю чат...</span>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lb-close" onclick="event.stopPropagation();closeLightbox()">✕</button>
  <img id="lightboxImg" src="" alt=""/>
</div>

<div class="chat-layout" id="appWrap" style="display:none">

  <div class="chat-hdr">
    <a href="../profile" class="back-link" title="Назад">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </a>
    <div class="chat-av">
      <img src="../img/favicon.png" alt="Support"/>
    </div>
    <div class="chat-hdr-info">
      <div class="chat-hdr-name">Antviz · Поддержка</div>
      <div class="chat-hdr-sub"><span class="online-dot"></span>онлайн</div>
    </div>
  </div>

  <div class="chat-msgs" id="chatMsgs"></div>

  <div class="chat-input-wrap">
    <input type="file" id="fileInput" style="display:none" multiple
      accept="image/*,.pdf,.doc,.docx,.zip,.rar,.psd,.fig"
      onchange="sendFiles(this.files)"/>
    <div class="chat-input-bar">
      <button class="attach-btn" onclick="document.getElementById('fileInput').click()" title="Прикрепить файл">
        <svg viewBox="0 0 24 24"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
      </button>
      <textarea class="chat-textarea" id="chatInput" placeholder="Сообщение..." rows="1"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"
        oninput="onInput(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMsg()">
        <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2" fill="currentColor" stroke="none"/></svg>
      </button>
    </div>
  </div>

</div>

<button class="new-topic-btn" id="newTopicBtn" onclick="startNewTopic()">
  + Новая тема
</button>
<div class="toast" id="toast"></div>

<script type="module">
import { auth, db } from '../firebase-config.js';
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  collection, query, orderBy, where, onSnapshot, limit,
  addDoc, serverTimestamp, doc, setDoc, updateDoc,
  getDocs, deleteDoc, Timestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const STATUS_LABELS = ['Новая заявка','Обсуждение','В работе','На проверке','Правки','Готово'];
const THREE_DAYS_MS = 3 * 24 * 60 * 60 * 1000;

let currentUser = null;
let unsubChat = null;
let userOrders = [];
let flowState = 'topic';
let initialLoadDone = false;
let welcomeShown = false;
let hasUserMessages = false;

/* ── helpers ── */
function toast(msg, type='info'){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className=`toast ${type} show`;
  setTimeout(()=>t.className='toast',3000);
}
function fmtTime(ts){
  if(!ts) return '';
  const d=ts.toDate?ts.toDate():new Date(ts);
  return d.toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});
}
function fmtDate(ts){
  if(!ts) return '—';
  const d=ts.toDate?ts.toDate():new Date(ts);
  return d.toLocaleDateString('ru',{day:'numeric',month:'short'});
}
function scrollBottom(instant){
  const c=document.getElementById('chatMsgs');
  if(instant) c.style.scrollBehavior='auto';
  c.scrollTop=c.scrollHeight;
  if(instant) setTimeout(()=>c.style.scrollBehavior='smooth',50);
}
function delay(ms){return new Promise(r=>setTimeout(r,ms));}

window.onInput=function(el){
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,120)+'px';
  document.getElementById('sendBtn').classList.toggle('active',el.value.trim().length>0);
};

/* ── purge messages older than 3 days ── */
async function purgeOldMessages(uid){
  try{
    const cutoff=Timestamp.fromMillis(Date.now()-THREE_DAYS_MS);
    const snap=await getDocs(query(collection(db,'chats',uid,'messages'),where('createdAt','<',cutoff)));
    for(const d of snap.docs) deleteDoc(d.ref).catch(()=>{});
  }catch(e){}
}

/* ── remove welcome messages ── */
async function removeWelcomeMessages(){
  if(!currentUser) return;
  try{
    const snap = await getDocs(query(
      collection(db,'chats',currentUser.uid,'messages'),
      where('flowTag','==','welcome')
    ));
    for(const d of snap.docs) deleteDoc(d.ref).catch(()=>{});
    welcomeShown = false;
  }catch(e){}
}

/* ── save bot message to Firestore ── */
async function saveBotMsg(text, flowTag){
  if(!currentUser) return null;
  try{
    const ref = await addDoc(collection(db,'chats',currentUser.uid,'messages'),{
      text, sender:'bot', senderName:'Бот', type:'text',
      flowTag: flowTag||null,
      createdAt: serverTimestamp()
    });
    return ref.id;
  }catch(e){ return null; }
}

/* ── render helpers ── */
function renderMsg(m){
  const container=document.getElementById('chatMsgs');
  const isMe=m.sender==='user';
  const isBot=m.sender==='bot';
  const div=document.createElement('div');
  div.className=`msg ${isMe?'mine':'theirs'}`;
  if(m._id) div.dataset.id=m._id;

  if(m.type==='file'){
    const src=m.fileData||m.fileUrl||'';
    const isImg=m.fileType&&m.fileType.startsWith('image/');
    if(isImg) div.innerHTML=`<img class="msg-img" src="${src}" onclick="openLightbox('${src.replace(/'/g,"\\'")}')"/><div class="msg-time">${isMe?'Вы':'Поддержка'} · ${fmtTime(m.createdAt)}</div>`;
    else div.innerHTML=`<a class="msg-file-link" href="${src}" download="${m.fileName}">📎 ${m.fileName||'Файл'}</a><div class="msg-time">${isMe?'Вы':'Поддержка'} · ${fmtTime(m.createdAt)}</div>`;
  } else {
    const name = isMe?'Вы': isBot?'Бот':'Поддержка';
    div.innerHTML=`<div class="msg-bubble">${(m.text||'').replace(/\n/g,'<br>')}</div><div class="msg-time">${name} · ${fmtTime(m.createdAt)}</div>`;
  }
  container.appendChild(div);
  return div;
}

function renderBotWithButtons(m){
  const div = renderMsg(m);
  if(!div) return;
  const row = document.createElement('div');
  row.className='bot-actions';
  const buttons = getBotButtons(m.flowTag);
  buttons.forEach(a=>{
    const btn=document.createElement('button');
    btn.className=`bot-btn${a.cls?' '+a.cls:''}`;
    btn.textContent=a.label;
    btn.onclick=a.fn;
    row.appendChild(btn);
  });
  if(buttons.length) div.appendChild(row);
}

/* ── button sets by flowTag ── */
function getBotButtons(tag){
  const topicBtns=[
    {label:'Статус заказа',    cls:'accent', fn:()=>{ doSendUserMsg('Статус заказа'); handleTopic('order'); }},
    {label:'Оплата',           cls:'accent', fn:()=>{ doSendUserMsg('Оплата'); handleTopic('payment'); }},
    {label:'Сроки',            cls:'accent', fn:()=>{ doSendUserMsg('Сроки'); handleTopic('timing'); }},
    {label:'Правки',           cls:'accent', fn:()=>{ doSendUserMsg('Правки'); handleTopic('revision'); }},
    {label:'Написать вопрос',          fn:()=>{ doSendUserMsg('Хочу написать вопрос'); openFreeChat(); }},
  ];
  const backBtn    ={label:'Назад к темам',     cls:'back',   fn:()=>showTopicMenu()};
  const managerBtn ={label:'Написать менеджеру', cls:'accent', fn:()=>openFreeChat()};

  switch(tag){
    case 'welcome': return topicBtns;
    case 'topic':   return topicBtns;
    case 'no_orders': return [
      {label:'Оформить заказ', cls:'accent', fn:()=>window.location.href='../order'},
      {label:'Назад', cls:'back', fn:()=>showTopicMenu()},
    ];
    case 'pick_order': return [
      ...userOrders.map(o=>({
        label:`№ ${(o.id||'').slice(0,8).toUpperCase()} · ${STATUS_LABELS[o.status||0]}`,
        cls:'accent',
        fn:async()=>{ showTyping(); await delay(700); hideTyping(); appendOrderCard(o); }
      })),
      {label:'Назад', cls:'back', fn:()=>showTopicMenu()},
    ];
    case 'payment':  return [backBtn, managerBtn];
    case 'timing':   return [backBtn, managerBtn];
    case 'revision': return [backBtn, {label:'Описать правки', cls:'accent', fn:()=>openFreeChat()}];
    case 'free':     return [backBtn];
    case 'hint':     return [{label:'Написать вопрос', cls:'accent', fn:()=>{ doSendUserMsg('Хочу написать вопрос'); openFreeChat(); }}];
    default: return [];
  }
}

function appendOrderCard(o){
  const container=document.getElementById('chatMsgs');
  const div=document.createElement('div');
  div.className='msg theirs';
  const s=o.status||0;
  div.innerHTML=`
    <div class="msg-bubble">Вот информация по вашему заказу:</div>
    <div class="order-info-card">
      <div class="oi-num">Заказ № ${(o.id||'').slice(0,8).toUpperCase()}</div>
      <div class="oi-row"><span class="oi-lbl">Тип</span><span class="oi-val">${o.siteType||'Сайт'}</span></div>
      <div class="oi-row"><span class="oi-lbl">Статус</span><span class="oi-val"><span class="s-pill s${s}">${STATUS_LABELS[s]}</span></span></div>
      <div class="oi-row"><span class="oi-lbl">Оплата</span><span class="oi-val" style="color:${o.paid?'var(--success)':'var(--error)'}">${o.paid?'Оплачен':'Не оплачен'}</span></div>
      <div class="oi-row"><span class="oi-lbl">Сумма</span><span class="oi-val">${o.totalPrice?o.totalPrice.toLocaleString('ru')+' ₽':'—'}</span></div>
      <div class="oi-row"><span class="oi-lbl">Создан</span><span class="oi-val">${fmtDate(o.createdAt)}</span></div>
      ${o.statusComment?`<div class="oi-row" style="flex-direction:column;gap:4px"><span class="oi-lbl">Комментарий</span><span class="oi-val" style="text-align:left;color:var(--accent2)">${o.statusComment}</span></div>`:''}
    </div>
    <div class="msg-time">Бот · сейчас</div>`;
  const row=document.createElement('div');
  row.className='bot-actions';
  [{label:'Назад к темам', cls:'back', fn:()=>showTopicMenu()},
   {label:'Написать менеджеру', cls:'accent', fn:()=>openFreeChat()}
  ].forEach(a=>{
    const btn=document.createElement('button');
    btn.className=`bot-btn ${a.cls}`; btn.textContent=a.label; btn.onclick=a.fn;
    row.appendChild(btn);
  });
  div.appendChild(row);
  container.appendChild(div);
  scrollBottom();
}

function showTyping(){
  const c=document.getElementById('chatMsgs');
  const el=document.createElement('div');
  el.className='typing-indicator'; el.id='typingIndicator';
  el.innerHTML='<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
  c.appendChild(el); scrollBottom();
}
function hideTyping(){ document.getElementById('typingIndicator')?.remove(); }

/* ── persist user msg (from button clicks) ── */
async function doSendUserMsg(text){
  if(!currentUser||!text) return;
  try{
    if(welcomeShown) await removeWelcomeMessages();
    await setDoc(doc(db,'chats',currentUser.uid),
      {name:currentUser.displayName||'',email:currentUser.email||''},{merge:true});
    await addDoc(collection(db,'chats',currentUser.uid,'messages'),{
      text, sender:'user', senderName:currentUser.displayName||'Пользователь',
      type:'text', createdAt:serverTimestamp()
    });
  }catch(e){}
}

/* ── bot flow ── */
async function showWelcome(){
  await removeWelcomeMessages();
  welcomeShown = true;
  await saveBotMsg('Привет! Я бот Антвизик.\nЧем могу помочь? Выберите тему:', 'welcome');
}

async function showTopicMenu(){
  flowState='topic';
  await saveBotMsg('Выберите тему:', 'topic');
}

async function handleTopic(topic){
  if(topic==='order'){
    if(!userOrders.length){
      showTyping(); await delay(800); hideTyping();
      await saveBotMsg('У вас пока нет заказов. Хотите оформить первый?', 'no_orders');
      return;
    }
    if(userOrders.length===1){
      showTyping(); await delay(900); hideTyping();
      appendOrderCard(userOrders[0]);
      return;
    }
    showTyping(); await delay(600); hideTyping();
    await saveBotMsg('Выберите заказ:', 'pick_order');
    return;
  }
  showTyping(); await delay(900); hideTyping();
  const texts={
    payment:'Принимаем оплату через СБП, банковские карты, T‑Pay и SberPay.\nПосле подтверждения заказа менеджер пришлёт реквизиты.',
    timing:'Сроки зависят от объёма:\n· Большинство сайтов — около двух дней\n· Если срок меняется, появится уведомление\n· Точные сроки уточняем после первого этапа заказа',
    revision:'Правки вносим по вашему ТЗ. Укажите в сообщении, что именно хотите изменить — менеджер ответит в ближайшее время.',
  };
  await saveBotMsg(texts[topic], topic);
}

async function openFreeChat(){
  flowState='open';
  document.getElementById('newTopicBtn')?.classList.add('show');
  await saveBotMsg('Напишите ваш вопрос — менеджер ответит в ближайшее время.\nДля быстрой навигации используйте кнопки выше.', 'free');
  document.getElementById('chatInput').focus();
}

/* ── new topic ── */
window.startNewTopic = async function(){
  flowState = 'topic';
  document.getElementById('newTopicBtn').classList.remove('show');
  const msgs = document.getElementById('chatMsgs');
  const sep = document.createElement('div');
  sep.style.cssText = 'text-align:center;color:var(--muted);font-size:11px;padding:10px;opacity:.5;letter-spacing:.04em';
  sep.textContent = '— Новая тема —';
  msgs.appendChild(sep);
  await showWelcome();
};

/* ── Firestore live listener ── */
function listenChat(uid){
  if(unsubChat) unsubChat();
  const q=query(collection(db,'chats',uid,'messages'),orderBy('createdAt','asc'),limit(100));
  unsubChat=onSnapshot(q,snap=>{
    snap.docChanges().forEach(ch=>{
      if(ch.type==='added'){
        const m={...ch.doc.data(), _id:ch.doc.id};
        if(document.querySelector(`[data-id="${m._id}"]`)) return;

        if(m.sender==='bot'){
          renderBotWithButtons(m);
          if(m.flowTag==='welcome') welcomeShown = true;
        } else if(m.sender==='admin'||m.sender==='user'){
          renderMsg(m);
          if(m.sender==='user') hasUserMessages = true;
        }
        if(m.sender==='admin'&&!m.readByUser)
          updateDoc(ch.doc.ref,{readByUser:true}).catch(()=>{});

        scrollBottom(!initialLoadDone);
      }
    });

    if(!initialLoadDone){
      initialLoadDone=true;
      setTimeout(()=>scrollBottom(true), 80);
    }
  },e=>console.error(e));
}

/* ── send message from textarea ── */
window.sendMsg=async function(){
  if(!currentUser) return;
  const inp=document.getElementById('chatInput');
  const text=inp.value.trim();
  if(!text) return;
  inp.value=''; inp.style.height='auto';
  document.getElementById('sendBtn').classList.remove('active');

  if(welcomeShown) await removeWelcomeMessages();

  if(flowState==='topic'){
    await saveBotMsg('Для навигации используйте кнопки выше.\nЕсли хотите написать менеджеру — нажмите «Написать вопрос».', 'hint');
    return;
  }

  flowState='open';
  document.getElementById('newTopicBtn')?.classList.add('show');
  try{
    await setDoc(doc(db,'chats',currentUser.uid),
      {name:currentUser.displayName||'',email:currentUser.email||''},{merge:true});
    await addDoc(collection(db,'chats',currentUser.uid,'messages'),{
      text, sender:'user', senderName:currentUser.displayName||'Пользователь',
      type:'text', createdAt:serverTimestamp()
    });
  }catch(e){ toast('Ошибка отправки','error'); }
};

/* ── file sending ── */
window.sendFiles=async function(files){
  if(!currentUser||!files.length) return;
  for(const file of Array.from(files)){
    if(file.size>3*1024*1024){ toast(file.name+' > 3 МБ','error'); continue; }
    try{
      const base64=await new Promise((res,rej)=>{
        const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=rej; r.readAsDataURL(file);
      });
      await addDoc(collection(db,'chats',currentUser.uid,'messages'),{
        type:'file', fileData:base64, fileName:file.name, fileType:file.type,
        sender:'user', senderName:currentUser.displayName||'', createdAt:serverTimestamp()
      });
      toast(file.name+' отправлен','success');
    }catch(e){ toast('Ошибка: '+file.name,'error'); }
  }
  document.getElementById('fileInput').value='';
};

/* ── lightbox ── */
window.openLightbox=function(src){
  document.getElementById('lightboxImg').src=src;
  document.getElementById('lightbox').classList.add('show');
};
window.closeLightbox=function(){
  document.getElementById('lightbox').classList.remove('show');
  document.getElementById('lightboxImg').src='';
};
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeLightbox(); });

/* ── bootstrap ── */
onAuthStateChanged(auth,async user=>{
  if(!user){ window.location.href='../auth'; return; }

  currentUser=user;

  await purgeOldMessages(user.uid);

  try{
    const snap=await getDocs(
      query(collection(db,'orders'),where('uid','==',user.uid))
    );
    userOrders=snap.docs.map(d=>({id:d.id,...d.data()}))
      .sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
  }catch(e){}

  document.getElementById('loadingScreen').style.display='none';
  document.getElementById('appWrap').style.display='flex';

  const chatSnap = await getDocs(collection(db,'chats',user.uid,'messages'));

  hasUserMessages = false;
  let hasAdminMessages = false;
  chatSnap.forEach(d => {
    const s = d.data().sender;
    if(s === 'user') hasUserMessages = true;
    if(s === 'admin') hasAdminMessages = true;
  });

  listenChat(user.uid);

  if(hasAdminMessages){
    flowState = 'open';
    document.getElementById('newTopicBtn')?.classList.add('show');
  } else if(chatSnap.empty || !hasUserMessages){
    await showWelcome();
  }
});
</script>
