<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Поддержка — Antviz</title>
  <link rel="icon" href="../img/favicon.png" type="image/png"/>
  
  <!-- Шрифты как у reg.ru -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  
  <style>
    /* ========== FONTS ========== */
    @font-face {
      font-display: swap;
      font-family: 'Geologica';
      font-style: normal;
      font-weight: 300;
      src: url('https://img.reg.ru/news/Geologica-Light.woff2') format('woff2'),
           url('https://img.reg.ru/news/Geologica-Light.woff') format('woff');
    }
    @font-face {
      font-display: swap;
      font-family: 'Geologica';
      font-style: normal;
      font-weight: 500;
      src: url('https://img.reg.ru/news/Geologica-Medium.woff2') format('woff2'),
           url('https://img.reg.ru/news/Geologica-Medium.woff') format('woff');
    }

    /* ========== RESET & ROOT ========== */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    
    :root{
      --bg:#0a0a0c;
      --bg-secondary:#111116;
      --bg-tertiary:#18181f;
      --bg-card:#16161d;
      --bg-input:#1a1a22;
      --border:rgba(255,255,255,0.08);
      --border-hover:rgba(255,255,255,0.14);
      --border-focus:rgba(108,99,255,0.4);
      --accent:#6c63ff;
      --accent-hover:#5a52e0;
      --accent-light:rgba(108,99,255,0.12);
      --accent-lighter:rgba(108,99,255,0.06);
      --text:#f0f0f5;
      --text-secondary:#8e8e9a;
      --text-muted:#666672;
      --text-inverse:#fff;
      --success:#47bf67;
      --error:#ff2d50;
      --warn:#fbbf24;
      --nav-h:84px;
      
      /* Скругления как у reg.ru */
      --radius-xs:4px;
      --radius-s:8px;
      --radius-m:12px;
      --radius-l:16px;
      --radius-xl:24px;
      --radius-xxl:60px;
      
      /* Тени как у reg.ru */
      --shadow-xs:0 2px 2px rgba(0,0,0,0.08);
      --shadow-s:0 4px 16px rgba(0,0,0,0.04),0 2px 2px rgba(0,0,0,0.08);
      --shadow-m:0 8px 20px rgba(0,0,0,0.08),0 4px 8px rgba(0,0,0,0.08);
      --shadow-l:0 12px 32px rgba(0,0,0,0.12),0 8px 20px rgba(0,0,0,0.08);
      --shadow-outline:0 0 0 2px rgba(108,99,255,0.3);
    }
    
    html,body{height:100%;overflow:hidden}
    body{
      background:var(--bg);
      color:var(--text);
      font-family:'Inter',sans-serif;
      font-weight:400;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      font-size:14px;
      line-height:1.4;
    }

    /* ========== ANIMATIONS ========== */
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes msgPop{0%{opacity:0;transform:translateY(4px)}100%{opacity:1;transform:translateY(0)}}

    /* ========== LOADING ========== */
    .loading-screen{
      position:fixed;inset:0;z-index:999;
      background:var(--bg);
      display:flex;align-items:center;justify-content:center;
      flex-direction:column;gap:16px;
    }
    .spinner{
      width:24px;height:24px;
      border:2px solid var(--border);
      border-top-color:var(--accent);
      border-radius:50%;
      animation:spin .7s linear infinite;
    }
    .loading-text{
      font-family:'Geologica',sans-serif;
      font-size:14px;font-weight:300;
      color:var(--text-secondary);
      letter-spacing:-0.02em;
    }

    /* ========== LAYOUT ========== */
    .chat-layout{
      position:fixed;top:var(--nav-h);left:0;right:0;bottom:0;
      display:flex;flex-direction:column;
      max-width:720px;margin:0 auto;
      border-left:1px solid var(--border);
      border-right:1px solid var(--border);
      background:var(--bg);
    }
    @media(max-width:768px){
      .chat-layout{top:0;border:none;bottom:0}
    }

    /* ========== HEADER ========== */
    .chat-hdr{
      padding:12px 20px;
      display:flex;align-items:center;gap:12px;
      flex-shrink:0;
      border-bottom:1px solid var(--border);
      background:var(--bg-secondary);
    }
    .back-link{
      width:36px;height:36px;
      border-radius:var(--radius-s);
      background:transparent;
      border:1px solid var(--border);
      display:flex;align-items:center;justify-content:center;
      color:var(--text-secondary);
      text-decoration:none;flex-shrink:0;
      transition:all .1s ease;
    }
    .back-link:hover{
      background:var(--bg-tertiary);
      border-color:var(--border-hover);
      color:var(--text);
    }
    .back-link svg{width:16px;height:16px;stroke:currentColor;stroke-width:2.2}

    .chat-hdr-body{
      display:flex;align-items:center;gap:12px;
      flex:1;min-width:0;
    }
    .chat-av{
      width:40px;height:40px;border-radius:50%;
      overflow:hidden;flex-shrink:0;
      background:var(--bg-tertiary);
      border:1px solid var(--border);
      display:flex;align-items:center;justify-content:center;
    }
    .chat-av img{width:100%;height:100%;object-fit:contain;padding:8px}
    .chat-hdr-info{flex:1;min-width:0}
    .chat-hdr-name{
      font-family:'Geologica',sans-serif;
      font-weight:500;font-size:14px;
      letter-spacing:-0.02em;
      white-space:nowrap;overflow:hidden;
      text-overflow:ellipsis;
    }
    .chat-hdr-sub{
      font-family:'Inter',sans-serif;
      font-size:12px;font-weight:400;
      color:var(--text-secondary);
      display:flex;align-items:center;
      gap:6px;margin-top:2px;
      letter-spacing:-0.02em;
    }
    .online-dot{
      width:6px;height:6px;border-radius:50%;
      background:var(--success);
      display:inline-block;flex-shrink:0;
    }

    /* ========== MESSAGES AREA ========== */
    .chat-msgs{
      flex:1;overflow-y:auto;
      padding:20px;
      display:flex;flex-direction:column;
      gap:8px;
      scroll-behavior:smooth;
    }
    .chat-msgs::-webkit-scrollbar{width:4px}
    .chat-msgs::-webkit-scrollbar-thumb{
      background:rgba(255,255,255,0.1);
      border-radius:2px;
    }

    /* ========== MESSAGE BUBBLES ========== */
    .msg{
      max-width:78%;
      display:flex;flex-direction:column;
      gap:4px;
      animation:msgPop .25s ease both;
    }
    .msg.mine{align-self:flex-end;align-items:flex-end}
    .msg.theirs{align-self:flex-start;align-items:flex-start}

    .msg-bubble{
      padding:10px 16px;
      border-radius:var(--radius-l);
      font-size:14px;font-weight:400;
      line-height:1.5;word-break:break-word;
      letter-spacing:-0.01em;
    }
    .msg.mine .msg-bubble{
      background:var(--accent);
      color:var(--text-inverse);
      border-bottom-right-radius:var(--radius-xs);
    }
    .msg.theirs .msg-bubble{
      background:var(--bg-card);
      border:1px solid var(--border);
      color:var(--text);
      border-bottom-left-radius:var(--radius-xs);
    }
    .msg-time{
      font-size:11px;font-weight:400;
      color:var(--text-muted);
      padding:0 4px;
      letter-spacing:-0.01em;
    }

    /* ========== TYPING INDICATOR ========== */
    .typing-indicator{
      align-self:flex-start;
      display:flex;align-items:center;
      gap:4px;padding:12px 16px;
      background:var(--bg-card);
      border:1px solid var(--border);
      border-radius:var(--radius-l);
      border-bottom-left-radius:var(--radius-xs);
      animation:fadeUp .2s ease;
    }
    .typing-dot{
      width:6px;height:6px;border-radius:50%;
      background:var(--text-muted);
      animation:typingBounce 1.4s infinite;
    }
    .typing-dot:nth-child(2){animation-delay:.2s}
    .typing-dot:nth-child(3){animation-delay:.4s}
    @keyframes typingBounce{
      0%,60%,100%{transform:translateY(0)}
      30%{transform:translateY(-6px)}
    }

    /* ========== BOT BUTTONS ========== */
    .bot-actions{
      display:flex;flex-wrap:wrap;
      gap:8px;margin-top:8px;
    }
    .bot-btn{
      background:transparent;
      border:1px solid var(--border);
      color:var(--text);
      font-family:'Inter',sans-serif;
      font-size:13px;font-weight:400;
      padding:8px 16px;
      border-radius:var(--radius-m);
      cursor:pointer;
      transition:all .1s ease;
      white-space:nowrap;
      letter-spacing:-0.01em;
    }
    .bot-btn:hover{
      background:var(--bg-tertiary);
      border-color:var(--border-hover);
    }
    .bot-btn:active{background:var(--bg-secondary)}
    .bot-btn.accent{
      border-color:var(--accent);
      color:var(--accent);
      background:var(--accent-lighter);
    }
    .bot-btn.accent:hover{
      background:var(--accent-light);
      border-color:var(--accent);
    }
    .bot-btn.back{
      border-color:transparent;
      color:var(--text-muted);
      font-size:12px;
    }
    .bot-btn.back:hover{
      color:var(--text);
      background:var(--bg-tertiary);
      border-color:var(--border);
    }

    /* ========== INPUT AREA ========== */
    .chat-input-wrap{
      position:relative;flex-shrink:0;
      padding:8px 20px 16px;
    }
    .chat-input-bar{
      display:flex;align-items:center;gap:8px;
      background:var(--bg-input);
      border:1px solid var(--border);
      border-radius:var(--radius-m);
      padding:6px 6px 6px 16px;
      transition:all .15s ease;
    }
    .chat-input-bar:focus-within{
      border-color:var(--border-focus);
      box-shadow:var(--shadow-outline);
    }
    .attach-btn{
      width:32px;height:32px;
      border-radius:var(--radius-s);
      background:transparent;border:none;
      color:var(--text-muted);
      cursor:pointer;
      display:flex;align-items:center;
      justify-content:center;
      flex-shrink:0;
      transition:all .1s ease;
      padding:0;
    }
    .attach-btn:hover{
      color:var(--text);
      background:var(--bg-tertiary);
    }
    .attach-btn svg{width:18px;height:18px;stroke:currentColor;stroke-width:2}
    
    .chat-textarea{
      flex:1;background:transparent;border:none;
      color:var(--text);
      font-family:'Inter',sans-serif;
      font-size:14px;font-weight:400;
      outline:none;resize:none;
      max-height:110px;line-height:1.5;
      padding:6px 0;
      caret-color:var(--accent);
    }
    .chat-textarea::placeholder{color:var(--text-muted)}
    
    .send-btn{
      width:36px;height:36px;
      border-radius:var(--radius-s);
      background:var(--accent);
      border:none;color:var(--text-inverse);
      cursor:pointer;
      display:flex;align-items:center;
      justify-content:center;
      flex-shrink:0;
      transition:all .1s ease;
      opacity:0.4;
    }
    .send-btn.active{opacity:1}
    .send-btn.active:hover{background:var(--accent-hover)}
    .send-btn:active{transform:scale(0.95)}
    .send-btn svg{width:16px;height:16px}

    /* ========== FILE ELEMENTS ========== */
    .msg-img{
      max-width:220px;max-height:200px;
      border-radius:var(--radius-m);
      display:block;cursor:pointer;
      transition:opacity .1s ease;
      border:1px solid var(--border);
    }
    .msg-img:hover{opacity:0.85}
    .msg-file-link{
      display:flex;align-items:center;gap:8px;
      background:var(--bg-card);
      border:1px solid var(--border);
      border-radius:var(--radius-s);
      padding:8px 12px;
      font-size:13px;font-weight:400;
      text-decoration:none;color:var(--text);
      letter-spacing:-0.01em;
    }

    /* ========== ORDER CARD ========== */
    .order-info-card{
      background:var(--bg-card);
      border:1px solid var(--border);
      border-radius:var(--radius-m);
      padding:16px;
      font-size:13px;
      margin-top:4px;
      min-width:240px;
    }
    .order-info-card .oi-num{
      font-family:'Geologica',sans-serif;
      font-weight:500;font-size:13px;
      margin-bottom:12px;color:var(--accent);
      letter-spacing:-0.02em;
    }
    .order-info-card .oi-row{
      display:flex;justify-content:space-between;
      gap:12px;padding:6px 0;
      border-bottom:1px solid var(--border);
    }
    .order-info-card .oi-row:last-child{border-bottom:none}
    .order-info-card .oi-lbl{color:var(--text-muted)}
    .order-info-card .oi-val{
      font-weight:500;text-align:right;
      color:var(--text);
    }
    .s-pill{
      display:inline-block;
      padding:2px 10px;
      border-radius:var(--radius-xs);
      font-size:12px;font-weight:500;
      letter-spacing:-0.01em;
    }
    .s0{background:rgba(255,255,255,0.06);color:var(--text-muted)}
    .s1{background:rgba(251,191,36,0.12);color:var(--warn)}
    .s2{background:rgba(56,189,248,0.12);color:#38bdf8}
    .s3{background:rgba(108,99,255,0.12);color:var(--accent)}
    .s4{background:rgba(251,191,36,0.12);color:var(--warn)}
    .s5{background:rgba(74,222,128,0.12);color:var(--success)}

    /* ========== LIGHTBOX ========== */
    .lightbox{
      position:fixed;inset:0;z-index:999;
      background:rgba(0,0,0,0.94);
      display:flex;align-items:center;
      justify-content:center;
      opacity:0;pointer-events:none;
      transition:opacity .2s;
    }
    .lightbox.show{opacity:1;pointer-events:all}
    .lightbox img{
      max-width:90vw;max-height:88vh;
      border-radius:var(--radius-m);
      object-fit:contain;
    }
    .lb-close{
      position:fixed;top:20px;right:20px;
      background:rgba(255,255,255,0.1);
      border:none;color:var(--text-inverse);
      font-size:16px;
      width:40px;height:40px;
      border-radius:var(--radius-s);
      cursor:pointer;
      display:flex;align-items:center;
      justify-content:center;
    }

    /* ========== NEW TOPIC BUTTON ========== */
    .new-topic-btn{
      position:fixed;bottom:90px;left:50%;
      transform:translateX(-50%);z-index:150;
      background:var(--bg-card);
      border:1px solid var(--border);
      border-radius:var(--radius-xxl);
      padding:8px 20px;
      font-family:'Inter',sans-serif;
      font-size:13px;font-weight:400;
      color:var(--text-secondary);
      cursor:pointer;
      display:none;align-items:center;
      gap:8px;
      transition:all .1s ease;
      white-space:nowrap;
      letter-spacing:-0.01em;
    }
    .new-topic-btn.show{display:flex}
    .new-topic-btn:hover{
      color:var(--text);
      border-color:var(--border-hover);
    }

    /* ========== TOAST ========== */
    .toast{
      position:fixed;bottom:100px;left:50%;
      transform:translateX(-50%) translateY(14px);
      z-index:700;
      padding:10px 20px;
      border-radius:var(--radius-s);
      font-family:'Inter',sans-serif;
      font-size:13px;font-weight:500;
      letter-spacing:-0.01em;
      opacity:0;
      transition:opacity .2s,transform .2s;
      pointer-events:none;white-space:nowrap;
    }
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .toast.success{
      background:rgba(71,191,103,0.15);
      border:1px solid rgba(71,191,103,0.3);
      color:var(--success);
    }
    .toast.error{
      background:rgba(255,45,80,0.15);
      border:1px solid rgba(255,45,80,0.3);
      color:var(--error);
    }
    .toast.info{
      background:rgba(108,99,255,0.15);
      border:1px solid rgba(108,99,255,0.3);
      color:var(--accent);
    }

    /* ========== SEPARATOR ========== */
    .chat-separator{
      text-align:center;
      color:var(--text-muted);
      font-size:12px;font-weight:400;
      padding:12px 0;
      letter-spacing:-0.01em;
    }
  </style>
</head>
<body>

<script src="../nav.js" data-page="support"></script>

<!-- Loading -->
<div class="loading-screen" id="loadingScreen">
  <div class="spinner"></div>
  <span class="loading-text">Загружаю чат...</span>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lb-close" onclick="event.stopPropagation();closeLightbox()">✕</button>
  <img id="lightboxImg" src="" alt=""/>
</div>

<!-- Chat Layout -->
<div class="chat-layout" id="appWrap" style="display:none">
  
  <!-- Header -->
  <div class="chat-hdr">
    <a href="../profile" class="back-link" title="Назад">
      <svg viewBox="0 0 24 24" fill="none">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </a>
    <div class="chat-hdr-body">
      <div class="chat-av">
        <img src="../img/favicon.png" alt="Support"/>
      </div>
      <div class="chat-hdr-info">
        <div class="chat-hdr-name">Design Antviz</div>
        <div class="chat-hdr-sub">
          <span class="online-dot"></span>Поддержка · онлайн
        </div>
      </div>
    </div>
  </div>

  <!-- Messages -->
  <div class="chat-msgs" id="chatMsgs"></div>

  <!-- Input -->
  <div class="chat-input-wrap">
    <input type="file" id="fileInput" style="display:none" multiple
      accept="image/*,.pdf,.doc,.docx,.zip,.rar,.psd,.fig"
      onchange="sendFiles(this.files)"/>
    <div class="chat-input-bar">
      <button class="attach-btn" onclick="document.getElementById('fileInput').click()" title="Прикрепить файл">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
        </svg>
      </button>
      <textarea class="chat-textarea" id="chatInput" placeholder="Сообщение..." rows="1"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"
        oninput="onInput(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMsg()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>

</div>

<!-- New topic button -->
<button class="new-topic-btn" id="newTopicBtn" onclick="startNewTopic()">
  ✦ Новая тема
</button>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Firebase + Script -->
<script type="module">
import { auth, db } from '../firebase-config.js';
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  collection, query, orderBy, where, onSnapshot, limit,
  addDoc, serverTimestamp, doc, setDoc, updateDoc,
  getDocs, deleteDoc, Timestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const STATUS_LABELS = ['Новая заявка','Обсуждение','В работе','На проверке','Правки','Готово'];
const THREE_DAYS_MS = 3 * 24 * 60 * 60 * 1000;

let currentUser = null;
let unsubChat = null;
let userOrders = [];
let flowState = 'topic';
let initialLoadDone = false;
let welcomeShown = false;
let hasUserMessages = false;

/* ── helpers ── */
function toast(msg, type='info'){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className=`toast ${type} show`;
  setTimeout(()=>t.className='toast',3000);
}
function fmtTime(ts){
  if(!ts) return '';
  const d=ts.toDate?ts.toDate():new Date(ts);
  return d.toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});
}
function fmtDate(ts){
  if(!ts) return '—';
  const d=ts.toDate?ts.toDate():new Date(ts);
  return d.toLocaleDateString('ru',{day:'numeric',month:'short'});
}
function scrollBottom(instant){
  const c=document.getElementById('chatMsgs');
  if(instant) c.style.scrollBehavior='auto';
  c.scrollTop=c.scrollHeight;
  if(instant) setTimeout(()=>c.style.scrollBehavior='smooth',50);
}
function delay(ms){return new Promise(r=>setTimeout(r,ms));}

window.onInput=function(el){
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,120)+'px';
  document.getElementById('sendBtn').classList.toggle('active',el.value.trim().length>0);
};

/* ── purge messages older than 3 days ── */
async function purgeOldMessages(uid){
  try{
    const cutoff=Timestamp.fromMillis(Date.now()-THREE_DAYS_MS);
    const snap=await getDocs(query(collection(db,'chats',uid,'messages'),where('createdAt','<',cutoff)));
    for(const d of snap.docs) deleteDoc(d.ref).catch(()=>{});
  }catch(e){}
}

/* ── Удаление приветствия бота ── */
async function removeWelcomeMessages(){
  if(!currentUser) return;
  try{
    const snap = await getDocs(query(
      collection(db,'chats',currentUser.uid,'messages'),
      where('flowTag','==','welcome')
    ));
    for(const d of snap.docs) deleteDoc(d.ref).catch(()=>{});
    welcomeShown = false;
  }catch(e){}
}

/* ── save bot message to Firestore ── */
async function saveBotMsg(text, flowTag){
  if(!currentUser) return null;
  try{
    const ref = await addDoc(collection(db,'chats',currentUser.uid,'messages'),{
      text, sender:'bot', senderName:'Бот', type:'text',
      flowTag: flowTag||null,
      createdAt: serverTimestamp()
    });
    return ref.id;
  }catch(e){ return null; }
}

/* ── render helpers ── */
function renderMsg(m){
  const container=document.getElementById('chatMsgs');
  const isMe=m.sender==='user';
  const isBot=m.sender==='bot';
  const div=document.createElement('div');
  div.className=`msg ${isMe?'mine':'theirs'}`;
  if(m._id) div.dataset.id=m._id;

  if(m.type==='file'){
    const src=m.fileData||m.fileUrl||'';
    const isImg=m.fileType&&m.fileType.startsWith('image/');
    if(isImg) div.innerHTML=`<img class="msg-img" src="${src}" onclick="openLightbox('${src.replace(/'/g,"\\'")}')"/><div class="msg-time">${isMe?'Вы':'Поддержка'} · ${fmtTime(m.createdAt)}</div>`;
    else div.innerHTML=`<a class="msg-file-link" href="${src}" download="${m.fileName}">📎 ${m.fileName||'Файл'}</a><div class="msg-time">${isMe?'Вы':'Поддержка'} · ${fmtTime(m.createdAt)}</div>`;
  } else {
    const name = isMe?'Вы': isBot?'Бот':'Поддержка';
    div.innerHTML=`<div class="msg-bubble">${(m.text||'').replace(/\n/g,'<br>')}</div><div class="msg-time">${name} · ${fmtTime(m.createdAt)}</div>`;
  }
  container.appendChild(div);
  return div;
}

function renderBotWithButtons(m){
  const div = renderMsg(m);
  if(!div) return;
  const row = document.createElement('div');
  row.className='bot-actions';
  const buttons = getBotButtons(m.flowTag);
  buttons.forEach(a=>{
    const btn=document.createElement('button');
    btn.className=`bot-btn${a.cls?' '+a.cls:''}`;
    btn.textContent=a.label;
    btn.onclick=a.fn;
    row.appendChild(btn);
  });
  if(buttons.length) div.appendChild(row);
}

/* ── button sets by flowTag ── */
function getBotButtons(tag){
  const topicBtns=[
    {label:'Статус заказа', cls:'accent', fn:()=>{ doSendUserMsg('Статус заказа'); handleTopic('order'); }},
    {label:'Оплата',        cls:'accent', fn:()=>{ doSendUserMsg('Оплата'); handleTopic('payment'); }},
    {label:'Сроки',         cls:'accent', fn:()=>{ doSendUserMsg('Сроки'); handleTopic('timing'); }},
    {label:'Правки',        cls:'accent', fn:()=>{ doSendUserMsg('Правки'); handleTopic('revision'); }},
    {label:'Написать вопрос', fn:()=>{ doSendUserMsg('Хочу написать вопрос'); openFreeChat(); }},
  ];
  const backBtn={label:'← Назад к темам', cls:'back', fn:()=>showTopicMenu()};
  const managerBtn={label:'Написать менеджеру', cls:'accent', fn:()=>openFreeChat()};

  switch(tag){
    case 'welcome': return topicBtns;
    case 'topic':   return topicBtns;
    case 'no_orders': return [
      {label:'Оформить заказ', cls:'accent', fn:()=>window.location.href='../order'},
      {label:'← Назад', cls:'back', fn:()=>showTopicMenu()},
    ];
    case 'pick_order': return [
      ...userOrders.map(o=>({
        label:`№ ${(o.id||'').slice(0,8).toUpperCase()} · ${STATUS_LABELS[o.status||0]}`,
        cls:'accent',
        fn:async()=>{ showTyping(); await delay(700); hideTyping(); appendOrderCard(o); }
      })),
      {label:'← Назад', cls:'back', fn:()=>showTopicMenu()},
    ];
    case 'payment':  return [backBtn, managerBtn];
    case 'timing':   return [backBtn, managerBtn];
    case 'revision': return [backBtn, {label:'Описать правки', cls:'accent', fn:()=>openFreeChat()}];
    case 'free':     return [backBtn];
    case 'hint':     return [{label:'Написать вопрос', cls:'accent', fn:()=>{ doSendUserMsg('Хочу написать вопрос'); openFreeChat(); }}];
    default: return [];
  }
}

function appendOrderCard(o){
  const container=document.getElementById('chatMsgs');
  const div=document.createElement('div');
  div.className='msg theirs';
  const s=o.status||0;
  div.innerHTML=`
    <div class="msg-bubble">Информация по заказу:</div>
    <div class="order-info-card">
      <div class="oi-num">№ ${(o.id||'').slice(0,8).toUpperCase()}</div>
      <div class="oi-row"><span class="oi-lbl">Тип</span><span class="oi-val">${o.siteType||'Сайт'}</span></div>
      <div class="oi-row"><span class="oi-lbl">Статус</span><span class="oi-val"><span class="s-pill s${s}">${STATUS_LABELS[s]}</span></span></div>
      <div class="oi-row"><span class="oi-lbl">Оплата</span><span class="oi-val" style="color:${o.paid?'var(--success)':'var(--error)'}">${o.paid?'Оплачен':'Не оплачен'}</span></div>
      <div class="oi-row"><span class="oi-lbl">Сумма</span><span class="oi-val">${o.totalPrice?o.totalPrice.toLocaleString('ru')+' ₽':'—'}</span></div>
      <div class="oi-row"><span class="oi-lbl">Создан</span><span class="oi-val">${fmtDate(o.createdAt)}</span></div>
      ${o.statusComment?`<div class="oi-row" style="flex-direction:column;gap:4px"><span class="oi-lbl">Комментарий</span><span class="oi-val" style="text-align:left;color:var(--accent)">${o.statusComment}</span></div>`:''}
    </div>
    <div class="msg-time">Бот · сейчас</div>`;
  const row=document.createElement('div');
  row.className='bot-actions';
  [{label:'← Назад к темам', cls:'back', fn:()=>showTopicMenu()},
   {label:'Написать менеджеру', cls:'accent', fn:()=>openFreeChat()}
  ].forEach(a=>{
    const btn=document.createElement('button');
    btn.className=`bot-btn ${a.cls}`; btn.textContent=a.label; btn.onclick=a.fn;
    row.appendChild(btn);
  });
  div.appendChild(row);
  container.appendChild(div);
  scrollBottom();
}

function showTyping(){
  const c=document.getElementById('chatMsgs');
  const el=document.createElement('div');
  el.className='typing-indicator'; el.id='typingIndicator';
  el.innerHTML='<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
  c.appendChild(el); scrollBottom();
}
function hideTyping(){document.getElementById('typingIndicator')?.remove();}

/* ── persist user msg (from button clicks) ── */
async function doSendUserMsg(text){
  if(!currentUser||!text) return;
  try{
    if(welcomeShown) await removeWelcomeMessages();
    await setDoc(doc(db,'chats',currentUser.uid),
      {name:currentUser.displayName||'',email:currentUser.email||''},{merge:true});
    await addDoc(collection(db,'chats',currentUser.uid,'messages'),{
      text, sender:'user', senderName:currentUser.displayName||'Пользователь',
      type:'text', createdAt:serverTimestamp()
    });
  }catch(e){}
}

/* ── BOT FLOW ── */
async function showWelcome(){
  await removeWelcomeMessages();
  welcomeShown = true;
  await saveBotMsg('Привет! Я бот Антвизик.\nЧем могу помочь? Выберите тему:', 'welcome');
}

async function showTopicMenu(){
  flowState='topic';
  await saveBotMsg('Выберите тему:', 'topic');
}

async function handleTopic(topic){
  if(topic==='order'){
    if(!userOrders.length){
      showTyping(); await delay(800); hideTyping();
      await saveBotMsg('У вас пока нет заказов. Хотите оформить первый?', 'no_orders');
      return;
    }
    if(userOrders.length===1){
      showTyping(); await delay(900); hideTyping();
      appendOrderCard(userOrders[0]);
      return;
    }
    showTyping(); await delay(600); hideTyping();
    await saveBotMsg('Выберите заказ:', 'pick_order');
    return;
  }
  showTyping(); await delay(900); hideTyping();
  const texts={
    payment:'Принимаем оплату через СБП, банковские карты, T‑Pay и SberPay.\nПосле подтверждения заказа менеджер пришлёт реквизиты.',
    timing:'Сроки зависят от объёма:\n· Большинство сайтов — около двух дней\n· Если срок меняется, появится уведомление\n· Точные сроки уточняем после первого этапа заказа',
    revision:'Правки вносим по вашему ТЗ. Укажите в сообщении, что именно хотите изменить — менеджер ответит в ближайшее время.',
  };
  await saveBotMsg(texts[topic], topic);
}

async function openFreeChat(){
  flowState='open';
  document.getElementById('newTopicBtn')?.classList.add('show');
  await saveBotMsg('Напишите ваш вопрос — менеджер ответит в ближайшее время.\nДля быстрой навигации используйте кнопки выше.', 'free');
  document.getElementById('chatInput').focus();
}

/* ── Firestore live listener ── */
window.startNewTopic = async function(){
  flowState = 'topic';
  document.getElementById('newTopicBtn').classList.remove('show');
  const msgs = document.getElementById('chatMsgs');
  const sep = document.createElement('div');
  sep.className = 'chat-separator';
  sep.textContent = '─── Новая тема ───';
  msgs.appendChild(sep);
  await showWelcome();
};

function listenChat(uid){
  if(unsubChat) unsubChat();
  const q=query(collection(db,'chats',uid,'messages'),orderBy('createdAt','asc'),limit(100));
  unsubChat=onSnapshot(q,snap=>{
    snap.docChanges().forEach(ch=>{
      if(ch.type==='added'){
        const m={...ch.doc.data(), _id:ch.doc.id};
        if(document.querySelector(`[data-id="${m._id}"]`)) return;

        if(m.sender==='bot'){
          renderBotWithButtons(m);
          if(m.flowTag==='welcome') welcomeShown = true;
        } else if(m.sender==='admin'||m.sender==='user'){
          renderMsg(m);
          if(m.sender==='user') hasUserMessages = true;
        }
        if(m.sender==='admin'&&!m.readByUser)
          updateDoc(ch.doc.ref,{readByUser:true}).catch(()=>{});

        scrollBottom(!initialLoadDone);
      }
    });

    if(!initialLoadDone){
      initialLoadDone=true;
      setTimeout(()=>scrollBottom(true), 80);
    }
  },e=>console.error(e));
}

/* ── Send message from textarea ── */
window.sendMsg=async function(){
  if(!currentUser) return;
  const inp=document.getElementById('chatInput');
  const text=inp.value.trim();
  if(!text) return;
  inp.value=''; inp.style.height='auto';
  document.getElementById('sendBtn').classList.remove('active');

  if(welcomeShown) await removeWelcomeMessages();

  if(flowState==='topic'){
    await saveBotMsg('Для навигации используйте кнопки выше.\nЕсли хотите написать менеджеру — нажмите «Написать вопрос».', 'hint');
    return;
  }

  flowState='open';
  document.getElementById('newTopicBtn')?.classList.add('show');
  try{
    await setDoc(doc(db,'chats',currentUser.uid),
      {name:currentUser.displayName||'',email:currentUser.email||''},{merge:true});
    await addDoc(collection(db,'chats',currentUser.uid,'messages'),{
      text, sender:'user', senderName:currentUser.displayName||'Пользователь',
      type:'text', createdAt:serverTimestamp()
    });
  }catch(e){ toast('Ошибка отправки','error'); }
};

/* ── File sending ── */
window.sendFiles=async function(files){
  if(!currentUser||!files.length) return;
  for(const file of Array.from(files)){
    if(file.size>3*1024*1024){ toast(file.name+' > 3 МБ','error'); continue; }
    try{
      const base64=await new Promise((res,rej)=>{
        const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=rej; r.readAsDataURL(file);
      });
      await addDoc(collection(db,'chats',currentUser.uid,'messages'),{
        type:'file', fileData:base64, fileName:file.name, fileType:file.type,
        sender:'user', senderName:currentUser.displayName||'', createdAt:serverTimestamp()
      });
      toast(file.name+' ✓','success');
    }catch(e){ toast('Ошибка: '+file.name,'error'); }
  }
  document.getElementById('fileInput').value='';
};

/* ── Lightbox ── */
window.openLightbox=function(src){
  document.getElementById('lightboxImg').src=src;
  document.getElementById('lightbox').classList.add('show');
};
window.closeLightbox=function(){
  document.getElementById('lightbox').classList.remove('show');
  document.getElementById('lightboxImg').src='';
};
document.addEventListener('keydown',e=>{if(e.key==='Escape') closeLightbox();});

/* ── Bootstrap ── */
onAuthStateChanged(auth,async user=>{
  if(!user){ window.location.href='../auth'; return; }
  
  currentUser=user;

  await purgeOldMessages(user.uid);

  try{
    const snap=await getDocs(
      query(collection(db,'orders'),where('uid','==',user.uid))
    );
    userOrders=snap.docs.map(d=>({id:d.id,...d.data()}))
      .sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
  }catch(e){}

  document.getElementById('loadingScreen').style.display='none';
  document.getElementById('appWrap').style.display='flex';

  const chatSnap = await getDocs(collection(db,'chats',user.uid,'messages'));

  hasUserMessages = false;
  let hasAdminMessages = false;
  chatSnap.forEach(d => {
    const s = d.data().sender;
    if(s === 'user') hasUserMessages = true;
    if(s === 'admin') hasAdminMessages = true;
  });

  listenChat(user.uid);

  if(hasAdminMessages){
    flowState = 'open';
    document.getElementById('newTopicBtn')?.classList.add('show');
  } else if(chatSnap.empty || !hasUserMessages){
    await showWelcome();
  }
});
</script>
