<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Поддержка — Antviz</title>
  <link rel="icon" href="../img/favicon.png" type="image/png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700;900&family=Onest:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0a0a0c;--surface:#111114;--surface-2:#15151a;--surface-3:#1a1a21;
      --line:rgba(255,255,255,.08);--line-strong:rgba(255,255,255,.16);
      --ink:#f2f2f6;--ink-dim:rgba(255,255,255,.46);--ink-faint:rgba(255,255,255,.26);
      --accent:#7D32FF;--accent-soft:#a78bfa;--accent-wash:rgba(125,50,255,.12);
      --good:#34d399;--good-wash:rgba(52,211,153,.12);
      --warn:#fbbf24;--warn-wash:rgba(251,191,36,.10);
      --bad:#f87171;--bad-wash:rgba(248,113,113,.10);
      --r-xs:6px;--r-sm:10px;--r-md:16px;--r-lg:24px;--r-xl:40px;
      --success:var(--good);--error:var(--bad);--accent2:var(--accent-soft);--muted:var(--ink-faint);
    }
    html,body{height:100%;overflow:hidden}
    body{background:var(--bg);color:var(--ink);font-family:'Onest',sans-serif;font-weight:300;font-size:15px;-webkit-font-smoothing:antialiased}
    @media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
    :focus-visible{outline:2px solid var(--accent-soft);outline-offset:2px}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    @keyframes blink{0%,100%{opacity:.25}50%{opacity:1}}
    @keyframes popIn{from{opacity:0;transform:scale(.94) translateY(4px)}to{opacity:1;transform:scale(1) translateY(0)}}

    /* LOADING */
    .loading-screen{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px}
    .spinner{width:22px;height:22px;border:1.5px solid var(--line-strong);border-top-color:var(--accent);border-radius:50%;animation:spin .65s linear infinite}

    /* LIGHTBOX */
    .lightbox{position:fixed;inset:0;z-index:900;background:rgba(0,0,0,.88);display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px}
    .lightbox.show{display:flex}
    .lb-close{position:absolute;top:20px;right:20px;background:var(--surface);border:1px solid var(--line-strong);color:var(--ink-faint);width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;transition:color .15s,border-color .15s}
    .lb-close:hover{color:var(--ink);border-color:var(--line-strong)}
    .lightbox img{max-width:90vw;max-height:85vh;border-radius:var(--r-md);object-fit:contain}

    /* ROOT LAYOUT — two columns */
    .chat-layout{
      display:none;
      width:100%;height:100%;
      max-width:1100px;margin:0 auto;
      flex-direction:row;
      padding:0;
    }
    .chat-layout.show{display:flex}

    /* SIDEBAR */
    .chat-sidebar{
      width:260px;flex-shrink:0;
      background:var(--surface);border-right:1px solid var(--line);
      display:flex;flex-direction:column;
      overflow:hidden;
    }
    .sidebar-top{padding:22px 20px 18px;border-bottom:1px solid var(--line)}
    .sidebar-back{display:inline-flex;align-items:center;gap:6px;color:var(--ink-faint);text-decoration:none;font-size:.8rem;margin-bottom:20px;transition:color .15s}
    .sidebar-back:hover{color:var(--ink)}
    .sidebar-back svg{width:13px;height:13px;stroke:currentColor;stroke-width:2;fill:none}
    .sidebar-brand{display:flex;align-items:center;gap:10px}
    .sidebar-av{width:38px;height:38px;border-radius:var(--r-sm);background:var(--accent-wash);border:1px solid rgba(125,50,255,.2);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
    .sidebar-av img{width:100%;height:100%;object-fit:cover}
    .sidebar-brand-text{line-height:1.3}
    .sidebar-name{font-family:'Unbounded',sans-serif;font-size:.78rem;font-weight:600}
    .sidebar-status{display:flex;align-items:center;gap:5px;font-size:.72rem;color:var(--ink-faint)}
    .online-dot{width:6px;height:6px;border-radius:50%;background:var(--good);flex-shrink:0}
    .sidebar-body{flex:1;padding:20px;display:flex;flex-direction:column;gap:12px;overflow-y:auto}
    .sidebar-label{font-size:.64rem;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-faint);font-weight:500;margin-bottom:4px}
    .sidebar-hint{font-size:.78rem;color:var(--ink-dim);line-height:1.6}
    .sidebar-divider{height:1px;background:var(--line);margin:4px 0}
    .sidebar-topic{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--r-sm);color:var(--ink-faint);font-size:.8rem;cursor:default;transition:background .15s}
    .sidebar-topic svg{width:13px;height:13px;stroke:currentColor;stroke-width:1.8;fill:none;flex-shrink:0}
    .sidebar-footer{padding:16px 20px;border-top:1px solid var(--line)}
    .sidebar-new-topic-btn{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;padding:.6rem .9rem;background:var(--accent-wash);border:1px solid rgba(125,50,255,.2);color:var(--accent-soft);font-family:'Onest',sans-serif;font-size:.8rem;font-weight:500;border-radius:var(--r-md);cursor:pointer;transition:background .15s;opacity:0;pointer-events:none;transition:opacity .2s,background .15s}
    .sidebar-new-topic-btn svg{width:12px;height:12px;stroke:currentColor;stroke-width:2.2;fill:none}
    .sidebar-new-topic-btn.show{opacity:1;pointer-events:all}
    .sidebar-new-topic-btn:hover{background:rgba(125,50,255,.18)}

    /* MAIN CHAT AREA */
    .chat-main{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg)}

    /* TOP STRIPE (narrow status bar) */
    .chat-top-bar{height:48px;padding:0 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--surface)}
    .chat-top-title{font-family:'Unbounded',sans-serif;font-size:.78rem;font-weight:600;color:var(--ink-faint)}
    .chat-top-meta{font-size:.72rem;color:var(--ink-faint);display:flex;align-items:center;gap:6px}
    .chat-top-meta span{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--good)}

    /* MESSAGES */
    .chat-msgs{flex:1;overflow-y:auto;padding:24px 20px;display:flex;flex-direction:column;gap:3px;scroll-behavior:smooth}
    .chat-msgs::-webkit-scrollbar{width:4px}
    .chat-msgs::-webkit-scrollbar-track{background:transparent}
    .chat-msgs::-webkit-scrollbar-thumb{background:var(--line-strong);border-radius:4px}

    /* MSG — class names kept to match JS renderMsg */
    .msg{display:flex;flex-direction:column;gap:4px;max-width:76%;animation:popIn .18s ease;margin-bottom:8px}
    .msg.mine{align-self:flex-end;align-items:flex-end}
    .msg.theirs{align-self:flex-start;align-items:flex-start}
    .msg-bubble{padding:11px 14px;border-radius:var(--r-lg);font-size:.88rem;line-height:1.65;word-break:break-word}
    .msg.mine .msg-bubble{background:var(--accent);color:#fff;border-bottom-right-radius:var(--r-xs)}
    .msg.theirs .msg-bubble{background:var(--surface);border:1px solid var(--line);color:var(--ink);border-bottom-left-radius:var(--r-xs)}
    .msg-time{font-size:.68rem;color:var(--ink-faint);padding:0 2px}
    .msg-img{max-width:220px;border-radius:var(--r-md);cursor:zoom-in;display:block;border:1px solid var(--line)}
    .msg-file-link{display:inline-flex;align-items:center;gap:7px;padding:9px 14px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-md);font-size:.82rem;color:var(--accent-soft);text-decoration:none;transition:border-color .15s}
    .msg-file-link:hover{border-color:var(--accent-soft)}

    /* BOT ACTIONS — class names and modifiers kept to match JS */
    .bot-actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;max-width:520px}
    .bot-actions.scrollable{overflow-x:auto;flex-wrap:nowrap;padding-bottom:4px}
    .bot-actions.locked{pointer-events:none;opacity:.45}
    .bot-btn{border:1px solid var(--line-strong);background:var(--surface-2);color:var(--ink-dim);font-family:'Onest',sans-serif;font-size:.78rem;font-weight:500;padding:.5rem .95rem;border-radius:99px;cursor:pointer;transition:background .15s,border-color .15s,color .15s;white-space:nowrap}
    .bot-btn:hover:not(:disabled){background:var(--surface-3);color:var(--ink);border-color:var(--line-strong)}
    .bot-btn.accent{background:var(--accent-wash);border-color:rgba(125,50,255,.25);color:var(--accent-soft)}
    .bot-btn.accent:hover:not(:disabled){background:rgba(125,50,255,.18)}
    .bot-btn.back{background:transparent;border-color:var(--line);color:var(--ink-faint)}
    .bot-btn:disabled{cursor:default}

    /* TYPING INDICATOR — class names kept */
    .typing-indicator{display:flex;align-items:center;gap:5px;padding:12px 16px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg) var(--r-lg) var(--r-lg) var(--r-xs);width:fit-content;margin-bottom:8px}
    .typing-dot{width:6px;height:6px;border-radius:50%;background:var(--ink-faint);animation:blink 1.2s ease-in-out infinite}
    .typing-dot:nth-child(2){animation-delay:.2s}
    .typing-dot:nth-child(3){animation-delay:.4s}

    /* ORDER INFO CARD — class names kept to match appendOrderCard */
    .order-info-card{background:var(--surface-2);border:1px solid var(--line-strong);border-radius:var(--r-md);padding:14px 16px;margin-top:8px;min-width:240px}
    .oi-num{font-family:'Unbounded',sans-serif;font-size:.82rem;font-weight:600;margin-bottom:10px;color:var(--ink)}
    .oi-row{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:6px 0;border-bottom:1px solid var(--line);font-size:.8rem}
    .oi-row:last-child{border-bottom:none}
    .oi-lbl{color:var(--ink-faint);flex-shrink:0}
    .oi-val{text-align:right;font-weight:500;color:var(--ink);word-break:break-word}
    /* status pills s0–s5 — class names kept */
    .s-pill{display:inline-block;font-size:.7rem;font-weight:600;padding:.2rem .55rem;border-radius:var(--r-xs)}
    .s0{background:var(--surface-3);color:var(--ink-faint)}
    .s1{background:var(--warn-wash);color:var(--warn)}
    .s2{background:rgba(96,165,250,.12);color:#60a5fa}
    .s3{background:var(--accent-wash);color:var(--accent-soft)}
    .s4{background:var(--warn-wash);color:var(--warn)}
    .s5{background:var(--good-wash);color:var(--good)}

    /* INPUT BAR */
    .chat-input-wrap{flex-shrink:0;padding:12px 16px;background:var(--surface);border-top:1px solid var(--line)}
    .chat-input-bar{display:flex;align-items:flex-end;gap:8px;background:var(--surface-2);border:1px solid var(--line-strong);border-radius:var(--r-xl);padding:8px 8px 8px 14px;transition:border-color .18s}
    .chat-input-bar:focus-within{border-color:var(--accent)}
    .attach-btn{width:34px;height:34px;border-radius:50%;background:transparent;border:1px solid var(--line);color:var(--ink-faint);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:color .15s,border-color .15s;margin-bottom:1px}
    .attach-btn:hover{color:var(--ink);border-color:var(--line-strong)}
    .attach-btn svg{width:14px;height:14px;stroke:currentColor;stroke-width:1.8;fill:none}
    .chat-textarea{flex:1;background:transparent;border:none;outline:none;resize:none;color:var(--ink);font-family:'Onest',sans-serif;font-size:.88rem;font-weight:300;line-height:1.6;min-height:24px;max-height:120px;padding:4px 0}
    .chat-textarea::placeholder{color:var(--ink-faint)}
    .send-btn{width:34px;height:34px;border-radius:50%;background:var(--line);border:none;color:var(--ink-faint);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:background .15s,color .15s;margin-bottom:1px}
    .send-btn svg{width:14px;height:14px}
    .send-btn.active{background:var(--accent);color:#fff}
    .send-btn:hover.active{background:#8f4eff}

    /* TOAST */
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);z-index:800;padding:.55rem 1.2rem;border-radius:99px;font-size:.78rem;font-weight:500;opacity:0;transition:opacity .22s,transform .22s;pointer-events:none;white-space:nowrap;max-width:90vw}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .toast.success{background:var(--good);color:#04140e}
    .toast.error{background:var(--bad);color:#1a0606}
    .toast.info{background:var(--accent);color:#fff}

    /* NEW TOPIC BTN (still in DOM for JS) — hidden; sidebar button replaces it visually */
    #newTopicBtn{display:none}

    /* MOBILE: collapse sidebar */
    @media(max-width:760px){
      html,body{overflow:auto}
      .chat-layout{flex-direction:column;height:auto;min-height:100vh}
      .chat-sidebar{width:100%;border-right:none;border-bottom:1px solid var(--line)}
      .sidebar-body{display:none}
      .sidebar-footer{display:none}
      .chat-main{flex:1;min-height:0;height:calc(100vh - 90px)}
      .chat-msgs{height:calc(100vh - 90px - 48px - 72px)}
    }
  </style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
  <div class="spinner"></div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lb-close" onclick="event.stopPropagation();closeLightbox()">✕</button>
  <img id="lightboxImg" src="" alt=""/>
</div>

<!-- hidden legacy new-topic btn kept for JS compatibility -->
<button id="newTopicBtn" onclick="startNewTopic()" aria-hidden="true"></button>

<div class="toast" id="toast"></div>

<div class="chat-layout" id="appWrap">

  <!-- SIDEBAR -->
  <aside class="chat-sidebar">
    <div class="sidebar-top">
      <a href="../profile" class="sidebar-back">
        <svg viewBox="0 0 24 24" fill="none"><polyline points="15 18 9 12 15 6"/></svg>
        Личный кабинет
      </a>
      <div class="sidebar-brand">
        <div class="sidebar-av">
          <img src="../img/favicon.png" alt="Antviz"/>
        </div>
        <div class="sidebar-brand-text">
          <div class="sidebar-name">Поддержка</div>
          <div class="sidebar-status">
            <span class="online-dot"></span>
            онлайн
          </div>
        </div>
      </div>
    </div>

    <div class="sidebar-body">
      <div>
        <div class="sidebar-label">Как это работает</div>
        <div class="sidebar-hint">Выберите тему — бот поможет разобраться. Для сложных вопросов подключим менеджера.</div>
      </div>
      <div class="sidebar-divider"></div>
      <div>
        <div class="sidebar-label">Доступные темы</div>
        <div class="sidebar-topic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Статус заказа</div>
        <div class="sidebar-topic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>Оплата</div>
        <div class="sidebar-topic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Сроки</div>
        <div class="sidebar-topic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>Правки</div>
        <div class="sidebar-topic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>Написать вопрос</div>
      </div>
    </div>

    <div class="sidebar-footer">
      <button class="sidebar-new-topic-btn" id="sidebarNewTopicBtn" onclick="startNewTopic()">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14"/></svg>
        Новая тема
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="chat-main">
    <div class="chat-top-bar">
      <span class="chat-top-title">Диалог с поддержкой</span>
      <span class="chat-top-meta"><span></span>Antviz · онлайн</span>
    </div>

    <div class="chat-msgs" id="chatMsgs"></div>

    <div class="chat-input-wrap">
      <input type="file" id="fileInput" style="display:none" multiple
        accept="image/*,.pdf,.doc,.docx,.zip,.rar,.psd,.fig"
        onchange="sendFiles(this.files)"/>
      <div class="chat-input-bar">
        <button class="attach-btn" onclick="document.getElementById('fileInput').click()" title="Прикрепить файл">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
        </button>
        <textarea class="chat-textarea" id="chatInput" placeholder="Напишите сообщение..." rows="1"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"
          oninput="onInput(this)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMsg()">
          <svg viewBox="0 0 24 24" fill="none"><line x1="22" y1="2" x2="11" y2="13" stroke="currentColor" stroke-width="2"/><polygon points="22 2 15 22 11 13 2 9 22 2" fill="currentColor"/></svg>
        </button>
      </div>
    </div>
  </div>

</div>

<script type="module">
import { auth, db } from '../firebase-config.js';
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  collection, query, orderBy, where, onSnapshot, limit,
  addDoc, serverTimestamp, doc, setDoc, updateDoc,
  getDocs, deleteDoc, Timestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const STATUS_LABELS = ['Новая заявка','Обсуждение','В работе','На проверке','Правки','Готово'];
const THREE_DAYS_MS = 3 * 24 * 60 * 60 * 1000;

let currentUser = null;
let unsubChat = null;
let userOrders = [];
let flowState = 'topic';
let initialLoadDone = false;
let welcomeShown = false;
let hasUserMessages = false;

/* ── helpers ── */
function toast(msg, type='info'){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className=`toast ${type} show`;
  setTimeout(()=>t.className='toast',3000);
}
function fmtTime(ts){
  if(!ts) return '';
  const d=ts.toDate?ts.toDate():new Date(ts);
  return d.toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});
}
function fmtDate(ts){
  if(!ts) return '—';
  const d=ts.toDate?ts.toDate():new Date(ts);
  return d.toLocaleDateString('ru',{day:'numeric',month:'short'});
}
function scrollBottom(instant){
  const c=document.getElementById('chatMsgs');
  if(instant) c.style.scrollBehavior='auto';
  c.scrollTop=c.scrollHeight;
  if(instant) setTimeout(()=>c.style.scrollBehavior='smooth',50);
}
function delay(ms){return new Promise(r=>setTimeout(r,ms));}

window.onInput=function(el){
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,120)+'px';
  document.getElementById('sendBtn').classList.toggle('active',el.value.trim().length>0);
};

/* ── purge messages older than 3 days ── */
async function purgeOldMessages(uid){
  try{
    const cutoff=Timestamp.fromMillis(Date.now()-THREE_DAYS_MS);
    const snap=await getDocs(query(collection(db,'chats',uid,'messages'),where('createdAt','<',cutoff)));
    if(snap.empty) return;
    for(const d of snap.docs) deleteDoc(d.ref).catch(()=>{});
    toast('История старше 3 дней очищена','info');
  }catch(e){}
}

/* ── dismiss welcome messages (soft-delete, no extra writes/deletes cost) ── */
async function removeWelcomeMessages(){
  if(!currentUser) return;
  try{
    const snap = await getDocs(query(
      collection(db,'chats',currentUser.uid,'messages'),
      where('flowTag','==','welcome')
    ));
    for(const d of snap.docs){
      if(!d.data().dismissed) updateDoc(d.ref,{dismissed:true}).catch(()=>{});
      document.querySelector(`[data-id="${d.id}"]`)?.remove();
    }
    welcomeShown = false;
  }catch(e){}
}

/* ── save bot message to Firestore ── */
async function saveBotMsg(text, flowTag){
  if(!currentUser) return null;
  try{
    const ref = await addDoc(collection(db,'chats',currentUser.uid,'messages'),{
      text, sender:'bot', senderName:'Бот', type:'text',
      flowTag: flowTag||null,
      createdAt: serverTimestamp()
    });
    return ref.id;
  }catch(e){ return null; }
}

/* ── render helpers ── */
function renderMsg(m){
  const container=document.getElementById('chatMsgs');
  const isMe=m.sender==='user';
  const isBot=m.sender==='bot';
  const div=document.createElement('div');
  div.className=`msg ${isMe?'mine':'theirs'}`;
  if(m._id) div.dataset.id=m._id;

  if(m.type==='file'){
    const src=m.fileData||m.fileUrl||'';
    const isImg=m.fileType&&m.fileType.startsWith('image/');
    if(isImg) div.innerHTML=`<img class="msg-img" src="${src}" onclick="openLightbox('${src.replace(/'/g,"\\'")}')"/><div class="msg-time">${isMe?'Вы':'Поддержка'} · ${fmtTime(m.createdAt)}</div>`;
    else div.innerHTML=`<a class="msg-file-link" href="${src}" download="${m.fileName}">📎 ${m.fileName||'Файл'}</a><div class="msg-time">${isMe?'Вы':'Поддержка'} · ${fmtTime(m.createdAt)}</div>`;
  } else {
    const name = isMe?'Вы': isBot?'Бот':'Поддержка';
    div.innerHTML=`<div class="msg-bubble">${(m.text||'').replace(/\n/g,'<br>')}</div><div class="msg-time">${name} · ${fmtTime(m.createdAt)}</div>`;
  }
  container.appendChild(div);
  return div;
}

function lockAllButtonRows(){
  document.querySelectorAll('.bot-actions:not(.locked)').forEach(r=>{
    r.classList.add('locked');
    r.querySelectorAll('button').forEach(b=>b.disabled=true);
  });
}

function renderBotWithButtons(m){
  const div = renderMsg(m);
  if(!div) return;
  // деактивируем все ранее показанные блоки кнопок — не даём кликать по "устаревшим" темам
  lockAllButtonRows();

  const row = document.createElement('div');
  row.className='bot-actions';
  const buttons = getBotButtons(m.flowTag);
  if(buttons.length > 6) row.classList.add('scrollable');
  buttons.forEach(a=>{
    const btn=document.createElement('button');
    btn.className=`bot-btn${a.cls?' '+a.cls:''}`;
    btn.textContent=a.label;
    btn.onclick=()=>{
      row.classList.add('locked');
      row.querySelectorAll('button').forEach(b=>b.disabled=true);
      a.fn();
    };
    row.appendChild(btn);
  });
  if(buttons.length) div.appendChild(row);
}

/* ── button sets by flowTag ── */
function getBotButtons(tag){
  const topicBtns=[
    {label:'Статус заказа',    cls:'accent', fn:()=>{ doSendUserMsg('Статус заказа'); handleTopic('order'); }},
    {label:'Оплата',           cls:'accent', fn:()=>{ doSendUserMsg('Оплата'); handleTopic('payment'); }},
    {label:'Сроки',            cls:'accent', fn:()=>{ doSendUserMsg('Сроки'); handleTopic('timing'); }},
    {label:'Правки',           cls:'accent', fn:()=>{ doSendUserMsg('Правки'); handleTopic('revision'); }},
    {label:'Написать вопрос',          fn:()=>{ doSendUserMsg('Хочу написать вопрос'); openFreeChat(); }},
  ];
  const backBtn    ={label:'Назад к темам',     cls:'back',   fn:()=>showTopicMenu()};
  const managerBtn ={label:'Написать менеджеру', cls:'accent', fn:()=>openFreeChat()};

  switch(tag){
    case 'welcome': return topicBtns;
    case 'topic':   return topicBtns;
    case 'no_orders': return [
      {label:'Оформить заказ', cls:'accent', fn:()=>window.location.href='../order'},
      {label:'Назад', cls:'back', fn:()=>showTopicMenu()},
    ];
    case 'pick_order': return [
      ...userOrders.map(o=>({
        label:`№ ${(o.id||'').slice(0,8).toUpperCase()} · ${STATUS_LABELS[o.status||0]}`,
        cls:'accent',
        fn:async()=>{ showTyping(); await delay(700); hideTyping(); appendOrderCard(o); }
      })),
      {label:'Назад', cls:'back', fn:()=>showTopicMenu()},
    ];
    case 'payment':  return [backBtn, managerBtn];
    case 'timing':   return [backBtn, managerBtn];
    case 'revision': return [backBtn, {label:'Описать правки', cls:'accent', fn:()=>openFreeChat()}];
    case 'free':     return [backBtn];
    case 'hint':     return [{label:'Написать вопрос', cls:'accent', fn:()=>{ doSendUserMsg('Хочу написать вопрос'); openFreeChat(); }}];
    default: return [];
  }
}

function appendOrderCard(o){
  const container=document.getElementById('chatMsgs');
  const div=document.createElement('div');
  div.className='msg theirs';
  const s = (typeof o.status==='number' && STATUS_LABELS[o.status]) ? o.status : 0;
  div.innerHTML=`
    <div class="msg-bubble">Вот информация по вашему заказу:</div>
    <div class="order-info-card">
      <div class="oi-num">Заказ № ${(o.id||'').slice(0,8).toUpperCase()}</div>
      <div class="oi-row"><span class="oi-lbl">Тип</span><span class="oi-val">${o.siteType||'Сайт'}</span></div>
      <div class="oi-row"><span class="oi-lbl">Статус</span><span class="oi-val"><span class="s-pill s${s}">${STATUS_LABELS[s]}</span></span></div>
      <div class="oi-row"><span class="oi-lbl">Оплата</span><span class="oi-val" style="color:${o.paid?'var(--success)':'var(--error)'}">${o.paid?'Оплачен':'Не оплачен'}</span></div>
      <div class="oi-row"><span class="oi-lbl">Сумма</span><span class="oi-val">${o.totalPrice?o.totalPrice.toLocaleString('ru')+' ₽':'—'}</span></div>
      <div class="oi-row"><span class="oi-lbl">Создан</span><span class="oi-val">${fmtDate(o.createdAt)}</span></div>
      ${o.statusComment?`<div class="oi-row" style="flex-direction:column;gap:4px"><span class="oi-lbl">Комментарий</span><span class="oi-val" style="text-align:left;color:var(--accent2)">${o.statusComment}</span></div>`:''}
    </div>
    <div class="msg-time">Бот · ${fmtTime(Timestamp.now())}</div>`;
  lockAllButtonRows();
  const row=document.createElement('div');
  row.className='bot-actions';
  [{label:'Назад к темам', cls:'back', fn:()=>showTopicMenu()},
   {label:'Написать менеджеру', cls:'accent', fn:()=>openFreeChat()}
  ].forEach(a=>{
    const btn=document.createElement('button');
    btn.className=`bot-btn ${a.cls}`; btn.textContent=a.label;
    btn.onclick=()=>{
      row.classList.add('locked');
      row.querySelectorAll('button').forEach(b=>b.disabled=true);
      a.fn();
    };
    row.appendChild(btn);
  });
  div.appendChild(row);
  container.appendChild(div);
  scrollBottom();
}

function showTyping(){
  const c=document.getElementById('chatMsgs');
  const el=document.createElement('div');
  el.className='typing-indicator'; el.id='typingIndicator';
  el.innerHTML='<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
  c.appendChild(el); scrollBottom();
}
function hideTyping(){ document.getElementById('typingIndicator')?.remove(); }

/* ── persist user msg (from button clicks) ── */
async function doSendUserMsg(text){
  if(!currentUser||!text) return;
  try{
    if(welcomeShown) await removeWelcomeMessages();
    await setDoc(doc(db,'chats',currentUser.uid),
      {name:currentUser.displayName||'',email:currentUser.email||''},{merge:true});
    await addDoc(collection(db,'chats',currentUser.uid,'messages'),{
      text, sender:'user', senderName:currentUser.displayName||'Пользователь',
      type:'text', createdAt:serverTimestamp()
    });
  }catch(e){}
}

/* ── bot flow ── */
async function showWelcome(){
  await removeWelcomeMessages();
  welcomeShown = true;
  await saveBotMsg('Привет! Я бот Антвизик.\nЧем могу помочь? Выберите тему:', 'welcome');
}

async function showTopicMenu(){
  flowState='topic';
  await saveBotMsg('Выберите тему:', 'topic');
}

async function handleTopic(topic){
  if(topic==='order'){
    if(!userOrders.length){
      showTyping(); await delay(800); hideTyping();
      await saveBotMsg('У вас пока нет заказов. Хотите оформить первый?', 'no_orders');
      return;
    }
    if(userOrders.length===1){
      showTyping(); await delay(900); hideTyping();
      appendOrderCard(userOrders[0]);
      return;
    }
    showTyping(); await delay(600); hideTyping();
    await saveBotMsg('Выберите заказ:', 'pick_order');
    return;
  }
  showTyping(); await delay(900); hideTyping();
  const texts={
    payment:'Принимаем оплату через СБП, банковские карты, T‑Pay и SberPay.\nОплата происходит прямо на сайте.',
    timing:'Сроки зависят от объёма:\n· Большинство сайтов — около двух дней\n· Если срок меняется, появится уведомление\n· Точные сроки уточняем после первого этапа заказа',
    revision:'Правки вносим по вашему ТЗ. Укажите в сообщении, что именно хотите изменить — менеджер ответит в ближайшее время.',
  };
  await saveBotMsg(texts[topic], topic);
}

async function openFreeChat(){
  flowState='open';
  document.getElementById('newTopicBtn')?.classList.add('show');
  document.getElementById('sidebarNewTopicBtn')?.classList.add('show');
  await saveBotMsg('Напишите ваш вопрос — менеджер ответит в ближайшее время.\nДля быстрой навигации используйте кнопки выше.', 'free');
  document.getElementById('chatInput').focus();
}

/* ── new topic ── */
window.startNewTopic = async function(){
  flowState = 'topic';
  document.getElementById('newTopicBtn').classList.remove('show');
  document.getElementById('sidebarNewTopicBtn').classList.remove('show');
  const msgs = document.getElementById('chatMsgs');
  const sep = document.createElement('div');
  sep.style.cssText = 'text-align:center;color:var(--muted);font-size:11px;padding:10px;opacity:.5;letter-spacing:.04em';
  sep.textContent = '— Новая тема —';
  msgs.appendChild(sep);
  await showWelcome();
};

/* ── Firestore live listener ──
   onFirstSnapshot(stats) вызывается один раз сразу после обработки первого
   снапшота — на тех же данных, что и рендер, без отдельного getDocs (нет гонки) */
function listenChat(uid, onFirstSnapshot){
  if(unsubChat) unsubChat();
  const q=query(collection(db,'chats',uid,'messages'),orderBy('createdAt','asc'),limit(100));
  unsubChat=onSnapshot(q,snap=>{
    let hasAdminMessages = false;
    const isFirst = !initialLoadDone;

    snap.docChanges().forEach(ch=>{
      if(ch.type==='added'){
        const m={...ch.doc.data(), _id:ch.doc.id};
        if(m.sender==='admin') hasAdminMessages = true;
        if(document.querySelector(`[data-id="${m._id}"]`)) return;
        if(m.dismissed) return;

        if(m.sender==='bot'){
          renderBotWithButtons(m);
          if(m.flowTag==='welcome') welcomeShown = true;
        } else if(m.sender==='admin'||m.sender==='user'){
          renderMsg(m);
          if(m.sender==='user') hasUserMessages = true;
        }
        if(m.sender==='admin'&&!m.readByUser)
          updateDoc(ch.doc.ref,{readByUser:true}).catch(()=>{});

        scrollBottom(!initialLoadDone);
      }
    });

    if(!initialLoadDone){
      initialLoadDone=true;
      setTimeout(()=>scrollBottom(true), 80);
      if(isFirst && onFirstSnapshot){
        onFirstSnapshot({hasAdminMessages, isEmpty: snap.empty});
      }
    }
  },e=>console.error(e));
}

/* ── send message from textarea ── */
window.sendMsg=async function(){
  if(!currentUser) return;
  const inp=document.getElementById('chatInput');
  const text=inp.value.trim();
  if(!text) return;
  inp.value=''; inp.style.height='auto';
  document.getElementById('sendBtn').classList.remove('active');

  if(welcomeShown) await removeWelcomeMessages();

  if(flowState==='topic'){
    await saveBotMsg('Для навигации используйте кнопки выше.\nЕсли хотите написать менеджеру — нажмите «Написать вопрос».', 'hint');
    return;
  }

  flowState='open';
  document.getElementById('newTopicBtn')?.classList.add('show');
  document.getElementById('sidebarNewTopicBtn')?.classList.add('show');
  try{
    await setDoc(doc(db,'chats',currentUser.uid),
      {name:currentUser.displayName||'',email:currentUser.email||''},{merge:true});
    await addDoc(collection(db,'chats',currentUser.uid,'messages'),{
      text, sender:'user', senderName:currentUser.displayName||'Пользователь',
      type:'text', createdAt:serverTimestamp()
    });
  }catch(e){ toast('Ошибка отправки','error'); }
};

/* ── file sending ── */
window.sendFiles=async function(files){
  if(!currentUser||!files.length) return;
  for(const file of Array.from(files)){
    if(file.size>3*1024*1024){ toast(file.name+' > 3 МБ','error'); continue; }
    try{
      const base64=await new Promise((res,rej)=>{
        const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=rej; r.readAsDataURL(file);
      });
      await addDoc(collection(db,'chats',currentUser.uid,'messages'),{
        type:'file', fileData:base64, fileName:file.name, fileType:file.type,
        sender:'user', senderName:currentUser.displayName||'', createdAt:serverTimestamp()
      });
      toast(file.name+' отправлен','success');
    }catch(e){ toast('Ошибка: '+file.name,'error'); }
  }
  document.getElementById('fileInput').value='';
};

/* ── lightbox ── */
window.openLightbox=function(src){
  document.getElementById('lightboxImg').src=src;
  document.getElementById('lightbox').classList.add('show');
};
window.closeLightbox=function(){
  document.getElementById('lightbox').classList.remove('show');
  document.getElementById('lightboxImg').src='';
};
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeLightbox(); });

/* ── bootstrap ── */
onAuthStateChanged(auth,async user=>{
  if(!user){ window.location.href='../auth'; return; }

  currentUser=user;

  await purgeOldMessages(user.uid);

  try{
    const snap=await getDocs(
      query(collection(db,'orders'),where('uid','==',user.uid))
    );
    userOrders=snap.docs.map(d=>({id:d.id,...d.data()}))
      .sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
  }catch(e){}

  document.getElementById('loadingScreen').style.display='none';
  document.getElementById('appWrap').style.display='flex';

  // решение о welcome/flowState принимаем по тому же снапшоту, что и рендер —
  // без отдельного getDocs, чтобы не было гонки с onSnapshot
  listenChat(user.uid, ({hasAdminMessages, isEmpty})=>{
    if(hasAdminMessages){
      flowState = 'open';
      document.getElementById('newTopicBtn')?.classList.add('show');
      document.getElementById('sidebarNewTopicBtn')?.classList.add('show');
    } else if(isEmpty || !hasUserMessages){
      showWelcome();
    }
  });
});
</script>
