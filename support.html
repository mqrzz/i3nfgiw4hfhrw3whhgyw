<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Поддержка — Design Antviz</title>
  <link rel="icon" href="favicon.png" type="image/png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;600;900&family=Onest:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0a0a0c;--bg2:#111116;--bg3:#18181f;--card:#16161d;
      --border:rgba(255,255,255,0.07);--border-hi:rgba(255,255,255,0.13);
      --accent:#6c63ff;--accent2:#a78bfa;--accent3:#38bdf8;
      --text:#f0f0f5;--muted:#777789;--muted2:#999aab;
      --success:#4ade80;--error:#f87171;--warn:#fbbf24;
      --nav-h:68px;
    }
    html,body{height:100%;overflow:hidden}
    body{background:var(--bg);color:var(--text);font-family:'Onest',sans-serif;font-weight:300}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.4)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes botTyping{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-4px)}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}

    /* NAV */
    nav.desktop-nav{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:200;
      display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;height:52px;
      width:calc(100% - 40px);max-width:1100px;background:rgba(22,22,30,0.85);backdrop-filter:blur(20px);
      border:1px solid rgba(255,255,255,0.1);border-radius:28px;box-shadow:0 4px 30px rgba(0,0,0,.4)}
    .logo{font-family:'Unbounded',sans-serif;font-weight:600;font-size:.9rem;letter-spacing:.04em;color:var(--text);text-decoration:none;display:flex;align-items:center;gap:10px}
    .logo-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent);animation:pulse 2s infinite}
    .nav-links{display:flex;gap:1.5rem;align-items:center}
    .nav-links a{color:var(--muted);text-decoration:none;font-size:.8rem;letter-spacing:.02em;transition:color .2s}
    .nav-links a:hover,.nav-links a.active{color:var(--text)}
    .nav-cta{background:var(--accent)!important;color:#fff!important;padding:.4rem 1.1rem;border-radius:50px;font-weight:500!important}

    .mobile-nav-bar{display:none;position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:200;
      background:rgba(22,22,30,0.92);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.12);border-radius:28px;
      padding:8px 6px;width:calc(100% - 24px);max-width:360px;justify-content:space-around;align-items:center;
      box-shadow:0 8px 40px rgba(0,0,0,.5)}
    .mobile-nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;text-decoration:none;
      color:var(--muted);font-size:.6rem;padding:6px 10px;border-radius:14px;transition:background .18s,color .18s}
    .mobile-nav-item svg{width:20px;height:20px}
    .mobile-nav-item.active{color:var(--accent2);background:rgba(108,99,255,.13)}
    @media(max-width:768px){nav.desktop-nav{display:none!important}.mobile-nav-bar{display:flex!important}}

    /* LOADING */
    .loading-screen{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:.9rem}
    .spinner{width:28px;height:28px;border:2px solid var(--border-hi);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}

    /* LAYOUT */
    .chat-layout{
      position:fixed;
      top:var(--nav-h);
      left:0;right:0;
      bottom:0;
      display:flex;
      flex-direction:column;
      max-width:720px;
      margin:0 auto;
      border-left:1px solid var(--border);
      border-right:1px solid var(--border);
    }
    @media(max-width:768px){
      .chat-layout{top:0;border:none;bottom:72px}
    }

    /* CHAT HEADER */
    .chat-hdr{
      padding:1rem 1.3rem;
      border-bottom:1px solid var(--border);
      display:flex;align-items:center;gap:.85rem;
      background:var(--bg2);
      flex-shrink:0;
    }
    .chat-av{width:40px;height:40px;border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .chat-av img{width:100%;height:100%;object-fit:cover}
    .chat-hdr-info{flex:1}
    .chat-hdr-name{font-family:'Unbounded',sans-serif;font-weight:600;font-size:.88rem}
    .chat-hdr-sub{font-size:.7rem;color:var(--muted);display:flex;align-items:center;gap:.35rem;margin-top:.1rem}
    .online-dot{width:6px;height:6px;border-radius:50%;background:var(--success);display:inline-block}
    .back-link{display:flex;align-items:center;gap:5px;color:var(--muted);text-decoration:none;font-size:.78rem;transition:color .15s;flex-shrink:0}
    .back-link:hover{color:var(--text)}
    .back-link svg{width:16px;height:16px;stroke:currentColor;stroke-width:2}

    /* MESSAGES */
    .chat-msgs{
      flex:1;
      overflow-y:auto;
      padding:1.1rem 1.2rem;
      display:flex;flex-direction:column;gap:.55rem;
      scroll-behavior:smooth;
    }
    .chat-msgs::-webkit-scrollbar{width:3px}
    .chat-msgs::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}

    .msg{max-width:78%;display:flex;flex-direction:column;gap:.1rem;animation:fadeUp .2s ease}
    .msg.mine{align-self:flex-end;align-items:flex-end}
    .msg.theirs{align-self:flex-start;align-items:flex-start}

    .msg-bubble{padding:.55rem .95rem;border-radius:16px;font-size:.83rem;line-height:1.55;word-break:break-word}
    .msg.mine .msg-bubble{background:var(--accent);color:#fff;border-bottom-right-radius:4px}
    .msg.theirs .msg-bubble{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-bottom-left-radius:4px}
    .msg-time{font-size:.6rem;color:var(--muted);margin-top:2px}

    /* SYSTEM MESSAGE */
    .system-msg{
      align-self:center;
      max-width:85%;
      text-align:center;
      padding:.5rem 1rem;
      background:rgba(255,255,255,0.03);
      border-radius:12px;
      font-size:.72rem;
      color:var(--muted2);
      animation:fadeIn .4s ease;
      line-height:1.5;
    }

    /* INLINE BUTTONS (in bot messages) */
    .inline-buttons{
      display:flex;
      flex-wrap:wrap;
      gap:.4rem;
      margin-top:.6rem;
    }
    .inline-btn{
      background:rgba(108,99,255,0.1);
      border:1px solid rgba(108,99,255,0.25);
      color:var(--accent2);
      font-family:'Onest',sans-serif;
      font-size:.75rem;
      font-weight:400;
      padding:.4rem .9rem;
      border-radius:10px;
      cursor:pointer;
      transition:all .18s;
      white-space:nowrap;
      letter-spacing:.01em;
    }
    .inline-btn:hover{
      background:rgba(108,99,255,0.2);
      border-color:rgba(108,99,255,0.45);
      color:#c4b5fd;
      transform:translateY(-1px);
    }
    .inline-btn.back-btn{
      background:rgba(255,255,255,0.04);
      border-color:rgba(255,255,255,0.12);
      color:var(--muted2);
    }
    .inline-btn.back-btn:hover{
      background:rgba(255,255,255,0.08);
      color:var(--text);
    }

    /* BOT TYPING */
    .typing-indicator{align-self:flex-start;display:flex;align-items:center;gap:4px;padding:.55rem .85rem;background:var(--bg3);border:1px solid var(--border);border-radius:16px;border-bottom-left-radius:4px;animation:fadeUp .2s ease}
    .typing-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:botTyping 1.2s infinite}
    .typing-dot:nth-child(2){animation-delay:.2s}
    .typing-dot:nth-child(3){animation-delay:.4s}

    /* INPUT ROW */
    .chat-input-row{
      padding:.75rem 1rem;
      border-top:1px solid var(--border);
      display:flex;gap:.5rem;align-items:flex-end;
      background:var(--bg2);
      flex-shrink:0;
    }
    .file-btn{width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,.03);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .17s}
    .file-btn:hover{border-color:var(--accent2);color:var(--accent2)}
    .file-btn svg{width:15px;height:15px}
    .chat-textarea{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:.58rem .9rem;color:var(--text);font-family:'Onest',sans-serif;font-size:.83rem;font-weight:300;outline:none;resize:none;max-height:100px;transition:border-color .18s;line-height:1.5}
    .chat-textarea:focus{border-color:rgba(108,99,255,.4)}
    .send-btn{width:36px;height:36px;border-radius:10px;background:var(--accent);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:box-shadow .18s,transform .12s}
    .send-btn:hover{box-shadow:0 3px 12px rgba(108,99,255,.4);transform:translateY(-1px)}
    .send-btn:active{transform:translateY(0)}
    .send-btn svg{width:15px;height:15px}

    /* IMAGE in chat */
    .msg-img{max-width:200px;max-height:180px;border-radius:10px;display:block;cursor:pointer;transition:opacity .18s;border:1px solid var(--border)}
    .msg-img:hover{opacity:.82}
    .msg-file-link{display:flex;align-items:center;gap:.38rem;background:rgba(255,255,255,.07);border:1px solid var(--border);border-radius:9px;padding:.38rem .65rem;font-size:.76rem;text-decoration:none;color:var(--text)}
    .msg-file-link:hover{background:rgba(255,255,255,.12)}

    /* LIGHTBOX */
    .lightbox{position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.94);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
    .lightbox.show{opacity:1;pointer-events:all}
    .lightbox img{max-width:90vw;max-height:88vh;border-radius:9px;object-fit:contain}
    .lb-close{position:fixed;top:1rem;right:1.2rem;background:rgba(255,255,255,.12);border:none;color:#fff;font-size:1.1rem;width:36px;height:36px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center}

    /* TOAST */
    .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(14px);z-index:700;padding:.5rem 1.2rem;border-radius:50px;font-size:.76rem;font-weight:500;opacity:0;transition:opacity .26s,transform .26s;pointer-events:none;white-space:nowrap}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .toast.success{background:var(--success);color:#000}
    .toast.error{background:var(--error);color:#fff}
    .toast.info{background:var(--accent);color:#fff}
  </style>
</head>
<body>

<div class="chat-layout" id="appWrap" style="display:none">
  <div class="chat-hdr">
    <a href="profile.html" class="back-link">
      <svg viewBox="0 0 24 24" fill="none"><polyline points="15 18 9 12 15 6"/></svg>
    </a>
    <div class="chat-av">
      <img src="favicon.png" alt="Design Antviz" onerror="this.style.display='none';this.parentElement.innerHTML='DA'"/>
    </div>
    <div class="chat-hdr-info">
      <div class="chat-hdr-name">Design Antviz</div>
      <div class="chat-hdr-sub"><span class="online-dot"></span>Поддержка · отвечаем быстро</div>
    </div>
  </div>

  <div class="chat-msgs" id="chatMsgs"></div>

  <div class="chat-input-row">
    <input type="file" id="fileInput" style="display:none" multiple accept="image/*,.pdf,.doc,.docx,.zip,.rar,.psd,.fig" onchange="sendFiles(this.files)"/>
    <button class="file-btn" onclick="document.getElementById('fileInput').click()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
    </button>
    <textarea class="chat-textarea" id="chatInput" placeholder="Напишите сообщение..." rows="1"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"
      oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px'"></textarea>
    <button class="send-btn" onclick="sendMsg()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { auth, db } from './firebase-config.js';
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { collection, query, orderBy, onSnapshot, addDoc, serverTimestamp, doc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

let currentUser=null, unsubChat=null, chatInited=false;

// Topics configuration
const TOPICS = {
  'status': {
    label: 'Статус заказа',
    reply: 'Уточните номер заказа или название проекта — я проверю статус. Актуальную информацию вы также можете посмотреть в разделе «Мои заказы» в личном кабинете.'
  },
  'payment': {
    label: 'Оплата',
    reply: 'Принимаем оплату через СБП, банковские карты, T-Pay и SberPay. После подтверждения заказа менеджер пришлёт реквизиты. Если возникли сложности — опишите ситуацию.'
  },
  'timeline': {
    label: 'Сроки разработки',
    reply: 'Сроки зависят от объёма проекта. Лендинг — от 3 дней, многостраничный сайт — от 1 недели, интернет-магазин — от 2 недель. Уточним точные сроки после обсуждения ТЗ.'
  },
  'edits': {
    label: 'Правки в заказ',
    reply: 'Опишите, что именно хотите изменить — мы внесём правки в ближайшее время. Если правок много, менеджер свяжется для уточнения.'
  },
  'manager': {
    label: 'Связаться с менеджером',
    reply: 'Передаю ваш запрос менеджеру. Он ответит в течение нескольких минут. Если срочно — напишите в Telegram @design_antviz.'
  },
  'other': {
    label: 'Другой вопрос',
    reply: 'Опишите ваш вопрос подробнее — я передам его нужному специалисту.'
  }
};

const BOT_REPLIES = {
  'статус': [TOPICS.status.reply],
  'оплат': [TOPICS.payment.reply],
  'сроки': [TOPICS.timeline.reply],
  'правк': [TOPICS.edits.reply],
  'менеджер': [TOPICS.manager.reply],
  'default': [
    'Получил ваше сообщение! Менеджер ответит совсем скоро.',
    'Спасибо за сообщение! Обработаю и отвечу в ближайшее время.',
    'Понял вас! Отвечу как можно скорее.'
  ],
};

function getDefaultMsg(){return BOT_REPLIES.default[Math.floor(Math.random()*BOT_REPLIES.default.length)];}
function getBotReply(text){const t=(text||'').toLowerCase();for(const[key,replies] of Object.entries(BOT_REPLIES)){if(key==='default') continue;if(t.includes(key)) return replies[0];}return getDefaultMsg();}

function toast(msg,type='info'){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast ${type} show`;setTimeout(()=>t.className='toast',3200);}
function fmtTime(ts){if(!ts) return '';const d=ts.toDate?ts.toDate():new Date(ts);return d.toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});}

// Append inline buttons to the last bot message
function appendInlineButtons(buttons){
  const container = document.getElementById('chatMsgs');
  const lastMsg = container.querySelector('.msg.theirs:last-of-type');
  if(!lastMsg) return;
  
  // Remove existing inline buttons
  const existing = lastMsg.querySelector('.inline-buttons');
  if(existing) existing.remove();
  
  const btnContainer = document.createElement('div');
  btnContainer.className = 'inline-buttons';
  
  buttons.forEach(btn => {
    const button = document.createElement('button');
    button.className = `inline-btn ${btn.isBack ? 'back-btn' : ''}`;
    button.textContent = btn.label;
    button.onclick = btn.action;
    btnContainer.appendChild(button);
  });
  
  lastMsg.querySelector('.msg-bubble').appendChild(btnContainer);
  container.scrollTop = container.scrollHeight;
}

// Show topic selection
function showTopics(){
  const container = document.getElementById('chatMsgs');
  
  // Remove all inline buttons from previous messages
  container.querySelectorAll('.inline-buttons').forEach(el => el.remove());
  
  // Add bot message with topic buttons
  const div = document.createElement('div');
  div.className = 'msg theirs';
  div.innerHTML = `<div class="msg-bubble">Выберите тему обращения:</div><div class="msg-time">Бот · сейчас</div>`;
  container.appendChild(div);
  
  const buttons = Object.entries(TOPICS).map(([key, topic]) => ({
    label: topic.label,
    action: () => selectTopic(key)
  }));
  
  appendInlineButtons(buttons);
}

// Handle topic selection
async function selectTopic(topicKey){
  const topic = TOPICS[topicKey];
  if(!topic) return;
  
  // Hide all existing inline buttons
  document.querySelectorAll('.inline-buttons').forEach(el => el.remove());
  
  // Add user message (topic selection)
  const container = document.getElementById('chatMsgs');
  const userDiv = document.createElement('div');
  userDiv.className = 'msg mine';
  userDiv.innerHTML = `<div class="msg-bubble">${topic.label}</div><div class="msg-time">Вы · сейчас</div>`;
  container.appendChild(userDiv);
  container.scrollTop = container.scrollHeight;
  
  // Save to Firestore
  try{
    await addDoc(collection(db,'chats',currentUser.uid,'messages'),{
      text: topic.label, sender: 'user', senderName: currentUser.displayName || 'Пользователь', type: 'text', createdAt: serverTimestamp()
    });
  }catch(e){}
  
  // Show typing
  showTyping();
  await new Promise(r => setTimeout(r, 800 + Math.random() * 600));
  hideTyping();
  
  // Bot reply
  const botDiv = document.createElement('div');
  botDiv.className = 'msg theirs';
  botDiv.innerHTML = `<div class="msg-bubble">${topic.reply}</div><div class="msg-time">Бот · сейчас</div>`;
  container.appendChild(botDiv);
  container.scrollTop = container.scrollHeight;
  
  // Save bot reply
  try{
    await addDoc(collection(db,'chats',currentUser.uid,'messages'),{
      text: topic.reply, sender: 'bot', senderName: 'Бот', type: 'text', createdAt: serverTimestamp()
    });
  }catch(e){}
  
  // Add back button
  appendInlineButtons([{
    label: '← Выбрать другую тему',
    isBack: true,
    action: showTopics
  }]);
}

function appendMsg(m, markRead=false){
  const container=document.getElementById('chatMsgs');
  const isMe=m.sender==='user';
  const div=document.createElement('div');
  div.className=`msg ${isMe?'mine':'theirs'}`;
  if(m.type==='file'){
    const src=m.fileData||m.fileUrl||'';
    const isImg=m.fileType&&m.fileType.startsWith('image/');
    if(isImg) div.innerHTML=`<img class="msg-img" src="${src}" alt="${m.fileName||''}" onclick="openLightbox('${src.replace(/'/g,"\\'")}')"/><div class="msg-time">${isMe?'Вы':'Поддержка'} · ${fmtTime(m.createdAt)}</div>`;
    else div.innerHTML=`<a class="msg-file-link" href="${src}" download="${m.fileName}">📎 ${m.fileName||'Файл'}</a><div class="msg-time">${isMe?'Вы':'Поддержка'} · ${fmtTime(m.createdAt)}</div>`;
  } else {
    const senderName=isMe?'Вы':(m.sender==='bot'?'Бот':'Поддержка');
    div.innerHTML=`<div class="msg-bubble">${(m.text||'').replace(/\n/g,'<br>')}</div><div class="msg-time">${senderName} · ${fmtTime(m.createdAt)}</div>`;
  }
  container.appendChild(div);
  container.scrollTop=container.scrollHeight;
}

function addSystemMessage(text){
  const container = document.getElementById('chatMsgs');
  const div = document.createElement('div');
  div.className = 'system-msg';
  div.textContent = text;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function showTyping(){
  const container=document.getElementById('chatMsgs');
  const el=document.createElement('div');
  el.className='typing-indicator';el.id='typingIndicator';
  el.innerHTML='<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
  container.appendChild(el);
  container.scrollTop=container.scrollHeight;
}
function hideTyping(){document.getElementById('typingIndicator')?.remove();}

let botReplyTimer=null;
async function scheduleAutoReply(userText){
  clearTimeout(botReplyTimer);
  botReplyTimer=setTimeout(async()=>{
    showTyping();
    await new Promise(r=>setTimeout(r,1200+Math.random()*800));
    hideTyping();
    try{
      await addDoc(collection(db,'chats',currentUser.uid,'messages'),{
        text: getBotReply(userText), sender: 'bot', senderName: 'Бот', type: 'text', createdAt: serverTimestamp()
      });
    }catch(e){}
  },6000);
}

function loadChat(uid){
  if(unsubChat) unsubChat();
  const container=document.getElementById('chatMsgs');
  container.innerHTML='';
  
  // System message about privacy
  addSystemMessage('Диалоги автоматически удаляются через 7 дней. Это сделано для вашей конфиденциальности.');
  
  // Welcome message
  const welcome=document.createElement('div');
  welcome.className='msg theirs';
  welcome.innerHTML=`<div class="msg-bubble">Здравствуйте! Я бот поддержки Design Antviz. Выберите тему обращения — я помогу или передам вопрос менеджеру.</div><div class="msg-time">Бот · сейчас</div>`;
  container.appendChild(welcome);
  container.scrollTop = container.scrollHeight;
  
  // Show topic buttons
  setTimeout(() => {
    const buttons = Object.entries(TOPICS).map(([key, topic]) => ({
      label: topic.label,
      action: () => selectTopic(key)
    }));
    appendInlineButtons(buttons);
  }, 300);

  const q=query(collection(db,'chats',uid,'messages'),orderBy('createdAt','asc'));
  unsubChat=onSnapshot(q,snap=>{
    snap.docChanges().forEach(ch=>{
      if(ch.type==='added') {
        appendMsg(ch.doc.data());
        // Mark admin messages as read
        if(ch.doc.data().sender==='admin'&&!ch.doc.data().readByUser){
          updateDoc(ch.doc.ref,{readByUser:true}).catch(()=>{});
        }
      }
    });
  },e=>console.error(e));
}

window.sendMsg=async function(){
  if(!currentUser) return;
  const inp=document.getElementById('chatInput');
  const text=inp.value.trim();
  if(!text) return;
  inp.value='';inp.style.height='auto';
  
  // Remove all inline buttons when user types manually
  document.querySelectorAll('.inline-buttons').forEach(el => el.remove());
  
  try{
    await setDoc(doc(db,'chats',currentUser.uid),{name:currentUser.displayName||'',email:currentUser.email||''},{merge:true});
    await addDoc(collection(db,'chats',currentUser.uid,'messages'),{text,sender:'user',senderName:currentUser.displayName||'Пользователь',type:'text',createdAt:serverTimestamp()});
    scheduleAutoReply(text);
  }catch(e){toast('Ошибка отправки','error');}
};

window.sendFiles=async function(files){
  if(!currentUser||!files.length) return;
  document.querySelectorAll('.inline-buttons').forEach(el => el.remove());
  for(const file of Array.from(files)){
    if(file.size>3*1024*1024){toast(file.name+' > 3 МБ','error');continue;}
    try{
      const base64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(file);});
      await addDoc(collection(db,'chats',currentUser.uid,'messages'),{type:'file',fileData:base64,fileName:file.name,fileType:file.type,sender:'user',senderName:currentUser.displayName||'',createdAt:serverTimestamp()});
      toast(file.name+' ✓','success');
    }catch(e){toast('Ошибка: '+file.name,'error');}
  }
  document.getElementById('fileInput').value='';
};

window.openLightbox=function(src){document.getElementById('lightboxImg').src=src;document.getElementById('lightbox').classList.add('show');};
window.closeLightbox=function(){document.getElementById('lightbox').classList.remove('show');document.getElementById('lightboxImg').src='';};
document.addEventListener('keydown',e=>{if(e.key==='Escape') closeLightbox();});

onAuthStateChanged(auth,user=>{
  if(!user){window.location.href='auth.html';return;}
  currentUser=user;
  document.getElementById('loadingScreen').style.display='none';
  document.getElementById('appWrap').style.display='flex';
  loadChat(user.uid);
});
</script>
</body>
</html>
